<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>calc for short</title>
<style>
  :root{
    --bg:#041021; --panel:#071827; --accent:#06b6d4; --text:#e6eef6; --muted:#94a3b8;
  }
  *{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;}
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#041021 0%, #071827 100%);color:var(--text);-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none}

  /* fixed back button top-left */
  .back-global{
    position:fixed;left:12px;top:12px;z-index:9999;
    background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--text);
    padding:8px 12px;border-radius:8px;font-weight:700;font-size:13px;
    backdrop-filter: blur(6px);
  }

  /* page layout */
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .calc{
    width:980px;max-width:96vw;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:12px;padding:14px;box-shadow:0 12px 40px rgba(2,6,23,0.6);
    display:flex;flex-direction:column;gap:12px;
    max-height:calc(100vh - 48px);
    overflow:hidden;
  }

  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .title{font-weight:800;font-size:18px;color:var(--text);text-align:center;flex:1;}
  .right-controls{display:flex;gap:8px;align-items:center;}
  .apple-btn{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:18px;color:var(--text);}
  .apple-input{display:none;padding:6px 8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text);width:160px;}
  .clear-btn{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:6px 10px;border-radius:8px;cursor:pointer;color:var(--text);font-weight:700;}

  /* content area scrolls internally to avoid page growth */
  .content{display:flex;flex-direction:column;gap:12px;overflow:auto;padding-right:6px;}
  .display{background:rgba(255,255,255,0.02);padding:12px;border-radius:8px;min-height:110px;display:flex;flex-direction:column;justify-content:space-between;flex:0 0 auto;}
  .expr{font-size:20px;color:var(--muted);min-height:36px;outline:none;white-space:pre-wrap;word-break:break-all;padding:4px;max-height:160px;overflow:auto;}
  .result{font-size:30px;color:var(--accent);font-weight:800;text-align:right;word-break:break-all;}

  /* keypad */
  .kbd{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:12px;flex:0 0 auto;}
  .key{padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));color:var(--text);font-weight:700;cursor:pointer;font-size:14px;}
  .key.wide{grid-column:span 2;}
  .key.accent{background:linear-gradient(180deg,var(--accent),#0284c7);color:#001;}
  .muted{color:var(--muted);font-size:13px;}

  /* games panel */
  .games-panel{margin-top:12px;background:rgba(255,255,255,0.01);padding:12px;border-radius:8px;display:none;flex-direction:column;gap:8px;overflow:auto;flex:1 1 auto;}
  .games-panel.active{display:flex;}
  .games-header{display:flex;justify-content:space-between;align-items:center;}
  .games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
  .game-card{padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.01);cursor:pointer;text-align:center;font-weight:700;color:var(--text);min-height:48px;display:flex;align-items:center;justify-content:center;}

  /* full-game view header */
  .game-full-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .game-full-title{font-weight:800;}
  .game-close{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:6px 8px;border-radius:8px;cursor:pointer;color:var(--text);}

  .game-area{min-height:220px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;overflow:auto;}
  .footer{margin-top:12px;text-align:right;color:var(--muted);font-size:12px;}
  @media (max-width:980px){ .kbd{grid-template-columns:repeat(4,1fr);} .calc{width:100%;padding:12px;} .apple-input{width:120px;} }
</style>
</head>
<body>
  <a class="back-global" href="index.html" title="Back to Dashboard">← Back to Dashboard</a>

  <div class="wrap">
    <div class="calc" role="application" aria-label="Modded Advanced Calculator — 30+ Games">
      <div class="top">
        <div style="width:44px;"></div>
        <div class="title">Modded Advanced Calculator</div>

        <div class="right-controls">
          <button id="apple-btn" class="apple-btn" title="Secret">🍎</button>
          <input id="apple-input" class="apple-input" aria-label="Secret input" />
          <button id="clear-all" class="clear-btn" title="Clear calculator">Clear</button>
        </div>
      </div>

      <div class="content">
        <div class="display" aria-live="polite">
          <div id="expression" class="expr" contenteditable="true" spellcheck="false" aria-label="Expression input">0</div>
          <div id="result" class="result">0</div>
        </div>

        <div class="kbd" role="group" aria-label="Keypad">
          <button class="key" data-insert="(">(</button>
          <button class="key" data-insert=")">)</button>
          <button class="key" data-insert="^">^</button>
          <button class="key" data-insert="pi">π</button>
          <button class="key" data-insert="e">e</button>
          <button class="key" id="back">⌫</button>

          <button class="key" data-insert="sin(">sin</button>
          <button class="key" data-insert="cos(">cos</button>
          <button class="key" data-insert="tan(">tan</button>
          <button class="key" data-insert="ln(">ln</button>
          <button class="key" data-insert="log10(">log</button>
          <button class="key" data-insert="sqrt(">√</button>

          <button class="key" data-insert="7">7</button>
          <button class="key" data-insert="8">8</button>
          <button class="key" data-insert="9">9</button>
          <button class="key" data-insert="/">÷</button>
          <button class="key" data-insert="%">mod</button>
          <button class="key" id="clear">C</button>

          <button class="key" data-insert="4">4</button>
          <button class="key" data-insert="5">5</button>
          <button class="key" data-insert="6">6</button>
          <button class="key" data-insert="*">×</button>
          <button class="key" data-insert="!">n!</button>
          <button class="key" data-insert="abs(">abs</button>

          <button class="key" data-insert="1">1</button>
          <button class="key" data-insert="2">2</button>
          <button class="key" data-insert="3">3</button>
          <button class="key" data-insert="-">−</button>
          <button class="key" data-insert="pow(">pow</button>
          <button class="key wide accent" id="eval">=</button>

          <button class="key" data-insert="0">0</button>
          <button class="key" data-insert=".">.</button>
          <button class="key" data-insert=",">,</button>
          <button class="key" data-insert="exp(">exp</button>
          <button class="key" data-insert="i">i</button>
          <button class="key" id="ans">ANS</button>
        </div>

        <!-- games panel -->
        <div id="games-panel" class="games-panel" aria-hidden="true">
          <div class="games-header">
            <div class="muted">Games — Modded Mode</div>
            <div style="display:flex;gap:8px;">
              <button id="games-hide" class="key small">Close Games</button>
            </div>
          </div>

          <div id="games-launcher" class="games-grid" aria-label="Games launcher"></div>

          <div id="games-full" style="display:none;flex-direction:column;gap:8px;">
            <div class="game-full-header">
              <div id="games-full-title" class="game-full-title"></div>
              <button id="games-full-close" class="game-close" title="Back to launcher">✕</button>
            </div>
            <div id="games-full-area" class="game-area"></div>
          </div>

          <div id="game-area" class="game-area"></div>
        </div>
      </div>

      <div class="footer">Type into the expression or use the inline tools. Press Ctrl+Enter to evaluate.</div>
    </div>
  </div>

<script>
/* Modded Advanced Calculator with 30+ games
   - Secret apple input toggles when apple clicked; no placeholder or hint
   - Games launcher shows many cards; clicking a card opens full-game view replacing launcher area
   - Full-game view has an X button to return to launcher
   - Clear button at top-right clears expression and result
   - Games are implemented inline and kept compact to avoid layout glitches
*/

/* DOM helpers */
const $ = id => document.getElementById(id);
const exprDiv = $('expression');
const resultDiv = $('result');
const appleBtn = $('apple-btn');
const appleInput = $('apple-input');
const clearAllBtn = $('clear-all');
const gamesPanel = $('games-panel');
const gamesLauncher = $('games-launcher');
const gamesFull = $('games-full');
const gamesFullTitle = $('games-full-title');
const gamesFullArea = $('games-full-area');
const gamesFullClose = $('games-full-close');
const gamesHide = $('games-hide');

let state = { ans: 0, memory: 0 };

/* --- Evaluator (safe-ish) --- */
function factorial(n){
  n = Math.floor(n);
  if(n < 0) return NaN;
  if(n === 0) return 1;
  let r = 1;
  for(let i=2;i<=n;i++) r *= i;
  return r;
}
function sanitize(expr){
  return expr.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-').replace(/mod/g,'%').replace(/\^/g,'**');
}
function mapFunctions(s){
  const map = {
    'pi':'Math.PI','e':'Math.E',
    'sin':'Math.sin','cos':'Math.cos','tan':'Math.tan',
    'asin':'Math.asin','acos':'Math.acos','atan':'Math.atan',
    'sinh':'Math.sinh','cosh':'Math.cosh','tanh':'Math.tanh',
    'exp':'Math.exp','ln':'Math.log','log10':'Math.log10','log':'Math.log10',
    'sqrt':'Math.sqrt','abs':'Math.abs','floor':'Math.floor','ceil':'Math.ceil','round':'Math.round',
    'pow':'Math.pow','min':'Math.min','max':'Math.max'
  };
  let out = s;
  Object.keys(map).forEach(k=>{
    out = out.replace(new RegExp('\\b'+k+'\\b','g'), map[k]);
  });
  out = out.replace(/(\d+|\))!/g, (m, p1) => `factorial(${p1})`);
  return out;
}
function evaluateExpression(expr, scope = {}){
  try{
    const s = sanitize(expr);
    const mapped = mapFunctions(s);
    const names = Object.keys(scope).concat(['factorial','Math','state']);
    const vals = Object.values(scope).concat([factorial, Math, state]);
    const fn = new Function(...names, `return (${mapped});`);
    const res = fn(...vals);
    return res;
  }catch(e){
    return { error: e.message || String(e) };
  }
}
function displayResult(expr, res){
  if(res && res.error){
    resultDiv.textContent = 'Error';
  } else {
    let out = res;
    if(typeof out === 'number'){
      if(!isFinite(out)) out = String(out);
      else out = Number(Math.round(out * 1e12) / 1e12);
    } else if(Array.isArray(out)) out = JSON.stringify(out);
    resultDiv.textContent = out;
    state.ans = (typeof out === 'number') ? out : (Number(out) || out);
  }
}

/* --- Secret apple input --- */
appleBtn.addEventListener('click', ()=>{
  if(appleInput.style.display === 'block'){
    appleInput.style.display = 'none';
    appleInput.value = '';
  } else {
    appleInput.style.display = 'block';
    appleInput.focus();
  }
});
appleInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    const v = (appleInput.value || '').trim().toLowerCase();
    appleInput.value = '';
    appleInput.style.display = 'none';
    if(v === 'games') openGamesPanel();
    else if(v === 'clear') { exprDiv.textContent='0'; resultDiv.textContent='0'; }
    else if(v === 'tools') showTool('plot');
    // silent for unknown commands
  } else if(e.key === 'Escape'){
    appleInput.style.display = 'none';
    appleInput.value = '';
  }
});

/* --- Keypad wiring --- */
document.querySelectorAll('[data-insert]').forEach(btn=>{
  btn.addEventListener('click', ()=> insertAtCursor(btn.getAttribute('data-insert')));
});
function insertAtCursor(text){
  const sel = window.getSelection();
  if(!sel.rangeCount){
    exprDiv.textContent = text;
    return;
  }
  const range = sel.getRangeAt(0);
  if(!exprDiv.contains(range.commonAncestorContainer)){
    exprDiv.focus();
    exprDiv.textContent = text;
    return;
  }
  range.deleteContents();
  const node = document.createTextNode(text);
  range.insertNode(node);
  range.setStartAfter(node);
  range.setEndAfter(node);
  sel.removeAllRanges();
  sel.addRange(range);
  exprDiv.focus();
}
$('back')?.addEventListener('click', ()=> {
  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if(range.collapsed){
    const node = range.startContainer;
    const offset = range.startOffset;
    if(node.nodeType === Node.TEXT_NODE){
      const text = node.textContent;
      const before = text.slice(0, Math.max(0, offset-1));
      const after = text.slice(offset);
      node.textContent = before + after;
      const newOffset = Math.max(0, offset-1);
      range.setStart(node, newOffset);
      range.setEnd(node, newOffset);
      sel.removeAllRanges();
      sel.addRange(range);
    } else {
      exprDiv.textContent = exprDiv.textContent.slice(0, -1);
    }
  } else {
    range.deleteContents();
  }
  exprDiv.focus();
});
$('clear')?.addEventListener('click', ()=> { exprDiv.textContent = '0'; resultDiv.textContent = '0'; exprDiv.focus(); });
$('ans')?.addEventListener('click', ()=> insertAtCursor(String(state.ans)));
$('eval')?.addEventListener('click', ()=> {
  const expr = exprDiv.textContent.trim();
  if(!expr) return;
  const r = evaluateExpression(expr, {x:0});
  displayResult(expr, r);
});
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)){ e.preventDefault(); $('eval').click(); }
  if(e.key === 'Escape'){ $('clear').click(); }
});

/* top-right Clear button */
clearAllBtn.addEventListener('click', ()=>{
  exprDiv.textContent = '0';
  resultDiv.textContent = '0';
  exprDiv.focus();
});

/* --- Tools placeholder (kept minimal) --- */
function showTool(name){
  // kept intentionally minimal; tools are available via secret input if needed
  alert('Tool: ' + name);
}

/* --- Games registry --- */
const games = [];
function registerGame(id, title, renderFn){
  games.push({id,title,render:renderFn});
}

/* Helper to open full game view */
function openFullGame(title, renderFn){
  gamesLauncher.style.display = 'none';
  $('game-area').style.display = 'none';
  gamesFull.style.display = 'flex';
  gamesFullTitle.textContent = title;
  gamesFullArea.innerHTML = '';
  try{ renderFn(gamesFullArea); }catch(e){ gamesFullArea.innerHTML = '<div class="muted">Game failed to load.</div>'; console.error(e); }
}
gamesFullClose.addEventListener('click', ()=>{
  gamesFull.style.display = 'none';
  gamesFullArea.innerHTML = '';
  gamesLauncher.style.display = '';
  $('game-area').style.display = '';
});
gamesHide.addEventListener('click', closeGamesPanel);

/* --- Implement 30+ compact games --- */

/* 1 Guess Number */
registerGame('guess','Guess Number', (container)=>{
  container.innerHTML = '';
  const msg = document.createElement('div'); msg.className='muted'; msg.textContent='Guess a number 1-100';
  const row = document.createElement('div'); row.style.display='flex'; row.style.gap='8px'; row.style.marginTop='8px';
  const input = document.createElement('input'); input.type='text';
  const go = document.createElement('button'); go.className='key small'; go.textContent='Guess';
  const newb = document.createElement('button'); newb.className='key small'; newb.textContent='New';
  const out = document.createElement('div'); out.className='muted'; out.style.marginTop='8px';
  row.appendChild(input); row.appendChild(go); row.appendChild(newb);
  container.appendChild(msg); container.appendChild(row); container.appendChild(out);
  let target = Math.floor(Math.random()*100)+1;
  go.addEventListener('click', ()=>{
    const v = Number(input.value);
    if(isNaN(v)) return out.textContent='Enter a number';
    if(v === target){ out.textContent='Correct!'; state.ans = v; }
    else if(v < target) out.textContent='Too low';
    else out.textContent='Too high';
  });
  newb.addEventListener('click', ()=>{ target = Math.floor(Math.random()*100)+1; out.textContent='New game started'; input.value=''; });
});

/* 2 Coin Flip */
registerGame('coin','Coin Flip', (container)=>{
  container.innerHTML = '';
  const btn = document.createElement('button'); btn.className='key small'; btn.textContent='Flip';
  const out = document.createElement('div'); out.className='muted'; out.style.marginTop='8px';
  container.appendChild(btn); container.appendChild(out);
  btn.addEventListener('click', ()=>{ const r = Math.random()<0.5?'Heads':'Tails'; out.textContent = r; state.ans = r; });
});

/* 3 Dice Roll */
registerGame('dice','Dice Roll', (container)=>{
  container.innerHTML = '';
  const btn = document.createElement('button'); btn.className='key small'; btn.textContent='Roll';
  const out = document.createElement('div'); out.className='muted'; out.style.marginTop='8px';
  container.appendChild(btn); container.appendChild(out);
  btn.addEventListener('click', ()=>{ const r = Math.floor(Math.random()*6)+1; out.textContent = r; state.ans = r; });
});

/* 4 Rock Paper Scissors */
registerGame('rps','Rock Paper Scissors', (container)=>{
  container.innerHTML = '';
  const msg = document.createElement('div'); msg.className='muted';
  const row = document.createElement('div'); row.style.display='flex'; row.style.gap='8px'; row.style.marginTop='8px';
  ['rock','paper','scissors'].forEach(m=>{
    const b = document.createElement('button'); b.className='key small'; b.textContent = m;
    b.addEventListener('click', ()=>{
      const choices = ['rock','paper','scissors']; const comp = choices[Math.floor(Math.random()*3)];
      let res = '';
      if(m === comp) res = 'Tie';
      else if((m==='rock'&&comp==='scissors')||(m==='paper'&&comp==='rock')||(m==='scissors'&&comp==='paper')) res = 'You win';
      else res = 'You lose';
      msg.textContent = `You: ${m} · CPU: ${comp} → ${res}`;
    });
    row.appendChild(b);
  });
  container.appendChild(msg); container.appendChild(row);
});

/* 5 Tic Tac Toe */
registerGame('ttt','Tic Tac Toe', (container)=>{
  container.innerHTML = '';
  const msg = document.createElement('div'); msg.className='muted'; msg.textContent='You are X';
  const boardEl = document.createElement('div'); boardEl.style.display='grid'; boardEl.style.gridTemplateColumns='repeat(3,80px)'; boardEl.style.gap='6px'; boardEl.style.marginTop='8px';
  const reset = document.createElement('button'); reset.className='key small'; reset.textContent='Reset';
  container.appendChild(msg); container.appendChild(boardEl); container.appendChild(reset);
  let board = Array(9).fill(null);
  function render(){
    boardEl.innerHTML = '';
    for(let i=0;i<9;i++){
      const b = document.createElement('button'); b.className='key small'; b.style.width='80px'; b.style.height='80px'; b.style.fontSize='22px';
      b.textContent = board[i] || '';
      b.addEventListener('click', ()=>{
        if(board[i]) return;
        board[i] = 'X';
        if(checkWin('X')){ msg.textContent='You win!'; render(); return; }
        aiMove();
        if(checkWin('O')){ msg.textContent='CPU wins'; render(); return; }
        if(board.every(x=>x)) msg.textContent='Tie';
        render();
      });
      boardEl.appendChild(b);
    }
  }
  function aiMove(){ const empties = board.map((v,i)=>v?null:i).filter(v=>v!==null); if(empties.length===0) return; const idx = empties[Math.floor(Math.random()*empties.length)]; board[idx] = 'O'; }
  function checkWin(p){ const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; return wins.some(line => line.every(i => board[i] === p)); }
  reset.addEventListener('click', ()=>{ board = Array(9).fill(null); msg.textContent=''; render(); });
  render();
});

/* 6 Snake */
registerGame('snake','Snake', (container)=>{
  container.innerHTML = '';
  const msg = document.createElement('div'); msg.className='muted'; msg.textContent='Arrow keys to move';
  const canvas = document.createElement('canvas'); canvas.width = 480; canvas.height = 320; canvas.style.marginTop='8px';
  const controls = document.createElement('div'); controls.style.display='flex'; controls.style.gap='8px'; controls.style.marginTop='8px';
  const start = document.createElement('button'); start.className='key small'; start.textContent='Start';
  const stop = document.createElement('button'); stop.className='key small'; stop.textContent='Stop';
  const reset = document.createElement('button'); reset.className='key small'; reset.textContent='Reset';
  controls.appendChild(start); controls.appendChild(stop); controls.appendChild(reset);
  container.appendChild(msg); container.appendChild(canvas); container.appendChild(controls);
  const ctx = canvas.getContext('2d');
  const cols = 24, rows = 16;
  const cellW = canvas.width / cols, cellH = canvas.height / rows;
  let snake = [{x:5,y:8},{x:4,y:8},{x:3,y:8}];
  let dir = 'right';
  let food = {x:12,y:8};
  let interval = null;
  let running = false;
  function draw(){
    ctx.fillStyle = '#071022';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#ff6b6b';
    ctx.fillRect(food.x*cellW, food.y*cellH, cellW-1, cellH-1);
    ctx.fillStyle = '#06b6d4';
    snake.forEach(seg => ctx.fillRect(seg.x*cellW, seg.y*cellH, cellW-1, cellH-1));
  }
  function placeFood(){
    let fx, fy;
    do{
      fx = Math.floor(Math.random()*cols);
      fy = Math.floor(Math.random()*rows);
    }while(snake.some(s=>s.x===fx && s.y===fy));
    food = {x:fx,y:fy};
  }
  function step(){
    const head = snake[0];
    let nx = head.x, ny = head.y;
    if(dir === 'right') nx++;
    if(dir === 'left') nx--;
    if(dir === 'up') ny--;
    if(dir === 'down') ny++;
    if(nx < 0) nx = cols-1;
    if(nx >= cols) nx = 0;
    if(ny < 0) ny = rows-1;
    if(ny >= rows) ny = 0;
    if(snake.some(s=>s.x===nx && s.y===ny)){ stopGame(); msg.textContent = 'Game over'; return; }
    snake.unshift({x:nx,y:ny});
    if(nx === food.x && ny === food.y){ placeFood(); }
    else snake.pop();
    draw();
  }
  function startGame(){ if(running) return; running = true; interval = setInterval(step, 120); msg.textContent='Running'; }
  function stopGame(){ running = false; clearInterval(interval); interval = null; msg.textContent='Stopped'; }
  function resetGame(){ snake = [{x:5,y:8},{x:4,y:8},{x:3,y:8}]; dir='right'; placeFood(); draw(); msg.textContent='Ready'; }
  start.addEventListener('click', startGame);
  stop.addEventListener('click', stopGame);
  reset.addEventListener('click', ()=>{ stopGame(); resetGame(); });

registerGame('connect4','Connect Four', (container)=>{
  container.innerHTML = '';
  const cols = 7, rows = 6;
  const board = Array(cols).fill(0).map(()=>Array(rows).fill(null));
  const boardEl = document.createElement('div'); boardEl.style.display='grid'; boardEl.style.gridTemplateColumns=`repeat(${cols},40px)`; boardEl.style.gap='4px';
  const msg = document.createElement('div'); msg.className='muted'; msg.style.marginTop='8px';
  const reset = document.createElement('button'); reset.className='key small'; reset.textContent='Reset';
  container.appendChild(boardEl); container.appendChild(msg); container.appendChild(reset);
  function render(){
    boardEl.innerHTML = '';
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const b = document.createElement('button'); b.className='key small'; b.style.width='40px'; b.style.height='40px';
        b.textContent = board[c][r] || '';
        b.addEventListener('click', ()=> drop(c));
        boardEl.appendChild(b);
      }
    }
  }
  function drop(c){
    for(let r=rows-1;r>=0;r--){
      if(!board[c][r]){ board[c][r]='X'; if(checkWin('X')){ msg.textContent='You win'; render(); return; } aiMove(); render(); return; }
    }
  }
  function aiMove(){ const c = Math.floor(Math.random()*cols); for(let r=rows-1;r>=0;r--) if(!board[c][r]){ board[c][r]='O'; if(checkWin('O')) msg.textContent='CPU wins'; return; } }
  function checkWin(p){
    for(let c=0;c<cols;c++) for(let r=0;r<rows;r++){
      if(c+3<cols && board[c][r]===p && board[c+1][r]===p && board[c+2][r]===p && board[c+3][r]===p) return true;
      if(r+3<rows && board[c][r]===p && board[c][r+1]===p && board[c][r+2]===p && board[c][r+3]===p) return true;
      if(c+3<cols && r+3<rows && board[c][r]===p && board[c+1][r+1]===p && board[c+2][r+2]===p && board[c+3][r+3]===p) return true;
      if(c-3>=0 && r+3<rows && board[c][r]===p && board[c-1][r+1]===p && board[c-2][r+2]===p && board[c-3][r+3]===p) return true;
    }
    return false;
  }
  reset.addEventListener('click', ()=>{ for(let c=0;c<cols;c++) for(let r=0;r<rows;r++) board[c][r]=null; msg.textContent=''; render(); });
  render();
});

/* 28 Maze (click to move) */
registerGame('maze','Maze', (container)=>{
  container.innerHTML = '';
  const boardEl = document.createElement('div'); boardEl.style.display='grid'; boardEl.style.gridTemplateColumns='repeat(8,36px)'; boardEl.style.gap='4px';

  container.appendChild(boardEl); container.appendChild(reset); container.appendChild(msg);
  const cols=8, rows=6;
  let player={x:0,y:0}, goal={x:cols-1,y:rows-1};
  function render(){
    boardEl.innerHTML='';
    for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
      const b=document.createElement('button'); b.className='key small'; b.style.width='36px'; b.style.height='36px';
      if(player.x===x && player.y===y) b.textContent='🙂';
      else if(goal.x===x && goal.y===y) b.textContent='🏁';
      else b.textContent='';
      b.addEventListener('click', ()=>{ if(Math.abs(player.x-x)+Math.abs(player.y-y)===1){ player={x,y}; render(); if(player.x===goal.x && player.y===goal.y) msg.textContent='You reached the goal!'; } });
      boardEl.appendChild(b);
    }
  }
  reset.addEventListener('click', ()=>{ player={x:0,y:0}; goal={x:cols-1,y:rows-1}; msg.textContent=''; render(); });
  render();
});

/* 35 Pair Match */
registerGame('pairmatch','Pair Match', (container)=>{
  container.innerHTML = '';
  const boardEl = document.createElement('div'); boardEl.style.display='grid'; boardEl.style.gridTemplateColumns='repeat(6,48px)'; boardEl.style.gap='6px';
  const reset = document.createElement('button'); reset.className='key small'; reset.textContent='Reset';
  const msg = document.createElement('div'); msg.className='muted'; msg.style.marginTop='8px';
  container.appendChild(boardEl); container.appendChild(reset); container.appendChild(msg);
  let cards=[];
  function resetGame(){
    const vals = [];
    for(let i=1;i<=9;i++){ vals.push(i); vals.push(i); }
    for(let i=vals.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [vals[i],vals[j]]=[vals[j],vals[i]]; }
    cards = vals.map(v=>({v,flipped:false,matched:false}));
    render();
  }
  function render(){
    boardEl.innerHTML='';
    cards.forEach((c,i)=>{
      const b=document.createElement('button'); b.className='key small'; b.style.width='48px'; b.style.height='48px';
      b.textContent = c.flipped || c.matched ? c.v : '';
      b.addEventListener('click', ()=>{
        if(c.flipped || c.matched) return;
        c.flipped = true; render();
        const flipped = cards.map((x,idx)=>x.flipped && !x.matched ? idx : -1).filter(x=>x!==-1);
        if(flipped.length===2){
          const [a,bidx] = flipped;
          if(cards[a].v === cards[bidx].v){ cards[a].matched = cards[bidx].matched = true; cards[a].flipped = cards[bidx].flipped = true; }
          else setTimeout(()=>{ cards[a].flipped = cards[bidx].flipped = false; render(); }, 600);
        }
      });
      boardEl.appendChild(b);
    });
  }
  reset.addEventListener('click', resetGame);
  resetGame();
});

/* Build launcher UI */
function buildLauncher(){
  gamesLauncher.innerHTML = '';
  games.forEach(g=>{
    const card = document.createElement('div');
    card.className = 'game-card';
    card.textContent = g.title;
    card.dataset.id = g.id;
    card.addEventListener('click', ()=> {
      openFullGame(g.title, g.render);
    });
    gamesLauncher.appendChild(card);
  });
}

/* Open/close games panel */
function openGamesPanel(){
  gamesLauncher.style.display = '';
  $('game-area').style.display = '';
  gamesFull.style.display = 'none';
  gamesPanel.classList.add('active');
  gamesPanel.setAttribute('aria-hidden','false');
  buildLauncher();
}
function closeGamesPanel(){
  gamesPanel.classList.remove('active');
  gamesPanel.setAttribute('aria-hidden','true');
  gamesFull.style.display = 'none';
  gamesFullArea.innerHTML = '';
  gamesLauncher.innerHTML = '';
  $('game-area').innerHTML = '';
}
