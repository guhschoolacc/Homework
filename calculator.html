<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Widescreen Scientific Calculator</title>
<style>
  :root{
    --bg:#0f1724;
    --panel:#0b1220;
    --accent:#00b4d8;
    --muted:#94a3b8;
    --glass: rgba(255,255,255,0.03);
    --btn:#111827;
    --btn-hover:#1f2937;
    --danger:#ef4444;
    --success:#10b981;
    --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }
  html,body{height:100%;margin:0;font-family:var(--font-sans);background:linear-gradient(180deg,#071024 0%, #071a2a 100%);color:#e6eef6}
  .topbar{
    display:flex;align-items:center;gap:16px;padding:14px 20px;background:transparent;
  }
  .back-btn{
    background:var(--glass);color:var(--accent);border:1px solid rgba(0,180,216,0.12);padding:8px 12px;border-radius:8px;text-decoration:none;font-weight:600;
  }
  .container{
    max-width:1400px;margin:20px auto;padding:18px;display:flex;gap:18px;
  }
  .calc{
    flex:1;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:14px;padding:18px;box-shadow:0 8px 30px rgba(2,6,23,0.6);
    display:flex;flex-direction:column;
  }
  .display{
    background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:10px;padding:18px;color:#e6eef6;border:1px solid rgba(255,255,255,0.03);
    display:flex;flex-direction:column;gap:8px;
  }
  .top-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
  .mode{font-size:13px;color:var(--muted);display:flex;gap:8px;align-items:center}
  .screen{
    font-family: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, "Courier New", monospace;
    font-size:22px;padding:10px;background:transparent;border-radius:6px;color:#dff6ff;min-height:56px;display:flex;align-items:center;justify-content:flex-end;
    word-break:break-all;
  }
  .result{font-size:18px;color:var(--muted);text-align:right;min-height:20px}
  .kbd{
    margin-top:14px;display:grid;grid-template-columns:repeat(6,1fr);gap:10px;
  }
  button.key{
    background:var(--btn);border:1px solid rgba(255,255,255,0.03);color:#e6eef6;padding:14px;border-radius:10px;font-size:15px;cursor:pointer;
    transition:transform .06s, background .12s;
  }
  button.key:hover{transform:translateY(-2px);background:var(--btn-hover)}
  button.wide{grid-column:span 2}
  .side{
    width:360px;min-width:300px;background:linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,0.02);
    display:flex;flex-direction:column;gap:12px;
  }
  .panel-title{font-weight:700;color:#dff6ff}
  .history{background:rgba(255,255,255,0.02);padding:10px;border-radius:8px;max-height:360px;overflow:auto;font-family:monospace;font-size:13px;color:var(--muted)}
  .history-item{padding:8px;border-bottom:1px dashed rgba(255,255,255,0.02);display:flex;justify-content:space-between;gap:8px}
  .vars{background:rgba(255,255,255,0.02);padding:10px;border-radius:8px;font-family:monospace;font-size:13px;color:var(--muted);min-height:120px}
  .small{font-size:13px;color:var(--muted)}
  .footer{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:12px}
  .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
  .btn-primary{background:linear-gradient(90deg,var(--accent),#00f0ff);color:#021124;border:none;padding:10px 12px;border-radius:10px;font-weight:700;cursor:pointer}
  .toggle{display:inline-flex;align-items:center;gap:8px}
  .kbd-help{font-size:12px;color:var(--muted)}
  @media (max-width:1000px){
    .container{flex-direction:column;padding:12px}
    .side{width:100%}
    .kbd{grid-template-columns:repeat(4,1fr)}
  }
</style>
</head>
<body>
  <div class="topbar">
    <a class="back-btn" href="index.html" title="Back to dashboard">← Back to Dashboard</a>
    <div style="flex:1"></div>
  </div>

  <div class="container">
    <div class="calc" role="application" aria-label="Scientific calculator">
      <div class="display" id="displayPanel">
        <div class="top-row">
          <div class="mode">
            <label class="small">Mode</label>
            <select id="angleMode" title="Angle mode" style="background:transparent;border:none;color:var(--muted);font-weight:700">
              <option value="rad">Radians</option>
              <option value="deg">Degrees</option>
            </select>
            <label class="small" style="margin-left:8px">Precision</label>
            <input id="precision" type="number" min="0" max="12" value="8" style="width:64px;background:transparent;border:none;color:var(--muted)" />
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn-ghost" id="copyBtn" title="Copy result">Copy</button>
            <button class="btn-ghost" id="clearAll" title="Clear everything">Clear</button>
          </div>
        </div>

        <div class="screen" id="expr" aria-live="polite">0</div>
        <div class="result" id="result"> </div>

        <div class="kbd" id="buttons">
          <!-- Row 1 -->
          <button class="key" data-val="(">(</button>
          <button class="key" data-val=")">)</button>
          <button class="key" data-val="pi">π</button>
          <button class="key" data-val="e">e</button>
          <button class="key" data-action="back">⌫</button>
          <button class="key" data-action="enter" style="background:linear-gradient(90deg,var(--accent),#00f0ff);color:#021124">=</button>

          <!-- Row 2 -->
          <button class="key" data-val="sin(">sin</button>
          <button class="key" data-val="cos(">cos</button>
          <button class="key" data-val="tan(">tan</button>
          <button class="key" data-val="asin(">asin</button>
          <button class="key" data-val="acos(">acos</button>
          <button class="key" data-val="atan(">atan</button>

          <!-- Row 3 -->
          <button class="key" data-val="sinh(">sinh</button>
          <button class="key" data-val="cosh(">cosh</button>
          <button class="key" data-val="tanh(">tanh</button>
          <button class="key" data-val="log10(">log</button>
          <button class="key" data-val="ln(">ln</button>
          <button class="key" data-val="sqrt(">√</button>

          <!-- Row 4 -->
          <button class="key" data-val="^">^</button>
          <button class="key" data-val="**">pow</button>
          <button class="key" data-val="abs(">abs</button>
          <button class="key" data-val="!">!</button>
          <button class="key" data-val="nPr(">nPr</button>
          <button class="key" data-val="nCr(">nCr</button>

          <!-- Row 5 -->
          <button class="key" data-val="7">7</button>
          <button class="key" data-val="8">8</button>
          <button class="key" data-val="9">9</button>
          <button class="key" data-val="/">÷</button>
          <button class="key" data-val="%">mod</button>
          <button class="key" data-val="floor(">floor</button>

          <!-- Row 6 -->
          <button class="key" data-val="4">4</button>
          <button class="key" data-val="5">5</button>
          <button class="key" data-val="6">6</button>
          <button class="key" data-val="*">×</button>
          <button class="key" data-val="exp(">exp</button>
          <button class="key" data-val="ceil(">ceil</button>

          <!-- Row 7 -->
          <button class="key" data-val="1">1</button>
          <button class="key" data-val="2">2</button>
          <button class="key" data-val="3">3</button>
          <button class="key" data-val="-">−</button>
          <button class="key" data-val="round(">round</button>
          <button class="key" data-val="trunc(">trunc</button>

          <!-- Row 8 -->
          <button class="key wide" data-val="0">0</button>
          <button class="key" data-val=".">.</button>
          <button class="key" data-val="+">+</button>
          <button class="key" data-val="ans">ans</button>
          <button class="key" data-val="=" data-action="enter">Enter</button>

          <!-- Row 9 letters -->
          <button class="key" data-val="a">a</button>
          <button class="key" data-val="b">b</button>
          <button class="key" data-val="c">c</button>
          <button class="key" data-val="d">d</button>
          <button class="key" data-val="f">f</button>
          <button class="key" data-val="g">g</button>

          <!-- Row 10 letters -->
          <button class="key" data-val="h">h</button>
          <button class="key" data-val="i">i</button>
          <button class="key" data-val="j">j</button>
          <button class="key" data-val="k">k</button>
          <button class="key" data-val="l">l</button>
          <button class="key" data-val="m">m</button>

          <!-- Row 11 letters -->
          <button class="key" data-val="n">n</button>
          <button class="key" data-val="o">o</button>
          <button class="key" data-val="p">p</button>
          <button class="key" data-val="q">q</button>
          <button class="key" data-val="r">r</button>
          <button class="key" data-val="s">s</button>

          <!-- Row 12 letters -->
          <button class="key" data-val="t">t</button>
          <button class="key" data-val="u">u</button>
          <button class="key" data-val="v">v</button>
          <button class="key" data-val="w">w</button>
          <button class="key" data-val="x">x</button>
          <button class="key" data-val="y">y</button>

          <!-- Row 13 -->
          <button class="key" data-val="z">z</button>
          <button class="key" data-val="=" data-action="assign">assign</button>
          <button class="key" data-val=";">;</button>
          <button class="key" data-action="clear">AC</button>
          <button class="key" data-action="mem+">M+</button>
          <button class="key" data-action="mem-">M-</button>
        </div>
      </div>

      <div class="footer">
        <div class="kbd-help small">Type expressions, use letters for variables, assign with <strong>a = 3</strong>, use <strong>ans</strong> for last result.</div>
        <div style="display:flex;gap:8px">
          <button class="btn-ghost" id="toggleHistory">Toggle History</button>
          <button class="btn-ghost" id="clearHistory">Clear History</button>
        </div>
      </div>
    </div>

    <aside class="side" id="sidePanel">
      <div>
        <div class="panel-title">History</div>
        <div class="history" id="historyList"></div>
      </div>

      <div>
        <div class="panel-title">Variables</div>
        <div class="vars" id="varsList">No variables set</div>
      </div>

      <div>
        <div class="panel-title">Memory</div>
        <div class="vars" id="memoryList">Memory: 0</div>
      </div>
    </aside>
  </div>

<script>
(() => {
  const exprEl = document.getElementById('expr');
  const resultEl = document.getElementById('result');
  const buttons = document.getElementById('buttons');
  const historyList = document.getElementById('historyList');
  const varsList = document.getElementById('varsList');
  const memoryList = document.getElementById('memoryList');
  const angleMode = document.getElementById('angleMode');
  const precisionInput = document.getElementById('precision');

  let expr = '';
  let lastAns = 0;
  let memory = 0;
  let history = [];
  let vars = {}; // letter variables

  const functions = [
    'sin','cos','tan','asin','acos','atan',
    'sinh','cosh','tanh','asinh','acosh','atanh',
    'log10','ln','sqrt','abs','floor','ceil','round','trunc','exp'
  ];

  function updateDisplay(){
    exprEl.textContent = expr || '0';
    resultEl.textContent = '';
  }

  function pushHistory(item){
    history.unshift(item);
    if(history.length>200) history.pop();
    renderHistory();
  }

  function renderHistory(){
    historyList.innerHTML = history.length ? history.map(h=>`<div class="history-item"><div>${escapeHtml(h.e)}</div><div style="color:var(--muted)">${escapeHtml(h.r)}</div></div>`).join('') : '<div class="small">No history</div>';
  }

  function renderVars(){
    const keys = Object.keys(vars);
    if(!keys.length){ varsList.textContent = 'No variables set'; return; }
    varsList.innerHTML = keys.map(k=>`${k} = ${formatNumber(vars[k])}`).join('<br>');
  }

  function renderMemory(){
    memoryList.textContent = 'Memory: ' + formatNumber(memory);
  }

  function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function formatNumber(n){
    if(typeof n === 'number' && !isFinite(n)) return String(n);
    const p = Math.max(0, Math.min(12, parseInt(precisionInput.value)||8));
    if(typeof n === 'number') return Number.isInteger(n) ? n.toString() : Number(n).toFixed(p).replace(/\.?0+$/,'');
    return String(n);
  }

  function insert(val){
    expr += val;
    updateDisplay();
  }

  function clearAll(){
    expr = '';
    lastAns = 0;
    updateDisplay();
    resultEl.textContent = '';
  }

  function backspace(){
    expr = expr.slice(0,-1);
    updateDisplay();
  }

  function setResult(r){
    lastAns = r;
    resultEl.textContent = formatNumber(r);
    pushHistory({e: expr || '', r: formatNumber(r)});
    renderHistory();
  }

  // Math helpers
  function factorial(n){
    if(n < 0) return NaN;
    if(Math.abs(n - Math.round(n)) > 1e-12) return NaN;
    n = Math.round(n);
    let res = 1;
    for(let i=2;i<=n;i++) res *= i;
    return res;
  }
  function nPr(n,r){
    if(n<0||r<0||r>n) return NaN;
    return factorial(n)/factorial(n-r);
  }
  function nCr(n,r){
    if(n<0||r<0||r>n) return NaN;
    return factorial(n)/(factorial(r)*factorial(n-r));
  }

  // Evaluate expression with support for variables and functions
  function evaluateExpression(input){
    input = input.trim();
    if(!input) return 0;

    // Assignment: letter = expr
    const assignMatch = input.match(/^([a-zA-Z])\s*=\s*(.+)$/);
    if(assignMatch){
      const name = assignMatch[1];
      const rhs = assignMatch[2];
      const val = evaluateExpression(rhs); // recursive
      if(typeof val === 'number' && !isNaN(val)){
        vars[name] = val;
        renderVars();
        return val;
      } else {
        throw new Error('Invalid assignment value');
      }
    }

    // Replace constants
    let exprToEval = input.replace(/\bpi\b/g, '('+Math.PI+')').replace(/\be\b/g, '('+Math.E+')');

    // Replace ans with lastAns
    exprToEval = exprToEval.replace(/\bans\b/g, '('+lastAns+')');

    // Replace variable names with their numeric values
    exprToEval = exprToEval.replace(/\b([a-zA-Z])\b/g, (m, p1) => {
      if(vars.hasOwnProperty(p1)) return '('+vars[p1]+')';
      // allow function names to pass through
      if(functions.includes(p1)) return p1;
      return p1;
    });

    // Handle factorial postfix "!"
    exprToEval = exprToEval.replace(/([0-9\.e\)\]]+)\s*!/g, (m, p1) => {
      return `__fact(${p1})`;
    });

    // Replace nPr and nCr calls like nPr(5,3)
    exprToEval = exprToEval.replace(/\bnPr\s*\(/g, '__nPr(');
    exprToEval = exprToEval.replace(/\bnCr\s*\(/g, '__nCr(');

    // Map function names to Math equivalents or custom wrappers
    const mapFns = {
      'sin':'__sin','cos':'__cos','tan':'__tan',
      'asin':'__asin','acos':'__acos','atan':'__atan',
      'sinh':'Math.sinh','cosh':'Math.cosh','tanh':'Math.tanh',
      'asinh':'Math.asinh','acosh':'Math.acosh','atanh':'Math.atanh',
      'log10':'Math.log10','ln':'Math.log','sqrt':'Math.sqrt',
      'abs':'Math.abs','floor':'Math.floor','ceil':'Math.ceil',
      'round':'Math.round','trunc':'Math.trunc','exp':'Math.exp'
    };

    // Replace function names with mapped names
    Object.keys(mapFns).forEach(fn => {
      const re = new RegExp('\\b' + fn + '\\s*\\(', 'g');
      exprToEval = exprToEval.replace(re, mapFns[fn] + '(');
    });

    // Replace ^ with Math.pow
    exprToEval = exprToEval.replace(/\^/g, '**');

    // Replace 'mod' or % with %
    exprToEval = exprToEval.replace(/\bmod\b/g, '%');

    // Safety: disallow letters other than allowed tokens
    // Allowed characters: digits, operators, parentheses, ., %, *, /, +, -, letters in our wrappers, commas, e
    // We'll attempt to evaluate in a controlled Function with only allowed helpers.

    // Build function
    const helpers = {
      __fact: factorial,
      __nPr: nPr,
      __nCr: nCr,
      Math: Math,
      __sin: function(x){ return angleMode.value === 'deg' ? Math.sin(x * Math.PI/180) : Math.sin(x); },
      __cos: function(x){ return angleMode.value === 'deg' ? Math.cos(x * Math.PI/180) : Math.cos(x); },
      __tan: function(x){ return angleMode.value === 'deg' ? Math.tan(x * Math.PI/180) : Math.tan(x); },
      __asin: function(x){ const v = Math.asin(x); return angleMode.value === 'deg' ? v * 180/Math.PI : v; },
      __acos: function(x){ const v = Math.acos(x); return angleMode.value === 'deg' ? v * 180/Math.PI : v; },
      __atan: function(x){ const v = Math.atan(x); return angleMode.value === 'deg' ? v * 180/Math.PI : v; }
    };

    // Final evaluation using Function constructor with helpers in scope
    try {
      const argNames = Object.keys(helpers);
      const argVals = Object.values(helpers);
      const fn = new Function(...argNames, 'return (' + exprToEval + ');');
      const res = fn(...argVals);
      if(typeof res === 'number' && !isFinite(res)) throw new Error('Result not finite');
      return res;
    } catch (err) {
      throw new Error('Invalid expression');
    }
  }

  // Button handling
  buttons.addEventListener('click', (ev) => {
    const btn = ev.target.closest('button');
    if(!btn) return;
    const val = btn.dataset.val;
    const action = btn.dataset.action;

    if(action === 'back'){ backspace(); return; }
    if(action === 'enter'){ doEvaluate(); return; }
    if(action === 'clear'){ expr = ''; updateDisplay(); return; }
    if(action === 'assign'){ // convenience: append '='
      expr += '=';
      updateDisplay();
      return;
    }
    if(action === 'mem+'){ memory += lastAns; renderMemory(); return; }
    if(action === 'mem-'){ memory -= lastAns; renderMemory(); return; }

    if(val !== undefined){
      if(val === 'ans'){ insert('ans'); return; }
      insert(val);
    }
  });

  document.getElementById('clearAll').addEventListener('click', () => { clearAll(); history = []; renderHistory(); vars = {}; renderVars(); memory = 0; renderMemory(); });
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = resultEl.textContent || exprEl.textContent;
    navigator.clipboard?.writeText(text).then(()=>{/*copied*/}).catch(()=>{/*ignore*/});
  });

  document.getElementById('toggleHistory').addEventListener('click', () => {
    const h = document.querySelector('.history');
    h.style.display = h.style.display === 'none' ? 'block' : 'none';
  });
  document.getElementById('clearHistory').addEventListener('click', () => { history = []; renderHistory(); });

  // Keyboard support
  window.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ e.preventDefault(); doEvaluate(); return; }
    if(e.key === 'Backspace'){ e.preventDefault(); backspace(); return; }
    if(e.key === 'Escape'){ e.preventDefault(); expr=''; updateDisplay(); return; }
    // allow numbers, letters, operators, parentheses, ., ^, %
    const allowed = /^[0-9a-zA-Z\+\-\*\/\^\%\.\(\)\,]$/;
    if(allowed.test(e.key)){
      insert(e.key);
      e.preventDefault();
    }
  });

  function doEvaluate(){
    try {
      const value = evaluateExpression(expr);
      setResult(value);
      lastAns = (typeof value === 'number') ? value : lastAns;
      expr = ''; updateDisplay();
    } catch (err) {
      resultEl.textContent = err.message;
    }
  }

  // Initialize
  updateDisplay();
  renderHistory();
  renderVars();
  renderMemory();

  // Expose for debugging (optional)
  window.calc = {
    evaluateExpression,
    getVars: () => ({...vars}),
    setVar: (k,v) => { vars[k]=v; renderVars(); }
  };
})();
</script>
</body>
</html>
