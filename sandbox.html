<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />

<title>Sandbox (buggy)</title>
<style>
  :root{
    --bg:#071021;
    --panel:#0b1220cc;
    --accent:#22c1c3;
    --muted:#9aa7b2;
    --glass: rgba(255,255,255,0.04);
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;}
  body{background:linear-gradient(180deg,var(--bg) 0%, #071827 60%);color:#e6eef3;overflow:hidden}
  .topbar{position:fixed;left:12px;top:12px;z-index:60;display:flex;gap:10px;align-items:center}
  .back-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));color:var(--accent);border:1px solid var(--glass);padding:8px 12px;border-radius:8px;font-weight:700;text-decoration:none;box-shadow:0 8px 24px rgba(2,6,23,0.6);backdrop-filter:blur(6px)}
  .toolbar{position:fixed;left:12px;top:64px;z-index:50;width:320px;padding:12px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid var(--glass);box-shadow:0 12px 40px rgba(2,6,23,0.6);color:var(--muted)}
  .toolbar h2{margin:0 0 8px 0;color:#dff7f6;font-size:15px}
  .row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
  select, button, input[type="range"]{background:#071226;color:#dff7f6;border:1px solid var(--glass);padding:8px;border-radius:8px;cursor:pointer;font-weight:600}
  .small{padding:6px 8px;font-size:13px}
  .toggle{background:linear-gradient(90deg,#0b2b2b,#072b3a);color:#bff0ef}
  .danger{background:linear-gradient(90deg,#3b0f0f,#5b1b1b);color:#ffd6d6}
  .panel{position:fixed;right:12px;top:12px;z-index:50;width:320px;padding:12px;border-radius:12px;background:var(--panel);box-shadow:0 10px 30px rgba(2,6,23,0.6);color:var(--muted)}
  .panel h3{margin:0 0 8px 0;color:#dff7f6;font-size:14px}
  .stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed rgba(255,255,255,0.02)}
  canvas{display:block;width:100vw;height:100vh;cursor:crosshair}
  .footer{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;color:var(--muted);font-size:12px;z-index:30;background:transparent;padding:6px 10px;border-radius:6px}
  .muted{color:var(--muted);font-size:13px}
  .mini{font-size:12px;padding:6px 8px}
</style>

<body>
  <div class="topbar">
    <a class="back-btn" href="index.html">Back to dashboard</a>
    <div class="brand">Sandbox — Fixed Ragdolls</div>
  </div>

  <div class="toolbar" id="toolbar">
    <h2>Tools & Spawn</h2>
    <div class="row">
      <select id="spawnType">
        <option value="circle">Circle</option>
        <option value="box">Box</option>
        <option value="ragdoll">Ragdoll NPC</option>
        <option value="bomb">Bomb</option>
        <option value="platform">Platform</option>
        <option value="gun">Gun</option>
      </select>
      <button id="spawnBtn" class="small">Spawn</button>
    </div>

    <div class="row">
      <button id="spawnMany" class="small">Spawn 10</button>
      <button id="spawnNPCs" class="small">Spawn NPCs</button>
    </div>

    <div class="row">
      <button id="toolSelect" class="mini">Select</button>
      <button id="toolForce" class="mini">Force</button>
      <button id="toolShoot" class="mini">Shoot</button>
      <button id="toolDelete" class="mini danger">Delete</button>
    </div>

    <div style="margin-top:8px">
      <div class="muted">Simulation</div>
      <div style="display:flex;gap:8px;margin-top:6px">
        <button id="pauseBtn" class="small">Pause</button>
        <button id="clearBtn" class="small">Clear</button>
      </div>
    </div>

    <div style="margin-top:10px" class="muted">This build fixes the flying issue. Ragdolls use Verlet, soft muscles, and clamped corrections so they stand naturally.</div>
  </div>

  <div class="panel" id="panel">
    <h3>Scene</h3>
    <div class="stat"><div>Bodies</div><div id="statBodies">0</div></div>
    <div class="stat"><div>Ragdolls</div><div id="statRagdolls">0</div></div>
    <div class="stat"><div>Bullets</div><div id="statBullets">0</div></div>
    <div class="stat"><div>FPS</div><div id="statFPS">0</div></div>
  </div>

  <canvas id="c"></canvas>
  <div class="footer">Improved physics sandbox — ragdolls stand up and behave.</div>

<script>
/* Fixed physics sandbox
   Key fixes:
   - Verlet integration uses both ax and ay (gravity applied correctly)
   - makePoint supports fixed points (invMass = 0)
   - Muscles are frame-rate scaled and clamped to avoid explosive corrections
*/

/* Utilities */
const rand = (a,b)=>a + Math.random()*(b-a);
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const nowMs = ()=>performance.now();

/* Canvas */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
let DPR = Math.max(1, window.devicePixelRatio || 1);
function resize(){
  DPR = Math.max(1, window.devicePixelRatio || 1);
  canvas.width = Math.floor(window.innerWidth * DPR);
  canvas.height = Math.floor(window.innerHeight * DPR);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

/* World */
const world = {
  gravity: { x: 0, y: 1200 },
  points: [],
  constraints: [],
  rigidBoxes: [],
  bullets: [],
  particles: [],
  bounds: { w: window.innerWidth, h: window.innerHeight }
};
function updateBounds(){ world.bounds.w = window.innerWidth; world.bounds.h = window.innerHeight; }
window.addEventListener('resize', updateBounds);

/* ID */
let idCounter = 1;

/* Point factory with fixed support */
function makePoint(x,y, opts={}){
  const fixed = !!opts.fixed;
  const mass = ('mass' in opts) ? opts.mass : 1;
  const invMass = fixed ? 0 : (mass > 0 ? 1 / mass : 1);
  return {
    id: idCounter++,
    x, y,
    px: x, py: y,
    ax: 0, ay: 0,
    invMass,
    radius: opts.radius || 4,
    color: opts.color || '#9ad7ff',
    tags: opts.tags || [],
    // ragdoll metadata (optional)
    ragdoll: !!opts.ragdoll,
    parts: opts.parts || null,
    health: ('health' in opts) ? opts.health : 100,
    gun: null,
    ai: opts.ai || null,
    standPose: opts.standPose || null
  };
}

/* Constraint factory */
function makeConstraint(a, b, rest, stiffness=1, tear=Infinity){
  return { id: idCounter++, a, b, rest: rest || Math.hypot(b.x-a.x, b.y-a.y), stiffness, tear };
}

/* Rigid box */
function makeBox(x,y,w,h,opts={}){
  return {
    id: idCounter++,
    x,y,w,h,
    vx: opts.vx||0, vy: opts.vy||0,
    mass: opts.mass || 1,
    invMass: 1 / (opts.mass || 1),
    fixed: !!opts.fixed,
    color: opts.color || '#2b3b4b',
    tags: opts.tags || [],
    owner: null,
    fireRate: opts.fireRate || 220,
    lastFired: 0
  };
}

/* Bullet and particle helpers */
function spawnBullet(x,y,vx,vy,owner){ world.bullets.push({ id: idCounter++, x,y,vx,vy,r:4,life:2000,age:0,owner }); }
function spawnParticle(x,y,vx,vy,life,color){ world.particles.push({ x,y,vx,vy,age:0,life,color }); }

/* Ragdoll builder using points + constraints */
function createRagdoll(x,y, opts={}){
  const scale = opts.scale || 1;
  const color = opts.color || '#9ad7ff';
  // points
  const head = makePoint(x, y - 36*scale, { radius:8*scale, color:'#ffd9c7' });
  const neck = makePoint(x, y - 20*scale, { radius:5*scale, color });
  const torsoTop = makePoint(x, y - 6*scale, { radius:7*scale, color, ragdoll:true });
  const torsoBot = makePoint(x, y + 18*scale, { radius:8*scale, color });
  const lUpperArm = makePoint(x - 20*scale, y - 8*scale, { radius:6*scale, color });
  const lLowerArm = makePoint(x - 36*scale, y + 6*scale, { radius:5*scale, color });
  const rUpperArm = makePoint(x + 20*scale, y - 8*scale, { radius:6*scale, color });
  const rLowerArm = makePoint(x + 36*scale, y + 6*scale, { radius:5*scale, color });
  const lUpperLeg = makePoint(x - 8*scale, y + 36*scale, { radius:7*scale, color });
  const lLowerLeg = makePoint(x - 8*scale, y + 64*scale, { radius:7*scale, color });
  const rUpperLeg = makePoint(x + 8*scale, y + 36*scale, { radius:7*scale, color });
  const rLowerLeg = makePoint(x + 8*scale, y + 64*scale, { radius:7*scale, color });

  const pts = [head, neck, torsoTop, torsoBot, lUpperArm, lLowerArm, rUpperArm, rLowerArm, lUpperLeg, lLowerLeg, rUpperLeg, rLowerLeg];
  for (let p of pts) world.points.push(p);

  // store parts on root
  torsoTop.parts = pts;
  torsoTop.health = 100;
  torsoTop.gun = null;
  torsoTop.ai = { targetId: null, shootCooldown: rand(800,2200), lastShot: 0, standTarget: true, standTimer: 0 };

  // constraints
  const cons = [];
  cons.push(makeConstraint(head, neck, 18*scale, 0.9));
  cons.push(makeConstraint(neck, torsoTop, 14*scale, 0.9));
  cons.push(makeConstraint(torsoTop, torsoBot, 24*scale, 0.95));
  cons.push(makeConstraint(torsoTop, lUpperArm, 22*scale, 0.9));
  cons.push(makeConstraint(lUpperArm, lLowerArm, 22*scale, 0.9));
  cons.push(makeConstraint(torsoTop, rUpperArm, 22*scale, 0.9));
  cons.push(makeConstraint(rUpperArm, rLowerArm, 22*scale, 0.9));
  cons.push(makeConstraint(torsoBot, lUpperLeg, 26*scale, 0.95));
  cons.push(makeConstraint(lUpperLeg, lLowerLeg, 28*scale, 0.95));
  cons.push(makeConstraint(torsoBot, rUpperLeg, 26*scale, 0.95));
  cons.push(makeConstraint(rUpperLeg, rLowerLeg, 28*scale, 0.95));
  cons.push(makeConstraint(lUpperArm, rUpperArm, 44*scale, 0.2));
  cons.push(makeConstraint(lUpperLeg, rUpperLeg, 20*scale, 0.2));
  for (let c of cons) world.constraints.push(c);

  // store stand pose relative to torsoTop (local offsets)
  torsoTop.standPose = {};
  for (let p of pts){
    torsoTop.standPose[p.id] = { dx: p.x - torsoTop.x, dy: p.y - torsoTop.y };
  }

  return torsoTop;
}

/* Verlet integration (fixed) */
function verlet(dt){
  const g = world.gravity;
  const dt2 = dt*dt;
  const damping = 0.995;
  for (let p of world.points){
    if (p.invMass === 0){ p.ax = 0; p.ay = 0; continue; }
    // accumulate gravity into acceleration
    p.ax += g.x;
    p.ay += g.y;
    // verlet step using both ax and ay
    const nx = p.x + (p.x - p.px) * damping + p.ax * dt2;
    const ny = p.y + (p.y - p.py) * damping + p.ay * dt2;
    p.px = p.x; p.py = p.y;
    p.x = nx; p.y = ny;
    // reset accelerations
    p.ax = 0; p.ay = 0;
  }
}

/* Constraint solver */
function solveConstraints(iterations=8){
  for (let k=0;k<iterations;k++){
    // distance constraints
    for (let i = world.constraints.length-1; i>=0; i--){
      const c = world.constraints[i];
      const A = c.a, B = c.b;
      const dx = B.x - A.x, dy = B.y - A.y;
      const dist = Math.hypot(dx,dy) || 0.0001;
      const diff = (dist - c.rest) / dist;
      const invA = A.invMass, invB = B.invMass;
      const w = invA + invB;
      if (w === 0) continue;
      const corr = diff * c.stiffness;
      const ax = dx * corr * (invA / w);
      const ay = dy * corr * (invA / w);
      const bx = -dx * corr * (invB / w);
      const by = -dy * corr * (invB / w);
      if (A.invMass) { A.x += ax; A.y += ay; }
      if (B.invMass) { B.x += bx; B.y += by; }
      // tearing
      if (Math.abs(dist - c.rest) > (c.tear || Infinity)){
        world.constraints.splice(i,1);
      }
    }

    // collisions point <-> rigid boxes
    for (let p of world.points){
      for (let b of world.rigidBoxes){
        const halfW = b.w/2, halfH = b.h/2;
        const left = b.x - halfW, right = b.x + halfW, top = b.y - halfH, bottom = b.y + halfH;
        const cx = clamp(p.x, left, right);
        const cy = clamp(p.y, top, bottom);
        const dx = p.x - cx, dy = p.y - cy;
        const dist2 = dx*dx + dy*dy;
        const r = p.radius;
        if (dist2 < r*r){
          const dist = Math.sqrt(dist2) || 0.0001;
          const nx = dx / dist, ny = dy / dist;
          const push = r - dist;
          if (p.invMass){ p.x += nx * push; p.y += ny * push; }
          // damp previous position to remove energy
          p.px += nx * push * 0.5;
          p.py += ny * push * 0.5;
        }
      }
    }

    // soft point-point collisions to avoid overlap
    for (let i=0;i<world.points.length;i++){
      const A = world.points[i];
      for (let j=i+1;j<world.points.length;j++){
        const B = world.points[j];
        const dx = B.x - A.x, dy = B.y - A.y;
        const dist = Math.hypot(dx,dy) || 0.0001;
        const minD = A.radius + B.radius;
        if (dist < minD){
          const overlap = minD - dist;
          const nx = dx/dist, ny = dy/dist;
          const invA = A.invMass, invB = B.invMass;
          const w = invA + invB;
          if (w === 0) continue;
          const ax = nx * overlap * (invA / w);
          const ay = ny * overlap * (invA / w);
          const bx = -nx * overlap * (invB / w);
          const by = -ny * overlap * (invB / w);
          if (A.invMass){ A.x += ax; A.y += ay; }
          if (B.invMass){ B.x += bx; B.y += by; }
        }
      }
    }
  }
}

/* Muscles with frame-rate scaling and clamping */
function applyMuscles(dt){
  // muscle strength scaled by dt (frame-rate independent)
  const baseK = 0.06; // base strength
  const k = baseK * Math.min(1, dt * 60); // scale by dt*60
  const maxCorrection = 6; // pixels per frame max
  for (let root of world.points){
    if (!root.ragdoll || !root.standPose || !root.parts) continue;
    const ai = root.ai || { standTarget: true };
    // decide whether to try to stand
    ai.standTimer = (ai.standTimer || 0) - dt*1000;
    if (ai.standTimer <= 0){ ai.standTarget = Math.random() < 0.6; ai.standTimer = 1500 + Math.random()*2500; }
    if (!ai.standTarget) continue;
    // for each part, compute desired world position from stored local offsets
    for (let p of root.parts){
      const pose = root.standPose[p.id];
      if (!pose) continue;
      const tx = root.x + pose.dx;
      const ty = root.y + pose.dy;
      const dx = tx - p.x, dy = ty - p.y;
      // clamp correction to avoid explosive jumps
      const corrX = clamp(dx * k, -maxCorrection, maxCorrection);
      const corrY = clamp(dy * k, -maxCorrection, maxCorrection);
      if (p.invMass){
        p.x += corrX;
        p.y += corrY;
        // nudge previous position to damp velocity (helps settle)
        p.px += corrX * 0.5;
        p.py += corrY * 0.5;
      }
    }
  }
}

/* Rigid boxes integration */
function integrateRigid(dt){
  for (let b of world.rigidBoxes){
    if (b.fixed) continue;
    b.vy += world.gravity.y * dt;
    b.vx *= 0.995; b.vy *= 0.995;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    const halfW = b.w/2, halfH = b.h/2;
    if (b.y + halfH > world.bounds.h){ b.y = world.bounds.h - halfH; if (b.vy > 0) b.vy = -b.vy * 0.3; b.vx *= 0.9; }
    if (b.y - halfH < 0){ b.y = halfH; if (b.vy < 0) b.vy = -b.vy * 0.3; }
    if (b.x - halfW < 0){ b.x = halfW; if (b.vx < 0) b.vx = -b.vx * 0.3; }
    if (b.x + halfW > world.bounds.w){ b.x = world.bounds.w - halfW; if (b.vx > 0) b.vx = -b.vx * 0.3; }
  }
}

/* Bullets update and collisions */
function updateBullets(dt){
  for (let i = world.bullets.length-1; i>=0; i--){
    const bl = world.bullets[i];
    bl.x += bl.vx * dt;
    bl.y += bl.vy * dt;
    bl.age += dt*1000;
    let removed = false;
    // rigid boxes
    for (let j = world.rigidBoxes.length-1; j>=0; j--){
      const b = world.rigidBoxes[j];
      if (bl.x >= b.x - b.w/2 && bl.x <= b.x + b.w/2 && bl.y >= b.y - b.h/2 && bl.y <= b.y + b.h/2){
        const speed = Math.hypot(bl.vx, bl.vy) || 1;
        const nx = bl.vx / speed, ny = bl.vy / speed;
        if (!b.fixed){ b.vx += nx * 120 / b.mass; b.vy += ny * 120 / b.mass; }
        severConstraintsNear(bl.x, bl.y, 24);
        for (let p=0;p<6;p++) spawnParticle(bl.x, bl.y, nx*rand(40,160)+rand(-40,40), ny*rand(40,160)+rand(-40,40), 600+rand(0,600), '#ffcc88');
        world.bullets.splice(i,1);
        removed = true;
        break;
      }
    }
    if (removed) continue;
    // points
    for (let j = world.points.length-1; j>=0; j--){
      const pt = world.points[j];
      const dx = bl.x - pt.x, dy = bl.y - pt.y;
      if (dx*dx + dy*dy <= (bl.r + pt.radius)*(bl.r + pt.radius)){
        const speed = Math.hypot(bl.vx, bl.vy) || 1;
        const nx = bl.vx / speed, ny = bl.vy / speed;
        if (pt.invMass){
          pt.x += nx * 8; pt.y += ny * 8;
          pt.px += nx * 4; pt.py += ny * 4;
        }
        const root = findRagdollRoot(pt);
        if (root){ root.health -= 8; if (Math.random() < 0.25) severConstraintsNear(pt.x, pt.y, 28); }
        for (let p=0;p<6;p++) spawnParticle(bl.x, bl.y, nx*rand(40,160)+rand(-40,40), ny*rand(40,160)+rand(-40,40), 600+rand(0,600), '#ffcc88');
        world.bullets.splice(i,1);
        removed = true;
        break;
      }
    }
    if (removed) continue;
    if (bl.age > bl.life) world.bullets.splice(i,1);
  }
}

/* Sever constraints near a point */
function severConstraintsNear(x,y,radius){
  for (let i = world.constraints.length-1; i>=0; i--){
    const c = world.constraints[i];
    const mx = (c.a.x + c.b.x)/2, my = (c.a.y + c.b.y)/2;
    if (Math.hypot(mx - x, my - y) <= radius){
      world.constraints.splice(i,1);
      return;
    }
  }
}

/* Find ragdoll root for a point */
function findRagdollRoot(pt){
  if (pt.ragdoll) return pt;
  for (let p of world.points){
    if (p.ragdoll && p.parts && p.parts.includes(pt)) return p;
  }
  return null;
}

/* Simple AI */
function updateAI(dt){
  const now = nowMs();
  const roots = world.points.filter(p => p.ragdoll);
  for (let root of roots){
    const ai = root.ai;
    if (!ai) continue;
    let target = null, best = 1e9;
    for (let other of roots){
      if (other === root) continue;
      const d = Math.hypot(other.x - root.x, other.y - root.y);
      if (d < best){ best = d; target = other; }
    }
    ai.targetId = target ? target.id : null;
    // gun pickup/shoot handled elsewhere; small random nudge to simulate walking
    if (Math.random() < 0.002) root.px -= rand(-20,20);
  }
}

/* Rendering */
function draw(now){
  ctx.fillStyle = '#071021';
  ctx.fillRect(0,0,canvas.width/DPR,canvas.height/DPR);

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  const step = 40;
  for (let x=0;x<world.bounds.w;x+=step){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,world.bounds.h); ctx.stroke(); }
  for (let y=0;y<world.bounds.h;y+=step){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(world.bounds.w,y); ctx.stroke(); }

  // constraints
  ctx.lineWidth = 2;
  for (let c of world.constraints){
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(200,200,255,0.12)';
    ctx.moveTo(c.a.x, c.a.y);
    ctx.lineTo(c.b.x, c.b.y);
    ctx.stroke();
  }

  // rigid boxes
  for (let b of world.rigidBoxes){
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.fillStyle = b.color;
    ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.strokeRect(-b.w/2, -b.h/2, b.w, b.h);
    if (b.tags && b.tags.includes('gun')){
      ctx.fillStyle = '#222';
      ctx.fillRect(b.w/2 - 6, -4, 12, 8);
      if (b.owner){
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fillRect(-b.w/2, b.h/2 + 4, b.w, 12);
        ctx.fillStyle = '#dff7f6';
        ctx.font = '11px Inter, Arial';
        ctx.textAlign = 'center';
        ctx.fillText(b.owner === 'player' ? 'Held' : 'Held', 0, b.h/2 + 14);
      }
    }
    ctx.restore();
  }

  // points
  for (let p of world.points){
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + (p.x - p.px)*0.5, p.y + (p.y - p.py)*0.5);
    ctx.stroke();
  }

  // bullets
  for (let bl of world.bullets){
    ctx.beginPath();
    ctx.fillStyle = '#ffd88a';
    ctx.arc(bl.x, bl.y, bl.r, 0, Math.PI*2);
    ctx.fill();
  }

  // particles
  for (let p of world.particles){
    ctx.beginPath();
    ctx.globalAlpha = 1 - (p.age / p.life);
    ctx.fillStyle = p.color;
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ragdoll health bars
  for (let p of world.points){
    if (p.ragdoll){
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(p.x - 28, p.y - 60, 56, 8);
      ctx.fillStyle = p.health > 50 ? 'limegreen' : (p.health > 20 ? 'orange' : 'red');
      ctx.fillRect(p.x - 28, p.y - 60, 56 * clamp(p.health/100,0,1), 8);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.strokeRect(p.x - 28, p.y - 60, 56, 8);
    }
  }
}

/* Main loop */
let last = performance.now();
let paused = false;
let fpsCounter = { last: performance.now(), frames: 0, fps: 0 };
function loop(){
  const now = performance.now();
  let dt = (now - last) / 1000;
  last = now;
  if (paused) dt = 0;
  dt = clamp(dt, 0, 0.033);

  verlet(dt);
  applyMuscles(dt);
  solveConstraints(8);
  integrateRigid(dt);
  updateBullets(dt);
  updateAI(dt);

  // update particles
  for (let i = world.particles.length-1; i>=0; i--){
    const p = world.particles[i];
    p.age += dt*1000;
    if (p.age > p.life) world.particles.splice(i,1);
    p.vy += world.gravity.y * 0.001 * dt * 60;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }

  draw(now);

  // fps & stats
  fpsCounter.frames++;
  if (performance.now() - fpsCounter.last >= 500){
    fpsCounter.fps = Math.round((fpsCounter.frames * 1000) / (performance.now() - fpsCounter.last));
    fpsCounter.last = performance.now();
    fpsCounter.frames = 0;
    document.getElementById('statFPS').textContent = fpsCounter.fps;
  }
  document.getElementById('statBodies').textContent = world.points.length + world.rigidBoxes.length;
  document.getElementById('statRagdolls').textContent = world.points.filter(p=>p.ragdoll).length;
  document.getElementById('statBullets').textContent = world.bullets.length;

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* UI wiring */
const spawnType = document.getElementById('spawnType');
const spawnBtn = document.getElementById('spawnBtn');
const spawnMany = document.getElementById('spawnMany');
const spawnNPCs = document.getElementById('spawnNPCs');
const toolSelect = document.getElementById('toolSelect');
const toolForce = document.getElementById('toolForce');
const toolShoot = document.getElementById('toolShoot');
const toolDelete = document.getElementById('toolDelete');
const pauseBtn = document.getElementById('pauseBtn');
const clearBtn = document.getElementById('clearBtn');

let currentTool = 'select';
let grabbed = null;
let grabOffset = {x:0,y:0};
let mouse = { x:0, y:0, down:false, right:false };

spawnBtn.addEventListener('click', ()=> spawnAt(rand(120, world.bounds.w-120), rand(40, 120), spawnType.value));
spawnMany.addEventListener('click', ()=> { for (let i=0;i<10;i++) spawnAt(rand(120, world.bounds.w-120), rand(40, 120), Math.random()<0.6 ? 'circle' : 'box'); });
spawnNPCs.addEventListener('click', ()=> { for (let i=0;i<6;i++) createRagdoll(rand(160, world.bounds.w-160), rand(80, world.bounds.h-160)); });

toolSelect.addEventListener('click', ()=> setTool('select'));
toolForce.addEventListener('click', ()=> setTool('force'));
toolShoot.addEventListener('click', ()=> setTool('shoot'));
toolDelete.addEventListener('click', ()=> setTool('delete'));

pauseBtn.addEventListener('click', ()=> { paused = !paused; pauseBtn.textContent = paused ? 'Resume' : 'Pause'; });
clearBtn.addEventListener('click', ()=> { world.points.length = 0; world.constraints.length = 0; world.rigidBoxes.length = 0; world.bullets.length = 0; world.particles.length = 0; });

function setTool(t){
  currentTool = t;
  [toolSelect, toolForce, toolShoot, toolDelete].forEach(btn=>btn.style.opacity = '0.6');
  if (t === 'select') toolSelect.style.opacity = '1';
  if (t === 'force') toolForce.style.opacity = '1';
  if (t === 'shoot') toolShoot.style.opacity = '1';
  if (t === 'delete') toolDelete.style.opacity = '1';
}

/* spawn helper */
function spawnAt(x,y,type){
  if (type === 'circle'){
    const p = makePoint(x,y,{ radius: rand(6,14), color: `hsl(${rand(0,360)}deg 60% 60%)` });
    world.points.push(p);
  } else if (type === 'box'){
    world.rigidBoxes.push(makeBox(x,y, rand(20,80), rand(12,48), { color: `hsl(${rand(0,360)}deg 60% 60%)` }));
  } else if (type === 'ragdoll'){
    createRagdoll(x,y);
  } else if (type === 'bomb'){
    const b = makeBox(x,y, 20,20, { mass: 1, color:'#ffb86b' });
    b.tags.push('bomb');
    b.timer = nowMs() + 2000 + Math.random()*2000;
    world.rigidBoxes.push(b);
  } else if (type === 'platform'){
    world.rigidBoxes.push(makeBox(x,y, rand(80,320), 18, { fixed:true, color:'#223344' }));
  } else if (type === 'gun'){
    const g = makeBox(x,y, 36,12, { mass: 1, color:'#b8b8ff' });
    g.tags.push('gun');
    world.rigidBoxes.push(g);
  }
}

/* Mouse interactions */
canvas.addEventListener('mousemove', (e)=>{
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left);
  mouse.y = (e.clientY - rect.top);
  if (grabbed && mouse.down && currentTool === 'select'){
    if (grabbed.invMass !== undefined){
      grabbed.x = mouse.x - grabOffset.x;
      grabbed.y = mouse.y - grabOffset.y;
      grabbed.px = grabbed.x; grabbed.py = grabbed.y;
    } else {
      grabbed.x = mouse.x - grabOffset.x;
      grabbed.y = mouse.y - grabOffset.y;
      grabbed.vx = 0; grabbed.vy = 0;
    }
  }
});
canvas.addEventListener('mousedown', (e)=>{
  e.preventDefault();
  mouse.down = true;
  mouse.right = (e.button === 2);
  const mx = mouse.x, my = mouse.y;
  if (currentTool === 'select'){
    for (let i = world.rigidBoxes.length-1; i>=0; i--){
      const b = world.rigidBoxes[i];
      if (mx >= b.x - b.w/2 && mx <= b.x + b.w/2 && my >= b.y - b.h/2 && my <= b.y + b.h/2){
        grabbed = b;
        grabOffset.x = mx - b.x; grabOffset.y = my - b.y;
        if (b.tags && b.tags.includes('gun') && !b.owner){ b.owner = 'player'; }
        return;
      }
    }
    for (let i = world.points.length-1; i>=0; i--){
      const p = world.points[i];
      if (Math.hypot(mx - p.x, my - p.y) <= p.radius + 4){
        grabbed = p;
        grabOffset.x = mx - p.x; grabOffset.y = my - p.y;
        return;
      }
    }
  } else if (currentTool === 'force'){
    for (let i = world.points.length-1; i>=0; i--){
      const p = world.points[i];
      if (Math.hypot(mx - p.x, my - p.y) <= p.radius + 6){
        p.px -= rand(-40,40);
        p.py -= rand(40,120);
        return;
      }
    }
    for (let i = world.rigidBoxes.length-1; i>=0; i--){
      const b = world.rigidBoxes[i];
      if (mx >= b.x - b.w/2 && mx <= b.x + b.w/2 && my >= b.y - b.h/2 && my <= b.y + b.h/2){
        b.vx += rand(-200,200);
        b.vy -= rand(80,320);
        return;
      }
    }
  } else if (currentTool === 'shoot'){
    const gun = world.rigidBoxes.find(b => b.tags && b.tags.includes('gun') && b.owner === 'player');
    if (gun){
      const ang = Math.atan2(my - gun.y, mx - gun.x);
      const speed = 900;
      spawnBullet(gun.x + Math.cos(ang)*20, gun.y + Math.sin(ang)*20, Math.cos(ang)*speed, Math.sin(ang)*speed, 'player');
      gun.lastFired = nowMs();
      gun.vx -= Math.cos(ang) * 80 / gun.mass;
      gun.vy -= Math.sin(ang) * 80 / gun.mass;
      return;
    }
    for (let b of world.rigidBoxes){
      if (b.tags && b.tags.includes('gun') && !b.owner){
        if (mx >= b.x - b.w/2 && mx <= b.x + b.w/2 && my >= b.y - b.h/2 && my <= b.y + b.h/2){
          b.owner = 'player';
          return;
        }
      }
    }
  } else if (currentTool === 'delete'){
    for (let i = world.rigidBoxes.length-1; i>=0; i--){
      const b = world.rigidBoxes[i];
      if (mx >= b.x - b.w/2 && mx <= b.x + b.w/2 && my >= b.y - b.h/2 && my <= b.y + b.h/2){
        for (let p of world.points) if (p.ragdoll && p.gun === b.id) p.gun = null;
        world.rigidBoxes.splice(i,1);
        return;
      }
    }
    for (let i = world.points.length-1; i>=0; i--){
      const p = world.points[i];
      if (Math.hypot(mx - p.x, my - p.y) <= p.radius + 6){
        world.constraints = world.constraints.filter(c => c.a !== p && c.b !== p);
        if (p.ragdoll && p.parts){
          for (let part of p.parts){
            const idx = world.points.indexOf(part);
            if (idx >= 0) world.points.splice(idx,1);
          }
        }
        const idx = world.points.indexOf(p);
        if (idx >= 0) world.points.splice(idx,1);
        return;
      }
    }
  }
});
canvas.addEventListener('mouseup', (e)=>{
  mouse.down = false;
  grabbed = null;
});
canvas.addEventListener('dblclick', (e)=>{
  spawnAt(mouse.x, mouse.y, spawnType.value);
});
canvas.addEventListener('contextmenu', (e)=>{
  e.preventDefault();
  const mx = mouse.x, my = mouse.y;
  for (let i = world.rigidBoxes.length-1; i>=0; i--){
    const b = world.rigidBoxes[i];
    if (mx >= b.x - b.w/2 && mx <= b.x + b.w/2 && my >= b.y - b.h/2 && my <= b.y + b.h/2){
      world.rigidBoxes.splice(i,1);
      return;
    }
  }
  for (let i = world.points.length-1; i>=0; i--){
    const p = world.points[i];
    if (Math.hypot(mx - p.x, my - p.y) <= p.radius + 6){
      world.constraints = world.constraints.filter(c => c.a !== p && c.b !== p);
      world.points.splice(i,1);
      return;
    }
  }
});

/* Keyboard */
window.addEventListener('keydown', (e)=>{
  if (e.key === 'g') world.gravity.y = world.gravity.y ? 1200 : 0;
  if (e.key === 'c') { world.points.length = 0; world.constraints.length = 0; world.rigidBoxes.length = 0; }
  if (e.key === ' ') { paused = !paused; pauseBtn.textContent = paused ? 'Resume' : 'Pause'; e.preventDefault(); }
  if (e.key === '1') setTool('select');
  if (e.key === '2') setTool('force');
  if (e.key === '3') setTool('shoot');
  if (e.key === '4') setTool('delete');
});

/* Initial scene */
(function init(){
  world.rigidBoxes.push(makeBox(world.bounds.w/2, world.bounds.h - 20, world.bounds.w - 200, 24, { fixed:true, color:'#223344' }));
  world.rigidBoxes.push(makeBox(220, world.bounds.h - 160, 240, 16, { fixed:true, color:'#2b3b4b' }));
  world.rigidBoxes.push(makeBox(world.bounds.w - 260, world.bounds.h - 260, 200, 16, { fixed:true, color:'#2b3b4b' }));
  for (let i=0;i<3;i++) createRagdoll(300 + i*80, world.bounds.h - 120);
  const g = makeBox(160, world.bounds.h - 80, 36, 12, { mass:1, color:'#b8b8ff' });
  g.tags.push('gun');
  world.rigidBoxes.push(g);
  for (let i=0;i<6;i++){
    world.points.push(makePoint(120 + i*80, 80 + Math.random()*40, { radius: rand(6,12), color:`hsl(${rand(0,360)}deg 60% 60%)` }));
    if (i%2===0) world.rigidBoxes.push(makeBox(120 + i*80, 40 + Math.random()*40, rand(20,60), rand(12,48)));
  }
})();

/* Bomb timer check */
setInterval(()=>{
  const now = nowMs();
  for (let i = world.rigidBoxes.length-1; i>=0; i--){
    const b = world.rigidBoxes[i];
    if (b.tags && b.tags.includes('bomb') && b.timer && now >= b.timer){
      const blast = 1200;
      const radius = 160;
      for (let p of world.points){
        const dx = p.x - b.x, dy = p.y - b.y;
        const d = Math.hypot(dx,dy);
        if (d < radius){
          const fall = 1 - (d / radius);
          if (p.invMass){
            p.x += (dx/d) * fall * 40;
            p.y += (dy/d) * fall * 40;
            p.px += (dx/d) * fall * 20;
            p.py += (dy/d) * fall * 20;
          }
        }
      }
      for (let rb of world.rigidBoxes){
        const dx = rb.x - b.x, dy = rb.y - b.y;
        const d = Math.hypot(dx,dy);
        if (d < radius){
          const fall = 1 - (d / radius);
          if (!rb.fixed){
            rb.vx += (dx/d) * fall * blast / rb.mass;
            rb.vy += (dy/d) * fall * blast / rb.mass;
          }
        }
      }
      for (let p=0;p<60;p++) spawnParticle(b.x, b.y, rand(-400,400), rand(-400,400), 800+rand(0,800), '#ffb86b');
      world.rigidBoxes.splice(i,1);
    }
  }
}, 200);

/* Prevent accidental drag */
document.body.addEventListener('dragstart', e=>e.preventDefault());
</script>
