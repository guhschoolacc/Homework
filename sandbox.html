<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mini Playground Sandbox</title>
  <style>
    /* ——— ROOT COLORS ——— */
    :root {
      --bg: #05060a;
      --text: #f9fafb;
      --text-soft: #9ca3af;
      --panel: #0b0f18;
      --border: #1f2933;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }

    body {
      background: #020617;
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ——— TOP BAR ——— */
    .top-bar {
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
    }

    .brand {
      font-size: 18px;
      font-weight: 600;
    }

    .return-btn {
      padding: 6px 14px;
      border-radius: 999px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      cursor: pointer;
      font-size: 13px;
      transition: 0.15s;
    }

    .return-btn:hover {
      background: #334155;
      border-color: #60a5fa;
      color: white;
    }

    /* ——— MAIN LAYOUT ——— */
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 260px 1fr 260px;
      gap: 10px;
      padding: 10px;
      height: calc(100vh - 55px);
    }

    .panel {
      background: #0b0f18;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ——— CANVAS FIX ——— */
    .canvas-wrapper {
      flex: 1;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1e293b;
      background: #020617;
      min-height: 400px; /* FIX: ensures canvas always has height */
    }

    #gameCanvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #020617;
      cursor: crosshair;
    }
  </style>
</head>
<body>

  <!-- ——— TOP BAR ——— -->
  <header class="top-bar">
    <div class="brand">Mini Playground</div>

    <!-- NEW BUTTON YOU REQUESTED -->
    <button class="return-btn" onclick="window.location.href='index.html'">
      ⬅ Return to Dashboard
    </button>
  </header>

  <!-- ——— MAIN LAYOUT ——— -->
  <main class="layout">
    <aside class="panel">
      <h3>Tools</h3>
      <p style="font-size:12px;color:#94a3b8;margin-top:6px;">
        (Left panel content preserved — add your tools here)
      </p>
    </aside>

    <section class="panel canvas-wrapper">
      <canvas id="gameCanvas"></canvas>
    </section>

    <aside class="panel">
      <h3>Stats</h3>
      <p style="font-size:12px;color:#94a3b8;margin-top:6px;">
        (Right panel content preserved — stats go here)
      </p>
    </aside>
  </main>

  <script>
    /* ——— FIXED CANVAS RESIZING ——— */
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * window.devicePixelRatio;
      canvas.height = rect.height * window.devicePixelRatio;
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    /* ——— SIMPLE TEST RENDER (proves canvas works) ——— */
    function render() {
      ctx.fillStyle = "#1e293b";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#38bdf8";
      ctx.font = "24px sans-serif";
      ctx.fillText("Canvas is working!", 20, 40);

      requestAnimationFrame(render);
    }
    render();
  </script>

</body>
</html>
