<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Minesweeper</title>
<style>
  :root{
    --bg:#0f1724;
    --panel:#0b1220;
    --accent:#f59e0b;
    --safe:#10b981;
    --danger:#ef4444;
    --text:#e6eef8;
    --muted:#9fb0c8;
  }
  html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#071028 0%, #0b1220 100%);color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box}
  .container{width:100%;max-width:980px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:12px;padding:18px;box-shadow:0 8px 30px rgba(2,6,23,0.7);position:relative}
  /* Back button fixed to the very top-left of the viewport */
  .back-btn{position:fixed;left:12px;top:12px;background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--text);padding:8px 12px;border-radius:8px;text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:8px;z-index:9999}
  .header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  .title{display:flex;align-items:center;gap:12px}
  .logo{width:44px;height:44px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#ef4444);display:flex;align-items:center;justify-content:center;font-weight:700;color:#071028}
  .controls{display:flex;gap:12px;align-items:center}
  .panel{background:var(--panel);padding:12px;border-radius:10px;display:flex;gap:12px;align-items:center}
  .stat{display:flex;flex-direction:column;align-items:center;min-width:84px}
  .stat .num{font-size:20px;font-weight:700;color:var(--text)}
  .stat .label{font-size:12px;color:var(--muted)}
  select,button{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--text);padding:8px 10px;border-radius:8px;font-weight:600}
  button.primary{background:var(--accent);border:none;color:#071428}
  .board-wrap{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;justify-content:center;padding:12px}
  .board{background:linear-gradient(180deg,#071428,#0b1a2a);padding:12px;border-radius:10px;display:grid;gap:4px}
  .cell{width:34px;height:34px;background:linear-gradient(180deg,#0f2436,#0b1a2a);display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;user-select:none;font-weight:700;color:var(--text);font-size:14px;box-shadow:inset 0 -2px 0 rgba(0,0,0,0.4)}
  .cell.revealed{background:linear-gradient(180deg,#e6eef8,#dbeaf6);color:#071428;box-shadow:none;cursor:default}
  .cell.flagged{background:linear-gradient(180deg,#0b1a2a,#071428);color:#f97316}
  .cell.mine{background:linear-gradient(180deg,#ffefef,#ffdede);color:var(--danger)}
  .cell.disabled{pointer-events:none;opacity:0.9}
  .controls-bottom{display:flex;gap:12px;align-items:center;justify-content:center;margin-top:12px}
  .message{margin-top:12px;text-align:center;color:var(--muted);font-size:14px}
  @media (max-width:640px){
    .cell{width:28px;height:28px;font-size:13px}
    .stat{min-width:72px}
  }
</style>
</head>
<body>
 

  <div class="container" role="application" aria-label="Minesweeper game">
    <div class="header">
      <div class="title">
        <div class="logo">MS</div>
        <div>
          <div style="font-weight:800;font-size:18px">Minesweeper</div>
          <div style="font-size:12px;color:var(--muted)">Classic minesweeper implemented in a single HTML file</div>
        </div>
      </div>

      <div class="controls">
        <div class="panel">
          <div class="stat">
            <div class="num" id="mineCount">0</div>
            <div class="label">Mines</div>
          </div>
          <div class="stat">
            <div class="num" id="timer">0</div>
            <div class="label">Seconds</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <select id="difficulty" aria-label="Difficulty">
              <option value="easy">Easy (9×9, 10)</option>
              <option value="medium" selected>Medium (16×16, 40)</option>
              <option value="hard">Hard (16×30, 99)</option>
              <option value="custom">Custom</option>
            </select>
            <button id="resetBtn" title="Reset game">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <div class="board-wrap">
      <div id="board" class="board" role="grid" aria-label="Minesweeper board"></div>
    </div>

    <div class="controls-bottom">
      <div style="display:flex;gap:8px;align-items:center">
        <label style="color:var(--muted);font-size:13px">Rows</label>
        <input id="rows" type="number" min="5" max="40" value="16" style="width:64px;padding:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text)">
        <label style="color:var(--muted);font-size:13px">Cols</label>
        <input id="cols" type="number" min="5" max="60" value="16" style="width:64px;padding:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text)">
        <label style="color:var(--muted);font-size:13px">Mines</label>
        <input id="mines" type="number" min="1" max="999" value="40" style="width:80px;padding:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text)">
      </div>
    </div>

    <div class="message" id="message">Left click to reveal. Right click to flag. Good luck.</div>
  </div>

<script>
/* Minesweeper single-file implementation
   Features:
   - Difficulty presets and custom sizes
   - Left click reveal, right click flag
   - Flood fill for empty cells
   - Timer and mine counter
   - Win / lose detection
   - Prevent default context menu on board
*/

(() => {
  const boardEl = document.getElementById('board');
  const mineCountEl = document.getElementById('mineCount');
  const timerEl = document.getElementById('timer');
  const messageEl = document.getElementById('message');
  const resetBtn = document.getElementById('resetBtn');
  const difficulty = document.getElementById('difficulty');
  const rowsInput = document.getElementById('rows');
  const colsInput = document.getElementById('cols');
  const minesInput = document.getElementById('mines');

  let rows = 16, cols = 16, mines = 40;
  let grid = []; // cells
  let started = false;
  let timer = null;
  let seconds = 0;
  let flags = 0;
  let remainingToReveal = 0;
  let gameOver = false;

  function setDifficultyPreset(preset){
    if(preset === 'easy'){ rows=9; cols=9; mines=10; }
    else if(preset === 'medium'){ rows=16; cols=16; mines=40; }
    else if(preset === 'hard'){ rows=16; cols=30; mines=99; }
    rowsInput.value = rows; colsInput.value = cols; minesInput.value = mines;
  }

  difficulty.addEventListener('change', e=>{
    if(e.target.value === 'custom'){
      messageEl.textContent = 'Set custom rows, cols and mines then press Reset.';
    } else {
      setDifficultyPreset(e.target.value);
      resetGame();
    }
  });

  function startTimer(){
    if(timer) clearInterval(timer);
    seconds = 0;
    timerEl.textContent = seconds;
    timer = setInterval(()=>{ seconds++; timerEl.textContent = seconds; }, 1000);
  }
  function stopTimer(){ if(timer) clearInterval(timer); timer = null; }

  function createGrid(){
    grid = [];
    for(let r=0;r<rows;r++){
      const row = [];
      for(let c=0;c<cols;c++){
        row.push({
          r,c,
          mine:false,
          revealed:false,
          flagged:false,
          adjacent:0,
          el:null
        });
      }
      grid.push(row);
    }
  }

  function inBounds(r,c){ return r>=0 && c>=0 && r<rows && c<cols; }

  function neighbors(r,c){
    const out=[];
    for(let dr=-1;dr<=1;dr++){
      for(let dc=-1;dc<=1;dc++){
        if(dr===0 && dc===0) continue;
        const nr=r+dr, nc=c+dc;
        if(inBounds(nr,nc)) out.push(grid[nr][nc]);
      }
    }
    return out;
  }

  function placeMines(firstClickR, firstClickC){
    // place mines randomly but avoid the first clicked cell and its neighbors
    const forbidden = new Set();
    forbidden.add(`${firstClickR},${firstClickC}`);
    neighbors(firstClickR, firstClickC).forEach(n=>forbidden.add(`${n.r},${n.c}`));
    let placed = 0;
    const total = mines;
    while(placed < total){
      const r = Math.floor(Math.random()*rows);
      const c = Math.floor(Math.random()*cols);
      const key = `${r},${c}`;
      if(forbidden.has(key)) continue;
      const cell = grid[r][c];
      if(cell.mine) continue;
      cell.mine = true;
      placed++;
    }
    // compute adjacent counts
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const cell = grid[r][c];
        cell.adjacent = neighbors(r,c).filter(n=>n.mine).length;
      }
    }
  }

  function buildBoard(){
    boardEl.innerHTML = '';
    boardEl.style.gridTemplateColumns = `repeat(${cols}, auto)`;
    boardEl.style.gridTemplateRows = `repeat(${rows}, auto)`;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const cell = grid[r][c];
        const el = document.createElement('div');
        el.className = 'cell';
        el.setAttribute('data-r', r);
        el.setAttribute('data-c', c);
        el.setAttribute('role','button');
        el.setAttribute('aria-label', `cell ${r+1},${c+1}`);
        el.tabIndex = 0;
        // events
        el.addEventListener('click', onLeftClick);
        el.addEventListener('contextmenu', onRightClick);
        el.addEventListener('keydown', (ev)=>{
          if(ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); onLeftClick.call(el, ev); }
          if(ev.key.toLowerCase() === 'f') { ev.preventDefault(); onRightClick.call(el, ev); }
        });
        cell.el = el;
        boardEl.appendChild(el);
      }
    }
  }

  function revealCell(cell){
    if(cell.revealed || cell.flagged) return;
    cell.revealed = true;
    const el = cell.el;
    el.classList.add('revealed');
    el.classList.remove('flagged');
    el.textContent = cell.mine ? '💣' : (cell.adjacent>0 ? cell.adjacent : '');
    if(cell.mine){
      el.classList.add('mine');
    } else {
      // color numbers
      const colors = ['#0b1220','#0b5cff','#10b981','#ef4444','#7c3aed','#b91c1c','#0ea5a4','#374151','#111827'];
      if(cell.adjacent>0) el.style.color = colors[cell.adjacent] || '#071428';
      else el.style.color = '#071428';
    }
    el.classList.add('disabled');
    remainingToReveal--;
  }

  function floodReveal(start){
    const stack = [start];
    while(stack.length){
      const cell = stack.pop();
      if(cell.revealed || cell.flagged) continue;
      revealCell(cell);
      if(cell.adjacent === 0 && !cell.mine){
        neighbors(cell.r, cell.c).forEach(n=>{
          if(!n.revealed && !n.flagged && !n.mine) stack.push(n);
        });
      }
    }
  }

  function revealAllMines(){
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const cell = grid[r][c];
        if(cell.mine && !cell.revealed){
          cell.el.textContent = '💣';
          cell.el.classList.add('revealed','mine','disabled');
        }
      }
    }
  }

  function checkWin(){
    if(remainingToReveal === 0 && !gameOver){
      gameOver = true;
      stopTimer();
      messageEl.textContent = `You win! Time: ${seconds}s. Press Reset to play again.`;
      // reveal flags nicely
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          const cell = grid[r][c];
          if(cell.mine && !cell.flagged){
            cell.el.classList.add('revealed','mine','disabled');
            cell.el.textContent = '💣';
          }
        }
      }
    }
  }

  function loseGame(triggerCell){
    gameOver = true;
    stopTimer();
    revealAllMines();
    if(triggerCell){
      triggerCell.el.classList.add('mine');
      triggerCell.el.textContent = '💥';
    }
    messageEl.textContent = `Boom! You hit a mine. Press Reset to try again.`;
  }

  function onLeftClick(e){
    if(gameOver) return;
    const el = this;
    const r = parseInt(el.getAttribute('data-r'),10);
    const c = parseInt(el.getAttribute('data-c'),10);
    const cell = grid[r][c];

    if(!started){
      // first click: place mines avoiding this cell and neighbors
      placeMines(r,c);
      started = true;
      startTimer();
      remainingToReveal = rows*cols - mines;
      // reveal first cell (and flood if empty)
      if(cell.mine){
        // extremely rare because we avoid first click, but just in case
        cell.mine = false;
      }
    }

    if(cell.flagged || cell.revealed) return;

    if(cell.mine){
      revealCell(cell);
      loseGame(cell);
      return;
    }

    if(cell.adjacent === 0){
      floodReveal(cell);
    } else {
      revealCell(cell);
    }

    checkWin();
    updateMineCounter();
  }

  function onRightClick(e){
    e.preventDefault();
    if(gameOver) return;
    const el = this;
    const r = parseInt(el.getAttribute('data-r'),10);
    const c = parseInt(el.getAttribute('data-c'),10);
    const cell = grid[r][c];

    if(!started){
      // allow flagging before start but mines not placed yet
      // do not start timer on right-click
    }

    if(cell.revealed) return;

    cell.flagged = !cell.flagged;
    if(cell.flagged){
      el.classList.add('flagged');
      el.textContent = '🚩';
      flags++;
    } else {
      el.classList.remove('flagged');
      el.textContent = '';
      flags--;
    }
    updateMineCounter();
    // quick win check: if flags equal mines, and all mines flagged
    if(flags === mines){
      // verify all mines flagged
      let allFlagged = true;
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          const cc = grid[r][c];
          if(cc.mine && !cc.flagged) allFlagged = false;
        }
      }
      if(allFlagged) {
        remainingToReveal = 0;
        checkWin();
      }
    }
  }

  function updateMineCounter(){
    mineCountEl.textContent = Math.max(0, mines - flags);
  }

  function resetGame(){
    // read custom values
    rows = parseInt(rowsInput.value,10) || rows;
    cols = parseInt(colsInput.value,10) || cols;
    mines = parseInt(minesInput.value,10) || mines;
    // clamp mines
    mines = Math.max(1, Math.min(mines, rows*cols - 1));
    rowsInput.value = rows; colsInput.value = cols; minesInput.value = mines;

    started = false;
    gameOver = false;
    flags = 0;
    remainingToReveal = rows*cols - mines;
    stopTimer();
    timerEl.textContent = '0';
    seconds = 0;
    messageEl.textContent = 'Left click to reveal. Right click to flag. Good luck.';
    createGrid();
    buildBoard();
    updateMineCounter();
  }

  // disable context menu on board for better UX
  boardEl.addEventListener('contextmenu', e=>e.preventDefault());

  // reset button
  resetBtn.addEventListener('click', resetGame);

  // initialize
  setDifficultyPreset(difficulty.value);
  resetGame();

  // accessibility: allow double-click chord to reveal neighbors if number matches flags
  boardEl.addEventListener('dblclick', (e)=>{
    if(gameOver) return;
    const el = e.target.closest('.cell');
    if(!el) return;
    const r = parseInt(el.getAttribute('data-r'),10);
    const c = parseInt(el.getAttribute('data-c'),10);
    const cell = grid[r][c];
    if(!cell.revealed || cell.adjacent === 0) return;
    const neigh = neighbors(r,c);
    const flaggedCount = neigh.filter(n=>n.flagged).length;
    if(flaggedCount === cell.adjacent){
      // reveal all unflagged neighbors
      neigh.forEach(n=>{
        if(!n.flagged && !n.revealed){
          if(n.mine){
            loseGame(n);
          } else if(n.adjacent === 0){
            floodReveal(n);
          } else {
            revealCell(n);
          }
        }
      });
      checkWin();
    }
  });

  // touch support: long press to flag
  let touchTimer = null;
  boardEl.addEventListener('touchstart', (e)=>{
    const el = e.target.closest('.cell');
    if(!el) return;
    touchTimer = setTimeout(()=> {
      const r = parseInt(el.getAttribute('data-r'),10);
      const c = parseInt(el.getAttribute('data-c'),10);
      const cell = grid[r][c];
      if(!cell.revealed){
        cell.flagged = !cell.flagged;
        if(cell.flagged){ el.classList.add('flagged'); el.textContent='🚩'; flags++; }
        else { el.classList.remove('flagged'); el.textContent=''; flags--; }
        updateMineCounter();
      }
    }, 500);
  });
  boardEl.addEventListener('touchend', ()=>{ if(touchTimer) clearTimeout(touchTimer); touchTimer = null; });

})();
</script>
</body>
</html>
