<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Block Breaker — Fixed</title>
<style>
  :root{
    --bg:#0b1220;
    --panel:#0f1724;
    --accent:#ffb86b;
    --muted:#9aa4b2;
  }
  html,body{
    height:100%;
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
    background:linear-gradient(180deg,#071021 0%, #0b1220 100%);
    color:#e6eef6;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  .back-btn{
    position:fixed;
    top:12px;
    left:12px;
    z-index:1000;
    background:var(--panel);
    color:var(--accent);
    border:1px solid rgba(255,184,107,0.12);
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
    box-shadow:0 6px 18px rgba(2,6,23,0.6);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .back-btn:hover{ transform:translateY(-2px); box-shadow:0 10px 24px rgba(2,6,23,0.7); }

  .wrap{
    min-height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 16px;
    box-sizing:border-box;
  }
  .game-card{
    width:900px;
    max-width:96vw;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:12px;
    padding:18px;
    box-shadow:0 10px 40px rgba(2,6,23,0.6);
    display:flex;
    gap:16px;
    align-items:flex-start;
  }
  /* Canvas uses fixed logical aspect ratio; CSS controls visual size */
  .canvas-wrap{
    width:720px;
    max-width:64vw;
    height:480px;
    max-height:54vh;
  }
  canvas{
    background:linear-gradient(180deg,#071428,#0b1b2a);
    border-radius:8px;
    display:block;
    width:100%;
    height:100%;
    box-shadow:inset 0 0 40px rgba(0,0,0,0.35);
    touch-action:none;
  }
  .sidebar{
    width:220px;
    max-width:28vw;
    color:var(--muted);
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .panel{
    background:rgba(255,255,255,0.02);
    padding:12px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.02);
  }
  .controls button{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:0;
    background:var(--accent);
    color:#071428;
    font-weight:700;
    cursor:pointer;
  }
  .muted{ color:var(--muted); font-size:13px; }
  .stat{ font-size:18px; font-weight:700; color:#e6eef6; }
  @media (max-width:720px){
    .game-card{ flex-direction:column; align-items:center; padding:12px; }
    .canvas-wrap{ width:92vw; height:56vh; }
    .sidebar{ width:92vw; max-width:none; }
  }
</style>
</head>
<body>


  <div class="wrap">
    <div class="game-card" role="application" aria-label="Block Breaker game">
      <div class="canvas-wrap">
        <canvas id="gameCanvas" aria-label="Block Breaker canvas"></canvas>
      </div>

      <div class="sidebar">
        <div class="panel">
          <div class="muted">Score</div>
          <div id="score" class="stat">0</div>
        </div>

        <div class="panel">
          <div class="muted">Lives</div>
          <div id="lives" class="stat">3</div>
        </div>

        <div class="panel">
          <div class="muted">Level</div>
          <div id="level" class="stat">1</div>
        </div>

        <div class="panel controls">
          <button id="startBtn">Start / Resume</button>
          <div style="height:8px"></div>
          <button id="pauseBtn" style="background:#2b3a4a;color:#fff">Pause</button>
          <div style="height:8px"></div>
          <button id="resetBtn" style="background:#1f2937;color:#fff">Reset</button>
        </div>

        <div class="panel muted">
          Controls: <br>
          - Move paddle with mouse or left/right arrow keys<br>
          - Space to launch ball / pause<br>
          - Touch: drag paddle
        </div>
      </div>
    </div>
  </div>

<script>
/* Fixed Block Breaker
   Key fixes:
   - Proper high-DPI canvas scaling and consistent logical coordinate system
   - Single requestAnimationFrame loop with cancelation and proper time delta
   - Improved brick collision side detection
   - Input coordinates mapped to logical coordinates
   - Stable pause/resume and restart behavior
*/

(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Logical resolution (drawing coordinates)
  const LOGICAL_W = 900;
  const LOGICAL_H = 600;

  // DOM
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const levelEl = document.getElementById('level');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Game state
  let score = 0;
  let lives = 3;
  let level = 1;
  let running = false;
  let paused = false;

  // Paddle
  const paddle = {
    w: 140,
    h: 16,
    x: (LOGICAL_W - 140) / 2,
    y: LOGICAL_H - 60,
    speed: 12,
    dx: 0
  };

  // Ball
  const ball = {
    r: 10,
    x: LOGICAL_W / 2,
    y: paddle.y - 12,
    speed: 6,
    vx: 0,
    vy: 0,
    stuck: true
  };

  // Bricks
  let bricks = [];
  const brickConfig = {
    rows: 5,
    cols: 10,
    padding: 10,
    offsetTop: 80,
    offsetLeft: 36
  };

  const brickColors = ['#ff6b6b','#ffb86b','#ffd56b','#8be78b','#6bd1ff'];

  // Animation control
  let animationId = null;
  let lastTime = 0;

  // Resize & DPI handling
  function resizeCanvas() {
    // Keep logical drawing size constant; scale canvas backing store to devicePixelRatio
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    // Set canvas CSS size from its container (already controlled by CSS)
    const rect = canvas.getBoundingClientRect();
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    // Backing store size uses logical resolution scaled by DPR but maintain aspect ratio
    canvas.width = LOGICAL_W * dpr;
    canvas.height = LOGICAL_H * dpr;
    // Map drawing operations so 1 unit = 1 logical pixel
    ctx.setTransform(dpr * (rect.width / rect.width), 0, 0, dpr * (rect.height / rect.height), 0, 0);
    // Note: we draw using LOGICAL_W x LOGICAL_H coordinates
  }
  window.addEventListener('resize', resizeCanvas);
  // Initial resize
  resizeCanvas();

  // Compute brick width to fit columns within logical width
  function computeBrickSize(cols) {
    const totalPadding = (cols - 1) * brickConfig.padding;
    const available = LOGICAL_W - brickConfig.offsetLeft * 2 - totalPadding;
    const w = Math.floor(available / cols);
    const h = 22;
    return { w, h };
  }

  function createBricks(rows = brickConfig.rows, cols = brickConfig.cols) {
    bricks = [];
    const size = computeBrickSize(cols);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = brickConfig.offsetLeft + c * (size.w + brickConfig.padding);
        const y = brickConfig.offsetTop + r * (size.h + brickConfig.padding);
        bricks.push({
          x, y,
          w: size.w,
          h: size.h,
          hits: 1 + Math.floor((level - 1) / 2),
          color: brickColors[r % brickColors.length]
        });
      }
    }
  }

  function resetBallAndPaddle(stick = true) {
    paddle.w = Math.max(80, 140 - (level - 1) * 6);
    paddle.x = (LOGICAL_W - paddle.w) / 2;
    paddle.y = LOGICAL_H - 60;
    ball.x = paddle.x + paddle.w / 2;
    ball.y = paddle.y - ball.r - 2;
    ball.vx = 0;
    ball.vy = 0;
    ball.speed = 6 + (level - 1) * 0.6;
    ball.stuck = stick;
  }

  function updateHUD() {
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    levelEl.textContent = level;
  }

  function launchBall() {
    if (!ball.stuck) return;
    // Launch with a controlled angle away from vertical to avoid straight vertical traps
    const angle = (Math.random() * Math.PI / 3) + Math.PI * 5/12;
    ball.vx = ball.speed * Math.cos(angle);
    ball.vy = -Math.abs(ball.speed * Math.sin(angle));
    ball.stuck = false;
  }

  // Collision helper: improved side detection using previous center
  function rectCircleColliding(circle, rect) {
    const distX = Math.abs(circle.x - rect.x - rect.w / 2);
    const distY = Math.abs(circle.y - rect.y - rect.h / 2);

    if (distX > (rect.w / 2 + circle.r)) return false;
    if (distY > (rect.h / 2 + circle.r)) return false;

    if (distX <= (rect.w / 2)) return true;
    if (distY <= (rect.h / 2)) return true;

    const dx = distX - rect.w / 2;
    const dy = distY - rect.h / 2;
    return (dx * dx + dy * dy <= (circle.r * circle.r));
  }

  // Main update
  function update(delta) {
    // Paddle movement from keyboard
    paddle.x += paddle.dx * paddle.speed * delta;
    paddle.x = Math.max(8, Math.min(LOGICAL_W - paddle.w - 8, paddle.x));

    if (ball.stuck) {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - ball.r - 2;
      return;
    }

    // Move ball
    const prevX = ball.x;
    const prevY = ball.y;
    ball.x += ball.vx * delta;
    ball.y += ball.vy * delta;

    // Walls
    if (ball.x - ball.r <= 8) {
      ball.x = 8 + ball.r;
      ball.vx = -ball.vx;
    } else if (ball.x + ball.r >= LOGICAL_W - 8) {
      ball.x = LOGICAL_W - 8 - ball.r;
      ball.vx = -ball.vx;
    }
    if (ball.y - ball.r <= 8) {
      ball.y = 8 + ball.r;
      ball.vy = -ball.vy;
    }

    // Paddle collision (only when moving downward)
    const paddleRect = { x: paddle.x, y: paddle.y, w: paddle.w, h: paddle.h };
    if (rectCircleColliding(ball, paddleRect) && ball.vy > 0) {
      // Determine hit position relative to paddle center
      const hitPos = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
      const maxBounce = Math.PI / 3; // 60 degrees
      const bounceAngle = hitPos * maxBounce;
      const speed = Math.hypot(ball.vx, ball.vy) * 1.02;
      ball.vx = speed * Math.sin(bounceAngle);
      ball.vy = -Math.abs(speed * Math.cos(bounceAngle));
      ball.y = paddle.y - ball.r - 1;
    }

    // Brick collisions: iterate and break on first collision to avoid multiple reflections in one frame
    for (let i = 0; i < bricks.length; i++) {
      const b = bricks[i];
      if (!b) continue;
      if (rectCircleColliding(ball, b)) {
        // Determine collision side by comparing previous center to brick bounds
        const collidedFromLeft = prevX + ball.r <= b.x;
        const collidedFromRight = prevX - ball.r >= b.x + b.w;
        const collidedFromTop = prevY + ball.r <= b.y;
        const collidedFromBottom = prevY - ball.r >= b.y + b.h;

        // Prefer horizontal flip if came from left/right, else vertical
        if (collidedFromLeft || collidedFromRight) {
          ball.vx = -ball.vx;
        } else if (collidedFromTop || collidedFromBottom) {
          ball.vy = -ball.vy;
        } else {
          // Fallback: invert vertical velocity
          ball.vy = -ball.vy;
        }

        b.hits--;
        if (b.hits <= 0) {
          bricks.splice(i, 1);
          score += 10;
        } else {
          score += 5;
        }
        updateHUD();
        break;
      }
    }

    // Ball fell below
    if (ball.y - ball.r > LOGICAL_H) {
      lives--;
      updateHUD();
      if (lives <= 0) {
        // Game over
        running = false;
        cancelAnimationFrame(animationId);
        animationId = null;
        drawGameOver();
        return;
      } else {
        resetBallAndPaddle(true);
      }
    }

    // Level cleared
    if (bricks.length === 0) {
      level++;
      createBricks();
      resetBallAndPaddle(true);
      updateHUD();
    }
  }

  // Drawing helpers
  function clear() {
    ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
  }

  function draw() {
    clear();

    // Background
    const g = ctx.createLinearGradient(0,0,0,LOGICAL_H);
    g.addColorStop(0,'#071428');
    g.addColorStop(1,'#071a2a');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);

    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 8;
    roundRect(ctx, 4, 4, LOGICAL_W - 8, LOGICAL_H - 8, 10, true, false);

    // Bricks
    bricks.forEach(b => {
      ctx.fillStyle = b.color;
      ctx.globalAlpha = 0.95;
      roundRect(ctx, b.x, b.y, b.w, b.h, 6, true, false);
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.font = '12px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(b.hits > 1 ? b.hits : '', b.x + b.w/2, b.y + b.h/2);
    });
    ctx.globalAlpha = 1;

    // Paddle
    const padGrad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x + paddle.w, paddle.y + paddle.h);
    padGrad.addColorStop(0, '#ffffff22');
    padGrad.addColorStop(1, '#ffffff08');
    ctx.fillStyle = padGrad;
    roundRect(ctx, paddle.x, paddle.y, paddle.w, paddle.h, 8, true, false);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 2;
    roundRect(ctx, paddle.x, paddle.y, paddle.w, paddle.h, 8, false, true);

    // Ball
    const ballGrad = ctx.createRadialGradient(ball.x - 4, ball.y - 4, 2, ball.x, ball.y, ball.r);
    ballGrad.addColorStop(0, '#ffffff');
    ballGrad.addColorStop(1, '#6bd1ff');
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();

    // HUD overlay
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(12,12,LOGICAL_W - 24, 48);
    ctx.fillStyle = '#e6eef6';
    ctx.font = '16px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(`Score: ${score}`, 28, 42);
    ctx.textAlign = 'right';
    ctx.fillText(`Lives: ${lives}   Level: ${level}`, LOGICAL_W - 28, 42);
  }

  function drawPausedOverlay() {
    ctx.fillStyle = 'rgba(2,6,23,0.5)';
    ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);
    ctx.fillStyle = '#fff';
    ctx.font = '36px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Paused', LOGICAL_W / 2, LOGICAL_H / 2 - 10);
    ctx.font = '14px system-ui';
    ctx.fillText('Press Space or Start to resume', LOGICAL_W / 2, LOGICAL_H / 2 + 24);
  }

  function drawGameOver() {
    draw();
    ctx.fillStyle = 'rgba(2,6,23,0.7)';
    ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);
    ctx.fillStyle = '#ffb86b';
    ctx.font = '48px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over', LOGICAL_W / 2, LOGICAL_H / 2 - 10);
    ctx.fillStyle = '#e6eef6';
    ctx.font = '18px system-ui';
    ctx.fillText(`Final Score: ${score}`, LOGICAL_W / 2, LOGICAL_H / 2 + 30);
  }

  function roundRect(ctx, x, y, w, h, r, fill, stroke) {
    if (typeof r === 'undefined') r = 5;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  // Main loop with stable timing and single RAF
  function loop(timestamp) {
    if (!running) return;
    if (!lastTime) lastTime = timestamp;
    const elapsed = timestamp - lastTime;
    lastTime = timestamp;
    const delta = Math.min(64, elapsed) / 16.67; // normalize to ~60fps

    if (!paused) {
      update(delta);
      draw();
    } else {
      draw();
      drawPausedOverlay();
    }

    animationId = requestAnimationFrame(loop);
  }

  // Input handling (keyboard)
  const keys = {};
  window.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowLeft') paddle.dx = -1;
    if (e.code === 'ArrowRight') paddle.dx = 1;
    if (e.code === 'Space') {
      if (!running) {
        startGame();
      } else if (paused) {
        togglePause();
      } else {
        launchBall();
      }
    }
    keys[e.code] = true;
  });
  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
    if (e.code === 'ArrowLeft' && !keys['ArrowRight']) paddle.dx = 0;
    if (e.code === 'ArrowRight' && !keys['ArrowLeft']) paddle.dx = 0;
  });

  // Map pointer/touch coordinates to logical coordinates
  function clientToLogical(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = (clientX - rect.left) * (LOGICAL_W / rect.width);
    const y = (clientY - rect.top) * (LOGICAL_H / rect.height);
    return { x, y };
  }

  // Mouse
  canvas.addEventListener('mousemove', (e) => {
    const p = clientToLogical(e.clientX, e.clientY);
    paddle.x = Math.max(8, Math.min(LOGICAL_W - paddle.w - 8, p.x - paddle.w / 2));
  });

  // Touch
  let touching = false;
  canvas.addEventListener('touchstart', (e) => {
    touching = true;
    const t = e.touches[0];
    const p = clientToLogical(t.clientX, t.clientY);
    paddle.x = Math.max(8, Math.min(LOGICAL_W - paddle.w - 8, p.x - paddle.w / 2));
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchmove', (e) => {
    if (!touching) return;
    const t = e.touches[0];
    const p = clientToLogical(t.clientX, t.clientY);
    paddle.x = Math.max(8, Math.min(LOGICAL_W - paddle.w - 8, p.x - paddle.w / 2));
    e.preventDefault();
  }, {passive:false});
  canvas.addEventListener('touchend', () => { touching = false; });

  // Buttons
  function startGame() {
    if (!running) {
      running = true;
      paused = false;
      score = 0;
      lives = 3;
      level = 1;
      createBricks();
      resetBallAndPaddle(true);
      updateHUD();
      lastTime = 0;
      if (animationId) cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(loop);
    } else {
      paused = false;
      lastTime = 0;
      if (!animationId) animationId = requestAnimationFrame(loop);
    }
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (!paused) {
      lastTime = 0;
      if (!animationId) animationId = requestAnimationFrame(loop);
    }
  }

  function resetGame() {
    running = true;
    paused = false;
    score = 0;
    lives = 3;
    level = 1;
    createBricks();
    resetBallAndPaddle(true);
    updateHUD();
    lastTime = 0;
    if (!animationId) animationId = requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', () => {
    if (!running) startGame();
    else { paused = false; launchBall(); }
  });
  pauseBtn.addEventListener('click', () => togglePause());
  resetBtn.addEventListener('click', () => resetGame());

  // Initialize
  createBricks();
  resetBallAndPaddle(true);
  updateHUD();
  draw();

  // Ensure canvas is sized correctly on load (some browsers report sizes late)
  window.requestAnimationFrame(() => {
    resizeCanvas();
    draw();
  });

})();
</script>
</body>
</html>
