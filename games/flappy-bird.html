<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FLPPY.EXE — arcade terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  :root {
    --bg: #0b0e12;
    --bg2: #111519;
    --bg3: #161b22;
    --border: #2a2f3a;
    --accent: #f0c040;
    --accent2: #00e5ff;
    --accent3: #ff4560;
    --green: #39ff14;
    --text: #c9d1d9;
    --text-dim: #6e7681;
    --font: 'Share Tech Mono', monospace;
    --font2: 'VT323', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── TOP NAV ── */
  .nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 44px;
    flex-shrink: 0;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }

  .nav-logo {
    font-family: var(--font2);
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
    margin-right: 10px;
    text-shadow: 0 0 10px var(--accent);
  }

  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 4px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    text-transform: uppercase;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(240,192,64,.08); }

  .nav-spacer { flex: 1; }

  .nav-icon {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 6px;
    transition: color .15s;
  }
  .nav-icon:hover { color: var(--accent); }

  /* ── GRID BACKGROUND ── */
  .grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(42,47,58,.25) 1px, transparent 1px),
      linear-gradient(90deg, rgba(42,47,58,.25) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 32px;
    position: relative;
    z-index: 1;
    gap: 18px;
  }

  /* ── PAGE TITLE ── */
  .page-title {
    font-family: var(--font2);
    font-size: clamp(36px, 6vw, 64px);
    letter-spacing: 8px;
    color: var(--accent);
    text-align: center;
    text-shadow: 0 0 20px var(--accent), 0 0 40px rgba(240,192,64,.3);
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%,100% { text-shadow: 0 0 20px var(--accent), 0 0 40px rgba(240,192,64,.3); }
    50% { text-shadow: 0 0 30px var(--accent), 0 0 60px rgba(240,192,64,.5), 0 0 80px rgba(240,192,64,.2); }
  }
  .page-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat-chip {
    border: 1px solid var(--border);
    background: var(--bg3);
    padding: 5px 14px;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-chip span { color: var(--accent); font-family: var(--font2); font-size: 16px; }

  /* ── CANVAS WRAPPER ── */
  .canvas-wrap {
    position: relative;
    border: 1px solid var(--border);
    box-shadow: 0 0 0 1px rgba(240,192,64,.1), 0 0 40px rgba(0,0,0,.6), inset 0 0 60px rgba(0,0,0,.4);
    background: #060910;
    overflow: hidden;
    width: min(480px, 96vw);
    aspect-ratio: 480/640;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  .canvas-corner {
    position: absolute;
    width: 12px; height: 12px;
    border-color: var(--accent);
    border-style: solid;
    opacity: .7;
  }
  .canvas-corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .canvas-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .canvas-corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
  .canvas-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  /* ── CONTROLS ROW ── */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .ctrl-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 8px 20px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(240,192,64,.06); }
  .ctrl-btn.primary { border-color: var(--accent); color: var(--accent); background: rgba(240,192,64,.08); }
  .ctrl-btn.primary:hover { background: rgba(240,192,64,.15); }
  .ctrl-btn.danger { border-color: var(--accent3); color: var(--accent3); background: rgba(255,69,96,.06); }
  .ctrl-btn.danger:hover { background: rgba(255,69,96,.12); }

  /* ── INFO NOTE ── */
  .note-bar {
    border: 1px solid var(--accent2);
    background: rgba(0,229,255,.04);
    padding: 7px 16px;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-dim);
    width: min(480px, 96vw);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .note-bar strong { color: var(--accent2); letter-spacing: 2px; font-size: 10px; }

  /* ── POWER-UP LEGEND ── */
  .legend {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    width: min(480px, 96vw);
  }
  .legend-item {
    border: 1px solid var(--border);
    background: var(--bg3);
    padding: 5px 12px;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── MOBILE BUTTONS ── */
  .mobile-jump {
    display: none;
    width: min(480px, 96vw);
  }
  .jump-btn {
    width: 100%;
    background: rgba(240,192,64,.06);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font2);
    font-size: 28px;
    letter-spacing: 4px;
    padding: 18px;
    cursor: pointer;
    text-align: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  @media (hover: none) and (pointer: coarse) {
    .mobile-jump { display: block; }
  }

  /* ── SCANLINE OVERLAY ── */
  .scanlines {
    position: fixed; inset: 0; z-index: 999; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 2px,
      rgba(0,0,0,.06) 2px,
      rgba(0,0,0,.06) 4px
    );
  }

  /* ── CRT VIGNETTE ── */
  .vignette {
    position: fixed; inset: 0; z-index: 998; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.55) 100%);
  }
</style>
</head>
<body>

<!-- SCANLINES + VIGNETTE -->
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="grid-bg"></div>

<!-- ── NAV ── -->
<nav class="nav">
  <div class="nav-logo">HOMEWRK 3.0</div>

</nav>

<!-- ── MAIN ── -->
<main class="main">

  <div>
    <div class="page-title">FLPPY.EXE</div>
    <div class="page-sub">◆ arcade terminal · v2.4.1 ◆</div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-chip">HIGH SCORE <span id="ui-hs">0</span></div>
    <div class="stat-chip">SCORE <span id="ui-score">0</span></div>

  <!-- Canvas -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="gameCanvas" width="480" height="640"></canvas>

<!-- ══════════════════════════════════════════════════════════
     GAME SCRIPT
══════════════════════════════════════════════════════════ -->
<script>
// ════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════
const CFG = {
  W: 480, H: 640,
  GRAVITY: 0.45,
  JUMP: -9.5,
  PIPE_W: 58,
  PIPE_SPEED_BASE: 2.6,
  PIPE_GAP_BASE: 175,
  PIPE_GAP_MIN: 110,
  PIPE_INTERVAL: 90,  // frames
  BIRD_X: 90,
  BIRD_R: 14,
  PARALLAX_LAYERS: 3,
  STAR_COUNT: 80,
  PARTICLE_MAX: 200,
  POWERUP_CHANCE: 0.22,
  SHIELD_DUR: 300,
  SLOWMO_DUR: 240,
  MAGNET_DUR: 280,
  DJUMP_DUR: 360,
};

// ════════════════════════════════════════════════
//  CANVAS / CTX
// ════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// ════════════════════════════════════════════════
//  AUDIO ENGINE  (Web Audio — no external files)
// ════════════════════════════════════════════════
let audioCtx = null;
let musicOn  = false;
let musicOsc = null, musicOsc2 = null, musicGain = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function beep(freq, type, dur, vol=.18, detune=0) {
  ensureAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type; o.frequency.value = freq; o.detune.value = detune;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function sfxJump()   { beep(440,'square',.12,.13); beep(660,'square',.08,.08); }
function sfxScore()  { beep(880,'sine',.15,.15); beep(1100,'sine',.1,.1); }
function sfxDie()    { beep(180,'sawtooth',.4,.2); beep(120,'sawtooth',.5,.15); }
function sfxPowerup(){ beep(660,'sine',.08,.12); beep(880,'sine',.08,.12); beep(1100,'sine',.12,.15); }
function sfxShield() { beep(300,'triangle',.3,.12); }
function sfxHit()    { beep(200,'sawtooth',.2,.2); }

function startMusic() {
  ensureAudio();
  if (musicGain) return;
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.06;
  musicGain.connect(audioCtx.destination);

  const notes = [220,246,261,293,329,349,392,440];
  let ni = 0;
  function playNote() {
    if (!musicOn) { stopMusic(); return; }
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(musicGain);
    o.type = 'square';
    o.frequency.value = notes[ni % notes.length];
    ni++;
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + .18);
    o.start(); o.stop(audioCtx.currentTime + .18);
    setTimeout(playNote, 200);
  }
  playNote();
}

function stopMusic() {
  if (musicGain) { musicGain.disconnect(); musicGain = null; }
}

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
const STATES = { START:0, PLAY:1, PAUSE:2, DEAD:3 };
let state = STATES.START;

let score=0, hiScore=0, level=1, lives=0;
let frame=0, shakeTimer=0, shakeAmt=0;
let slowFactor=1, slowTimer=0;

// Bird
const bird = {
  x: CFG.BIRD_X, y: CFG.H/2,
  vy: 0, angle: 0,
  shield: false, shieldTimer: 0,
  djump: false, djumpTimer: 0, djumpUsed: false,
  magnet: false, magnetTimer: 0,
  slowmo: false, slowmoTimer: 0,
  trail: [],
  wingPhase: 0,
  alive: true,
};

let pipes = [];
let powerups = [];
let particles = [];
let stars = [];
let bgStars = [];
let clouds = [];
let pipeTimer = 0;
let totalPipes = 0;
let scoreMultiplier = 1;

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
function init() {
  hiScore = parseInt(localStorage.getItem('flppy_hi') || '0');
  generateStars();
  generateClouds();
  updateUI();
  loop();
}

function generateStars() {
  stars = [];
  bgStars = [];
  for (let i=0;i<CFG.STAR_COUNT;i++) {
    stars.push({
      x: Math.random()*CFG.W,
      y: Math.random()*CFG.H,
      r: Math.random()*1.5+.3,
      spd: Math.random()*.4+.1,
      alpha: Math.random()*.8+.2,
      twinkle: Math.random()*Math.PI*2,
    });
  }
  for (let i=0;i<30;i++) {
    bgStars.push({
      x: Math.random()*CFG.W,
      y: Math.random()*CFG.H*.7,
      r: Math.random()*3+1,
      spd: Math.random()*.2+.05,
      hue: Math.random()*360,
    });
  }
}

function generateClouds() {
  clouds = [];
  for (let i=0;i<6;i++) {
    clouds.push({
      x: Math.random()*CFG.W,
      y: Math.random()*CFG.H*.5+20,
      w: Math.random()*80+40,
      spd: Math.random()*.3+.1,
      alpha: Math.random()*.12+.04,
    });
  }
}

function resetGame() {
  score=0; level=1; lives=3; frame=0; pipeTimer=0; totalPipes=0;
  scoreMultiplier=1; slowFactor=1; slowTimer=0;
  pipes=[]; powerups=[]; particles=[];
  bird.y=CFG.H/2; bird.vy=0; bird.angle=0; bird.alive=true;
  bird.shield=false; bird.shieldTimer=0;
  bird.djump=false; bird.djumpTimer=0; bird.djumpUsed=false;
  bird.magnet=false; bird.magnetTimer=0;
  bird.slowmo=false; bird.slowmoTimer=0;
  bird.trail=[];
  state=STATES.PLAY;
  updateUI();
}

// ════════════════════════════════════════════════
//  PIPE FACTORY
// ════════════════════════════════════════════════
function getPipeGap() {
  const progress = Math.min(totalPipes/40, 1);
  return Math.max(CFG.PIPE_GAP_MIN, CFG.PIPE_GAP_BASE - progress*65);
}
function getPipeSpeed() {
  return CFG.PIPE_SPEED_BASE + Math.min(level*.35, 3.5);
}
function spawnPipe() {
  const gap = getPipeGap();
  const minTop = 70, maxTop = CFG.H - gap - 70;
  const topH = Math.random()*(maxTop-minTop)+minTop;
  const hasPU = Math.random() < CFG.POWERUP_CHANCE;
  const types = ['shield','slowmo','djump','magnet'];
  pipes.push({
    x: CFG.W+10,
    topH,
    botY: topH+gap,
    scored: false,
    speed: getPipeSpeed(),
    hue: Math.random()*30-15, // slight colour variation
  });
  if (hasPU) {
    const type = types[Math.floor(Math.random()*types.length)];
    powerups.push({
      x: CFG.W+10+CFG.PIPE_W/2,
      y: topH + gap/2,
      type,
      collected: false,
      pulse: 0,
    });
  }
  totalPipes++;
}

// ════════════════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════════════════
function spawnParticles(x,y,count,hue,spd=3,life=35) {
  for (let i=0;i<count;i++) {
    if (particles.length>=CFG.PARTICLE_MAX) break;
    const ang = Math.random()*Math.PI*2;
    const s   = Math.random()*spd+.5;
    particles.push({
      x,y,
      vx: Math.cos(ang)*s,
      vy: Math.sin(ang)*s,
      life, maxLife: life,
      hue, r: Math.random()*3+1,
    });
  }
}

function spawnTrail(x,y) {
  if (Math.random()>.5) return;
  particles.push({
    x: x+Math.random()*6-3,
    y: y+Math.random()*6-3,
    vx: -Math.random()*.8-.2,
    vy: Math.random()*.6-.3,
    life: 18, maxLife: 18,
    hue: bird.shield?180 : bird.slowmo?120 : 45,
    r: Math.random()*2+.5,
    trail: true,
  });
}

// ════════════════════════════════════════════════
//  FLAP
// ════════════════════════════════════════════════
function flap() {
  if (state===STATES.START) { state=STATES.PLAY; resetGame(); return; }
  if (state===STATES.DEAD)  { state=STATES.PLAY; resetGame(); return; }
  if (state===STATES.PAUSE) return;
  if (!bird.alive) return;

  if (bird.djump && !bird.djumpUsed && bird.vy>0) {
    bird.vy = CFG.JUMP*.95;
    bird.djumpUsed = true;
    spawnParticles(bird.x, bird.y, 12, 60);
    sfxJump();
    return;
  }
  bird.vy = CFG.JUMP;
  sfxJump();
  spawnParticles(bird.x+10, bird.y, 8, 45, 2, 20);
}

// ════════════════════════════════════════════════
//  COLLISION
// ════════════════════════════════════════════════
function circleRect(cx,cy,cr, rx,ry,rw,rh) {
  const nx = Math.max(rx, Math.min(cx, rx+rw));
  const ny = Math.max(ry, Math.min(cy, ry+rh));
  const dx = cx-nx, dy = cy-ny;
  return dx*dx+dy*dy < cr*cr;
}

// ════════════════════════════════════════════════
//  POWERUP APPLY
// ════════════════════════════════════════════════
function applyPowerup(type) {
  sfxPowerup();
  spawnParticles(bird.x,bird.y,20, type==='shield'?180:type==='slowmo'?120:type==='magnet'?0:60, 4,50);
  if (type==='shield')  { bird.shield=true; bird.shieldTimer=CFG.SHIELD_DUR; }
  if (type==='slowmo')  { bird.slowmo=true; bird.slowmoTimer=CFG.SLOWMO_DUR; slowFactor=.45; }
  if (type==='djump')   { bird.djump=true;  bird.djumpTimer=CFG.DJUMP_DUR; bird.djumpUsed=false; }
  if (type==='magnet')  { bird.magnet=true; bird.magnetTimer=CFG.MAGNET_DUR; scoreMultiplier=2; }
}

// ════════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════════
function update() {
  if (state!==STATES.PLAY) return;
  frame++;

  // shake decay
  if (shakeTimer>0) { shakeTimer--; shakeAmt=Math.max(0,shakeAmt*.85); }

  // bird timers
  if (bird.shield && --bird.shieldTimer<=0) { bird.shield=false; }
  if (bird.djump  && --bird.djumpTimer<=0)  { bird.djump=false; bird.djumpUsed=false; }
  if (bird.magnet && --bird.magnetTimer<=0) { bird.magnet=false; scoreMultiplier=1; }
  if (bird.slowmo && --bird.slowmoTimer<=0) { bird.slowmo=false; slowFactor=1; }

  // bird physics
  bird.vy += CFG.GRAVITY * slowFactor;
  bird.vy  = Math.max(-18, Math.min(bird.vy, 18));
  bird.y  += bird.vy * slowFactor;
  bird.angle = Math.max(-30, Math.min(bird.vy*4, 90));
  bird.wingPhase += 0.25;

  // trail
  spawnTrail(bird.x, bird.y);
  bird.trail.push({x:bird.x, y:bird.y, alpha:1});
  if (bird.trail.length>18) bird.trail.shift();
  bird.trail.forEach(t => t.alpha*=.88);

  // ceiling/floor
  if (bird.y - CFG.BIRD_R < 0) {
    bird.y = CFG.BIRD_R; bird.vy = 2;
    triggerHit();
  }
  if (bird.y + CFG.BIRD_R > CFG.H) {
    bird.y = CFG.H - CFG.BIRD_R;
    triggerDeath();
    return;
  }

  // stars parallax
  stars.forEach(s => {
    s.x -= s.spd * slowFactor;
    s.twinkle += .04;
    if (s.x<0) s.x=CFG.W;
  });
  bgStars.forEach(s => {
    s.x -= s.spd * slowFactor;
    if (s.x<0) s.x=CFG.W;
  });
  clouds.forEach(c => {
    c.x -= c.spd * slowFactor;
    if (c.x + c.w < 0) c.x=CFG.W+c.w;
  });

  // pipes
  pipeTimer++;
  const pipeInt = Math.max(55, CFG.PIPE_INTERVAL - level*3);
  if (pipeTimer >= pipeInt) { spawnPipe(); pipeTimer=0; }

  pipes.forEach(p => {
    p.x -= p.speed * slowFactor;
    // score
    if (!p.scored && p.x + CFG.PIPE_W < bird.x) {
      p.scored=true;
      score += scoreMultiplier;
      sfxScore();
      level = Math.floor(score/8)+1;
      updateUI();
      spawnParticles(bird.x,bird.y,5,60,1.5,25);
    }
    // collision
    if (!bird.shield) {
      const hit = circleRect(bird.x,bird.y,CFG.BIRD_R-2, p.x,0,CFG.PIPE_W,p.topH) ||
                  circleRect(bird.x,bird.y,CFG.BIRD_R-2, p.x,p.botY,CFG.PIPE_W,CFG.H-p.botY);
      if (hit) triggerDeath();
    }
  });
  pipes = pipes.filter(p => p.x + CFG.PIPE_W > -10);

  // powerups
  powerups.forEach(pu => {
    pu.x -= getPipeSpeed() * slowFactor;
    pu.pulse += .07;
    if (!pu.collected && Math.hypot(pu.x-bird.x, pu.y-bird.y) < CFG.BIRD_R+14) {
      pu.collected=true;
      applyPowerup(pu.type);
    }
  });
  powerups = powerups.filter(pu => !pu.collected && pu.x > -20);

  // particles
  particles.forEach(p => {
    p.x += p.vx * slowFactor;
    p.y += p.vy * slowFactor;
    if (!p.trail) p.vy += .08 * slowFactor;
    p.life--;
  });
  particles = particles.filter(p => p.life>0);
}

function triggerHit() {
  sfxHit();
  shakeTimer=12; shakeAmt=5;
  spawnParticles(bird.x,bird.y,15,0,4,30);
  lives = Math.max(0, lives-1);
  if (lives<=0) triggerDeath();
  updateUI();
}

function triggerDeath() {
  if (state!==STATES.PLAY) return;
  sfxDie();
  shakeTimer=30; shakeAmt=10;
  spawnParticles(bird.x,bird.y,40,30,6,60);
  bird.alive=false;
  if (score>hiScore) { hiScore=score; localStorage.setItem('flppy_hi',hiScore); }
  updateUI();
  setTimeout(()=>{ state=STATES.DEAD; }, 900);
}

function updateUI() {
  document.getElementById('ui-hs').textContent    = hiScore;
  document.getElementById('ui-score').textContent = score;
  document.getElementById('ui-level').textContent = level;
  const h = '♥'.repeat(Math.max(0,lives)) + '♡'.repeat(Math.max(0,3-lives));
  document.getElementById('ui-lives').textContent = h;
}

// ════════════════════════════════════════════════
//  DRAW HELPERS
// ════════════════════════════════════════════════
const COL = {
  bg1: '#060910', bg2: '#0b0e14', bg3: '#0f1420',
  pipe: '#1a2a1a', pipeEdge: '#2a4a2a', pipeLight: '#3aff6a',
  bird: '#f0c040', birdEye: '#0b0e14', birdBeak: '#ff8a00',
  accent: '#f0c040', accent2: '#00e5ff', accent3: '#ff4560', green: '#39ff14',
};

function hex2rgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function drawRoundRect(x,y,w,h,r,fill,stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  if (fill)  { ctx.fillStyle=fill; ctx.fill(); }
  if (stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=1.5; ctx.stroke(); }
}

// ════════════════════════════════════════════════
//  DRAW BACKGROUND
// ════════════════════════════════════════════════
function drawBackground() {
  // gradient sky
  const grad = ctx.createLinearGradient(0,0,0,CFG.H);
  grad.addColorStop(0,'#060910');
  grad.addColorStop(.4,'#0a0f1c');
  grad.addColorStop(1,'#060910');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,CFG.W,CFG.H);

  // grid
  ctx.strokeStyle='rgba(42,47,58,.18)';
  ctx.lineWidth=1;
  const gsize=40;
  for (let x=0;x<CFG.W;x+=gsize) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,CFG.H); ctx.stroke(); }
  for (let y=0;y<CFG.H;y+=gsize) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CFG.W,y); ctx.stroke(); }

  // deep bg stars (nebula-like dots)
  bgStars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle=`hsla(${s.hue},80%,70%,.15)`;
    ctx.fill();
  });

  // stars
  stars.forEach(s => {
    const tw = Math.sin(s.twinkle)*.3+.7;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle=`rgba(200,220,255,${s.alpha*tw})`;
    ctx.fill();
  });

  // clouds
  clouds.forEach(c => {
    ctx.fillStyle=`rgba(100,140,200,${c.alpha})`;
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w, c.w*.35, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x-c.w*.25, c.y+4, c.w*.5, c.w*.25, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x+c.w*.2, c.y+3, c.w*.45, c.w*.22, 0, 0, Math.PI*2);
    ctx.fill();
  });

  // horizon glow
  const hg = ctx.createLinearGradient(0,CFG.H*.55,0,CFG.H*.75);
  hg.addColorStop(0,'rgba(0,180,100,.0)');
  hg.addColorStop(.5,'rgba(0,180,80,.04)');
  hg.addColorStop(1,'rgba(0,180,60,.0)');
  ctx.fillStyle=hg;
  ctx.fillRect(0,CFG.H*.55,CFG.W,CFG.H*.2);
}

// ════════════════════════════════════════════════
//  DRAW PIPES
// ════════════════════════════════════════════════
function drawPipes() {
  pipes.forEach(p => {
    // glow
    const gx = ctx.createRadialGradient(p.x+CFG.PIPE_W/2,p.topH/2,0,p.x+CFG.PIPE_W/2,p.topH/2,CFG.PIPE_W*.8);
    gx.addColorStop(0,'rgba(57,255,80,.08)');
    gx.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gx;
    ctx.fillRect(p.x-10,0,CFG.PIPE_W+20,p.topH);

    // top pipe body
    drawRoundRect(p.x+2,0,CFG.PIPE_W-4,p.topH-14,'#0b180d','rgba(26,50,26,.95)');

    // top pipe cap
    ctx.fillStyle='#1e3a1e';
    ctx.fillRect(p.x-3,p.topH-16,CFG.PIPE_W+6,16);
    ctx.strokeStyle='#3aff6a';
    ctx.lineWidth=1.5;
    ctx.strokeRect(p.x-3,p.topH-16,CFG.PIPE_W+6,16);

    // top pipe highlights
    ctx.fillStyle='rgba(58,255,106,.12)';
    ctx.fillRect(p.x+6,4,6,p.topH-20);
    ctx.fillStyle='rgba(58,255,106,.05)';
    ctx.fillRect(p.x+14,4,3,p.topH-20);

    // top pipe edge glow
    ctx.strokeStyle='rgba(58,255,106,.25)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(p.x+2,0); ctx.lineTo(p.x+2,p.topH-14); ctx.stroke();

    // bottom pipe body
    drawRoundRect(p.x+2,p.botY+14,CFG.PIPE_W-4,CFG.H-p.botY-14,'#0b180d','rgba(26,50,26,.95)');

    // bottom pipe cap
    ctx.fillStyle='#1e3a1e';
    ctx.fillRect(p.x-3,p.botY,CFG.PIPE_W+6,16);
    ctx.strokeStyle='#3aff6a';
    ctx.lineWidth=1.5;
    ctx.strokeRect(p.x-3,p.botY,CFG.PIPE_W+6,16);

    // bottom highlights
    ctx.fillStyle='rgba(58,255,106,.12)';
    ctx.fillRect(p.x+6,p.botY+20,6,CFG.H-p.botY-24);
    ctx.fillStyle='rgba(58,255,106,.05)';
    ctx.fillRect(p.x+14,p.botY+20,3,CFG.H-p.botY-24);

    // scan lines on pipes
    ctx.strokeStyle='rgba(0,0,0,.25)';
    ctx.lineWidth=1;
    for (let y=4;y<p.topH-16;y+=6) {
      ctx.beginPath(); ctx.moveTo(p.x+2,y); ctx.lineTo(p.x+CFG.PIPE_W-2,y); ctx.stroke();
    }
    for (let y=p.botY+20;y<CFG.H;y+=6) {
      ctx.beginPath(); ctx.moveTo(p.x+2,y); ctx.lineTo(p.x+CFG.PIPE_W-2,y); ctx.stroke();
    }
  });
}

// ════════════════════════════════════════════════
//  DRAW POWERUPS
// ════════════════════════════════════════════════
const PU_COLORS = { shield:'#00e5ff', slowmo:'#39ff14', djump:'#f0c040', magnet:'#ff4560' };
const PU_ICONS  = { shield:'⊕', slowmo:'⏱', djump:'⟡', magnet:'✕' };

function drawPowerups() {
  powerups.forEach(pu => {
    if (pu.collected) return;
    const c  = PU_COLORS[pu.type];
    const sc = Math.sin(pu.pulse)*.12+.88;
    const sz = 14 * sc;

    ctx.save();
    ctx.translate(pu.x, pu.y);

    // outer glow
    const g = ctx.createRadialGradient(0,0,sz*.3,0,0,sz*2.5);
    g.addColorStop(0,c+'55');
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(0,0,sz*2.5,0,Math.PI*2);
    ctx.fill();

    // ring
    ctx.strokeStyle=c;
    ctx.lineWidth=1.5;
    ctx.setLineDash([4,3]);
    ctx.beginPath();
    ctx.arc(0,0,sz+4,0,Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);

    // body
    drawRoundRect(-sz,-sz,sz*2,sz*2,4,c+'22',c);

    // icon
    ctx.fillStyle=c;
    ctx.font=`${sz*1.1}px monospace`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(PU_ICONS[pu.type],0,1);

    ctx.restore();
  });
}

// ════════════════════════════════════════════════
//  DRAW BIRD
// ════════════════════════════════════════════════
function drawBird() {
  if (!bird.alive && Math.floor(Date.now()/80)%2===0) return;

  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.angle * Math.PI/180);

  // trail
  bird.trail.forEach((t,i) => {
    const sz=(i/bird.trail.length)*CFG.BIRD_R*.8;
    const col = bird.shield?`rgba(0,229,255,${t.alpha*.4})`:
                bird.slowmo?`rgba(57,255,20,${t.alpha*.4})`:
                `rgba(240,192,64,${t.alpha*.35})`;
    ctx.beginPath();
    ctx.arc(t.x-bird.x, t.y-bird.y, Math.max(.5,sz), 0, Math.PI*2);
    ctx.fillStyle=col;
    ctx.fill();
  });

  // shield ring
  if (bird.shield) {
    ctx.strokeStyle=`rgba(0,229,255,${.5+Math.sin(frame*.15)*.3})`;
    ctx.lineWidth=2.5;
    ctx.setLineDash([5,3]);
    ctx.beginPath();
    ctx.arc(0,0,CFG.BIRD_R+7,0,Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);
    const sg=ctx.createRadialGradient(0,0,CFG.BIRD_R,0,0,CFG.BIRD_R+12);
    sg.addColorStop(0,'rgba(0,229,255,.12)');
    sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;
    ctx.beginPath();
    ctx.arc(0,0,CFG.BIRD_R+12,0,Math.PI*2);
    ctx.fill();
  }

  // body glow
  const glow = ctx.createRadialGradient(0,0,2,0,0,CFG.BIRD_R+4);
  const gc = bird.shield?'rgba(0,229,255,':bird.slowmo?'rgba(57,255,20,':'rgba(240,192,64,';
  glow.addColorStop(0,gc+'.3)');
  glow.addColorStop(1,gc+'0)');
  ctx.fillStyle=glow;
  ctx.beginPath();
  ctx.arc(0,0,CFG.BIRD_R+4,0,Math.PI*2);
  ctx.fill();

  // body
  const birdCol = bird.shield?'#00e5ff':bird.slowmo?'#39ff14':bird.magnet?'#ff4560':'#f0c040';
  ctx.fillStyle=birdCol;
  ctx.beginPath();
  ctx.arc(0,0,CFG.BIRD_R,0,Math.PI*2);
  ctx.fill();

  // body sheen
  const sheen=ctx.createLinearGradient(-CFG.BIRD_R,-CFG.BIRD_R,CFG.BIRD_R,CFG.BIRD_R);
  sheen.addColorStop(0,'rgba(255,255,255,.25)');
  sheen.addColorStop(1,'rgba(0,0,0,.2)');
  ctx.fillStyle=sheen;
  ctx.beginPath();
  ctx.arc(0,0,CFG.BIRD_R,0,Math.PI*2);
  ctx.fill();

  // wing
  const wingY = Math.sin(bird.wingPhase)*4;
  ctx.fillStyle=bird.shield?'#00b0cc':bird.slowmo?'#26cc0a':'#c08800';
  ctx.beginPath();
  ctx.ellipse(2, wingY+4, 9, 5, -.3, 0, Math.PI*2);
  ctx.fill();

  // eye
  ctx.fillStyle='#0b0e14';
  ctx.beginPath();
  ctx.arc(5,-3,4,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath();
  ctx.arc(6,-4,1.5,0,Math.PI*2);
  ctx.fill();

  // beak
  ctx.fillStyle='#ff8a00';
  ctx.beginPath();
  ctx.moveTo(CFG.BIRD_R-2,-2);
  ctx.lineTo(CFG.BIRD_R+8,0);
  ctx.lineTo(CFG.BIRD_R-2,3);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ════════════════════════════════════════════════
//  DRAW PARTICLES
// ════════════════════════════════════════════════
function drawParticles() {
  particles.forEach(p => {
    const t = p.life/p.maxLife;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r*t, 0, Math.PI*2);
    ctx.fillStyle=`hsla(${p.hue},100%,65%,${t*.9})`;
    ctx.fill();
  });
}

// ════════════════════════════════════════════════
//  DRAW HUD (in-canvas)
// ════════════════════════════════════════════════
function drawHUD() {
  // Score top-right
  ctx.fillStyle='rgba(0,0,0,.55)';
  drawRoundRect(CFG.W-110,10,100,32,3,'rgba(0,0,0,.55)');
  ctx.font='bold 22px "VT323",monospace';
  ctx.textAlign='right';
  ctx.textBaseline='middle';
  ctx.fillStyle='rgba(240,192,64,.9)';
  ctx.fillText(score, CFG.W-18, 27);
  ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillStyle='rgba(200,200,200,.5)';
  ctx.fillText('SCORE', CFG.W-18, 38);

  // power-up timers
  let px=10, py=10;
  const drawTimer=(label,timer,max,col)=>{
    const pct = timer/max;
    ctx.fillStyle='rgba(0,0,0,.5)';
    drawRoundRect(px,py,80,22,3,'rgba(0,0,0,.5)');
    ctx.fillStyle=col+'44';
    ctx.fillRect(px+1,py+1,78*pct,20);
    ctx.strokeStyle=col;
    ctx.lineWidth=1;
    ctx.strokeRect(px,py,80,22);
    ctx.font='9px "Share Tech Mono",monospace';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillStyle=col;
    ctx.fillText(label,px+40,py+11);
    py+=28;
  };
  if (bird.shield)  drawTimer('SHIELD',bird.shieldTimer,CFG.SHIELD_DUR,'#00e5ff');
  if (bird.slowmo)  drawTimer('SLOW-MO',bird.slowmoTimer,CFG.SLOWMO_DUR,'#39ff14');
  if (bird.djump)   drawTimer('DBL JUMP',bird.djumpTimer,CFG.DJUMP_DUR,'#f0c040');
  if (bird.magnet)  drawTimer('x2 SCORE',bird.magnetTimer,CFG.MAGNET_DUR,'#ff4560');

  // slow-mo overlay
  if (bird.slowmo) {
    const p = bird.slowmoTimer/CFG.SLOWMO_DUR;
    ctx.fillStyle=`rgba(57,255,20,${.04*p})`;
    ctx.fillRect(0,0,CFG.W,CFG.H);
    ctx.strokeStyle=`rgba(57,255,20,${.15*p})`;
    ctx.lineWidth=2;
    ctx.strokeRect(1,1,CFG.W-2,CFG.H-2);
  }
}

//  DRAW START SCREEN

function drawStart() {

  ctx.fillStyle='rgba(0,0,0,.6)';
  ctx.fillRect(0,0,CFG.W,CFG.H);

  // title block
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='64px "VT323",monospace';
  const g=ctx.createLinearGradient(0,CFG.H*.28,0,CFG.H*.42);
  g.addColorStop(0,'#f0c040'); g.addColorStop(1,'#c08000');
  ctx.fillStyle=g;
  ctx.fillText('FLPPY.EXE',CFG.W/2,CFG.H*.32);

  ctx.font='13px "Share Tech Mono",monospace';
  ctx.fillStyle='rgba(200,200,200,.6)';
  ctx.fillText('◆  ARCADE TERMINAL  ◆',CFG.W/2,CFG.H*.40);

  // animated bird preview
  ctx.save();
  ctx.translate(CFG.W/2, CFG.H*.53+Math.sin(t*2)*10);
  ctx.fillStyle='#f0c040';
  ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fill();
  const sg=ctx.createLinearGradient(-18,-18,18,18);
  sg.addColorStop(0,'rgba(255,255,255,.3)'); sg.addColorStop(1,'rgba(0,0,0,.2)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0b0e14'; ctx.beginPath(); ctx.arc(7,-4,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(8,-5,1.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff8a00';
  ctx.beginPath(); ctx.moveTo(16,-2); ctx.lineTo(26,0); ctx.lineTo(16,4); ctx.closePath(); ctx.fill();
  ctx.restore();

  // CTA button
  const pulse=Math.sin(t*3)*.5+.5;
  ctx.fillStyle=`rgba(240,192,64,${.12+pulse*.08})`;
  drawRoundRect(CFG.W/2-100,CFG.H*.64,200,42,3,`rgba(240,192,64,${.12+pulse*.08})`);
  ctx.strokeStyle=`rgba(240,192,64,${.6+pulse*.4})`;
  ctx.lineWidth=1.5;
  ctx.strokeRect(CFG.W/2-100,CFG.H*.64,200,42);
  ctx.font='20px "VT323",monospace';
  ctx.fillStyle=`rgba(240,192,64,${.8+pulse*.2})`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('▶  PRESS TO START',CFG.W/2,CFG.H*.64+21);

  if (hiScore>0) {
    ctx.font='12px "Share Tech Mono",monospace';
    ctx.fillStyle='rgba(200,200,200,.5)';
    ctx.fillText(`HI-SCORE: ${hiScore}`,CFG.W/2,CFG.H*.77);
  }

  // controls hint
  ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillStyle='rgba(100,100,100,.6)';
  ctx.fillText('SPACE  /  CLICK  /  TAP',CFG.W/2,CFG.H*.84);

// ════════════════════════════════════════════════
//  DRAW GAME OVER
// ════════════════════════════════════════════════
function drawDead() {
  const t=Date.now()/1000;
  ctx.fillStyle='rgba(0,0,0,.75)';
  ctx.fillRect(0,0,CFG.W,CFG.H);

  // box
  const bx=CFG.W/2-140, by=CFG.H*.25;
  drawRoundRect(bx,by,280,260,4,'rgba(15,20,30,.95)');
  ctx.strokeStyle='rgba(255,69,96,.5)';
  ctx.lineWidth=1.5;
  ctx.strokeRect(bx,by,280,260);

  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='48px "VT323",monospace';
  ctx.fillStyle='#ff4560';
  ctx.fillText('GAME OVER',CFG.W/2,by+50);

  ctx.font='13px "Share Tech Mono",monospace';
  ctx.fillStyle='rgba(200,200,200,.6)';
  ctx.fillText('SCORE',CFG.W/2,by+90);
  ctx.font='36px "VT323",monospace';
  ctx.fillStyle='#f0c040';
  ctx.fillText(score,CFG.W/2,by+115);

  if (score>=hiScore && score>0) {
    ctx.font='11px "Share Tech Mono",monospace';
    ctx.fillStyle='#39ff14';
    ctx.fillText('✦ NEW HIGH SCORE ✦',CFG.W/2,by+142);
  } else {
    ctx.font='11px "Share Tech Mono",monospace';
    ctx.fillStyle='rgba(200,200,200,.4)';
    ctx.fillText(`BEST: ${hiScore}`,CFG.W/2,by+142);
  }

  ctx.font='11px "Share Tech Mono",monospace';
  ctx.fillStyle='rgba(200,200,200,.4)';
  ctx.fillText(`LEVEL REACHED: ${level}`,CFG.W/2,by+162);

  // CTA
  const p=Math.sin(t*3)*.5+.5;
  drawRoundRect(CFG.W/2-90,by+185,180,42,3,`rgba(240,192,64,${.1+p*.06})`);
  ctx.strokeStyle=`rgba(240,192,64,${.5+p*.5})`;
  ctx.lineWidth=1.5;
  ctx.strokeRect(CFG.W/2-90,by+185,180,42);
  ctx.font='20px "VT323",monospace';
  ctx.fillStyle=`rgba(240,192,64,${.8+p*.2})`;
  ctx.fillText('▶  RETRY',CFG.W/2,by+206);
}

// ════════════════════════════════════════════════
//  FLOOR / CEILING LINES
// ════════════════════════════════════════════════
function drawBounds() {
  // ceiling
  ctx.strokeStyle='rgba(58,255,106,.2)';
  ctx.lineWidth=1;
  ctx.setLineDash([8,8]);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(CFG.W,0); ctx.stroke();
  // floor
  ctx.beginPath(); ctx.moveTo(0,CFG.H); ctx.lineTo(CFG.W,CFG.H); ctx.stroke();
  ctx.setLineDash([]);
}

// ════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════
function render() {
  ctx.save();

  // screen shake
  if (shakeTimer>0) {
    ctx.translate(
      (Math.random()-.5)*shakeAmt,
      (Math.random()-.5)*shakeAmt
    );
  }

  drawBackground();
  drawPipes();
  drawPowerups();
  drawParticles();
  if (state===STATES.PLAY || state===STATES.PAUSE || state===STATES.DEAD) {
    drawBird();
  }
  drawBounds();

  if (state===STATES.PLAY)   drawHUD();
  if (state===STATES.START)  drawStart();
  if (state===STATES.PAUSE)  { drawHUD(); drawPause(); }
  if (state===STATES.DEAD)   drawDead();

  ctx.restore();
}

let lastTime=0;
function loop(ts=0) {
  requestAnimationFrame(loop);
  // bg star + cloud update even on non-play states for visual polish
  if (state===STATES.START) {
    stars.forEach(s=>{ s.x-=s.spd*.5; s.twinkle+=.04; if(s.x<0)s.x=CFG.W; });
    bgStars.forEach(s=>{ s.x-=s.spd*.3; if(s.x<0)s.x=CFG.W; });
    clouds.forEach(c=>{ c.x-=c.spd*.3; if(c.x+c.w<0)c.x=CFG.W+c.w; });
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
    particles=particles.filter(p=>p.life>0);
  }
  update();
  render();
}

// ════════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if (e.code==='Space') { e.preventDefault(); flap(); }
  if (e.code==='KeyP') togglePause();
});

canvas.addEventListener('click', e=>{ e.preventDefault(); flap(); });
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); flap(); },{passive:false});

document.getElementById('jumpBtn').addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
document.getElementById('jumpBtn').addEventListener('click',e=>{e.preventDefault();flap();});

function togglePause() {
  if (state===STATES.PLAY)  { state=STATES.PAUSE; return; }
  if (state===STATES.PAUSE) { state=STATES.PLAY; return; }
}

// buttons
document.getElementById('btnPlay').addEventListener('click',()=>{
  if (state===STATES.START || state===STATES.DEAD) { resetGame(); }
  else if (state===STATES.PAUSE) { state=STATES.PLAY; }
});
document.getElementById('btnPause').addEventListener('click',togglePause);
document.getElementById('btnReset').addEventListener('click',()=>{
  state=STATES.START;
  pipes=[]; powerups=[]; particles=[];
  score=0; level=1; lives=3; frame=0; pipeTimer=0; totalPipes=0;
  bird.y=CFG.H/2; bird.vy=0; bird.angle=0; bird.alive=true;
  bird.shield=false; bird.shieldTimer=0;
  bird.djump=false; bird.djumpTimer=0;
  bird.magnet=false; bird.magnetTimer=0;
  bird.slowmo=false; bird.slowmoTimer=0;
  bird.trail=[];
  slowFactor=1; scoreMultiplier=1;
  updateUI();
});
document.getElementById('btnMusic').addEventListener('click',()=>{
  musicOn=!musicOn;
  document.getElementById('btnMusic').textContent = musicOn?'♪ MUSIC: ON':'♪ MUSIC: OFF';
  if (musicOn) startMusic(); else stopMusic();
});

// ════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════
init();
</script>
</body>
</html>
