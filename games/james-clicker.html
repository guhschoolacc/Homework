<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>James Clicker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#071226; --panel:#0f1724; --muted:#9aa4b2;
    --accent:#7c5cff; --accent-2:#16a34a; --glass: rgba(255,255,255,0.03);
    --glass-2: rgba(255,255,255,0.02);
  }
  *{box-sizing:border-box;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;}
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#04101a,#071a2a);color:#e6eef8;}
  .wrap{max-width:1200px;margin:28px auto;padding:20px;display:grid;grid-template-columns:1fr 420px;gap:18px;}
  .panel{background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);border-radius:14px;padding:18px;border:1px solid rgba(255,255,255,0.03);box-shadow:0 10px 40px rgba(2,6,23,0.6);}
  /* Left: main click area */
  .main{display:flex;flex-direction:column;gap:14px;align-items:center;}
  .hud{width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .score{font-weight:800;font-size:22px;letter-spacing:0.2px;}
  .sub{color:var(--muted);font-size:13px;}
  #clickArea{width:720px;max-width:92vw;height:420px;border-radius:14px;overflow:hidden;background:var(--glass);position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;}
  /* two-layer images to avoid flicker */
  .layer{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .6s ease, transform .35s ease;will-change:opacity,transform;}
  .layer.top{z-index:3;opacity:1;}
  .layer.bottom{z-index:2;opacity:0;}
  .badge{position:absolute;left:16px;top:16px;background:linear-gradient(90deg,rgba(0,0,0,0.45),rgba(0,0,0,0.25));padding:8px 12px;border-radius:10px;font-weight:800;color:#fff;border:1px solid rgba(255,255,255,0.03);backdrop-filter:blur(4px);}
  .glow{position:absolute;inset:0;pointer-events:none;mix-blend-mode:screen;opacity:0;transition:opacity .6s;}
  .statsRow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
  .stat{background:var(--glass-2);padding:10px 12px;border-radius:12px;font-size:13px;color:var(--muted);min-width:120px;text-align:center;}
  /* Right: shop & controls */
  .side{display:flex;flex-direction:column;gap:12px;}
  .controls{display:flex;gap:8px;align-items:center;}
  .btn{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted);padding:8px 10px;border-radius:8px;cursor:pointer;}
  .primary{background:linear-gradient(90deg,var(--accent),#5b8bff);border:none;color:white;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:700;box-shadow:0 8px 24px rgba(124,92,255,0.12);}
  .shopGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
  .cardItem{background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent);padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.02);display:flex;flex-direction:column;gap:8px;min-height:110px;transition:transform .12s;}
  .cardItem:hover{transform:translateY(-6px)}
  .shopTop{display:flex;justify-content:space-between;align-items:center;}
  .shopName{font-weight:800;}
  .shopDesc{color:var(--muted);font-size:13px;}
  .shopBuy{display:flex;justify-content:space-between;align-items:center;margin-top:auto;}
  .progressBar{height:14px;background:rgba(255,255,255,0.03);border-radius:10px;overflow:hidden;}
  .progressFill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));width:0%;transition:width .6s ease;}
  .achWrap{display:flex;gap:8px;flex-wrap:wrap;}
  .ach{background:rgba(255,255,255,0.02);padding:8px 10px;border-radius:10px;color:var(--muted);font-size:13px;}
  .footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;color:var(--muted);font-size:13px;}
  @media (max-width:980px){.wrap{grid-template-columns:1fr;}.side{order:2}}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel main" aria-label="Main game area">
    <div class="hud">
      <div>
        <div class="score" id="coins">0</div>
        <div class="sub">James Coins • <span id="cpc">1</span> CPC • <span id="mult">1x</span></div>
      </div>
      <div class="controls">
        <button class="btn" id="saveBtn">Save</button>
        <button class="btn" id="resetBtn">Reset</button>
        <button class="btn" id="prestigeBtn" title="Prestige when at final phase">Prestige</button>
      </div>
    </div>

    <div id="clickArea" title="Click James" aria-label="Click target">
      <div class="badge" id="phaseBadge">Calm</div>
      <img id="layerTop" class="layer top" alt="phase top" draggable="false" />
      <img id="layerBottom" class="layer bottom" alt="phase bottom" draggable="false" />
      <div id="glow" class="glow"></div>
    </div>

    <div class="statsRow">
      <div class="stat">Total Clicks<br><strong id="totalClicks">0</strong></div>
      <div class="stat">Auto Clickers<br><strong id="autoCount">0</strong></div>
      <div class="stat">Phase<br><strong id="phaseLabel">Calm</strong></div>
    </div>

    <div style="width:100%;margin-top:12px;">
      <div class="sub">Phase Progress</div>
      <div style="margin-top:8px;">
        <div class="progressBar" aria-hidden="true"><div id="progressFill" class="progressFill"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;">
          <div class="sub">Next at <strong id="nextThreshold">—</strong></div>
          <div class="sub">Progress <strong id="progressPercent">0%</strong></div>
        </div>
      </div>
    </div>

  </div>

  <aside class="panel side" aria-label="Shop and settings">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <h3 style="margin:0 0 6px 0;">Shop & Progression</h3>
        <div class="sub">Aggressive scaling keeps the endgame challenging.</div>
      </div>
      <div style="text-align:right;">
        <div class="sub">Prestige</div>
        <div style="font-weight:800;color:#ffd166;" id="prestige">0</div>
      </div>
    </div>

    <div style="margin-top:12px;">
      <div class="shopGrid" id="shop"></div>
    </div>

    <div style="margin-top:12px;display:flex;gap:8px;align-items:center;">
      <button class="primary" id="clickBtn">Click</button>
      <button class="btn" id="buyMax">Buy Max</button>
      <button class="btn" id="exportSave">Export Save</button>
    </div>

    <div style="margin-top:12px;">
      <div class="sub" style="margin-bottom:6px;">Achievements</div>
      <div class="achWrap" id="achievements"></div>
    </div>

    <div class="footer">
      <div class="sub">Save status: <span id="saveStatus">Not saved</span></div>
      <div class="sub">Tip: press <strong>Space</strong> to click</div>
    </div>
  </aside>
</div>

<canvas id="particles" width="800" height="600" style="position:fixed;left:0;top:0;pointer-events:none;"></canvas>

<script>
/* James Clicker — GitHub-ready single file
   - Place your images in ./images/ with these filenames:
     jamescalm.jpg, phase1.png, phase2.png, phase3.png, phase4.png, phase5.png, phase6.png
   - The script preloads them and uses two-layer crossfade to avoid flicker.
*/

/* ---------- Config ---------- */
const IMAGE_BASE = './images/'; // GitHub Pages serves relative paths; keep './images/' for repo root
const PHASE_FILES = ['jamescalm.jpg','phase1.png','phase2.png','phase3.png','phase4.png','phase5.png','phase6.png'];
const MAX_PHASE = PHASE_FILES.length - 1;
const PHASE_BASE = 300;
const PHASE_FACTOR = 12;
const SHOP_GROWTH = 1.55;
const PRESTIGE_REWARD_MULT = 0.05;

/* ---------- State ---------- */
const state = {
  coins: 0,
  totalClicks: 0,
  cpc: 1,
  multiplier: 1,
  autoCount: 0,
  prestige: 0,
  phaseIndex: 0,
  shop: [
    { id:'cpc1', name:'Better Mouse', desc:'+1 CPC', baseCost:50, level:0, type:'cpc', value:1 },
    { id:'cpc2', name:'Golden Cursor', desc:'+5 CPC', baseCost:600, level:0, type:'cpc', value:5 },
    { id:'auto1', name:'Auto Clicker', desc:'+1 auto/sec', baseCost:300, level:0, type:'auto', value:1 },
    { id:'multi1', name:'Multiplier', desc:'+0.5x mult', baseCost:1800, level:0, type:'mult', value:0.5 },
    { id:'auto2', name:'Auto Farm', desc:'+15 auto', baseCost:14000, level:0, type:'auto', value:15 }
  ],
  achievements: {},
  totalCoinsEver: 0
};

/* Achievements */
const ACHIEVEMENTS = [
  { id:'first_click', title:'First Click', desc:'Click James once', check: s => s.totalClicks >= 1 },
  { id:'click_100', title:'Century', desc:'100 total clicks', check: s => s.totalClicks >= 100 },
  { id:'coins_1k', title:'Starter Rich', desc:'Earn 1,000 coins (total)', check: s => (s.totalCoinsEver || 0) >= 1000 },
  { id:'phase_1', title:'Phase 1', desc:'Reach Phase 1', check: s => s.phaseIndex >= 1 },
  { id:'phase_final', title:'Endgame', desc:'Reach final phase', check: s => s.phaseIndex >= MAX_PHASE }
];

/* ---------- DOM refs ---------- */
const $ = id => document.getElementById(id);
const coinsEl = $('coins'), cpcEl = $('cpc'), multEl = $('mult') || null, totalClicksEl = $('totalClicks'),
      autoCountEl = $('autoCount'), phaseLabelEl = $('phaseLabel') || null, progressFill = $('progressFill'),
      nextThresholdEl = $('nextThreshold') || null, progressPercentEl = $('progressPercent') || null,
      shopEl = $('shop'), achievementsEl = $('achievements'), saveStatusEl = $('saveStatus'),
      prestigeEl = $('prestige'), phaseBadge = $('phaseBadge'), layerTop = $('layerTop'), layerBottom = $('layerBottom'),
      clickArea = $('clickArea'), glow = $('glow');

/* ---------- Utilities ---------- */
function format(n){ return Math.floor(n).toLocaleString(); }
function now(){ return new Date().toLocaleTimeString(); }
function logConsole(msg){ /* removed activity panel; keep console logs for debugging */ console.debug('[JamesClicker]', msg); }
function phaseThreshold(idx){ return Math.ceil(PHASE_BASE * Math.pow(PHASE_FACTOR, idx)); }

/* ---------- Autosave (immediate, debounced) ---------- */
let autosaveTimer = null;
function scheduleAutosave(){
  if(autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(()=>{ saveGame(false); autosaveTimer = null; }, 120);
}
function markAction(desc){
  if(desc) logConsole(desc);
  scheduleAutosave();
}

/* ---------- Preload images to avoid flicker ---------- */
const preloaded = [];
function preloadAll(){
  for(let i=0;i<PHASE_FILES.length;i++){
    const img = new Image();
    img.src = IMAGE_BASE + PHASE_FILES[i];
    preloaded[i] = img;
  }
}

/* ---------- Render UI ---------- */
function updateUI(){
  coinsEl.textContent = `${format(state.coins)}`;
  cpcEl.textContent = `${(state.cpc * state.multiplier).toFixed(2)}`;
  totalClicksEl.textContent = format(state.totalClicks);
  $('autoCount').textContent = format(state.autoCount);
  phaseBadge.textContent = state.phaseIndex === 0 ? 'Calm' : `Phase ${state.phaseIndex}`;
  prestigeEl.textContent = format(state.prestige);
  saveStatusEl.textContent = localStorage.getItem('jc_save') ? 'Saved' : 'Not saved';
  renderShop();
  renderProgress();
  renderAchievements();
  renderPhaseImage();
}

/* ---------- Shop ---------- */
function shopCost(item){ return Math.ceil(item.baseCost * Math.pow(SHOP_GROWTH, item.level)); }
function renderShop(){
  shopEl.innerHTML = '';
  state.shop.forEach(item=>{
    const cost = shopCost(item);
    const div = document.createElement('div');
    div.className = 'cardItem';
    div.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-weight:800">${item.name}</div>
          <div class="sub" style="margin-top:6px">${item.desc} • Level ${item.level}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:800">${format(cost)}</div>
          <div class="sub" style="margin-top:6px">${item.type.toUpperCase()}</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <button class="primary small buyBtn" data-id="${item.id}" ${state.coins < cost ? 'disabled' : ''}>Buy</button>
        <div class="sub">Owned: <strong>${item.level}</strong></div>
      </div>
    `;
    shopEl.appendChild(div);
    div.querySelector('.buyBtn').addEventListener('click', ()=>{ buyItem(item.id); });
  });
}

function buyItem(id){
  const item = state.shop.find(s=>s.id===id);
  const cost = shopCost(item);
  if(state.coins < cost) return;
  state.coins -= cost;
  item.level++;
  if(item.type === 'cpc') state.cpc += item.value;
  else if(item.type === 'auto') state.autoCount += item.value;
  else if(item.type === 'mult') state.multiplier = +(state.multiplier + item.value).toFixed(3);
  state.shop.forEach(s => s.baseCost = Math.ceil(s.baseCost * 1.02));
  markAction(`Bought ${item.name}`);
  updateUI();
  playClickSound(1 + Math.random()*0.2);
}

/* Buy max */
function buyMax(){
  let any=false;
  state.shop.forEach(item=>{
    let cost = shopCost(item);
    while(state.coins >= cost){
      state.coins -= cost;
      item.level++;
      if(item.type === 'cpc') state.cpc += item.value;
      else if(item.type === 'auto') state.autoCount += item.value;
      else if(item.type === 'mult') state.multiplier = +(state.multiplier + item.value).toFixed(3);
      cost = shopCost(item);
      any=true;
    }
  });
  if(any) markAction('Bought max upgrades');
  updateUI();
}

/* ---------- Clicking & auto ---------- */
function clickJames(){
  const gain = state.cpc * state.multiplier;
  state.coins += gain;
  state.totalClicks++;
  state.totalCoinsEver = (state.totalCoinsEver || 0) + gain;
  animateClick();
  spawnParticles();
  checkPhaseProgress();
  markAction('Clicked');
  updateUI();
  playClickSound(1 + Math.random()*0.2);
}

/* click animation uses container transform only (no image swap) */
function animateClick(){
  clickArea.animate([{transform:'scale(1)'},{transform:'scale(1.035)'},{transform:'scale(1)'}],{duration:200,easing:'cubic-bezier(.2,.8,.2,1)'});
}

let autoTimer = null;
function startAuto(){
  if(autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(()=>{
    if(state.autoCount <= 0) return;
    const gain = state.autoCount * state.multiplier;
    state.coins += gain;
    state.totalCoinsEver = (state.totalCoinsEver || 0) + gain;
    checkPhaseProgress();
    markAction(null);
    updateUI();
  }, 1000);
}

/* ---------- Phase progression ---------- */
function renderProgress(){
  const idx = state.phaseIndex;
  if(idx >= MAX_PHASE){
    progressFill.style.width = '100%';
    if(nextThresholdEl) nextThresholdEl.textContent = 'MAX';
    if(progressPercentEl) progressPercentEl.textContent = '100%';
    return;
  }
  const next = phaseThreshold(idx);
  if(nextThresholdEl) nextThresholdEl.textContent = format(next);
  const pct = Math.min(1, state.coins / next);
  progressFill.style.width = `${Math.floor(pct*100)}%`;
  if(progressPercentEl) progressPercentEl.textContent = `${Math.floor(pct*100)}%`;
}

function checkPhaseProgress(){
  while(state.phaseIndex < MAX_PHASE && state.coins >= phaseThreshold(state.phaseIndex)){
    state.phaseIndex++;
    flashGlow();
    markAction(`Advanced to Phase ${state.phaseIndex}`);
    state.shop.forEach(s => s.baseCost = Math.ceil(s.baseCost * 1.06));
  }
}

/* ---------- Phase image rendering (two-layer crossfade) ---------- */
let currentIndex = null;
function renderPhaseImage(){
  const idx = state.phaseIndex;
  if(currentIndex === idx) return;
  const path = IMAGE_BASE + PHASE_FILES[idx];
  // Preload
  const img = new Image();
  img.onload = ()=>{
    // set bottom to previous top, then set top to new and crossfade
    layerBottom.src = layerTop.src || img.src;
    layerBottom.style.opacity = '1';
    layerTop.style.transition = 'none';
    layerTop.src = img.src;
    // force reflow then crossfade
    requestAnimationFrame(()=>{
      layerTop.style.transition = 'opacity .6s ease, transform .35s ease';
      layerTop.style.opacity = '1';
      layerBottom.style.opacity = '0';
      currentIndex = idx;
    });
  };
  img.onerror = ()=>{
    // fallback svg
    const label = idx === 0 ? 'Calm' : `Phase ${idx}`;
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='1200'><rect width='100%' height='100%' fill='#0b1220'/><text x='50%' y='50%' fill='#7c5cff' font-size='48' font-family='Inter,Arial' text-anchor='middle' dominant-baseline='middle'>${label} — missing image</text></svg>`;
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  };
  img.src = path;
}

/* ---------- Visuals ---------- */
function flashGlow(){
  glow.style.opacity = '1';
  glow.style.background = `radial-gradient(circle at 50% 30%, rgba(124,92,255,0.18), transparent 30%), radial-gradient(circle at 70% 70%, rgba(22,163,74,0.12), transparent 30%)`;
  setTimeout(()=>{ glow.style.opacity = '0'; }, 900);
}
function spawnParticles(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  const rect = clickArea.getBoundingClientRect();
  const startX = rect.left + rect.width/2;
  const startY = rect.top + rect.height/2;
  const particles = [];
  for(let i=0;i<20;i++){
    particles.push({
      x:startX, y:startY,
      vx:(Math.random()-0.5)*10, vy:(Math.random()-2.5)*10,
      life: 40 + Math.random()*40,
      size: 3 + Math.random()*6,
      hue: 200 + Math.random()*160
    });
  }
  let t = 0;
  function frame(){
    t++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.vy += 0.18;
      p.life--;
      ctx.beginPath();
      ctx.fillStyle = `hsla(${p.hue},80%,60%,${Math.max(0,p.life/80)})`;
      ctx.arc(p.x - window.scrollX, p.y - window.scrollY, p.size * Math.max(0,p.life/80), 0, Math.PI*2);
      ctx.fill();
    });
    if(particles.some(p=>p.life>0) && t < 160) requestAnimationFrame(frame);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  frame();
}

/* ---------- Sound ---------- */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playClickSound(pitch=1){
  try{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = 220 * pitch;
    g.gain.value = 0.06;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.18);
    o.stop(audioCtx.currentTime + 0.2);
  }catch(e){}
}

/* ---------- Achievements ---------- */
function renderAchievements(){
  achievementsEl.innerHTML = '';
  ACHIEVEMENTS.forEach(a=>{
    const unlocked = !!state.achievements[a.id];
    const div = document.createElement('div');
    div.className = 'ach';
    div.style.border = unlocked ? '1px solid rgba(124,92,255,0.6)' : '1px solid rgba(255,255,255,0.02)';
    div.innerHTML = `<strong style="display:block">${a.title}</strong><div style="font-size:12px;color:var(--muted)">${a.desc}</div>`;
    achievementsEl.appendChild(div);
  });
}
function checkAchievements(){
  let changed=false;
  ACHIEVEMENTS.forEach(a=>{
    if(!state.achievements[a.id] && a.check(state)){
      state.achievements[a.id] = true;
      changed=true;
      logConsole(`Achievement unlocked: ${a.title}`);
    }
  });
  if(changed) markAction('Achievement unlocked');
}

/* ---------- Save / Load / Reset / Export ---------- */
function saveGame(showLog=true){
  const save = {
    coins: state.coins, totalClicks: state.totalClicks, cpc: state.cpc, multiplier: state.multiplier,
    autoCount: state.autoCount, prestige: state.prestige, phaseIndex: state.phaseIndex,
    shop: state.shop, achievements: state.achievements, totalCoinsEver: state.totalCoinsEver
  };
  localStorage.setItem('jc_save', JSON.stringify(save));
  saveStatusEl.textContent = 'Saved';
  if(showLog) logConsole('Game saved');
}
function loadGame(){
  const raw = localStorage.getItem('jc_save');
  if(!raw) return;
  try{
    const s = JSON.parse(raw);
    state.coins = s.coins || 0;
    state.totalClicks = s.totalClicks || 0;
    state.cpc = s.cpc || 1;
    state.multiplier = s.multiplier || 1;
    state.autoCount = s.autoCount || 0;
    state.prestige = s.prestige || 0;
    state.phaseIndex = s.phaseIndex || 0;
    if(Array.isArray(s.shop)) state.shop = s.shop;
    if(s.achievements) state.achievements = s.achievements;
    state.totalCoinsEver = s.totalCoinsEver || 0;
    logConsole('Save loaded');
  }catch(e){ console.error(e); }
}
function resetGame(){
  if(!confirm('Reset progress? This will clear saved data.')) return;
  localStorage.removeItem('jc_save');
  state.coins = 0; state.totalClicks = 0; state.cpc = 1; state.multiplier = 1; state.autoCount = 0; state.prestige = 0; state.phaseIndex = 0;
  state.shop.forEach(i=>i.level=0);
  state.achievements = {};
  state.totalCoinsEver = 0;
  updateUI();
  saveGame(true);
}

/* Export save to clipboard */
function exportSave(){
  const raw = localStorage.getItem('jc_save');
  if(!raw){ alert('No save to export'); return; }
  navigator.clipboard.writeText(raw).then(()=>{ alert('Save copied to clipboard'); });
}

/* ---------- Prestige ---------- */
function canPrestige(){ return state.phaseIndex >= MAX_PHASE; }
function doPrestige(){
  if(!canPrestige()){ alert('Reach the final phase to prestige.'); return; }
  if(!confirm('Prestige will reset most progress for permanent bonuses. Continue?')) return;
  state.prestige++;
  state.multiplier = +(state.multiplier + PRESTIGE_REWARD_MULT).toFixed(3);
  state.coins = 0; state.totalClicks = 0; state.cpc = 1; state.autoCount = 0; state.phaseIndex = 0;
  state.shop.forEach(i=>i.level=0);
  state.achievements = {};
  state.totalCoinsEver = 0;
  markAction('Prestiged');
  updateUI();
}

/* ---------- Wiring ---------- */
document.addEventListener('keydown', e=>{ if(e.code === 'Space'){ e.preventDefault(); clickJames(); }});
clickArea.addEventListener('click', clickJames);
$('clickBtn').addEventListener('click', clickJames);
$('saveBtn').addEventListener('click', ()=>saveGame(true));
$('resetBtn').addEventListener('click', resetGame);
$('buyMax').addEventListener('click', buyMax);
$('exportSave').addEventListener('click', exportSave);
$('prestigeBtn').addEventListener('click', doPrestige);

/* Autosave on many interactions */
['clickArea','clickBtn','buyMax','saveBtn','resetBtn','exportSave','prestigeBtn'].forEach(id=>{
  const el = typeof id === 'string' ? document.getElementById(id) : id;
  if(el) el.addEventListener('click', ()=>scheduleAutosave());
});

/* Periodic tasks */
function resizeCanvas(){ const c = document.getElementById('particles'); c.width = window.innerWidth; c.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
setInterval(()=>startAuto(), 1000);
setInterval(()=>{ checkAchievements(); saveGame(false); }, 8000);

/* ---------- Init ---------- */
preloadAll();
loadGame();
updateUI();
startAuto();

/* Fallbacks for missing images */
layerTop.addEventListener('error', ()=>{ const idx = state.phaseIndex; const label = idx===0?'Calm':`Phase ${idx}`; const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='1200'><rect width='100%' height='100%' fill='#0b1220'/><text x='50%' y='50%' fill='#7c5cff' font-size='48' font-family='Inter,Arial' text-anchor='middle' dominant-baseline='middle'>${label} — missing image</text></svg>`; layerTop.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg); });
layerBottom.addEventListener('error', ()=>{ layerBottom.src = layerTop.src; });

</script>
</body>
</html>
