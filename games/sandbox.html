<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sandbox</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --accent:#2563eb;
      --text:#0f172a;
      --muted:#6b7280;
    }
    html,body{
      height:100%;
      margin:0;
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:linear-gradient(180deg,var(--bg),#eef2ff);
      color:var(--text);
    }
    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }
    .card{
      background:var(--card);
      border-radius:12px;
      box-shadow:0 8px 30px rgba(15,23,42,0.08);
      padding:36px;
      max-width:720px;
      width:100%;
      text-align:center;
    }
    h1{
      margin:0 0 12px 0;
      font-size:20px;
      font-weight:600;
      letter-spacing:0.2px;
    }
    p{
      margin:0 0 24px 0;
      color:var(--muted);
      font-size:15px;
    }
    .btn{
      display:inline-block;
      text-decoration:none;
      background:var(--accent);
      color:#fff;
      padding:12px 18px;
      border-radius:8px;
      font-weight:600;
      box-shadow:0 6px 18px rgba(37,99,235,0.18);
      transition:transform .12s ease, box-shadow .12s ease;
    }
    .btn:active{ transform:translateY(1px); }
    .btn:focus{ outline:3px solid rgba(37,99,235,0.18); outline-offset:3px; }
    .small{
      display:block;
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
    }
    @media (prefers-reduced-motion:reduce){
      .btn{ transition:none; }
    }
  </style>
</head>
<body>
  <main class="wrap" role="main">
    <section class="card" aria-labelledby="title">
      <h1 id="title">Temporarily removed for troubleshooting.</h1>
      <p>This should be back in a day or two, sorry.</p>
      <span class="small" aria-hidden="true">You will be redirected to the dashboard.</span>
    </section>
  </main>
</body>
</html>
