<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>File Converter</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #0e0f12, #1a1c22);
    font-family: 'Inter', sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* Back Button */
  .back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 10px 16px;
    background: rgba(15,23,42,0.85);
    border: 1px solid rgba(148,163,184,0.5);
    border-radius: 12px;
    backdrop-filter: blur(12px);
    color: #e5e7eb;
    text-decoration: none;
    font-size: 0.9rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: 0.15s ease;
    z-index: 9999;
  }
  .back-btn:hover {
    background: rgba(30,41,59,0.9);
  }

  .converter-card {
    width: 450px;
    padding: 28px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(18px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.12);
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    margin: 0 0 20px;
    font-size: 26px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.5px;
  }

  label {
    font-size: 14px;
    opacity: 0.85;
  }

  input, select {
    width: 100%;
    margin-top: 6px;
    margin-bottom: 18px;
    padding: 12px;
    border-radius: 14px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: #fff;
    outline: none;
    font-size: 14px;
    transition: 0.2s ease;
  }

  select option {
    background: #1a1c22;
    color: white;
  }

  input:hover, select:hover {
    background: rgba(255,255,255,0.18);
  }

  button {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #4f7cff, #6a5cff);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.25s ease;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(80,120,255,0.35);
  }
</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back to Dashboard</a>

<div class="converter-card">
  <h1>File Converter</h1>

  <label>Select File</label>
  <input type="file" id="fileInput">

  <label>Convert To</label>
  <select id="formatSelect">
    <!-- Images -->
    <option value="image/png">PNG</option>
    <option value="image/jpeg">JPG</option>
    <option value="image/webp">WEBP</option>

    <!-- Video -->
    <option value="video/webm">WEBM (Video)</option>
    <option value="video/mp4">MP4 (Video)</option>

    <!-- Audio -->
    <option value="audio/mp3">MP3 (Audio)</option>
    <option value="audio/wav">WAV (Audio)</option>
    <option value="audio/ogg">OGG (Audio)</option>

    <!-- Text -->
    <option value="text/plain">TXT</option>
  </select>

  <button id="convertBtn">Convert & Download</button>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const formatSelect = document.getElementById('formatSelect');
const convertBtn = document.getElementById('convertBtn');

convertBtn.addEventListener('click', async () => {
  const file = fileInput.files[0];
  if (!file) {
    alert('Please choose a file first.');
    return;
  }

  const targetType = formatSelect.value;
  const ext = targetType.split('/')[1];
  const baseName = file.name.split('.').slice(0, -1).join('.') || 'converted';

  // IMAGE CONVERSION
  if (targetType.startsWith("image/")) {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => {
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);

        canvas.toBlob(blob => {
          downloadBlob(blob, baseName + "." + ext);
        }, targetType, 0.92);
      };
      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
    return;
  }

  // VIDEO & AUDIO CONVERSION (Browser-limited)
  if (targetType.startsWith("video/") || targetType.startsWith("audio/")) {
    try {
      const blob = new Blob([await file.arrayBuffer()], { type: targetType });
      downloadBlob(blob, baseName + "." + ext);
      return;
    } catch (err) {
      alert("Your browser cannot convert this media type.");
    }
  }

  // TEXT CONVERSION
  if (targetType === "text/plain") {
    const text = await file.text();
    const blob = new Blob([text], { type: "text/plain" });
    downloadBlob(blob, baseName + ".txt");
    return;
  }

  // FALLBACK
  alert("This file type cannot be converted, downloading original.");
  downloadBlob(file, file.name);
});

function downloadBlob(blob, filename) {
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
}
</script>

</body>
</html>
