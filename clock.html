<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Clock</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
}

body {
  background: radial-gradient(circle at top, #1f2937, #020617 55%);
  color: #e5e7eb;
  padding: 40px 20px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}

/* Main clock */
.main-clock {
  text-align: center;
  padding: 28px 40px;
  border-radius: 24px;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(148,163,184,0.5);
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  max-width: 720px;
  width: 100%;
}

.main-time {
  font-size: 4rem;
  font-weight: 600;
  letter-spacing: 1px;
}

.main-date {
  margin-top: 6px;
  font-size: 1.1rem;
  color: #cbd5e1;
}

.main-tz {
  margin-top: 4px;
  font-size: 0.9rem;
  color: #94a3b8;
}

/* Layout */
.dashboard {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
  gap: 28px;
  max-width: 1300px;
  width: 100%;
}

@media (max-width: 960px) {
  .dashboard {
    grid-template-columns: 1fr;
  }
}

/* Cards */
.card {
  background: rgba(15,23,42,0.9);
  border-radius: 22px;
  padding: 22px 20px 20px;
  border: 1px solid rgba(148,163,184,0.5);
  box-shadow: 0 20px 50px rgba(0,0,0,0.55);
}

.card h2 {
  font-size: 1.4rem;
  margin-bottom: 8px;
}

/* Time status */
.time-status {
  margin-top: 4px;
  margin-bottom: 16px;
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(30,64,175,0.35);
  border: 1px solid rgba(129,140,248,0.6);
  font-size: 0.9rem;
}

/* Period list */
.period-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.period {
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(15,23,42,0.9);
  border: 1px solid rgba(55,65,81,0.9);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.9rem;
}

.period.active {
  background: linear-gradient(135deg, rgba(79,70,229,0.7), rgba(59,130,246,0.7));
  border-color: rgba(191,219,254,0.9);
  box-shadow: 0 0 14px rgba(59,130,246,0.7);
}

.period-label {
  font-weight: 500;
}

.period-time {
  color: #cbd5e1;
  font-size: 0.85rem;
}

.period-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.period-tag {
  font-size: 0.7rem;
  padding: 3px 9px;
  border-radius: 999px;
  border: 1px solid rgba(148,163,184,0.9);
  background: rgba(15,23,42,0.9);
}

.delete-period {
  font-size: 0.8rem;
  color: #fecaca;
  cursor: pointer;
}

/* Buttons */
.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}

.btn {
  padding: 7px 11px;
  border-radius: 10px;
  border: 1px solid rgba(148,163,184,0.7);
  background: rgba(55,65,81,0.9);
  color: #e5e7eb;
  font-size: 0.85rem;
  cursor: pointer;
}

.btn.primary {
  background: linear-gradient(135deg, #4f46e5, #3b82f6);
  border-color: rgba(191,219,254,0.9);
}

.btn.danger {
  background: rgba(127,29,29,0.9);
  border-color: rgba(248,113,113,0.9);
}

/* Add box */
.add-box {
  margin-top: 10px;
  padding: 10px;
  border-radius: 14px;
  background: rgba(15,23,42,0.9);
  border: 1px solid rgba(55,65,81,0.9);
}

.add-row {
  display: grid;
  grid-template-columns: 2fr 1.1fr 0.9fr 1.1fr 0.9fr;
  gap: 6px;
  margin-bottom: 8px;
}

.add-box input,
.add-box select {
  width: 100%;
  padding: 6px 7px;
  border-radius: 8px;
  border: 1px solid rgba(55,65,81,0.9);
  background: rgba(15,23,42,0.9);
  color: #e5e7eb;
  font-size: 0.8rem;
}

/* Dropdown */
.dropdown-panel {
  margin-top: 8px;
  border-radius: 14px;
  background: rgba(15,23,42,0.98);
  border: 1px solid rgba(148,163,184,0.7);
  box-shadow: 0 18px 40px rgba(0,0,0,0.7);
  padding: 10px;
  display: none;
  font-size: 0.85rem;
}

.dropdown-header {
  font-weight: 600;
  margin-bottom: 6px;
}

.dropdown-input {
  width: 100%;
  padding: 6px 7px;
  border-radius: 8px;
  border: 1px solid rgba(55,65,81,0.9);
  background: rgba(15,23,42,0.9);
  color: #e5e7eb;
  font-size: 0.8rem;
  margin-bottom: 8px;
}

.dropdown-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
}

.dropdown-small-btn {
  padding: 3px 7px;
  border-radius: 7px;
  border: 1px solid rgba(148,163,184,0.7);
  background: rgba(55,65,81,0.9);
  color: #e5e7eb;
  font-size: 0.75rem;
  cursor: pointer;
}

.dropdown-small-btn.delete {
  background: rgba(127,29,29,0.9);
  border-color: rgba(248,113,113,0.9);
}

/* World list */
.world-list {
  margin-top: 6px;
  max-height: 420px;
  overflow-y: auto;
  padding-right: 6px;
  border-radius: 14px;
  background: rgba(15,23,42,0.9);
  border: 1px solid rgba(55,65,81,0.9);
}

.tz-row {
  display: flex;
  justify-content: space-between;
  padding: 7px 9px;
  border-bottom: 1px solid rgba(31,41,55,0.9);
  font-size: 0.85rem;
}
</style>
</head>
<body>

    <a href="index.html" 
   style="
     position: fixed;
     top: 20px;
     left: 20px;
     padding: 10px 16px;
     background: rgba(15,23,42,0.85);
     border: 1px solid rgba(148,163,184,0.5);
     border-radius: 12px;
     backdrop-filter: blur(12px);
     color: #e5e7eb;
     text-decoration: none;
     font-size: 0.9rem;
     box-shadow: 0 4px 20px rgba(0,0,0,0.4);
     transition: 0.15s ease;
   "
   onmouseover="this.style.background='rgba(30,41,59,0.9)'"
   onmouseout="this.style.background='rgba(15,23,42,0.85)'">
  ← Back to Dashboard
</a>


<div class="main-clock">
  <div class="main-time" id="mainTime">--:--:--</div>
  <div class="main-date" id="mainDate">Loading…</div>
  <div class="main-tz" id="mainTz">Detecting timezone…</div>
</div>

<div class="dashboard">
  <!-- School schedule -->
  <div class="card" id="schoolCard">
    <h2>School Schedule</h2>
    <div class="time-status" id="timeStatus">Loading…</div>

    <div class="period-list" id="periodList"></div>

    <div class="btn-row">
      <button class="btn primary" id="restoreDefaultBtn">Restore Default</button>
      <button class="btn" id="saveScheduleBtn">Save</button>
      <button class="btn" id="loadScheduleBtn">Load</button>
      <button class="btn danger" id="clearAllBtn">Clear All</button>
    </div>

    <div class="add-box">
      <div class="add-row">
        <input id="newLabel" placeholder="Label">
        <input id="newStart" placeholder="HH:MM">
        <select id="newStartAP"><option>AM</option><option>PM</option></select>
        <input id="newEnd" placeholder="HH:MM">
        <select id="newEndAP"><option>AM</option><option>PM</option></select>
      </div>
      <button class="btn primary" id="addPeriodBtn">Add Period</button>
      <div class="dropdown-panel" id="scheduleDropdown"></div>
    </div>
  </div>

  <!-- World timezones -->
  <div class="card">
    <h2>World Timezones</h2>
    <div class="world-list" id="worldList">Loading…</div>
  </div>
</div>

<script>
/* ===== LOAD CURRENT SCHEDULE FIRST ===== */
let schoolPeriods = JSON.parse(localStorage.getItem("currentScheduleV4") || "[]");
if (!Array.isArray(schoolPeriods)) schoolPeriods = [];

/* ===== DEFAULT SCHEDULE (only via Restore button) ===== */
const DEFAULT_SCHEDULE = [
  { label: "1st Period", start: "08:00", end: "08:58" },
  { label: "2nd Period", start: "09:02", end: "09:44" },
  { label: "3rd Period", start: "09:48", end: "10:30" },
  { label: "4th Period", start: "10:34", end: "11:16" },
  { label: "WYN",       start: "11:20", end: "11:43" },
  { label: "Lunch",     start: "11:43", end: "12:06" },
  { label: "Recess",    start: "12:03", end: "12:26" },
  { label: "5th Period",start: "12:27", end: "13:25" },
  { label: "6th Period",start: "13:29", end: "14:27" },
  { label: "7th Period",start: "14:31", end: "15:30" }
];

/* ===== SAVE CURRENT SCHEDULE ===== */
function saveCurrentSchedule() {
  localStorage.setItem("currentScheduleV4", JSON.stringify(schoolPeriods));
}

/* ===== SAVED NAMED SCHEDULES ===== */
let savedSchedules = JSON.parse(localStorage.getItem("savedSchedulesV4") || "[]");
if (!Array.isArray(savedSchedules)) savedSchedules = [];

function saveSchedulesList() {
  localStorage.setItem("savedSchedulesV4", JSON.stringify(savedSchedules));
}

/* ===== TIME HELPERS ===== */
function convertTo24(time, ap) {
  const m = /^(\d{1,2}):(\d{2})$/.exec(time);
  if (!m) return null;
  let h = parseInt(m[1], 10);
  const min = parseInt(m[2], 10);
  if (h < 1 || h > 12 || min < 0 || min > 59) return null;
  if (ap === "PM" && h !== 12) h += 12;
  if (ap === "AM" && h === 12) h = 0;
  return `${String(h).padStart(2,"0")}:${String(min).padStart(2,"0")}`;
}

function format12(t) {
  const [h, m] = t.split(":").map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", hour12: true });
}

/* ===== TIME STATUS ENGINE ===== */
function updateTimeStatus() {
  const now = new Date();
  const status = document.getElementById("timeStatus");

  if (!schoolPeriods.length) {
    status.textContent = "No periods scheduled.";
    return;
  }

  let active = null;
  let next = null;

  for (let i = 0; i < schoolPeriods.length; i++) {
    const p = schoolPeriods[i];
    const start = new Date();
    const end = new Date();
    const [sh, sm] = p.start.split(":").map(Number);
    const [eh, em] = p.end.split(":").map(Number);
    start.setHours(sh, sm, 0, 0);
    end.setHours(eh, em, 0, 0);

    if (now >= start && now < end) {
      active = { index: i, label: p.label, end };
      break;
    }
    if (now < start) {
      next = { index: i, label: p.label, start };
      break;
    }
  }

  if (active) {
    const diff = active.end - now;
    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    let nextText = "No more periods today.";
    if (schoolPeriods[active.index + 1]) {
      const np = schoolPeriods[active.index + 1];
      const ns = new Date();
      const [h2, m2] = np.start.split(":").map(Number);
      ns.setHours(h2, m2, 0, 0);
      const ndiff = ns - now;
      const nm = Math.floor(ndiff / 60000);
      const ns2 = Math.floor((ndiff % 60000) / 1000);
      nextText = `Next: ${np.label} in ${nm}m ${ns2}s`;
    }

    status.innerHTML = `<strong>Current:</strong> ${active.label}<br>Ends in: ${m}m ${s}s<br>${nextText}`;
    return;
  }

  if (next) {
    const diff = next.start - now;
    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    if (next.index > 0) {
      const prev = schoolPeriods[next.index - 1];
      const pe = new Date();
      const [h3, m3] = prev.end.split(":").map(Number);
      pe.setHours(h3, m3, 0, 0);
      if (now >= pe && now < next.start) {
        status.innerHTML = `<strong>On Break</strong><br>Break ends in: ${m}m ${s}s<br>Next: ${next.label}`;
        return;
      }
    }

    status.textContent = `Next: ${next.label} in ${m}m ${s}s`;
    return;
  }

  status.textContent = "School day finished.";
}

/* ===== RENDER PERIODS ===== */
function renderPeriods() {
  const list = document.getElementById("periodList");
  list.innerHTML = "";
  const now = new Date();

  schoolPeriods.forEach((p, i) => {
    const start = new Date();
    const end = new Date();
    const [sh, sm] = p.start.split(":").map(Number);
    const [eh, em] = p.end.split(":").map(Number);
    start.setHours(sh, sm, 0, 0);
    end.setHours(eh, em, 0, 0);
    const active = now >= start && now < end;

    const div = document.createElement("div");
    div.className = "period" + (active ? " active" : "");
    div.innerHTML = `
      <div>
        <div class="period-label">${p.label}</div>
        <div class="period-time">${format12(p.start)} – ${format12(p.end)}</div>
      </div>
      <div class="period-right">
        <div class="period-tag">${active ? "Now" : "Upcoming"}</div>
        <div class="delete-period" data-del="${i}">Delete</div>
      </div>
    `;
    list.appendChild(div);
  });

  document.querySelectorAll(".delete-period").forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.getAttribute("data-del"), 10);
      schoolPeriods.splice(idx, 1);
      saveCurrentSchedule();
      renderPeriods();
      updateTimeStatus();
    };
  });
}

/* ===== ADD PERIOD ===== */
document.getElementById("addPeriodBtn").onclick = () => {
  const label = document.getElementById("newLabel").value.trim();
  const startRaw = document.getElementById("newStart").value.trim();
  const startAP = document.getElementById("newStartAP").value;
  const endRaw = document.getElementById("newEnd").value.trim();
  const endAP = document.getElementById("newEndAP").value;

  if (!label || !startRaw || !endRaw) {
    alert("Fill all fields.");
    return;
  }

  const start24 = convertTo24(startRaw, startAP);
  const end24 = convertTo24(endRaw, endAP);
  if (!start24 || !end24) {
    alert("Use valid times like 8:00, 10:30, etc.");
    return;
  }

  schoolPeriods.push({ label, start: start24, end: end24 });
  saveCurrentSchedule();
  renderPeriods();
  updateTimeStatus();

  document.getElementById("newLabel").value = "";
  document.getElementById("newStart").value = "";
  document.getElementById("newEnd").value = "";
};

/* ===== RESTORE DEFAULT ===== */
document.getElementById("restoreDefaultBtn").onclick = () => {
  schoolPeriods = DEFAULT_SCHEDULE.map(p => ({ ...p }));
  saveCurrentSchedule();
  renderPeriods();
  updateTimeStatus();
};

/* ===== CLEAR ALL ===== */
document.getElementById("clearAllBtn").onclick = () => {
  if (!confirm("Clear all periods?")) return;
  schoolPeriods = [];
  saveCurrentSchedule();
  renderPeriods();
  updateTimeStatus();
};

/* ===== SAVE / LOAD DROPDOWN ===== */
let dropdownMode = null;
const dropdown = document.getElementById("scheduleDropdown");
const schoolCard = document.getElementById("schoolCard");

function closeDropdown() {
  dropdownMode = null;
  dropdown.style.display = "none";
  dropdown.innerHTML = "";
}

document.getElementById("saveScheduleBtn").onclick = (e) => {
  e.stopPropagation();
  if (dropdownMode === "save") {
    closeDropdown();
    return;
  }
  dropdownMode = "save";
  dropdown.innerHTML = `
    <div class="dropdown-header">Save Schedule</div>
    <input class="dropdown-input" id="saveName" placeholder="Schedule name">
    <button class="dropdown-small-btn" id="saveNow">Save</button>
  `;
  dropdown.style.display = "block";

  document.getElementById("saveNow").onclick = () => {
    const name = document.getElementById("saveName").value.trim();
    if (!name) {
      alert("Enter a name.");
      return;
    }
    savedSchedules.push({
      name,
      periods: schoolPeriods.map(p => ({ ...p }))
    });
    saveSchedulesList();
    closeDropdown();
  };
};

document.getElementById("loadScheduleBtn").onclick = (e) => {
  e.stopPropagation();
  if (dropdownMode === "load") {
    closeDropdown();
    return;
  }
  dropdownMode = "load";
  dropdown.innerHTML = `<div class="dropdown-header">Load Schedule</div>`;

  if (!savedSchedules.length) {
    dropdown.innerHTML += `<div style="color:#94a3b8;font-size:0.8rem;">No saved schedules.</div>`;
  } else {
    savedSchedules.forEach((s, i) => {
      const row = document.createElement("div");
      row.className = "dropdown-row";
      row.innerHTML = `
        <div>${s.name}</div>
        <div>
          <button class="dropdown-small-btn" data-load="${i}">Load</button>
          <button class="dropdown-small-btn delete" data-del="${i}">X</button>
        </div>
      `;
      dropdown.appendChild(row);
    });

    dropdown.querySelectorAll("[data-load]").forEach(btn => {
      btn.onclick = () => {
        const idx = parseInt(btn.getAttribute("data-load"), 10);
        const sched = savedSchedules[idx];
        if (!sched) return;
        schoolPeriods = sched.periods.map(p => ({ ...p }));
        saveCurrentSchedule();   // persist loaded schedule
        renderPeriods();
        updateTimeStatus();
        closeDropdown();
      };
    });

    dropdown.querySelectorAll("[data-del]").forEach(btn => {
      btn.onclick = () => {
        const idx = parseInt(btn.getAttribute("data-del"), 10);
        savedSchedules.splice(idx, 1);
        saveSchedulesList();
        document.getElementById("loadScheduleBtn").click();
      };
    });
  }

  dropdown.style.display = "block";
};

document.addEventListener("click", (e) => {
  if (!schoolCard.contains(e.target)) {
    closeDropdown();
  }
});

/* ===== WORLD TIMEZONES ===== */
function initWorldTimezones() {
  const list = document.getElementById("worldList");
  list.innerHTML = "";
  const zones = Intl.supportedValuesOf("timeZone");
  zones.forEach(tz => {
    const row = document.createElement("div");
    row.className = "tz-row";
    row.innerHTML = `
      <div>${tz}</div>
      <div data-tz="${tz}">--:--:--</div>
    `;
    list.appendChild(row);
  });
}

function updateWorldTimes() {
  const now = new Date();
  document.querySelectorAll("[data-tz]").forEach(el => {
    el.textContent = now.toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      hour12: true,
      timeZone: el.dataset.tz
    });
  });
}

/* ===== MAIN CLOCK ===== */
function updateMainClock() {
  const now = new Date();
  document.getElementById("mainTime").textContent =
    now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true });
  document.getElementById("mainDate").textContent =
    now.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" });
  document.getElementById("mainTz").textContent =
    Intl.DateTimeFormat().resolvedOptions().timeZone;
}

/* ===== INIT ===== */
function init() {
  initWorldTimezones();
  renderPeriods();
  updateTimeStatus();
  updateMainClock();
  updateWorldTimes();
  setInterval(() => {
    updateMainClock();
    updateWorldTimes();
    updateTimeStatus();
    renderPeriods();
  }, 1000);
}

init();
</script>
</body>
</html>
