<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Clock</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
/* ============================
   GLOBAL / LAYOUT
   ============================ */
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
body {
  background: radial-gradient(circle at 10% 10%, #0b1220 0%, #07101a 40%, #02040a 100%);
  color: #e6eef8;
  padding: 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  min-height: 100vh;
}

/* Back button */
.back-btn {
  position: fixed;
  top: 18px;
  left: 18px;
  padding: 10px 14px;
  background: rgba(15,23,42,0.86);
  border: 1px solid rgba(148,163,184,0.45);
  color: #e6eef8;
  text-decoration: none;
  border-radius: 12px;
  font-size: 0.92rem;
  box-shadow: 0 6px 22px rgba(0,0,0,0.45);
  transition: transform .12s ease, background .12s ease;
}
.back-btn:hover { transform: translateY(-2px); background: rgba(20,30,50,0.95); }

/* Main clock card */
.main-clock {
  width: 100%;
  max-width: 820px;
  padding: 26px 28px;
  border-radius: 20px;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  text-align: center;
}

/* Digital time */
.main-time { font-size: 3.8rem; font-weight: 700; letter-spacing: 0.6px; }
.main-date { margin-top: 8px; color: #cbd5e1; font-size: 1.02rem; }
.main-tz { margin-top: 6px; color: #94a3b8; font-size: 0.9rem; }

/* Analog canvas */
#analogClock {
  display: block;
  margin: 18px auto 0;
  border-radius: 50%;
  width: 220px;
  height: 220px;
  background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.02), rgba(255,255,255,0.005));
  border: 1px solid rgba(255,255,255,0.04);
  box-shadow: 0 12px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.02);
}

/* Dashboard layout */
.dashboard {
  width: 100%;
  max-width: 1300px;
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: 26px;
}

@media (max-width: 980px) {
  .dashboard { grid-template-columns: 1fr; }
}

/* Card style */
.card {
  padding: 18px;
  border-radius: 16px;
  background: rgba(15,23,42,0.9);
  border: 1px solid rgba(148,163,184,0.06);
  box-shadow: 0 20px 50px rgba(0,0,0,0.55);
}

/* Titles */
.card h2 { font-size: 1.25rem; margin-bottom: 8px; }

/* Time status */
.time-status {
  margin-bottom: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(30,58,138,0.18);
  border: 1px solid rgba(99,102,241,0.18);
  color: #e6eef8;
  font-size: 0.95rem;
}

/* Period list */
.period-list { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; max-height:420px; overflow:auto; padding-right:6px; }
.period {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 12px; border-radius:12px;
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.03);
}
.period.active {
  background: linear-gradient(135deg, rgba(79,70,229,0.18), rgba(59,130,246,0.14));
  border-color: rgba(99,102,241,0.28);
  box-shadow: 0 6px 18px rgba(59,130,246,0.06);
}
.period-label { font-weight:600; }
.period-time { color:#cbd5e1; font-size:0.88rem; }
.period-right { display:flex; gap:10px; align-items:center; }

/* small tag & delete */
.period-tag { font-size:0.72rem; padding:4px 8px; border-radius:999px; border:1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.01); }
.delete-period { color:#fecaca; cursor:pointer; font-size:0.85rem; }

/* Add box */
.add-box { margin-top:10px; padding:10px; border-radius:12px; background: rgba(255,255,255,0.01); border:1px solid rgba(255,255,255,0.02); }
.add-row { display:grid; grid-template-columns: 2fr 1fr 0.9fr 1fr 0.9fr; gap:8px; margin-bottom:8px; }
.add-box input, .add-box select { padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,0.03); background: rgba(255,255,255,0.01); color:#e6eef8; font-size:0.9rem; }

/* Buttons */
.btn-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.btn { padding:8px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.04); background: rgba(55,65,81,0.9); color:#e6eef8; cursor:pointer; font-size:0.9rem; }
.btn.primary { background: linear-gradient(135deg,#4f46e5,#3b82f6); border-color: rgba(191,219,254,0.9); }
.btn.danger { background: linear-gradient(180deg,#7f1d1d,#991b1b); border-color: rgba(248,113,113,0.9); }

/* Dropdown */
.dropdown-panel { margin-top:8px; display:none; padding:10px; border-radius:10px; background: rgba(10,14,22,0.98); border:1px solid rgba(148,163,184,0.06); box-shadow:0 18px 40px rgba(0,0,0,0.6); }
.dropdown-header { font-weight:700; margin-bottom:8px; }
.dropdown-input { width:100%; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,0.03); background: rgba(255,255,255,0.01); color:#e6eef8; margin-bottom:8px; }
.dropdown-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; }
.dropdown-small-btn { padding:6px 8px; border-radius:8px; border:1px solid rgba(255,255,255,0.04); background: rgba(55,65,81,0.9); color:#e6eef8; cursor:pointer; font-size:0.82rem; }
.dropdown-small-btn.delete { background: linear-gradient(180deg,#7f1d1d,#991b1b); border-color: rgba(248,113,113,0.9); }

/* World list */
.world-list { max-height:420px; overflow:auto; padding-right:6px; border-radius:10px; background: rgba(255,255,255,0.01); border:1px solid rgba(255,255,255,0.02); }
.tz-row { display:flex; justify-content:space-between; padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.02); font-size:0.9rem; color:#e6eef8; }
</style>
</head>
<body>

<a class="back-btn" href="index.html">← Back to Dashboard</a>

<div class="main-clock">
  <div class="main-time" id="mainTime">--:--:--</div>
  <div class="main-date" id="mainDate">Loading…</div>
  <div class="main-tz" id="mainTz">Detecting timezone…</div>

  <!-- Analog clock canvas -->
  <canvas id="analogClock" width="220" height="220" aria-label="Analog clock"></canvas>
</div>

<div class="dashboard">
  <!-- LEFT: School schedule -->
  <div class="card" id="schoolCard">
    <h2>School Schedule</h2>
    <div class="time-status" id="timeStatus">Loading…</div>

    <div class="period-list" id="periodList"></div>

    <div class="btn-row">
      <button class="btn primary" id="restoreDefaultBtn">Restore Default</button>
      <button class="btn" id="saveScheduleBtn">Save</button>
      <button class="btn" id="loadScheduleBtn">Load</button>
      <button class="btn danger" id="clearAllBtn">Clear All</button>
    </div>

    <div class="add-box">
      <div class="add-row">
        <input id="newLabel" placeholder="Label">
        <input id="newStart" placeholder="HH:MM">
        <select id="newStartAP"><option>AM</option><option>PM</option></select>
        <input id="newEnd" placeholder="HH:MM">
        <select id="newEndAP"><option>AM</option><option>PM</option></select>
      </div>
      <button class="btn primary" id="addPeriodBtn">Add Period</button>
      <div class="dropdown-panel" id="scheduleDropdown"></div>
    </div>
  </div>

  <!-- RIGHT: World timezones -->
  <div class="card">
    <h2>World Timezones</h2>
    <div class="world-list" id="worldList">Loading…</div>
  </div>
</div>

<script>
/* ============================
   LOAD CURRENT SCHEDULE FIRST
   ============================ */
let schoolPeriods = JSON.parse(localStorage.getItem("currentScheduleV4") || "[]");
if (!Array.isArray(schoolPeriods)) schoolPeriods = [];

/* ============================
   DEFAULT SCHEDULE (only via Restore)
   ============================ */
const DEFAULT_SCHEDULE = [
  { label: "1st Period", start: "08:00", end: "08:58" },
  { label: "2nd Period", start: "09:02", end: "09:44" },
  { label: "3rd Period", start: "09:48", end: "10:30" },
  { label: "4th Period", start: "10:34", end: "11:16" },
  { label: "WYN",       start: "11:20", end: "11:43" },
  { label: "Lunch",     start: "11:43", end: "12:06" },
  { label: "Recess",    start: "12:03", end: "12:26" },
  { label: "5th Period",start: "12:27", end: "13:25" },
  { label: "6th Period",start: "13:29", end: "14:27" },
  { label: "7th Period",start: "14:31", end: "15:30" }
];

/* ============================
   SAVE / LOAD HELPERS
   ============================ */
function saveCurrentSchedule() {
  localStorage.setItem("currentScheduleV4", JSON.stringify(schoolPeriods));
}

let savedSchedules = JSON.parse(localStorage.getItem("savedSchedulesV4") || "[]");
if (!Array.isArray(savedSchedules)) savedSchedules = [];

function saveSchedulesList() {
  localStorage.setItem("savedSchedulesV4", JSON.stringify(savedSchedules));
}

/* ============================
   TIME UTILITIES
   ============================ */
function convertTo24(time, ap) {
  const m = /^(\d{1,2}):(\d{2})$/.exec(time);
  if (!m) return null;
  let h = parseInt(m[1], 10);
  const min = parseInt(m[2], 10);
  if (h < 1 || h > 12 || min < 0 || min > 59) return null;
  if (ap === "PM" && h !== 12) h += 12;
  if (ap === "AM" && h === 12) h = 0;
  return `${String(h).padStart(2,"0")}:${String(min).padStart(2,"0")}`;
}

function format12(t) {
  const [h, m] = t.split(":").map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit", hour12: true });
}

/* ============================
   TIME STATUS ENGINE
   ============================ */
function updateTimeStatus() {
  const now = new Date();
  const status = document.getElementById("timeStatus");

  if (!schoolPeriods.length) {
    status.textContent = "No periods scheduled.";
    return;
  }

  let active = null;
  let next = null;

  for (let i = 0; i < schoolPeriods.length; i++) {
    const p = schoolPeriods[i];
    const start = new Date();
    const end = new Date();
    const [sh, sm] = p.start.split(":").map(Number);
    const [eh, em] = p.end.split(":").map(Number);
    start.setHours(sh, sm, 0, 0);
    end.setHours(eh, em, 0, 0);

    if (now >= start && now < end) {
      active = { index: i, label: p.label, end };
      break;
    }
    if (now < start) {
      next = { index: i, label: p.label, start };
      break;
    }
  }

  if (active) {
    const diff = active.end - now;
    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    let nextText = "No more periods today.";
    if (schoolPeriods[active.index + 1]) {
      const np = schoolPeriods[active.index + 1];
      const ns = new Date();
      const [h2, m2] = np.start.split(":").map(Number);
      ns.setHours(h2, m2, 0, 0);
      const ndiff = ns - now;
      const nm = Math.floor(ndiff / 60000);
      const ns2 = Math.floor((ndiff % 60000) / 1000);
      nextText = `Next: ${np.label} in ${nm}m ${ns2}s`;
    }

    status.innerHTML = `<strong>Current:</strong> ${active.label}<br>Ends in: ${m}m ${s}s<br>${nextText}`;
    return;
  }

  if (next) {
    const diff = next.start - now;
    const m = Math.floor(diff / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    if (next.index > 0) {
      const prev = schoolPeriods[next.index - 1];
      const pe = new Date();
      const [h3, m3] = prev.end.split(":").map(Number);
      pe.setHours(h3, m3, 0, 0);
      if (now >= pe && now < next.start) {
        status.innerHTML = `<strong>On Break</strong><br>Break ends in: ${m}m ${s}s<br>Next: ${next.label}`;
        return;
      }
    }

    status.textContent = `Next: ${next.label} in ${m}m ${s}s`;
    return;
  }

  status.textContent = "School day finished.";
}

/* ============================
   RENDER PERIODS
   ============================ */
function renderPeriods() {
  const list = document.getElementById("periodList");
  list.innerHTML = "";
  const now = new Date();

  schoolPeriods.forEach((p, i) => {
    const start = new Date();
    const end = new Date();
    const [sh, sm] = p.start.split(":").map(Number);
    const [eh, em] = p.end.split(":").map(Number);
    start.setHours(sh, sm, 0, 0);
    end.setHours(eh, em, 0, 0);
    const active = now >= start && now < end;

    const div = document.createElement("div");
    div.className = "period" + (active ? " active" : "");
    div.innerHTML = `
      <div>
        <div class="period-label">${p.label}</div>
        <div class="period-time">${format12(p.start)} – ${format12(p.end)}</div>
      </div>
      <div class="period-right">
        <div class="period-tag">${active ? "Now" : "Upcoming"}</div>
        <div class="delete-period" data-del="${i}">Delete</div>
      </div>
    `;
    list.appendChild(div);
  });

  document.querySelectorAll(".delete-period").forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.getAttribute("data-del"), 10);
      schoolPeriods.splice(idx, 1);
      saveCurrentSchedule();
      renderPeriods();
      updateTimeStatus();
    };
  });
}

/* ============================
   ADD PERIOD
   ============================ */
document.getElementById("addPeriodBtn").onclick = () => {
  const label = document.getElementById("newLabel").value.trim();
  const startRaw = document.getElementById("newStart").value.trim();
  const startAP = document.getElementById("newStartAP").value;
  const endRaw = document.getElementById("newEnd").value.trim();
  const endAP = document.getElementById("newEndAP").value;

  if (!label || !startRaw || !endRaw) {
    alert("Fill all fields.");
    return;
  }

  const start24 = convertTo24(startRaw, startAP);
  const end24 = convertTo24(endRaw, endAP);
  if (!start24 || !end24) {
    alert("Use valid times like 8:00, 10:30, etc.");
    return;
  }

  schoolPeriods.push({ label, start: start24, end: end24 });
  saveCurrentSchedule();
  renderPeriods();
  updateTimeStatus();

  document.getElementById("newLabel").value = "";
  document.getElementById("newStart").value = "";
  document.getElementById("newEnd").value = "";
};

/* ============================
   RESTORE DEFAULT
   ============================ */
document.getElementById("restoreDefaultBtn").onclick = () => {
  if (!confirm("Replace current schedule with the default schedule?")) return;
  schoolPeriods = DEFAULT_SCHEDULE.map(p => ({ ...p }));
  saveCurrentSchedule();
  renderPeriods();
  updateTimeStatus();
};

/* ============================
   CLEAR ALL
   ============================ */
document.getElementById("clearAllBtn").onclick = () => {
  if (!confirm("Clear all periods?")) return;
  schoolPeriods = [];
  saveCurrentSchedule();
  renderPeriods();
  updateTimeStatus();
};

/* ============================
   SAVE / LOAD DROPDOWN
   ============================ */
let dropdownMode = null;
const dropdown = document.getElementById("scheduleDropdown");
const schoolCard = document.getElementById("schoolCard");

function closeDropdown() {
  dropdownMode = null;
  dropdown.style.display = "none";
  dropdown.innerHTML = "";
}

document.getElementById("saveScheduleBtn").onclick = (e) => {
  e.stopPropagation();
  if (dropdownMode === "save") { closeDropdown(); return; }
  dropdownMode = "save";
  dropdown.innerHTML = `
    <div class="dropdown-header">Save Schedule</div>
    <input class="dropdown-input" id="saveName" placeholder="Schedule name">
    <div style="display:flex;gap:8px;">
      <button class="dropdown-small-btn" id="saveNow">Save</button>
      <button class="dropdown-small-btn" id="cancelSave">Cancel</button>
    </div>
  `;
  dropdown.style.display = "block";

  document.getElementById("saveNow").onclick = () => {
    const name = document.getElementById("saveName").value.trim();
    if (!name) { alert("Enter a name."); return; }
    savedSchedules.push({ name, periods: schoolPeriods.map(p => ({ ...p })) });
    saveSchedulesList();
    closeDropdown();
  };
  document.getElementById("cancelSave").onclick = closeDropdown;
};

document.getElementById("loadScheduleBtn").onclick = (e) => {
  e.stopPropagation();
  if (dropdownMode === "load") { closeDropdown(); return; }
  dropdownMode = "load";
  dropdown.innerHTML = `<div class="dropdown-header">Load Schedule</div>`;

  if (!savedSchedules.length) {
    dropdown.innerHTML += `<div style="color:#94a3b8;font-size:0.88rem;">No saved schedules.</div>`;
  } else {
    savedSchedules.forEach((s, i) => {
      const row = document.createElement("div");
      row.className = "dropdown-row";
      row.innerHTML = `
        <div>${s.name}</div>
        <div>
          <button class="dropdown-small-btn" data-load="${i}">Load</button>
          <button class="dropdown-small-btn delete" data-del="${i}">X</button>
        </div>
      `;
      dropdown.appendChild(row);
    });

    dropdown.querySelectorAll("[data-load]").forEach(btn => {
      btn.onclick = () => {
        const idx = parseInt(btn.getAttribute("data-load"), 10);
        const sched = savedSchedules[idx];
        if (!sched) return;
        schoolPeriods = sched.periods.map(p => ({ ...p }));
        saveCurrentSchedule(); // persist loaded schedule so it survives refresh
        renderPeriods();
        updateTimeStatus();
        closeDropdown();
      };
    });

    dropdown.querySelectorAll("[data-del]").forEach(btn => {
      btn.onclick = () => {
        const idx = parseInt(btn.getAttribute("data-del"), 10);
        if (!confirm("Delete saved schedule?")) return;
        savedSchedules.splice(idx, 1);
        saveSchedulesList();
        document.getElementById("loadScheduleBtn").click();
      };
    });
  }

  dropdown.style.display = "block";
};

document.addEventListener("click", (e) => {
  if (!schoolCard.contains(e.target)) closeDropdown();
});

/* ============================
   WORLD TIMEZONES
   ============================ */
function initWorldTimezones() {
  const list = document.getElementById("worldList");
  list.innerHTML = "";
  let zones = [];
  try {
    zones = Intl.supportedValuesOf ? Intl.supportedValuesOf("timeZone") : [
      "UTC","America/New_York","America/Chicago","America/Los_Angeles","Europe/London","Europe/Paris","Asia/Tokyo","Australia/Sydney"
    ];
  } catch (err) {
    zones = ["UTC","America/New_York","America/Chicago","America/Los_Angeles","Europe/London","Europe/Paris","Asia/Tokyo","Australia/Sydney"];
  }

  zones.forEach(tz => {
    const row = document.createElement("div");
    row.className = "tz-row";
    row.innerHTML = `<div>${tz}</div><div data-tz="${tz}">--:--:--</div>`;
    list.appendChild(row);
  });
}

function updateWorldTimes() {
  const now = new Date();
  document.querySelectorAll("[data-tz]").forEach(el => {
    try {
      el.textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true, timeZone: el.dataset.tz });
    } catch (err) {
      el.textContent = "--:--:--";
    }
  });
}

/* ============================
   MAIN CLOCK
   ============================ */
function updateMainClock() {
  const now = new Date();
  document.getElementById("mainTime").textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true });
  document.getElementById("mainDate").textContent = now.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" });
  document.getElementById("mainTz").textContent = Intl.DateTimeFormat().resolvedOptions().timeZone;
}

/* ============================
   ANALOG CLOCK (Canvas)
   ============================ */
function drawHand(ctx, cx, cy, angle, length, width, color) {
  ctx.beginPath();
  ctx.lineCap = "round";
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(angle) * length, cy + Math.sin(angle) * length);
  ctx.lineWidth = width;
  ctx.strokeStyle = color;
  ctx.stroke();
}

function drawAnalogClock() {
  const canvas = document.getElementById("analogClock");
  if (!canvas || !canvas.getContext) return;
  const ctx = canvas.getContext("2d");
  const cssSize = 220;
  const dpr = window.devicePixelRatio || 1;

  if (canvas._dpr !== dpr) {
    canvas._dpr = dpr;
    canvas.width = cssSize * dpr;
    canvas.height = cssSize * dpr;
    canvas.style.width = cssSize + "px";
    canvas.style.height = cssSize + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  } else {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  ctx.clearRect(0, 0, cssSize, cssSize);
  const cx = cssSize / 2;
  const cy = cssSize / 2;
  const radius = cssSize / 2 - 6;

  // outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(0,0,0,0)";
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = "rgba(255,255,255,0.06)";
  ctx.stroke();

  // ticks
  for (let i = 0; i < 60; i++) {
    const ang = (i / 60) * Math.PI * 2;
    const inner = i % 5 === 0 ? radius - 18 : radius - 12;
    const outer = radius - 4;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(ang) * inner, cy + Math.sin(ang) * inner);
    ctx.lineTo(cx + Math.cos(ang) * outer, cy + Math.sin(ang) * outer);
    ctx.lineWidth = i % 5 === 0 ? 2.2 : 1;
    ctx.strokeStyle = i % 5 === 0 ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.18)";
    ctx.stroke();
  }

  // numbers
  ctx.fillStyle = "rgba(255,255,255,0.78)";
  ctx.font = "600 14px system-ui, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  for (let n = 1; n <= 12; n++) {
    const ang = ((n / 12) * Math.PI * 2) - Math.PI / 2;
    const tx = cx + Math.cos(ang) * (radius - 36);
    const ty = cy + Math.sin(ang) * (radius - 36);
    ctx.fillText(String(n), tx, ty);
  }

  const now = new Date();
  const sec = now.getSeconds() + now.getMilliseconds() / 1000;
  const min = now.getMinutes() + sec / 60;
  const hr = (now.getHours() % 12) + min / 60;

  // hour
  drawHand(ctx, cx, cy, (hr / 12) * Math.PI * 2 - Math.PI / 2, radius * 0.5, 6, "rgba(255,255,255,0.95)");
  // minute
  drawHand(ctx, cx, cy, (min / 60) * Math.PI * 2 - Math.PI / 2, radius * 0.72, 4, "rgba(255,255,255,0.92)");
  // second
  drawHand(ctx, cx, cy, (sec / 60) * Math.PI * 2 - Math.PI / 2, radius * 0.82, 1.6, "rgba(249,115,22,0.95)");

  // center pin
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.95)";
  ctx.fill();
}

/* start analog loop */
(function startAnalog() {
  drawAnalogClock();
  setInterval(drawAnalogClock, 1000 / 30);
})();

/* ============================
   INITIALIZE EVERYTHING
   ============================ */
function init() {
  initWorldTimezones();
  renderPeriods();
  updateTimeStatus();
  updateMainClock();
  updateWorldTimes();

  setInterval(() => {
    updateMainClock();
    updateWorldTimes();
    updateTimeStatus();
    renderPeriods();
  }, 1000);
}

init();
</script>
