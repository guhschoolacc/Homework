<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Arcade Stunt Run</title>
<style>
  :root{
    --bg-dark:#071026;
    --road:#0b1220;
    --neon:#00f0ff;
    --accent:#ff3d81;
    --glass: rgba(10,18,30,0.6);
  }
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#020317 0%,#071026 100%);font-family:Inter,system-ui,Arial;color:#dff6ff}
  .wrap{max-width:1100px;margin:18px auto;padding:12px}
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  h1{color:var(--neon);margin:0;font-size:20px}
  .panel{background:var(--glass);padding:8px 12px;border-radius:10px}
  canvas{display:block;width:100%;height:auto;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.6)}
  .hud{display:flex;gap:12px;align-items:center}
  button{background:linear-gradient(90deg,var(--neon),var(--accent));border:none;color:#001;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:700}
  .menuOverlay{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center}
  .menuCard{width:640px;background:linear-gradient(180deg,rgba(2,6,16,0.95),rgba(6,10,20,0.9));border-radius:12px;padding:18px;color:#dff6ff;box-shadow:0 10px 30px rgba(0,0,0,.6)}
  .levels{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .levelBtn{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:8px 10px;border-radius:8px;cursor:pointer;color:#cfe9ff}
  .small{font-size:13px;color:#9fb8d9}
  .center{display:flex;justify-content:center;gap:8px;margin-top:12px}
  .stat{font-weight:700;color:var(--neon)}
  .hudRight{display:flex;gap:10px;align-items:center}
  .best{font-size:12px;color:#9fb8d9}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Arcade Stunt Run</h1>
      <div class="small">Perform flips, collect coins, hit checkpoints, beat the clock</div>
    </div>
    <div class="panel hud">
      <div>Score: <span id="score">0</span></div>
      <div>Time: <span id="timer">60</span>s</div>
      <div>Level: <span id="levelLabel">1</span></div>
      <div class="hudRight"><button id="menuToggle">Menu</button></div>
    </div>
  </header>

  <div style="position:relative">
    <canvas id="game" width="1000" height="540"></canvas>

    <div id="menu" class="menuOverlay" style="display:flex">
      <div class="menuCard">
        <h2 style="margin:0;color:var(--neon)">Main Menu</h2>
        <p class="small" style="margin-top:8px">Choose a level and game mode. Stunt Run rewards airtime and rotations. Best times are saved locally.</p>

        <div style="margin-top:12px">
          <label class="small">Select Level</label>
          <div class="levels" id="levelsList"></div>
        </div>

        <div style="margin-top:12px">
          <label class="small">Mode</label>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button id="modeStunt" class="levelBtn">Stunt Run</button>
            <button id="modeTime" class="levelBtn">Time Trial</button>
            <button id="modeCollect" class="levelBtn">Coin Rush</button>
          </div>
        </div>

        <div class="center">
          <button id="startBtn">Start</button>
          <button id="restartBtn">Restart</button>
        </div>

        <div style="margin-top:12px" class="small">Best times: <span id="bestTime" class="best">—</span></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ---------- Canvas and DPR ---------- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = canvas.width, H = canvas.height;
(function setDPR(){
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
})();

/* ---------- UI ---------- */
const menuEl = document.getElementById('menu');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const menuToggle = document.getElementById('menuToggle');
const levelsList = document.getElementById('levelsList');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const levelLabel = document.getElementById('levelLabel');
const bestTimeEl = document.getElementById('bestTime');

/* ---------- State ---------- */
let state = 'menu';
let currentLevel = 0;
let mode = 'stunt';
let score = 0;
let timer = 60;
let bestTimes = JSON.parse(localStorage.getItem('stunt_best') || '{}');

/* ---------- Controls ---------- */
const keys = {};
addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

/* ---------- Levels with scenery and ramp layouts ---------- */
const levels = [
  {
    name: 'Neon City',
    bg: 'city',
    time: 60,
    ramps: [
      {x: 400, w: 120, h: -80},
      {x: 900, w: 160, h: -120},
      {x: 1500, w: 140, h: -100},
      {x: 2100, w: 180, h: -140}
    ],
    coins: [500, 950, 1600, 2200],
    checkpoints: [1200, 2400],
    accent: '#00f0ff'
  },
  {
    name: 'Desert Dunes',
    bg: 'desert',
    time: 70,
    ramps: [
      {x: 300, w: 140, h: -90},
      {x: 700, w: 100, h: -70},
      {x: 1200, w: 200, h: -150},
      {x: 1900, w: 160, h: -110}
    ],
    coins: [350, 760, 1250, 1950],
    checkpoints: [1000, 2000],
    accent: '#ffd166'
  },
  {
    name: 'Forest Run',
    bg: 'forest',
    time: 65,
    ramps: [
      {x: 420, w: 110, h: -70},
      {x: 820, w: 150, h: -110},
      {x: 1400, w: 130, h: -90},
      {x: 2000, w: 170, h: -130}
    ],
    coins: [480, 860, 1450, 2050],
    checkpoints: [1100, 2300],
    accent: '#7be495'
  }
];

/* populate level buttons */
levels.forEach((lv,i)=>{
  const b = document.createElement('button');
  b.className = 'levelBtn';
  b.textContent = (i+1)+'. '+lv.name;
  b.onclick = ()=>{ currentLevel = i; updateMenuPreview(); };
  levelsList.appendChild(b);
});
function updateMenuPreview(){
  levelLabel.textContent = (currentLevel+1) + ' - ' + levels[currentLevel].name;
  const key = currentLevel + '_' + mode;
  bestTimeEl.textContent = bestTimes[key] ? bestTimes[key].toFixed(2) + 's' : '—';
}
updateMenuPreview();

/* mode buttons */
document.getElementById('modeStunt').onclick = ()=>{ mode='stunt'; updateMenuPreview(); };
document.getElementById('modeTime').onclick = ()=>{ mode='time'; updateMenuPreview(); };
document.getElementById('modeCollect').onclick = ()=>{ mode='collect'; updateMenuPreview(); };

/* ---------- Player and world ---------- */
const world = { width: 2800, scroll: 0, speed: 0 };
const bike = {
  x: 160, y: 0, w: 64, h: 28,
  vx: 0, vy: 0, angle: 0, angVel: 0,
  onGround: true, airtime: 0, rotationAccum: 0
};
let ramps = [], coins = [], checkpoints = [];

/* ---------- Particles ---------- */
const particles = [];
function spawnParticle(x,y,dx,dy,color,life=40){ particles.push({x,y,dx,dy,color,life,age:0}); }

/* ---------- Audio helper ---------- */
const audioCtx = (typeof AudioContext !== 'undefined') ? new AudioContext() : null;
function beep(freq=440, t=0.06, vol=0.06){ if(!audioCtx) return; const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sine'; o.frequency.value=freq; g.gain.value=vol; o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+t); }

/* ---------- Init level ---------- */
function initLevel(){
  const lv = levels[currentLevel];
  ramps = lv.ramps.map(r=>Object.assign({}, r));
  coins = lv.coins.map(x=>({x,y: groundYAt(x)-40, collected:false}));
  checkpoints = lv.checkpoints.map(x=>({x,passed:false}));
  world.width = Math.max(2600, ramps[ramps.length-1].x + 600);
  bike.x = 160; bike.y = groundYAt(0) - 40; bike.vx = 0; bike.vy = 0; bike.angle = 0; bike.angVel = 0; bike.onGround = true; bike.airtime = 0; bike.rotationAccum = 0;
  world.scroll = 0; world.speed = 0;
  score = 0; timer = lv.time;
  scoreEl.textContent = Math.floor(score); timerEl.textContent = Math.ceil(timer);
  levelLabel.textContent = (currentLevel+1) + ' - ' + lv.name;
}

/* ground profile simple function */
function groundYAt(x){
  // base road y
  const base = H - 120;
  // small sine bumps for variety
  return base + Math.sin(x*0.004)*18 + Math.cos(x*0.002)*10;
}

/* ramp surface function returns ramp top y for x inside ramp */
function rampTopAt(x){
  for(const r of ramps){
    if(x >= r.x && x <= r.x + r.w){
      const t = (x - r.x) / r.w;
      return groundYAt(r.x) + r.h * (1 - (t)); // simple incline
    }
  }
  return null;
}

/* ---------- Menu and controls ---------- */
startBtn.onclick = ()=>{ menuEl.style.display='none'; state='playing'; initLevel(); if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); };
restartBtn.onclick = ()=>{ initLevel(); state='playing'; menuEl.style.display='none'; };
menuToggle.onclick = ()=>{ menuEl.style.display = (menuEl.style.display === 'none') ? 'flex' : 'none'; state = (menuEl.style.display === 'none') ? 'playing' : 'menu'; };

/* ---------- Game loop ---------- */
let last = performance.now();
function loop(now){
  const dt = Math.min(40, now - last) / 16.666;
  last = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ---------- Update ---------- */
function update(dt){
  if(state !== 'playing') return;
  const lv = levels[currentLevel];

  // input
  const left = keys['arrowleft'] || keys['a'];
  const right = keys['arrowright'] || keys['d'];
  const up = keys['arrowup'] || keys['w'];
  const down = keys['arrowdown'] || keys['s'];
  const flip = keys[' '] || keys['space'];

  // throttle and braking
  const accel = up ? 0.18 : 0.06;
  const brake = down ? 0.3 : 0;
  bike.vx += (accel - brake) * dt;
  bike.vx = Math.max(0, Math.min(12, bike.vx));

  // world scroll follows bike
  world.scroll += bike.vx * dt * 6;
  world.scroll = Math.max(0, Math.min(world.width - 800, world.scroll));

  // horizontal position relative to world
  const worldX = world.scroll + bike.x;

  // ramp interaction
  const rampTop = rampTopAt(worldX);
  if(rampTop !== null){
    // if approaching ramp, set bike y to ramp top when on ground
    if(bike.onGround && bike.y + bike.h >= rampTop - 2){
      // launch
      bike.vy = -6 - Math.min(6, bike.vx * 0.4);
      bike.onGround = false;
      spawnParticle(bike.x + 10, rampTop, -1, -1.2, 'rgba(255,200,120,0.9)', 30);
      beep(880,0.04,0.04);
    }
  }

  // gravity
  bike.vy += 0.35 * dt;
  bike.y += bike.vy * dt * 12;

  // rotation in air
  if(!bike.onGround){
    // player can add rotation
    const rotInput = (right ? 0.02 : 0) - (left ? 0.02 : 0);
    bike.angVel += rotInput * dt;
    if(flip){
      bike.angVel += 0.06 * dt;
    }
    bike.angle += bike.angVel * dt;
    bike.rotationAccum += Math.abs(bike.angVel * dt);
    bike.airtime += dt;
  }

  // landing detection
  const groundY = rampTopAt(worldX) ?? groundYAt(worldX);
  if(bike.y + bike.h >= groundY){
    if(!bike.onGround){
      // landing event
      const landingSpeed = Math.abs(bike.vy);
      const rotationScore = Math.floor(bike.rotationAccum * 40);
      const airtimeScore = Math.floor(bike.airtime * 30);
      // reward for clean landing angle
      const anglePenalty = Math.max(0, Math.abs(bike.angle) - 0.6);
      const landingBonus = Math.max(0, rotationScore + airtimeScore - Math.floor(anglePenalty * 100));
      score += landingBonus;
      if(landingBonus > 0) spawnParticle(bike.x + 20, groundY - 6, (Math.random()-0.5)*2, -1.2, 'rgba(0,240,255,0.9)', 40);
      // reset air values
      bike.airtime = 0; bike.rotationAccum = 0;
      // heavy crash if landing too steep or too fast
      if(landingSpeed > 10 || Math.abs(bike.angle) > 1.6){
        // crash
        state = 'gameover';
        menuEl.style.display = 'flex';
        startBtn.style.display = 'none';
        beep(120,0.4,0.12);
      } else {
        // successful landing dampen velocities
        bike.vy *= 0.2;
        bike.angVel *= 0.2;
        bike.angle *= 0.4;
        bike.onGround = true;
      }
    }
    // snap to ground
    bike.y = groundY - bike.h;
  } else {
    bike.onGround = false;
  }

  // coins collection
  for(let i=0;i<coins.length;i++){
    const c = coins[i];
    if(!c.collected && Math.abs((c.x - world.scroll) - bike.x) < 40 && Math.abs(c.y - (bike.y + bike.h/2)) < 40){
      c.collected = true;
      score += 50;
      spawnParticle(c.x - world.scroll, c.y, (Math.random()-0.5)*2, -1.2, 'rgba(0,255,120,0.95)', 40);
      beep(1200,0.06,0.06);
    }
  }

  // checkpoints
  for(const cp of checkpoints){
    if(!cp.passed && worldX > cp.x){
      cp.passed = true;
      timer += 12;
      score += 100;
      beep(1000,0.08,0.08);
    }
  }

  // timer
  timer -= 0.016 * dt * 60;
  if(timer <= 0){
    state = 'gameover';
    menuEl.style.display = 'flex';
    startBtn.style.display = 'none';
  }

  // update particles
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.dx * dt * 6;
    p.y += p.dy * dt * 6;
    p.dy += 0.06 * dt;
    p.age += dt;
    if(p.age > p.life) particles.splice(i,1);
  }

  // update UI
  scoreEl.textContent = Math.floor(score);
  timerEl.textContent = Math.max(0, Math.ceil(timer));
}

/* ---------- Render ---------- */
function render(){
  ctx.clearRect(0,0,W,H);
  const lv = levels[currentLevel];

  // background gradient
  const g = ctx.createLinearGradient(0,0,0,H);
  if(lv.bg === 'city'){ g.addColorStop(0,'#071026'); g.addColorStop(1,'#020317'); }
  if(lv.bg === 'desert'){ g.addColorStop(0,'#0b1a1a'); g.addColorStop(1,'#2b1a00'); }
  if(lv.bg === 'forest'){ g.addColorStop(0,'#052018'); g.addColorStop(1,'#071a10'); }
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // parallax scenery
  drawParallax(lv);

  // road
  ctx.fillStyle = '#0b1220'; ctx.fillRect(0, H-160, W, 160);
  // road center glow
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 6; ctx.setLineDash([30,20]);
  ctx.beginPath(); ctx.moveTo(W/2, H-160); ctx.lineTo(W/2, H); ctx.stroke(); ctx.setLineDash([]);

  // draw ramps
  ctx.save();
  ctx.translate(-world.scroll,0);
  for(const r of ramps){
    // ramp polygon
    ctx.fillStyle = 'linear-gradient(#333,#111)';
    ctx.beginPath();
    ctx.moveTo(r.x, groundYAt(r.x));
    ctx.lineTo(r.x + r.w, groundYAt(r.x + r.w));
    ctx.lineTo(r.x + r.w, groundYAt(r.x + r.w) + 40);
    ctx.lineTo(r.x, groundYAt(r.x) + 40);
    ctx.closePath();
    ctx.fillStyle = '#2b2b2b';
    ctx.fill();
    // ramp top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(r.x, groundYAt(r.x) - 6, r.w, 6);
  }

  // draw coins
  for(const c of coins){
    if(c.collected) continue;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(c.x, c.y, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fillRect(c.x-6, c.y-6, 12, 6);
  }

  // draw checkpoints
  for(const cp of checkpoints){
    ctx.fillStyle = cp.passed ? 'rgba(0,255,120,0.6)' : 'rgba(255,255,255,0.08)';
    ctx.fillRect(cp.x - 6, groundYAt(cp.x) - 120, 12, 120);
    ctx.fillStyle = lv.accent;
    ctx.fillRect(cp.x + 12, groundYAt(cp.x) - 100, 40, 24);
  }

  ctx.restore();

  // draw bike shadow
  const bikeScreenX = bike.x;
  const bikeScreenY = bike.y;
  ctx.save();
  ctx.translate(bikeScreenX + 10, bikeScreenY + bike.h + 6);
  ctx.rotate(bike.angle);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(-20, 0, 60, 10);
  ctx.restore();

  // draw bike
  ctx.save();
  ctx.translate(bikeScreenX + 10, bikeScreenY + 10);
  ctx.rotate(bike.angle);
  // body
  ctx.fillStyle = lv.accent;
  roundRect(ctx, -10, -8, 80, 20, 6);
  // seat
  ctx.fillStyle = '#001';
  roundRect(ctx, 6, -6, 36, 12, 4);
  // wheels
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(6, 14, 10, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(56, 14, 10, 0, Math.PI*2); ctx.fill();
  // neon outline
  ctx.strokeStyle = 'rgba(0,240,255,0.9)';
  ctx.lineWidth = 2;
  ctx.strokeRect(-10, -8, 80, 20);
  ctx.restore();

  // particles
  for(const p of particles){
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 1 - (p.age / p.life);
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // HUD overlays
  if(state === 'menu'){
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0,0,W,H);
  }
  if(state === 'gameover'){
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ff6b6b'; ctx.font = '36px Inter'; ctx.fillText('Game Over', W/2 - 100, H/2 - 10);
    ctx.fillStyle = '#cfe9ff'; ctx.font = '18px Inter'; ctx.fillText('Score: ' + Math.floor(score), W/2 - 60, H/2 + 20);
    // save best time for time mode
    if(mode === 'time'){
      const key = currentLevel + '_' + mode;
      const t = levels[currentLevel].time - timer;
      if(!bestTimes[key] || t < bestTimes[key]){ bestTimes[key] = t; localStorage.setItem('stunt_best', JSON.stringify(bestTimes)); }
    }
  }
}

/* ---------- Parallax scenery drawing ---------- */
let tick = 0;
function drawParallax(lv){
  tick += 1;
  if(lv.bg === 'city'){
    // skyline
    for(let i=0;i<8;i++){
      const bx = (i*160 - (tick*0.3 % 160));
      const h = 60 + (i%3)*30;
      ctx.fillStyle = 'rgba(10,20,30,0.6)';
      ctx.fillRect(bx, 40, 120, h);
      ctx.fillStyle = 'rgba(255,230,120,0.06)';
      for(let y=50;y<40+h;y+=12) for(let x=bx+8;x<bx+112;x+=14) ctx.fillRect(x,y,8,8);
    }
  } else if(lv.bg === 'desert'){
    for(let i=0;i<6;i++){
      const bx = i*220 - (tick*0.4 % 220);
      const by = 140 + Math.sin((tick*0.02)+i)*8;
      ctx.fillStyle = 'rgba(80,50,20,0.35)';
      ctx.beginPath(); ctx.ellipse(bx, by, 220, 60, 0, 0, Math.PI*2); ctx.fill();
    }
  } else if(lv.bg === 'forest'){
    for(let i=0;i<12;i++){
      const bx = i*90 - (tick*0.5 % 90);
      const by = 120 + (i%3)*10;
      drawTree(bx, by, 1.0 + (i%2)*0.2);
    }
  }
}

/* ---------- Helpers ---------- */
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  ctx.fill();
}
function drawTree(x,y,scale=1){
  ctx.fillStyle = '#1f5f2f';
  ctx.beginPath();
  ctx.moveTo(x, y-40*scale);
  ctx.lineTo(x-18*scale, y+6*scale);
  ctx.lineTo(x+18*scale, y+6*scale);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#6b4b2a';
  ctx.fillRect(x-4*scale, y+6*scale, 8*scale, 12*scale);
}

/* ---------- Keyboard shortcuts ---------- */
addEventListener('keydown', e=>{
  if(e.key === 'Escape'){ menuEl.style.display = 'flex'; state='menu'; }
  if(e.key === 'r'){ initLevel(); state='playing'; menuEl.style.display='none'; }
});

/* ---------- Ensure audio resumes on first interaction ---------- */
document.addEventListener('click', ()=>{ if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }, {once:true});

/* ---------- Start with menu ---------- */
menuEl.style.display = 'flex';
startBtn.style.display = 'inline-block';
updateMenuPreview();
</script>
</body>
</html>
