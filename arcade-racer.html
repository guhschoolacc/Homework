<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>arcade racer</title>
<style>
  :root{
    --bg:#87CEEB;
    --ground:#6b4f2b;
    --panel: rgba(0,0,0,0.6);
    --accent:#ffcc00;
    --hud:#ffffff;
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Arial;}
  #gameWrap{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:linear-gradient(#87CEEB,#bfe9ff 60%);}
  header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:linear-gradient(rgba(255,255,255,0.06),rgba(255,255,255,0));backdrop-filter: blur(2px);}
  header .title{font-weight:700;color:#05386b}
  header .controls{display:flex;gap:8px;align-items:center}
  button{background:var(--panel);color:var(--hud);border:0;padding:8px 12px;border-radius:6px;cursor:pointer}
  button:hover{opacity:0.95}
  #canvasContainer{flex:1;position:relative;display:flex;align-items:center;justify-content:center}
  canvas{background:transparent;display:block;max-width:100%;height:auto}
  #hud{position:absolute;left:12px;top:12px;color:var(--hud);z-index:10}
  #hud .row{display:flex;gap:12px;align-items:center;margin-bottom:6px}
  .panel{background:var(--panel);padding:8px 10px;border-radius:8px;color:var(--hud);font-weight:600}
  #results{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;min-width:320px;max-width:90%;display:none}
  #results .card{background:linear-gradient(180deg,#fff,#f3f3f3);padding:18px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.25);text-align:center}
  #results h2{margin:0 0 8px;color:#222}
  .stars{font-size:28px;color:#ffb400;margin:8px 0}
  .small{font-size:13px;color:#444}
  footer{padding:8px 12px;background:linear-gradient(rgba(255,255,255,0),rgba(0,0,0,0.02));display:flex;justify-content:space-between;align-items:center}
  @media (max-width:700px){
    header .title{font-size:14px}
    button{padding:6px 8px}
  }
</style>
</head>
<body>
<div id="gameWrap">
  <header>
    <div class="title">Moto X3M — Stable Edition</div>
    <div class="controls">
      <div class="panel small">Level: <span id="levelName">1</span></div>
      <div class="panel small">Time: <span id="time">0.00</span>s</div>
      <button id="restartBtn">Restart (R)</button>
    </div>
  </header>

  <div id="canvasContainer">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <div id="hud">
      <div class="row">
        <div class="panel">Speed: <span id="speed">0</span> km/h</div>
        <div class="panel">Flips: <span id="flips">0</span></div>
        <div class="panel">Score: <span id="score">0</span></div>
      </div>
      <div class="row">
        <div class="panel small">Controls: W/A/S/D or Arrows — R restart</div>
      </div>
    </div>

    <div id="results">
      <div class="card">
        <h2 id="resultTitle">Level Complete</h2>
        <div class="small" id="resultTime">Time: 0.00s</div>
        <div class="stars" id="resultStars">★★★</div>
        <div style="margin-top:12px">
          <button id="nextBtn">Next Level</button>
          <button id="retryBtn">Retry</button>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div class="small">Refactor: stable physics, smooth camera, UI separated from world</div>
    <div class="small">Tip: gentle throttle and small lean inputs for best control</div>
  </footer>
</div>

<script>
/*
Refactor notes (high-level):
- Reworked physics to be stable: semi-implicit integration, chassis rigid body + two wheels with spring constraints.
- Added angular damping and clamped angular velocity to prevent wild flips.
- Smooth throttle ramping (targetThrottle -> currentThrottle) to avoid instant impulses.
- Wheel-ground collision: project wheel onto terrain segment, snap and apply friction/impulse.
- Camera uses LERP with forward offset; removed shake to avoid jitter.
- UI is DOM-based and updated separately; canvas transform reset before drawing UI elements.
- Game loop uses consistent delta time and clamps dt to avoid spikes.
- Code organized into: handleInput(), updatePhysics(), updateCamera(), renderWorld(), renderUI().
*/

// ---------- Config ----------
const CONFIG = {
  gravity: 1600,               // px/s^2
  wheelRadius: 18,
  wheelMass: 3,
  chassisMass: 10,
  suspensionRest: 60,
  suspensionK: 1800,           // spring stiffness
  suspensionDamping: 160,      // damping
  maxEngineForce: 1800,
  maxBrakeForce: 2600,
  maxSpeed: 900,               // px/s
  maxFallSpeed: 1200,
  angularDamping: 0.98,        // reduce spinning
  maxAngularVel: 6.0,          // rad/s clamp
  airControlTorque: 700,       // small torque for lean
  throttleAccel: 3.5,          // how fast throttle ramps to target
  wheelFriction: 0.9,          // tangential friction when on ground
  cameraLerp: 0.10,            // camera smoothing
  cameraForwardOffset: 420,    // px forward visibility
  dtClamp: 0.016,              // clamp dt to 60fps step (as requested)
  flipBonusTime: 0.8,
  flipScore: 150
};

// ---------- Canvas ----------
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: true });
let W = canvas.width, H = canvas.height;
function resizeCanvas(){
  const container = document.getElementById('canvasContainer');
  const rect = container.getBoundingClientRect();
  const scale = Math.min(rect.width / 1280, rect.height / 720);
  canvas.style.width = Math.round(1280 * scale) + 'px';
  canvas.style.height = Math.round(720 * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ---------- Input ----------
const input = { left:false, right:false, up:false, down:false, restart:false, boost:false };
window.addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = true;
  if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right = true;
  if(e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') input.up = true;
  if(e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') input.down = true;
  if(e.key === 'r' || e.key === 'R') input.restart = true;
  if(e.code === 'Space') input.boost = true;
});
window.addEventListener('keyup', e => {
  if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = false;
  if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right = false;
  if(e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') input.up = false;
  if(e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') input.down = false;
  if(e.key === 'r' || e.key === 'R') input.restart = false;
  if(e.code === 'Space') input.boost = false;
});

// ---------- Utility ----------
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function lerp(a,b,t){ return a + (b-a)*t; }
function now(){ return performance.now()/1000; }
function rand(min,max){ return min + Math.random()*(max-min); }

// ---------- Level data (kept simple, same as before) ----------
const LEVELS = [
  {
    name: "Beginner's Hill",
    startPos: { x: 60, y: 420 },
    finishX: 2200,
    terrain: [
      [ -200, 520 ], [0,520], [120,520], [220,480], [360,480], [520,520], [700,520],
      [820,460], [920,420], [1040,420], [1160,480], [1300,520], [1500,520],
      [1620,460], [1740,420], [1860,420], [1980,480], [2120,520], [2400,520]
    ],
    obstacles: [],
    timeThresholds: [18,28]
  },
  {
    name: "Big Air",
    startPos: { x: 60, y: 420 },
    finishX: 3000,
    terrain: [
      [-200,520],[0,520],[200,520],[360,480],[520,480],[700,520],[900,520],
      [980,520],[1040,420],[1160,420],[1280,420],[1400,520],[1520,520],[1640,480],
      [1760,420],[1880,420],[2000,520],[2200,520],[2360,420],[2480,420],[2600,520],[3200,520]
    ],
    obstacles: [],
    timeThresholds: [22,36]
  }
];

// ---------- Physics primitives ----------
class Vec {
  constructor(x=0,y=0){ this.x=x; this.y=y; }
  add(v){ return new Vec(this.x+v.x, this.y+v.y); }
  sub(v){ return new Vec(this.x-v.x, this.y-v.y); }
  mul(s){ return new Vec(this.x*s, this.y*s); }
  len(){ return Math.hypot(this.x,this.y); }
  norm(){ const l=this.len()||1; return new Vec(this.x/l,this.y/l); }
}

// ---------- Terrain helpers ----------
function pointToSegmentProjection(px,py,x1,y1,x2,y2){
  const vx = x2-x1, vy = y2-y1;
  const wx = px-x1, wy = py-y1;
  const c1 = vx*wx + vy*wy;
  const c2 = vx*vx + vy*vy;
  if(c2 === 0) return { x:x1, y:y1, t:0 };
  let t = c1 / c2;
  t = clamp(t, 0, 1);
  return { x: x1 + vx*t, y: y1 + vy*t, t };
}

// ---------- Player (chassis + two wheels) ----------
class Wheel {
  constructor(x,y,r){
    this.pos = new Vec(x,y);
    this.vel = new Vec(0,0);
    this.r = r;
    this.onGround = false;
    this.groundNormal = new Vec(0,-1);
  }
}

class Player {
  constructor(x,y){
    // chassis center
    this.pos = new Vec(x, y - 40);
    this.vel = new Vec(0,0);
    this.angle = 0; // chassis angle
    this.angularVel = 0;
    // wheels relative offsets (chassis local)
    this.rearOffset = new Vec(-60, 20);
    this.frontOffset = new Vec(60, 20);
    // wheels world
    this.rear = new Wheel(this.pos.x + this.rearOffset.x, this.pos.y + this.rearOffset.y, CONFIG.wheelRadius);
    this.front = new Wheel(this.pos.x + this.frontOffset.x, this.pos.y + this.frontOffset.y, CONFIG.wheelRadius);
    // throttle smoothing
    this.targetThrottle = 0;
    this.currentThrottle = 0;
    // state
    this.score = 0;
    this.flips = 0;
    this.airRotationAccum = 0;
    this.wasAirborne = false;
    this.crashed = false;
    this.finished = false;
  }

  // compute world position of a chassis-local point
  chassisToWorld(local){
    const c = Math.cos(this.angle), s = Math.sin(this.angle);
    return new Vec(this.pos.x + local.x*c - local.y*s, this.pos.y + local.x*s + local.y*c);
  }

  // update controls: set targetThrottle and apply small torque for lean
  handleInput(dt, input){
    // Smooth throttle ramping to avoid instant impulses
    const throttleInput = input.up ? 1 : (input.down ? -0.6 : 0);
    this.targetThrottle = throttleInput;
    // ramp currentThrottle toward target
    this.currentThrottle = lerp(this.currentThrottle, this.targetThrottle, clamp(CONFIG.throttleAccel * dt, 0, 1));

    // lean torque: small, predictable
    let torque = 0;
    if(input.left) torque -= 1;
    if(input.right) torque += 1;
    // apply torque scaled by airControlTorque; on ground torque has less effect
    const airFactor = (this.rear.onGround || this.front.onGround) ? 0.35 : 1.0;
    this.angularVel += torque * CONFIG.airControlTorque * dt * airFactor / CONFIG.chassisMass;

    // clamp angular velocity to prevent wild spinning
    this.angularVel = clamp(this.angularVel, -CONFIG.maxAngularVel, CONFIG.maxAngularVel);
  }

  // physics update: semi-implicit Euler for chassis and wheels, suspension constraints
  updatePhysics(dt, level){
    if(this.crashed || this.finished) return;

    // --- apply gravity to wheels and chassis ---
    this.rear.vel.y += CONFIG.gravity * dt;
    this.front.vel.y += CONFIG.gravity * dt;
    this.vel.y += CONFIG.gravity * dt * 0.6; // chassis slightly less affected

    // --- engine force applied to rear wheel as traction along chassis forward direction ---
    const forward = new Vec(Math.cos(this.angle), Math.sin(this.angle));
    const engineForce = this.currentThrottle * CONFIG.maxEngineForce;
    // convert to acceleration on wheel (F = m * a)
    const wheelAccel = engineForce / CONFIG.wheelMass;
    this.rear.vel.x += forward.x * wheelAccel * dt;
    this.rear.vel.y += forward.y * wheelAccel * dt;

    // braking: apply opposite force to both wheels
    if(this.targetThrottle < 0){
      const brake = CONFIG.maxBrakeForce;
      const brakeAccel = brake / CONFIG.wheelMass;
      this.rear.vel.x -= forward.x * brakeAccel * dt;
      this.rear.vel.y -= forward.y * brakeAccel * dt;
      this.front.vel.x -= forward.x * brakeAccel * 0.6 * dt;
      this.front.vel.y -= forward.y * brakeAccel * 0.6 * dt;
    }

    // --- integrate wheels (semi-implicit) ---
    this.rear.pos.x += this.rear.vel.x * dt;
    this.rear.pos.y += this.rear.vel.y * dt;
    this.front.pos.x += this.front.vel.x * dt;
    this.front.pos.y += this.front.vel.y * dt;

    // --- suspension: spring between chassis anchor and wheel ---
    const applySuspension = (wheel, localOffset) => {
      const anchor = this.chassisToWorld(localOffset);
      const dx = wheel.pos.x - anchor.x;
      const dy = wheel.pos.y - anchor.y;
      const dist = Math.hypot(dx,dy);
      const dirx = dx / (dist || 1), diry = dy / (dist || 1);
      const stretch = dist - CONFIG.suspensionRest;
      // spring force
      const fs = -CONFIG.suspensionK * stretch;
      // relative velocity along spring
      const relVel = (wheel.vel.x - this.vel.x) * dirx + (wheel.vel.y - this.vel.y) * diry;
      const fd = -CONFIG.suspensionDamping * relVel;
      const total = fs + fd;
      // apply to wheel and chassis (impulse)
      const ax = (total * dirx) / CONFIG.wheelMass;
      const ay = (total * diry) / CONFIG.wheelMass;
      wheel.vel.x += ax * dt;
      wheel.vel.y += ay * dt;
      this.vel.x -= (total * dirx) / CONFIG.chassisMass * dt;
      this.vel.y -= (total * diry) / CONFIG.chassisMass * dt;
      // small torque from suspension offset to chassis angular velocity
      const torque = (localOffset.x * (total * diry) - localOffset.y * (total * dirx)) / CONFIG.chassisMass;
      this.angularVel += torque * dt * 0.002;
    };
    applySuspension(this.rear, this.rearOffset);
    applySuspension(this.front, this.frontOffset);

    // --- terrain collision for wheels: project onto nearest segment and snap ---
    const segments = level.segments;
    const handleWheelGround = (wheel) => {
      wheel.onGround = false;
      for(let i=0;i<segments.length-1;i++){
        const a = segments[i], b = segments[i+1];
        const proj = pointToSegmentProjection(wheel.pos.x, wheel.pos.y, a[0],a[1], b[0],b[1]);
        const dx = wheel.pos.x - proj.x, dy = wheel.pos.y - proj.y;
        const dist = Math.hypot(dx,dy);
        if(dist < wheel.r + 0.001){
          // snap wheel to surface (prevent sinking)
          const nx = dx / (dist || 1), ny = dy / (dist || 1);
          const penetration = wheel.r - dist;
          wheel.pos.x += nx * penetration;
          wheel.pos.y += ny * penetration;
          // compute normal and tangent
          const normal = new Vec(nx, ny);
          const tangent = new Vec(-normal.y, normal.x);
          // decompose velocity
          const vn = wheel.vel.x * normal.x + wheel.vel.y * normal.y;
          const vt = wheel.vel.x * tangent.x + wheel.vel.y * tangent.y;
          // reflect normal velocity (small bounce) and apply friction to tangent
          const bounce = -0.05; // reduced bounce to avoid infinite bouncing
          const newVn = vn * bounce;
          const newVt = vt * CONFIG.wheelFriction;
          wheel.vel.x = tangent.x * newVt + normal.x * newVn;
          wheel.vel.y = tangent.y * newVt + normal.y * newVn;
          wheel.onGround = true;
          wheel.groundNormal = normal;
          // transfer some impulse to chassis
          this.vel.x += normal.x * (-newVn) * 0.02;
          this.vel.y += normal.y * (-newVn) * 0.02;
          // small stabilization: align chassis angle slowly to wheel line if both wheels on ground
        }
      }
    };
    handleWheelGround(this.rear);
    handleWheelGround(this.front);

    // --- chassis integration (semi-implicit) ---
    // update angular velocity with damping to prevent wild spinning
    this.angularVel *= CONFIG.angularDamping;
    this.angularVel = clamp(this.angularVel, -CONFIG.maxAngularVel, CONFIG.maxAngularVel);
    this.angle += this.angularVel * dt;

    // update chassis linear velocity from wheels average (soft)
    const avgWheelVelX = (this.rear.vel.x + this.front.vel.x) * 0.5;
    const avgWheelVelY = (this.rear.vel.y + this.front.vel.y) * 0.5;
    // blend to avoid instant changes
    this.vel.x = lerp(this.vel.x, avgWheelVelX, 0.06);
    this.vel.y = lerp(this.vel.y, avgWheelVelY, 0.06);

    // clamp speeds
    const speed = Math.hypot(this.vel.x, this.vel.y);
    if(speed > CONFIG.maxSpeed){
      const s = CONFIG.maxSpeed / speed;
      this.vel.x *= s; this.vel.y *= s;
    }
    if(this.vel.y > CONFIG.maxFallSpeed) this.vel.y = CONFIG.maxFallSpeed;

    // integrate chassis position
    this.pos.x += this.vel.x * dt;
    this.pos.y += this.vel.y * dt;

    // --- keep wheels attached to chassis via constraint (prevent drifting away) ---
    const enforceWheelConstraint = (wheel, localOffset) => {
      const desired = this.chassisToWorld(localOffset);
      const dx = desired.x - wheel.pos.x;
      const dy = desired.y - wheel.pos.y;
      // correct position partially to avoid snapping
      wheel.pos.x += dx * 0.5;
      wheel.pos.y += dy * 0.5;
      // adjust wheel velocity to match chassis movement a bit
      wheel.vel.x += (this.vel.x - wheel.vel.x) * 0.2;
      wheel.vel.y += (this.vel.y - wheel.vel.y) * 0.2;
    };
    enforceWheelConstraint(this.rear, this.rearOffset);
    enforceWheelConstraint(this.front, this.frontOffset);

    // --- flips detection: accumulate rotation while airborne ---
    const airborne = !(this.rear.onGround || this.front.onGround);
    if(airborne){
      if(!this.wasAirborne){
        this.airRotationAccum = 0;
        this.wasAirborne = true;
      }
      this.airRotationAccum += this.angularVel * dt;
    } else {
      if(this.wasAirborne){
        const rot = Math.abs(this.airRotationAccum) / (2*Math.PI);
        const fullFlips = Math.floor(rot + 0.25);
        if(fullFlips > 0){
          this.flips += fullFlips;
          this.score += fullFlips * CONFIG.flipScore;
          gameState.time = Math.max(0, gameState.time - fullFlips * CONFIG.flipBonusTime);
          // small particle feedback
          spawnParticles(this.pos.x, this.pos.y, 10, '#ffd166');
        }
      }
      this.wasAirborne = false;
    }

    // --- safety checks: if rotation too extreme or player below world, trigger crash/reset ---
    if(Math.abs(this.angle) > Math.PI * 1.2 || this.pos.y > 3000){
      this.triggerCrash();
    }
  }

  triggerCrash(){
    if(this.crashed) return;
    this.crashed = true;
    spawnParticles(this.pos.x, this.pos.y, 28, '#ff6b6b');
    // small camera nudge (no shake)
    camera.targetX = this.pos.x - CONFIG.cameraForwardOffset;
    // stop movement
    this.vel = new Vec(0,0);
    this.rear.vel = new Vec(0,0);
    this.front.vel = new Vec(0,0);
    // stop engine sound if any
    stopEngineSound();
  }
}

// ---------- Particles ----------
const particles = [];
function spawnParticles(x,y,count,color){
  for(let i=0;i<count;i++){
    particles.push({
      x:x + rand(-12,12),
      y:y + rand(-12,12),
      vx: rand(-200,200),
      vy: rand(-200,-40),
      life: rand(0.4,1.2),
      color: color || '#fff'
    });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.vy += CONFIG.gravity * dt * 0.2;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if(p.life <= 0) particles.splice(i,1);
  }
}
function drawParticles(ctx){
  for(const p of particles){
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  }
  ctx.globalAlpha = 1;
}

// ---------- Level class ----------
class Level {
  constructor(data){
    this.name = data.name;
    this.startPos = data.startPos;
    this.finishX = data.finishX;
    this.points = data.terrain;
    this.segments = data.terrain;
    this.obstacles = data.obstacles || [];
    this.timeThresholds = data.timeThresholds || [20,40];
  }
  update(dt){}
  draw(ctx){
    // distant hills
    ctx.save();
    ctx.fillStyle = '#cfe8d8';
    ctx.beginPath();
    ctx.moveTo(-1000, 520);
    for(let i=0;i<40;i++){
      const x = i*200 - camera.x*0.2;
      const y = 420 + Math.sin(i*0.6 + camera.x*0.002)*40;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(camera.x + 4000, 720);
    ctx.lineTo(-2000,720);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // terrain fill
    ctx.save();
    ctx.fillStyle = '#6b4f2b';
    ctx.beginPath();
    ctx.moveTo(this.points[0][0], this.points[0][1]);
    for(let i=1;i<this.points.length;i++){
      ctx.lineTo(this.points[i][0], this.points[i][1]);
    }
    ctx.lineTo(this.points[this.points.length-1][0], 900);
    ctx.lineTo(this.points[0][0], 900);
    ctx.closePath();
    ctx.fill();

    // terrain outline
    ctx.strokeStyle = '#3f2f1f';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(this.points[0][0], this.points[0][1]);
    for(let i=1;i<this.points.length;i++){
      ctx.lineTo(this.points[i][0], this.points[i][1]);
    }
    ctx.stroke();
    ctx.restore();

    // finish line
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.fillRect(this.finishX - 6, 360, 12, 160);
    ctx.fillStyle = '#000';
    ctx.fillRect(this.finishX - 6, 360, 12, 20);
    ctx.restore();
  }
}

// ---------- Camera ----------
const camera = {
  x: 0, y: 0,
  targetX: 0, targetY: 0,
  update(dt, player){
    // target is player.x - forwardOffset, player.y centered
    this.targetX = player.pos.x - CONFIG.cameraForwardOffset;
    this.targetY = player.pos.y - 360;
    // smooth lerp (no snapping)
    this.x = lerp(this.x, this.targetX, CONFIG.cameraLerp);
    this.y = lerp(this.y, this.targetY, CONFIG.cameraLerp);
  },
  apply(ctx){
    ctx.setTransform(1,0,0,1,0,0);
    ctx.translate(-this.x + 160, -this.y);
  }
};

// ---------- Sound (light) ----------
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audioCtx = AudioCtx ? new AudioCtx() : null;
let engineOsc = null, engineGain = null;
function startEngineSound(){
  if(!audioCtx) return;
  if(engineOsc) return;
  engineOsc = audioCtx.createOscillator();
  engineGain = audioCtx.createGain();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 60;
  engineGain.gain.value = 0.01;
  engineOsc.connect(engineGain); engineGain.connect(audioCtx.destination);
  engineOsc.start();
}
function stopEngineSound(){
  if(!engineOsc) return;
  engineOsc.stop(); engineOsc.disconnect();
  engineGain.disconnect();
  engineOsc = null; engineGain = null;
}
function setEnginePitch(p){
  if(!engineOsc) return;
  engineOsc.frequency.value = 60 + p * 160;
  engineGain.gain.value = 0.005 + p * 0.03;
}

// ---------- Game state & UI ----------
let currentLevelIndex = 0;
let level = new Level(LEVELS[currentLevelIndex]);
let player = new Player(level.startPos.x, level.startPos.y);
let lastTime = now();
let gameState = { running:true, time:0, bestTimes: JSON.parse(localStorage.getItem('moto_bestTimes') || '{}') };

const levelNameEl = document.getElementById('levelName');
const timeEl = document.getElementById('time');
const speedEl = document.getElementById('speed');
const flipsEl = document.getElementById('flips');
const scoreEl = document.getElementById('score');
const restartBtn = document.getElementById('restartBtn');
const resultsEl = document.getElementById('results');
const resultTitle = document.getElementById('resultTitle');
const resultTime = document.getElementById('resultTime');
const resultStars = document.getElementById('resultStars');
const nextBtn = document.getElementById('nextBtn');
const retryBtn = document.getElementById('retryBtn');

restartBtn.addEventListener('click', ()=> resetLevel());
nextBtn.addEventListener('click', ()=> { currentLevelIndex = Math.min(LEVELS.length-1, currentLevelIndex+1); loadLevel(currentLevelIndex); hideResults(); });
retryBtn.addEventListener('click', ()=> { loadLevel(currentLevelIndex); hideResults(); });

function loadLevel(idx){
  level = new Level(LEVELS[idx]);
  player = new Player(level.startPos.x, level.startPos.y);
  currentLevelIndex = idx;
  gameState.time = 0;
  gameState.running = true;
  lastTime = now();
  startEngineSound();
  levelNameEl.textContent = level.name;
  camera.x = player.pos.x - CONFIG.cameraForwardOffset;
  camera.y = player.pos.y - 360;
}
function resetLevel(){ loadLevel(currentLevelIndex); hideResults(); }
function showResults(){
  gameState.running = false;
  resultsEl.style.display = 'block';
  resultTitle.textContent = 'Level Complete';
  resultTime.textContent = `Time: ${gameState.time.toFixed(2)}s`;
  const thresholds = level.timeThresholds;
  let stars = 1;
  if(gameState.time <= thresholds[0]) stars = 3;
  else if(gameState.time <= thresholds[1]) stars = 2;
  resultStars.textContent = '★'.repeat(stars) + '☆'.repeat(3-stars);
  const key = 'level_' + currentLevelIndex;
  const prev = gameState.bestTimes[key];
  if(!prev || gameState.time < prev){
    gameState.bestTimes[key] = gameState.time;
    localStorage.setItem('moto_bestTimes', JSON.stringify(gameState.bestTimes));
  }
}
function hideResults(){ resultsEl.style.display = 'none'; }

// ---------- Main update functions (refactored) ----------
function handleInput(dt){
  // map input to player controls
  player.handleInput(dt, input);
  // restart
  if(input.restart){
    resetLevel();
    input.restart = false;
  }
}

function updatePhysics(dt){
  // update level (obstacles if any)
  level.update(dt);
  // update player physics
  player.updatePhysics(dt, level);
  // update particles
  updateParticles(dt);
  // engine pitch based on speed
  const speed = Math.hypot(player.vel.x, player.vel.y);
  setEnginePitch(Math.min(1, speed / 600));
  // update time
  gameState.time += dt;
  // check finish
  if(player.pos.x >= level.finishX && !player.finished){
    player.finished = true;
    stopEngineSound();
    showResults();
  }
}

function updateCamera(dt){
  camera.update(dt, player);
}

function renderWorld(){
  // clear and apply camera
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  camera.apply(ctx);

  // draw level and world
  level.draw(ctx);

  // draw wheels
  const drawWheel = (wheel) => {
    ctx.beginPath();
    ctx.fillStyle = '#222';
    ctx.arc(wheel.pos.x, wheel.pos.y, wheel.r, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 3;
    ctx.stroke();
  };
  drawWheel(player.rear);
  drawWheel(player.front);

  // draw chassis
  ctx.save();
  ctx.translate(player.pos.x, player.pos.y);
  ctx.rotate(player.angle);
  ctx.fillStyle = player.crashed ? '#aa2222' : '#ff6f00';
  ctx.beginPath();
  ctx.moveTo(-70, -10);
  ctx.quadraticCurveTo(-20, -40, 40, -20);
  ctx.quadraticCurveTo(70, -10, 60, 10);
  ctx.quadraticCurveTo(20, 30, -40, 20);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.stroke();
  // rider
  ctx.save();
  ctx.translate(0, -18);
  ctx.rotate(-0.15);
  ctx.fillStyle = '#222';
  ctx.fillRect(-8, -28, 16, 28);
  ctx.beginPath(); ctx.fillStyle = '#ffd166'; ctx.arc(0, -36, 10, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.restore();

  // particles
  drawParticles(ctx);

  // reset transform before drawing UI overlays on canvas (none here) to avoid UI jitter
  ctx.setTransform(1,0,0,1,0,0);
}

function renderUI(){
  // DOM-based HUD updates (keeps UI stable and not tied to camera)
  const speed = Math.hypot(player.vel.x, player.vel.y);
  speedEl.textContent = Math.round(speed*0.06);
  flipsEl.textContent = player.flips;
  scoreEl.textContent = player.score;
  timeEl.textContent = gameState.time.toFixed(2);
}

// ---------- Game loop (stable dt) ----------
function gameLoop(){
  const t = now();
  let deltaTime = t - lastTime;
  lastTime = t;
  // clamp delta to avoid spikes (as requested)
  const dt = Math.min(deltaTime, CONFIG.dtClamp);
  if(gameState.running){
    handleInput(dt);
    updatePhysics(dt);
    updateCamera(dt);
  }
  renderWorld();
  renderUI();
  requestAnimationFrame(gameLoop);
}

// ---------- Simple particle spawn for feedback ----------
function spawnParticles(x,y,count,color){
  for(let i=0;i<count;i++){
    particles.push({
      x:x + rand(-12,12),
      y:y + rand(-12,12),
      vx: rand(-200,200),
      vy: rand(-200,-40),
      life: rand(0.4,1.2),
      color: color || '#fff'
    });
  }
}

// ---------- Sound helpers (redeclare to ensure available) ----------
function playBeep(freq=440, time=0.08, type='sine', gain=0.12){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = gain;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + time);
  o.stop(audioCtx.currentTime + time + 0.02);
}

// ---------- Init ----------
loadLevel(0);
startEngineSound();
requestAnimationFrame(gameLoop);

// expose for debugging
window._game = { player, level, loadLevel, resetLevel };

</script>
