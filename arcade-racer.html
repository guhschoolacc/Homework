<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Arcade Racer</title>
<style>
  :root{--bg:#0b0f1a;--neon:#00f0ff;--accent:#ff3d81}
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#02030a 0%,#071026 100%);font-family:Inter,system-ui,Arial}
  #game{display:block;margin:24px auto;background:#071026;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.6)}
  .ui{width:800px;margin:0 auto;color:#cfe9ff;text-align:center}
  canvas{display:block;background:linear-gradient(180deg,#0b1220 0%,#071026 100%);border-radius:8px}
  .hud{display:flex;justify-content:space-between;padding:8px 12px;color:#9fd8ff;font-weight:600}
  button{background:var(--neon);border:none;color:#001;padding:8px 12px;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<div class="ui">
  <h2 style="color:var(--neon);margin:8px 0">Arcade Racer</h2>
  <div class="hud"><div>Score: <span id="score">0</span></div><div>Speed: <span id="spd">1</span>x</div></div>
  <canvas id="game" width="800" height="500"></canvas>
  <div style="margin:12px 0"><button id="restart">Restart</button></div>
  <p style="color:#9fb8d9">Controls: ← → or A D. Avoid cars; collect green pickups.</p>
</div>

<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let w=canvas.width,h=canvas.height,keys={},score=0,speed=3,gameOver=false;
const player={x:w/2-22,y:h-120,w:44,h:88,color:'#ff3d81'};
const enemies=[],pickups=[];

document.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
document.getElementById('restart').onclick=init;

function rnd(min,max){return Math.random()*(max-min)+min}

function spawnEnemy(){
  enemies.push({x:rnd(80,w-140),y:-120,w:48,h:96,spd:rnd(speed+1,speed+3),col:'#222'});
}
function spawnPickup(){ pickups.push({x:rnd(100,w-120),y:-60,r:12,spd:2.2}); }

function init(){
  enemies.length=0;pickups.length=0;score=0;speed=3;gameOver=false;
  player.x=w/2-22;
  for(let i=0;i<3;i++)spawnEnemy();
  requestAnimationFrame(loop);
}
function rectsCollide(a,b){return a.x<a.x+a.w && b.x<b.x+b.w && a.y<a.y+a.h && b.y<b.y+b.h} // placeholder

function drawRoad(){
  ctx.fillStyle='#071026';ctx.fillRect(0,0,w,h);
  // road
  ctx.fillStyle='#0b1220';ctx.fillRect(80,0,w-160,h);
  // side glow
  ctx.fillStyle='rgba(0,240,255,0.04)';ctx.fillRect(70,0,10,h);ctx.fillRect(w-80,0,10,h);
  // center dashed
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=6;ctx.setLineDash([30,20]);
  ctx.beginPath();ctx.moveTo(w/2,0);ctx.lineTo(w/2,h);ctx.stroke();ctx.setLineDash([]);
}

function drawCar(x,y,wid,hei,col){
  // simple stylized car
  ctx.fillStyle=col;ctx.fillRect(x,y,wid,hei);
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(x+6,y+10,wid-12,hei-20);
  ctx.fillStyle='#fff';ctx.fillRect(x+8,y+6,8,8);ctx.fillRect(x+wid-16,y+6,8,8);
}

function loop(t){
  if(gameOver){ ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,w,h);
    ctx.fillStyle= '#fff'; ctx.font='36px Inter'; ctx.fillText('Game Over - Score: '+score,w/2-180,h/2);
    return;
  }
  // update
  if(keys['arrowleft']||keys['a']) player.x-=6;
  if(keys['arrowright']||keys['d']) player.x+=6;
  player.x=Math.max(90,Math.min(w-90-player.w,player.x));
  // spawn logic
  if(Math.random()<0.02+score/20000) spawnEnemy();
  if(Math.random()<0.01) spawnPickup();
  enemies.forEach(e=>{ e.y+=e.spd+speed*0.2; if(e.y>h+200) e.y=-200,e.x=rnd(90,w-140),score+=5; });
  pickups.forEach(p=>p.y+=p.spd);
  // collisions
  enemies.forEach(e=>{ if(!(player.x+player.w<e.x||player.x>e.x+e.w||player.y+player.h<e.y||player.y>e.y+e.h)){
      gameOver=true;
    }});
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i];
    if(Math.hypot((p.x)-(player.x+player.w/2),(p.y)-(player.y+player.h/2))<40){ score+=20; pickups.splice(i,1); }
    else if(p.y>h+50) pickups.splice(i,1);
  }
  // speed ramp
  speed += 0.0008;
  document.getElementById('score').textContent=Math.floor(score);
  document.getElementById('spd').textContent=speed.toFixed(2);

  // draw
  drawRoad();
  // enemies
  enemies.forEach(e=>drawCar(e.x,e.y,e.w,e.h,'#222'));
  // pickups
  pickups.forEach(p=>{
    ctx.fillStyle='#00ff88'; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  // player
  drawCar(player.x,player.y,player.w,player.h,player.color);

  requestAnimationFrame(loop);
}

init();
</script>
</body>
</html>
