<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LocalStorage Viewer</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#0f1724;
      --muted:#9aa4b2;
      --text:#e6eef8;
      --accent:#60a5fa;
      --accent-2:#7c3aed;
      --danger:#ff6b6b;
      --row-hover:rgba(255,255,255,0.02);
      --card-shadow: 0 6px 18px rgba(2,6,23,0.6);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
    }
    html,body{height:100%}
    body{margin:0;background:linear-gradient(180deg,#071026 0%, #07101a 100%);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:28px;}
    .wrap{width:100%;max-width:1100px}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
    h1{font-size:18px;margin:0;color:var(--text)}
    /* Fixed back button in very top-left */
    .backBtn{
      position:fixed;
      top:12px;
      left:12px;
      z-index:9999;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      background:transparent;
      color:var(--text);
      border:1px solid rgba(255,255,255,0.04);
      border-radius:10px;
      text-decoration:none;
      font-size:13px;
      transition:all .12s ease;
      backdrop-filter: blur(6px);
    }
    .backBtn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(2,6,23,0.6)}
    .controls{display:flex;gap:8px;align-items:center}
    input[type="text"], textarea, select{font:inherit;background:transparent;color:var(--text)}
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:10px;padding:14px;box-shadow:var(--card-shadow);border:1px solid rgba(255,255,255,0.03)}
    .toolbar{display:flex;gap:8px;align-items:center}
    .search{padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);min-width:220px;background:transparent;color:var(--text)}
    button{background:linear-gradient(180deg,var(--accent),#3b82f6);color:#021028;border:0;padding:8px 10px;border-radius:8px;cursor:pointer;font-weight:600}
    button.ghost{background:transparent;color:var(--accent);border:1px solid rgba(96,165,250,0.12)}
    button.warn{background:linear-gradient(180deg,var(--danger),#ff4b4b);color:#0b0b0b}
    .layout{display:grid;grid-template-columns:1fr 460px;gap:14px;margin-top:12px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 8px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.02);font-size:13px;color:var(--text)}
    tr:hover{background:var(--row-hover);cursor:pointer}
    .muted{color:var(--muted);font-size:13px}
    .value-preview{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:rgba(255,255,255,0.02);padding:10px;border-radius:8px;max-height:260px;overflow:auto;color:var(--text)}
    .form-row{display:flex;gap:8px;margin-bottom:8px}
    .form-row input[type="text"]{flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--text)}
    .small{padding:6px 8px;font-size:13px;border-radius:8px}
    .actions{display:flex;gap:8px;margin-top:8px}
    .file-input{display:none}
    footer{margin-top:12px;color:var(--muted);font-size:13px}
    .count-pill{background:rgba(255,255,255,0.02);padding:6px 8px;border-radius:999px;color:var(--muted);font-size:13px}
    @media (max-width:980px){.layout{grid-template-columns:1fr}}
    /* table button style */
    table button{background:transparent;color:var(--accent);border:1px solid rgba(96,165,250,0.08);padding:6px 8px;border-radius:8px;font-weight:600}
    /* inputs and textarea */
    textarea{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--text);border-radius:8px;padding:10px}
    select{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--text);border-radius:8px;padding:8px}
    /* subtle focus */
    input:focus, textarea:focus, select:focus, button:focus, .backBtn:focus{outline:2px solid rgba(96,165,250,0.12);outline-offset:2px}
    /* ensure header has some left padding so content doesn't sit under fixed button on small screens */
    @media (max-width:520px){
      .wrap{padding-left:56px}
    }
  </style>
</head>
<body>
  <!-- Fixed back button in the very top-left corner -->


  <div class="wrap">
    <header>
      <h1>LocalStorage Viewer</h1>

      <div class="controls">
        <div class="toolbar card" style="display:flex;gap:8px;align-items:center">
          <input id="search" class="search" type="text" placeholder="Search keys..." />
          <button id="refresh" class="ghost small">Refresh</button>
          <button id="exportBtn" class="small">Export JSON</button>
          <label for="importFile" class="small ghost" style="cursor:pointer;padding:6px 8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04)">Import</label>
          <input id="importFile" class="file-input" type="file" accept="application/json" />
          <button id="clearAll" class="warn small">Clear All</button>
        </div>
      </div>
    </header>

    <div class="layout">
      <div class="card" style="padding:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <strong>Stored Keys</strong>
          <span id="count" class="count-pill">0 items</span>
        </div>

        <div style="max-height:520px;overflow:auto">
          <table id="kvTable" aria-live="polite">
            <thead>
              <tr><th style="width:48%">Key</th><th style="width:32%">Type</th><th style="width:20%">Actions</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

        <div style="margin-top:12px">
          <div class="form-row">
            <input id="newKey" type="text" placeholder="New key" />
            <input id="newValue" type="text" placeholder='New value (string or JSON)' />
            <button id="addBtn" class="small">Add</button>
          </div>
          <div class="muted">Tip: paste JSON into value and click Add to store structured data.</div>
        </div>
      </div>

      <div class="card" style="padding:12px;">
        <strong>Value Viewer / Editor</strong>
        <div style="margin-top:8px" id="viewerEmpty">
          <div class="muted">Select a key from the left to view or edit its value.</div>
        </div>

        <div id="viewer" style="display:none;margin-top:8px">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
            <div style="flex:1">
              <div class="muted">Key</div>
              <input id="editKey" type="text" style="width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04)" />
            </div>
            <div style="width:120px">
              <div class="muted">Type</div>
              <select id="valueType" style="width:100%;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04)">
                <option value="auto">Auto-detect</option>
                <option value="string">String</option>
                <option value="json">JSON</option>
              </select>
            </div>
          </div>

          <div class="muted">Value</div>
          <textarea id="editValue" rows="12" style="width:100%;padding:10px;border-radius:8px;font-family:ui-monospace,Menlo,monospace"></textarea>

          <div class="actions">
            <button id="saveBtn" class="small">Save</button>
            <button id="deleteBtn" class="small warn">Delete</button>
            <button id="copyBtn" class="small ghost">Copy</button>
            <button id="prettyBtn" class="small ghost">Pretty JSON</button>
          </div>
        </div>

        <div style="margin-top:12px">
          <div class="muted">Raw preview</div>
          <div id="rawPreview" class="value-preview">—</div>
        </div>
      </div>
    </div>

    <footer class="muted">Local changes affect this browser only. Use Export to back up data.</footer>
  </div>

  <script>
    (function(){
      const tableBody = document.getElementById('tableBody');
      const countEl = document.getElementById('count');
      const searchInput = document.getElementById('search');
      const refreshBtn = document.getElementById('refresh');
      const addBtn = document.getElementById('addBtn');
      const newKey = document.getElementById('newKey');
      const newValue = document.getElementById('newValue');
      const viewer = document.getElementById('viewer');
      const viewerEmpty = document.getElementById('viewerEmpty');
      const editKey = document.getElementById('editKey');
      const editValue = document.getElementById('editValue');
      const saveBtn = document.getElementById('saveBtn');
      const deleteBtn = document.getElementById('deleteBtn');
      const copyBtn = document.getElementById('copyBtn');
      const prettyBtn = document.getElementById('prettyBtn');
      const rawPreview = document.getElementById('rawPreview');
      const valueType = document.getElementById('valueType');
      const exportBtn = document.getElementById('exportBtn');
      const importFile = document.getElementById('importFile');
      const clearAll = document.getElementById('clearAll');

      let currentKey = null;
      function safeParseJSON(str){
        try { return JSON.parse(str); } catch(e){ return null; }
      }

      function detectType(val){
        if (val === null || val === undefined) return 'string';
        if (typeof val !== 'string') return typeof val;
        const parsed = safeParseJSON(val);
        return parsed !== null ? 'json' : 'string';
      }

      function renderTable(filter = ''){
        tableBody.innerHTML = '';
        const keys = [];
        for (let i=0;i<localStorage.length;i++){
          keys.push(localStorage.key(i));
        }
        keys.sort((a,b)=>a.localeCompare(b));
        const filtered = keys.filter(k => k.toLowerCase().includes(filter.toLowerCase()));
        countEl.textContent = filtered.length + ' items';
        if (filtered.length === 0){
          const tr = document.createElement('tr');
          tr.innerHTML = '<td colspan="3" class="muted">No keys found</td>';
          tableBody.appendChild(tr);
          return;
        }
        filtered.forEach(key=>{
          const raw = localStorage.getItem(key);
          const type = detectType(raw);
          const tr = document.createElement('tr');
          tr.innerHTML = '<td>' + escapeHtml(key) + '</td><td class="muted">' + type + '</td><td><button data-key="'+escapeAttr(key)+'" class="ghost small">Open</button></td>';
          tableBody.appendChild(tr);
        });
      }

      function escapeHtml(s){ return String(s).replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; }); }
      function escapeAttr(s){ return s.replace(/"/g,'&quot;'); }

      tableBody.addEventListener('click', (e)=>{
        const btn = e.target.closest('button');
        if (!btn) return;
        const key = btn.getAttribute('data-key');
        if (!key) return;
        openKey(key);
      });

      function openKey(key){
        currentKey = key;
        const raw = localStorage.getItem(key);
        editKey.value = key;
        editValue.value = raw === null ? '' : raw;
        valueType.value = detectType(raw) === 'json' ? 'auto' : 'auto';
        viewer.style.display = '';
        viewerEmpty.style.display = 'none';
        updateRawPreview(raw);
      }

      function updateRawPreview(raw){
        if (raw === null) rawPreview.textContent = 'null';
        else {
          const parsed = safeParseJSON(raw);
          rawPreview.textContent = parsed !== null ? JSON.stringify(parsed, null, 2) : raw;
        }
      }

      saveBtn.addEventListener('click', ()=>{
        const key = editKey.value.trim();
        if (!key){ alert('Key cannot be empty'); return; }
        let val = editValue.value;
        if (valueType.value === 'json'){
          try { JSON.parse(val); } catch(e){ alert('Invalid JSON'); return; }
        } else if (valueType.value === 'auto'){
          const parsed = safeParseJSON(val);
          if (parsed !== null) val = JSON.stringify(parsed);
        }
        if (currentKey && currentKey !== key) localStorage.removeItem(currentKey);
        localStorage.setItem(key, val);
        currentKey = key;
        renderTable(searchInput.value);
        updateRawPreview(val);
        alert('Saved.');
      });

      deleteBtn.addEventListener('click', ()=>{
        if (!currentKey) return;
        if (!confirm('Delete key "'+currentKey+'"?')) return;
        localStorage.removeItem(currentKey);
        currentKey = null;
        viewer.style.display = 'none';
        viewerEmpty.style.display = '';
        renderTable(searchInput.value);
        rawPreview.textContent = '—';
      });

      copyBtn.addEventListener('click', async ()=>{
        try {
          await navigator.clipboard.writeText(editValue.value);
          alert('Copied to clipboard.');
        } catch(e){
          alert('Copy failed. Select and copy manually.');
        }
      });

      prettyBtn.addEventListener('click', ()=>{
        const parsed = safeParseJSON(editValue.value);
        if (parsed === null){ alert('Value is not valid JSON'); return; }
        editValue.value = JSON.stringify(parsed, null, 2);
      });

      addBtn.addEventListener('click', ()=>{
        const key = newKey.value.trim();
        if (!key){ alert('Key cannot be empty'); return; }
        let val = newValue.value;
        const parsed = safeParseJSON(val);
        if (parsed !== null) val = JSON.stringify(parsed);
        localStorage.setItem(key, val);
        newKey.value = '';
        newValue.value = '';
        renderTable(searchInput.value);
        alert('Added.');
      });

      refreshBtn.addEventListener('click', ()=>renderTable(searchInput.value));
      searchInput.addEventListener('input', ()=>renderTable(searchInput.value));

      exportBtn.addEventListener('click', ()=>{
        const obj = {};
        for (let i=0;i<localStorage.length;i++){
          const k = localStorage.key(i);
          obj[k] = localStorage.getItem(k);
        }
        const blob = new Blob([JSON.stringify(obj, null, 2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'localstorage-export-' + new Date().toISOString().slice(0,19).replace(/[:T]/g,'-') + '.json';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      });

      importFile.addEventListener('change', (e)=>{
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(){
          try {
            const parsed = JSON.parse(reader.result);
            if (typeof parsed !== 'object' || parsed === null){ alert('Invalid JSON file'); return; }
            const keys = Object.keys(parsed);
            if (!confirm('Import ' + keys.length + ' keys? Click OK to merge (existing keys will be overwritten).')) return;
            keys.forEach(k => {
              localStorage.setItem(k, String(parsed[k]));
            });
            renderTable(searchInput.value);
            alert('Import complete.');
          } catch(err){
            alert('Failed to parse JSON: ' + err.message);
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      });

      clearAll.addEventListener('click', ()=>{
        if (!confirm('This will remove ALL localStorage keys for this origin. Continue?')) return;
        localStorage.clear();
        currentKey = null;
        viewer.style.display = 'none';
        viewerEmpty.style.display = '';
        renderTable('');
        rawPreview.textContent = '—';
      });

      renderTable('');

      window.addEventListener('keydown', (e)=>{
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f'){ e.preventDefault(); searchInput.focus(); }
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'n'){ e.preventDefault(); newKey.focus(); }
      });

      window._lsViewer = {
        refresh: ()=>renderTable(searchInput.value),
        open: openKey,
        getCurrentKey: ()=>currentKey
      };
    })();
  </script>
</body>
</html>
