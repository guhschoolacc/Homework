<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IP Lookup</title>
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --accent:#06b6d4;
      --muted:#94a3b8;
      --glass: rgba(255,255,255,0.03);
      --radius:12px;
      --maxw:900px;
    }
    html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;color:#e6eef6;background:linear-gradient(180deg,#071025 0%, #071a2a 100%);-webkit-font-smoothing:antialiased}
    .container{max-width:var(--maxw);margin:48px auto;padding:28px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:var(--radius);box-shadow:0 6px 30px rgba(2,6,23,0.6);position:relative}
    header{display:flex;align-items:center;gap:16px;margin-bottom:18px}
    h1{font-size:20px;margin:0;color:#fff}
    p.lead{margin:0;color:var(--muted);font-size:13px}
    /* Back button top-left */
    .back-btn{
      position:fixed;
      top:16px;
      left:16px;
      background:transparent;
      color:var(--accent);
      border:1px solid rgba(6,182,212,0.12);
      padding:10px 14px;
      border-radius:10px;
      text-decoration:none;
      font-weight:600;
      display:inline-flex;
      gap:8px;
      align-items:center;
      backdrop-filter: blur(6px);
      transition:transform .12s ease, box-shadow .12s ease;
      z-index:9999;
    }
    .back-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(6,182,212,0.08)}
    .controls{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap}
    input[type="text"]{
      background:var(--glass);
      border:1px solid rgba(255,255,255,0.03);
      color:#e6eef6;
      padding:12px 14px;border-radius:10px;flex:1;min-width:220px;
      outline:none;font-size:14px;
    }
    button.primary{
      background:linear-gradient(90deg,var(--accent),#0ea5a4);
      color:#042027;border:0;padding:12px 14px;border-radius:10px;font-weight:700;cursor:pointer;
      box-shadow:0 6px 18px rgba(6,182,212,0.12);
    }
    button.ghost{
      background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.03);padding:10px 12px;border-radius:10px;cursor:pointer;
    }
    .result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:20px}
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.02)}
    .card h3{margin:0;font-size:12px;color:var(--muted);font-weight:700}
    .card p{margin:8px 0 0;font-size:15px;color:#e6eef6;word-break:break-word}
    .map-wrap{margin-top:18px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.02)}
    iframe.map{width:100%;height:420px;border:0;display:block}
    .meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .small{font-size:12px;color:var(--muted)}
    .footer{margin-top:18px;color:var(--muted);font-size:13px}
    .actions{display:flex;gap:8px;align-items:center}
    .copy-btn{background:transparent;border:1px solid rgba(255,255,255,0.03);color:var(--muted);padding:8px 10px;border-radius:8px;cursor:pointer}
    .error{color:#ffb4b4;background:rgba(255,20,20,0.04);padding:10px;border-radius:8px;margin-top:12px;border:1px solid rgba(255,20,20,0.06)}
    @media (max-width:520px){.container{margin:20px;padding:16px}}
  </style>
</head>
<body>
 

  <main class="container" role="main" aria-labelledby="title">
    <header>
      <div>
        <h1 id="title">IP Lookup</h1>
        <p class="lead">Enter an IP address or domain, or click <strong>Lookup my IP</strong> to detect your public IP.</p>
      </div>
    </header>

    <section aria-label="controls">
      <div class="controls">
        <input id="query" type="text" placeholder="IP address or domain (e.g., 8.8.8.8 or example.com)" autocomplete="off" />
        <div style="display:flex;gap:8px">
          <button id="lookupBtn" class="primary">Lookup</button>
          <button id="myIpBtn" class="ghost">Lookup my IP</button>
        </div>
      </div>
    </section>

    <section id="output" aria-live="polite">
      <div id="error" class="error" style="display:none"></div>

      <div class="result-grid" id="infoGrid" style="display:none">
        <div class="card">
          <h3>IP</h3>
          <p id="ip">—</p>
        </div>
        <div class="card">
          <h3>Hostname / ASN</h3>
          <p id="org">—</p>
        </div>
        <div class="card">
          <h3>Location</h3>
          <p id="location">—</p>
        </div>
        <div class="card">
          <h3>Timezone</h3>
          <p id="timezone">—</p>
        </div>
        <div class="card">
          <h3>ISP</h3>
          <p id="isp">—</p>
        </div>
        <div class="card">
          <h3>Coordinates</h3>
          <p id="coords">—</p>
        </div>
      </div>

      <div id="mapSection" style="display:none">
        <div class="map-wrap" id="mapWrap">
          <iframe id="mapFrame" class="map" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <div class="meta">
          <div class="small">Open in map:</div>
          <div class="actions">
            <a id="openOsm" class="copy-btn" target="_blank" rel="noopener">Open OpenStreetMap</a>
            <button id="copyBtn" class="copy-btn">Copy IP</button>
          </div>
        </div>
      </div>

      <div class="footer">
        <div><strong>Note:</strong> This page uses public geolocation services to resolve IP addresses. Results are approximate.</div>
      </div>
    </section>
  </main>

  <script>
    // Helper: show error
    const showError = (msg) => {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('infoGrid').style.display = 'none';
      document.getElementById('mapSection').style.display = 'none';
    };

    const clearError = () => {
      const el = document.getElementById('error');
      el.style.display = 'none';
      el.textContent = '';
    };

    // Resolve domain to IP using Google's DNS-over-HTTPS (no API key)
    async function resolveDomainToIp(domain){
      try{
        const url = 'https://dns.google/resolve?name=' + encodeURIComponent(domain) + '&type=A';
        const res = await fetch(url);
        if(!res.ok) throw new Error('DNS lookup failed');
        const data = await res.json();
        if(data && data.Answer && data.Answer.length){
          // pick first A record
          const a = data.Answer.find(a=>a.type===1) || data.Answer[0];
          return a.data;
        }
        throw new Error('No A record found for domain');
      }catch(e){
        throw new Error('Domain resolution error: ' + e.message);
      }
    }

    // Fetch geolocation for an IP using ipapi.co (no key required for basic usage)
    async function fetchGeoForIp(ip){
      // ipapi supports both IP and "json" for caller IP
      const url = ip ? `https://ipapi.co/${encodeURIComponent(ip)}/json/` : 'https://ipapi.co/json/';
      const res = await fetch(url);
      if(!res.ok) throw new Error('Geolocation service error');
      const data = await res.json();
      if(data.error) throw new Error(data.reason || 'Geolocation lookup failed');
      return data;
    }

    // Build OpenStreetMap embed URL centered on lat/lon
    function buildOsmEmbed(lat, lon, zoom=10){
      // OpenStreetMap embed URL with marker
      // We'll use the simple map page with mlat/mlon params for compatibility
      return `https://www.openstreetmap.org/?mlat=${encodeURIComponent(lat)}&mlon=${encodeURIComponent(lon)}&zoom=${encodeURIComponent(zoom)}`;
    }

    // Update UI with geolocation data
    function updateUI(data){
      clearError();
      document.getElementById('infoGrid').style.display = 'grid';
      document.getElementById('ip').textContent = data.ip || data.ip_address || '—';
      document.getElementById('org').textContent = data.org || data.asn || (data.network && data.network.name) || '—';
      const city = data.city || data.region || '';
      const region = data.region || data.region_name || '';
      const country = data.country_name || data.country || '';
      const postal = data.postal || data.postal_code || '';
      const locText = [city, region, postal, country].filter(Boolean).join(', ');
      document.getElementById('location').textContent = locText || '—';
      document.getElementById('timezone').textContent = data.timezone || data.utc_offset || '—';
      document.getElementById('isp').textContent = data.org || data.isp || '—';
      const lat = data.latitude || data.lat || data.latitude || data.latitude;
      const lon = data.longitude || data.lon || data.longitude || data.longitude;
      const coordsText = (lat && lon) ? `${lat}, ${lon}` : '—';
      document.getElementById('coords').textContent = coordsText;

      if(lat && lon){
        document.getElementById('mapSection').style.display = 'block';
        const embedUrl = buildOsmEmbed(lat, lon, 10);
        // Use the map page in an iframe (works cross-origin)
        document.getElementById('mapFrame').src = embedUrl;
        document.getElementById('openOsm').href = embedUrl;
      } else {
        document.getElementById('mapSection').style.display = 'none';
      }
    }

    // Main lookup flow
    async function lookup(query){
      clearError();
      document.getElementById('infoGrid').style.display = 'none';
      document.getElementById('mapSection').style.display = 'none';

      try{
        let ip = query && query.trim();
        if(!ip){
          // lookup caller IP
          const geo = await fetchGeoForIp('');
          updateUI(geo);
          return;
        }

        // If looks like domain (contains letters and dots but not only digits and dots), resolve
        const ipPattern = /^(\d{1,3}\.){3}\d{1,3}$/; // simple IPv4 check
        const ipv6Pattern = /^[0-9a-fA-F:]+$/;
        if(!ipPattern.test(ip) && !ipv6Pattern.test(ip)){
          // treat as domain
          try{
            ip = await resolveDomainToIp(ip);
          }catch(e){
            // If domain resolution fails, still try to pass the original string to geolocation service (some services accept hostnames)
            // but prefer to show a helpful error
            throw new Error('Could not resolve domain to IP: ' + e.message);
          }
        }

        const geo = await fetchGeoForIp(ip);
        updateUI(geo);
      }catch(err){
        showError(err.message || 'Lookup failed');
      }
    }

    // Event wiring
    document.getElementById('lookupBtn').addEventListener('click', ()=> {
      const q = document.getElementById('query').value;
      lookup(q);
    });

    document.getElementById('myIpBtn').addEventListener('click', ()=> {
      document.getElementById('query').value = '';
      lookup('');
    });

    document.getElementById('query').addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') document.getElementById('lookupBtn').click();
    });

    document.getElementById('copyBtn').addEventListener('click', async ()=>{
      const ip = document.getElementById('ip').textContent;
      if(!ip || ip === '—') return;
      try{
        await navigator.clipboard.writeText(ip);
        const old = document.getElementById('copyBtn').textContent;
        document.getElementById('copyBtn').textContent = 'Copied!';
        setTimeout(()=> document.getElementById('copyBtn').textContent = old, 1400);
      }catch(e){
        alert('Copy failed: ' + e.message);
      }
    });

    // On load: auto lookup caller IP
    window.addEventListener('load', ()=> {
      lookup('');
    });
  </script>
</body>
</html>
