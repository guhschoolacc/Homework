<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QR Code Generator</title>
  <style>
    :root{
      --bg:#071023;
      --card:#0b1220;
      --accent:#60a5fa;
      --accent-strong:#3b82f6;
      --muted:#9aa6b2;
      --text:#e6f0fb;
      --input-bg:#0f1724;
      --input-border:#1f2937;
      --btn-bg:#0b1220;
      --btn-fg:#e6f0fb;
      --glass: rgba(255,255,255,0.02);
      --shadow: 0 8px 30px rgba(2,6,23,0.6);
    }
    html,body{height:100%}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      background:linear-gradient(180deg,var(--bg) 0%, #04101b 100%);
      margin:0;
      padding:36px;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      min-height:100vh;
      box-sizing:border-box;
      color:var(--text);
    }

    /* Back button fixed top-left */
    .back-btn{
      position:fixed;
      top:16px;
      left:16px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      color:var(--text);
      text-decoration:none;
      border-radius:10px;
      box-shadow:0 6px 18px rgba(2,6,23,0.6);
      font-weight:700;
      font-size:14px;
      z-index:1000;
      border:1px solid rgba(255,255,255,0.03);
    }
    .back-btn:focus{outline:3px solid rgba(96,165,250,0.18); outline-offset:2px}

    .card{
      background:linear-gradient(180deg,var(--card), #07101a);
      border-radius:14px;
      box-shadow:var(--shadow);
      padding:22px;
      width:100%;
      max-width:820px;
      border:1px solid rgba(255,255,255,0.03);
    }
    h1{margin:0 0 8px 0;font-size:20px;color:var(--text)}
    p.lead{margin:0 0 18px 0;color:var(--muted)}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
    input[type="text"], select{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--input-border);
      background:var(--input-bg);
      color:var(--text);
      font-size:15px;
      box-sizing:border-box;
      outline:none;
    }
    input[type="text"]::placeholder{color:rgba(230,240,251,0.35)}
    .controls{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
    button{
      background:linear-gradient(180deg,var(--accent),var(--accent-strong));
      color:var(--btn-fg);
      border:0;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
      box-shadow:0 6px 18px rgba(59,130,246,0.12);
      transition:transform .08s ease, box-shadow .12s ease;
    }
    button:active{transform:translateY(1px)}
    button.secondary{
      background:transparent;
      color:var(--text);
      font-weight:700;
      border:1px solid rgba(255,255,255,0.06);
      padding:9px 12px;
      box-shadow:none;
    }
    button[disabled]{
      opacity:0.45;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }
    .preview{
      display:flex;
      gap:18px;
      align-items:center;
      margin-top:18px;
      flex-wrap:wrap;
    }
    .qr-wrap{
      width:220px;
      height:220px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.03);
      box-shadow:0 6px 20px rgba(2,6,23,0.6);
    }
    .meta{flex:1;min-width:220px}
    small{color:var(--muted)}
    .options{display:flex;gap:8px;align-items:center;margin-top:8px}
    .footer{margin-top:18px;color:var(--muted);font-size:13px}
    @media (max-width:520px){
      body{padding:16px}
      .back-btn{top:12px;left:12px;padding:6px 10px;font-size:13px}
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn" aria-label="Back to Dashboard">← Back to Dashboard</a>

  <div class="card" role="main">
    <h1>QR Code Generator</h1>
    <p class="lead">Generate QR codes for links or any text. Download as PNG or copy the image data.</p>

    <div class="row" style="margin-bottom:12px">
      <div style="flex:1;min-width:220px">
        <label for="text">Text or URL</label>
        <input id="text" type="text" placeholder="https://example.com or any text" value="https://example.com" />
      </div>

      <div style="width:160px">
        <label for="size">Size</label>
        <select id="size">
          <option value="128">128 × 128</option>
          <option value="200" selected>200 × 200</option>
          <option value="300">300 × 300</option>
          <option value="400">400 × 400</option>
        </select>
      </div>

      <div style="width:160px">
        <label for="ec">Error Correction</label>
        <select id="ec">
          <option value="L">L (Low)</option>
          <option value="M" selected>M (Medium)</option>
          <option value="Q">Q (Quartile)</option>
          <option value="H">H (High)</option>
        </select>
      </div>
    </div>

    <div class="controls">
      <button id="generate">Generate QR</button>
      <button id="download" class="secondary" disabled>Download PNG</button>
      <button id="copy" class="secondary" disabled>Copy Image</button>
      <button id="clear" class="secondary">Clear</button>
    </div>

    <div class="preview" aria-live="polite">
      <div class="qr-wrap" id="qrcode"></div>
      <div class="meta">
        <div><strong>Preview</strong></div>
        <div style="margin-top:8px"><small id="previewText">No QR generated yet</small></div>
        <div class="footer">Tip: Use high error correction if you plan to overlay a logo.</div>
      </div>
    </div>
  </div>

  <!-- qrcodejs library -->
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

  <script>
    // Elements
    const input = document.getElementById('text');
    const sizeSelect = document.getElementById('size');
    const ecSelect = document.getElementById('ec');
    const generateBtn = document.getElementById('generate');
    const downloadBtn = document.getElementById('download');
    const copyBtn = document.getElementById('copy');
    const clearBtn = document.getElementById('clear');
    const qrcodeContainer = document.getElementById('qrcode');
    const previewText = document.getElementById('previewText');

    let qr; // QRCode instance

    function makeQRCode(text, size, ecLevel) {
      qrcodeContainer.innerHTML = '';
      const options = {
        text: text,
        width: size,
        height: size,
        colorDark: "#e6f0fb",
        colorLight: "#071023",
        correctLevel: QRCode.CorrectLevel[ecLevel]
      };
      qr = new QRCode(qrcodeContainer, options);
    }

    function getCanvasFromQRCode() {
      const canvas = qrcodeContainer.querySelector('canvas');
      if (canvas) return canvas;
      const img = qrcodeContainer.querySelector('img');
      if (img) {
        const c = document.createElement('canvas');
        c.width = img.naturalWidth || img.width;
        c.height = img.naturalHeight || img.height;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#071023';
        ctx.fillRect(0,0,c.width,c.height);
        ctx.drawImage(img,0,0);
        return c;
      }
      return null;
    }

    function enableButtons(enabled) {
      downloadBtn.disabled = !enabled;
      copyBtn.disabled = !enabled;
    }

    generateBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) {
        previewText.textContent = 'Please enter text or a URL.';
        enableButtons(false);
        return;
      }
      const size = parseInt(sizeSelect.value, 10);
      const ec = ecSelect.value;
      makeQRCode(text, size, ec);
      previewText.textContent = text;
      enableButtons(true);
    });

    downloadBtn.addEventListener('click', () => {
      const canvas = getCanvasFromQRCode();
      if (!canvas) return;
      const dataUrl = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = 'qrcode.png';
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    copyBtn.addEventListener('click', async () => {
      const canvas = getCanvasFromQRCode();
      if (!canvas) return;
      try {
        canvas.toBlob(async (blob) => {
          if (!blob) return;
          try {
            await navigator.clipboard.write([
              new ClipboardItem({ 'image/png': blob })
            ]);
            copyBtn.textContent = 'Copied';
            setTimeout(()=> copyBtn.textContent = 'Copy Image', 1500);
          } catch (err) {
            const dataUrl = canvas.toDataURL('image/png');
            await navigator.clipboard.writeText(dataUrl);
            copyBtn.textContent = 'Copied URL';
            setTimeout(()=> copyBtn.textContent = 'Copy Image', 1500);
          }
        });
      } catch (e) {
        const dataUrl = canvas.toDataURL('image/png');
        await navigator.clipboard.writeText(dataUrl);
        copyBtn.textContent = 'Copied URL';
        setTimeout(()=> copyBtn.textContent = 'Copy Image', 1500);
      }
    });

    clearBtn.addEventListener('click', () => {
      qrcodeContainer.innerHTML = '';
      previewText.textContent = 'No QR generated yet';
      enableButtons(false);
    });

    // Generate initial QR on load
    window.addEventListener('load', () => {
      generateBtn.click();
    });
  </script>
</body>
</html>
