<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Snake Ripoff</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1724;
      --accent:#22c55e;
      --muted:#94a3b8;
      --danger:#ef4444;
    }
    html,body{
      height:100%;
      margin:0;
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:linear-gradient(180deg,#071021 0%, #071827 100%);
      color:#e6eef8;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* Back button top-left */
    .back-btn{
      position:fixed;
      top:12px;
      left:12px;
      z-index:50;
      background:rgba(255,255,255,0.06);
      color:#e6eef8;
      border:1px solid rgba(255,255,255,0.06);
      padding:8px 12px;
      border-radius:8px;
      text-decoration:none;
      display:inline-flex;
      gap:8px;
      align-items:center;
      font-weight:600;
      box-shadow:0 4px 14px rgba(2,6,23,0.6);
      transition:transform .12s ease, background .12s ease;
    }
    .back-btn:hover{ transform:translateY(-2px); background:rgba(255,255,255,0.08); }

    /* Layout */
    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:48px 20px;
      box-sizing:border-box;
    }
    .card{
      width:760px;
      max-width:96vw;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:14px;
      padding:20px;
      box-shadow:0 10px 40px rgba(2,6,23,0.6);
      display:flex;
      gap:18px;
      align-items:flex-start;
    }

    /* Canvas area */
    .game-area{
      background:linear-gradient(180deg,#071827,#071021);
      border-radius:10px;
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    canvas{
      background:linear-gradient(180deg,#06121a,#071827);
      border-radius:8px;
      display:block;
      image-rendering:pixelated;
      box-shadow:0 8px 30px rgba(2,6,23,0.6);
    }

    /* Sidebar */
    .sidebar{
      width:220px;
      min-width:180px;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .title{
      font-size:18px;
      color:#e6eef8;
      font-weight:700;
    }
    .score{
      font-size:28px;
      color:var(--accent);
      font-weight:800;
    }
    .meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
    }
    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .btn{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.03);
      color:#e6eef8;
      padding:8px 10px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
    }
    .btn.warn{ background:linear-gradient(90deg,#7f1d1d,#ef4444); color:white; border:none; }
    .footer{
      margin-top:auto;
      font-size:12px;
      color:var(--muted);
    }

    @media (max-width:720px){
      .card{ flex-direction:column; align-items:center; }
      .sidebar{ width:100%; flex-direction:row; justify-content:space-between; gap:6px; }
    }
  </style>
</head>
<body>
  <a class="back-btn" href="index.html" title="Back to dashboard">⬅ Back to Dashboard</a>

  <div class="wrap">
    <div class="card" role="application" aria-label="Snake game">
      <div class="game-area" id="game-area">
        <canvas id="game" width="480" height="480" aria-label="Snake game canvas"></canvas>
      </div>

      <div class="sidebar" aria-hidden="false">
        <div>
          <div class="title">Snake Ripoff</div>
          <div class="meta">Use <strong>arrow keys</strong> or <strong>WASD</strong> to move. Eat food to grow. Don't hit walls or yourself.</div>
        </div>

        <div>
          <div style="margin-top:12px">Score</div>
          <div class="score" id="score">0</div>
        </div>

        <div>
          <div style="margin-top:8px">Speed</div>
          <div class="meta" id="speedLabel">Normal</div>
        </div>

        <div style="margin-top:8px">
          <div class="controls">
            <button class="btn" id="startBtn">Start</button>
            <button class="btn" id="pauseBtn">Pause</button>
            <button class="btn" id="restartBtn">Restart</button>
            <button class="btn" id="speedBtn">Faster</button>
          </div>
        </div>

        <div class="footer">Tip: Press <strong>Space</strong> to pause/resume.</div>
      </div>
    </div>
  </div>

  <script>
    // Basic snake game implementation
    (function(){
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const speedLabel = document.getElementById('speedLabel');
      const startBtn = document.getElementById('startBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const restartBtn = document.getElementById('restartBtn');
      const speedBtn = document.getElementById('speedBtn');

      const TILE = 16; // size of one tile in pixels
      const COLS = canvas.width / TILE;
      const ROWS = canvas.height / TILE;

      let snake, dir, food, running, score, tickInterval, speedIndex;
      const speeds = [140, 110, 85, 60, 40]; // ms per tick
      const speedNames = ['Slow','Normal','Fast','Very Fast','Insane'];

      function reset(){
        snake = [
          {x: Math.floor(COLS/2), y: Math.floor(ROWS/2)},
          {x: Math.floor(COLS/2)-1, y: Math.floor(ROWS/2)},
          {x: Math.floor(COLS/2)-2, y: Math.floor(ROWS/2)}
        ];
        dir = {x:1, y:0};
        placeFood();
        running = false;
        score = 0;
        speedIndex = 1;
        updateScore();
        updateSpeedLabel();
        clearInterval(tickInterval);
      }

      function placeFood(){
        let valid = false;
        while(!valid){
          food = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
          valid = !snake.some(s => s.x === food.x && s.y === food.y);
        }
      }

      function updateScore(){
        scoreEl.textContent = score;
      }
      function updateSpeedLabel(){
        speedLabel.textContent = speedNames[speedIndex];
      }

      function draw(){
        // background
        ctx.fillStyle = '#06121a';
        ctx.fillRect(0,0,canvas.width,canvas.height);

        // grid subtle
        ctx.strokeStyle = 'rgba(255,255,255,0.02)';
        ctx.lineWidth = 1;
        for(let i=0;i<=COLS;i++){
          ctx.beginPath();
          ctx.moveTo(i*TILE,0);
          ctx.lineTo(i*TILE,canvas.height);
          ctx.stroke();
        }
        for(let j=0;j<=ROWS;j++){
          ctx.beginPath();
          ctx.moveTo(0,j*TILE);
          ctx.lineTo(canvas.width,j*TILE);
          ctx.stroke();
        }

        // food
        ctx.fillStyle = '#ffb86b';
        roundRect(ctx, food.x*TILE+2, food.y*TILE+2, TILE-4, TILE-4, 4, true, false);

        // snake
        for(let i=0;i<snake.length;i++){
          const s = snake[i];
          if(i===0){
            // head
            ctx.fillStyle = '#22c55e';
            roundRect(ctx, s.x*TILE+1, s.y*TILE+1, TILE-2, TILE-2, 4, true, false);
          } else {
            // body gradient
            const t = 1 - (i / snake.length) * 0.6;
            ctx.fillStyle = `rgba(${34},${197},${94},${t})`;
            roundRect(ctx, s.x*TILE+2, s.y*TILE+2, TILE-4, TILE-4, 3, true, false);
          }
        }
      }

      function roundRect(ctx, x, y, w, h, r, fill, stroke) {
        if (typeof r === 'undefined') r = 5;
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
      }

      function step(){
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        // wall collision
        if(head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS){
          gameOver();
          return;
        }

        // self collision
        if(snake.some(s => s.x === head.x && s.y === head.y)){
          gameOver();
          return;
        }

        snake.unshift(head);

        // eat food
        if(head.x === food.x && head.y === food.y){
          score += 10;
          placeFood();
          updateScore();
        } else {
          snake.pop();
        }

        draw();
      }

      function gameOver(){
        running = false;
        clearInterval(tickInterval);
        // flash red head
        const old = ctx.fillStyle;
        ctx.fillStyle = '#ef4444';
        const h = snake[0];
        roundRect(ctx, h.x*TILE+1, h.y*TILE+1, TILE-2, TILE-2, 4, true, false);
        ctx.fillStyle = old;
        // show overlay text
        setTimeout(()=> {
          ctx.fillStyle = 'rgba(2,6,23,0.7)';
          ctx.fillRect(0, canvas.height/2 - 36, canvas.width, 72);
          ctx.fillStyle = '#fff';
          ctx.font = '20px Inter, Arial';
          ctx.textAlign = 'center';
          ctx.fillText('Game Over — Press Restart', canvas.width/2, canvas.height/2 + 6);
        }, 80);
      }

      function start(){
        if(running) return;
        running = true;
        clearInterval(tickInterval);
        tickInterval = setInterval(step, speeds[speedIndex]);
      }

      function pause(){
        running = !running;
        if(running){
          start();
        } else {
          clearInterval(tickInterval);
        }
      }

      // input handling
      let lastKeyTime = 0;
      window.addEventListener('keydown', (e) => {
        const now = Date.now();
        // prevent too-rapid direction flips
        if(now - lastKeyTime < 40) return;
        lastKeyTime = now;

        const key = e.key.toLowerCase();
        if(key === 'arrowup' || key === 'w'){
          if(dir.y === 1) return;
          dir = {x:0,y:-1};
        } else if(key === 'arrowdown' || key === 's'){
          if(dir.y === -1) return;
          dir = {x:0,y:1};
        } else if(key === 'arrowleft' || key === 'a'){
          if(dir.x === 1) return;
          dir = {x:-1,y:0};
        } else if(key === 'arrowright' || key === 'd'){
          if(dir.x === -1) return;
          dir = {x:1,y:0};
        } else if(key === ' '){
          // space toggles pause
          e.preventDefault();
          pause();
        }
      });

      // buttons
      startBtn.addEventListener('click', ()=> start());
      pauseBtn.addEventListener('click', ()=> pause());
      restartBtn.addEventListener('click', ()=> {
        reset();
        draw();
      });
      speedBtn.addEventListener('click', ()=> {
        speedIndex = (speedIndex + 1) % speeds.length;
        updateSpeedLabel();
        if(running){
          clearInterval(tickInterval);
          tickInterval = setInterval(step, speeds[speedIndex]);
        }
      });

      // initialize
      reset();
      draw();

      // friendly mobile touch controls (simple)
      let touchStart = null;
      canvas.addEventListener('touchstart', (e) => {
        if(e.touches.length !== 1) return;
        const t = e.touches[0];
        touchStart = {x: t.clientX, y: t.clientY};
      }, {passive:true});
      canvas.addEventListener('touchend', (e) => {
        if(!touchStart) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - touchStart.x;
        const dy = t.clientY - touchStart.y;
        if(Math.abs(dx) > Math.abs(dy)){
          if(dx > 10 && dir.x !== -1) dir = {x:1,y:0};
          else if(dx < -10 && dir.x !== 1) dir = {x:-1,y:0};
        } else {
          if(dy > 10 && dir.y !== -1) dir = {x:0,y:1};
          else if(dy < -10 && dir.y !== 1) dir = {x:0,y:-1};
        }
        touchStart = null;
      }, {passive:true});

      // small accessibility: focus canvas to capture keys
      canvas.tabIndex = 0;
      canvas.style.outline = 'none';
      canvas.addEventListener('click', ()=> canvas.focus());

      // draw initial frame
      draw();
    })();
  </script>
</body>
</html>
