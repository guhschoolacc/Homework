<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Casino — Slots</title>
  <style>
    :root{
      --bg:#05060a;
      --panel:#0f1115;
      --card:#0f1317;
      --accent:#ffd166;
      --accent-2:#ff7a59;
      --muted:#9aa0a6;
      --glass: rgba(255,255,255,0.03);
      --reel-bg: linear-gradient(180deg,#0b0f12,#071018);
      --win-glow: rgba(46,230,167,0.12);
      --symbol-size: 96px;
    }

    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#eaf2f7;background:
      radial-gradient(800px 400px at 10% 10%, rgba(124,92,255,0.03), transparent 8%),
      linear-gradient(180deg,var(--bg) 0%, #07070a 100%);-webkit-font-smoothing:antialiased;}

    /* Back button */
    .back-btn{
      position:fixed;
      top:14px;
      left:14px;
      z-index:1000;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02));
      color:var(--accent);
      text-decoration:none;
      border-radius:10px;
      box-shadow:0 8px 30px rgba(0,0,0,0.6);
      border:1px solid rgba(255,255,255,0.03);
      font-weight:700;
    }

    main{max-width:1100px;margin:84px auto;padding:28px;display:flex;flex-direction:column;gap:18px}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px}
    h1{margin:0;color:var(--accent);font-size:30px}
    .sub{color:var(--muted);font-size:13px;margin:0}

    .panel{
      background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(0,0,0,0.02));
      border-radius:14px;
      padding:20px;
      box-shadow:0 18px 40px rgba(2,6,8,0.6);
      border:1px solid rgba(255,255,255,0.03);
      display:flex;
      gap:20px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    /* Realistic slot machine shell */
    .machine-shell{
      display:flex;
      gap:18px;
      align-items:center;
      background:linear-gradient(180deg,#0b0f12,#071018);
      padding:22px;
      border-radius:14px;
      box-shadow:0 20px 60px rgba(0,0,0,0.6), inset 0 2px 0 rgba(255,255,255,0.02);
      border:1px solid rgba(255,255,255,0.03);
    }

    /* Reels container */
    .reels{
      display:flex;
      gap:12px;
      align-items:center;
      padding:8px;
      background:linear-gradient(180deg,#071018,#05060a);
      border-radius:10px;
      box-shadow:0 8px 24px rgba(0,0,0,0.6);
    }

    /* Single reel */
    .reel-viewport{
      width: var(--symbol-size);
      height: calc(var(--symbol-size) * 1.2);
      overflow:hidden;
      border-radius:10px;
      background:var(--reel-bg);
      border:2px solid rgba(255,255,255,0.03);
      position:relative;
      box-shadow:0 8px 20px rgba(0,0,0,0.6), inset 0 6px 18px rgba(0,0,0,0.6);
    }

    .reel-strip{
      display:block;
      will-change:transform;
      transform: translateY(0);
    }

    .symbol{
      width:100%;
      height:var(--symbol-size);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:48px;
      user-select:none;
      -webkit-user-select:none;
      color:#fff;
      text-shadow:0 4px 10px rgba(0,0,0,0.6);
    }

    /* Center payline */
    .payline{
      position:absolute;
      left:0;
      right:0;
      top:50%;
      transform:translateY(-50%);
      height:calc(var(--symbol-size) * 0.12);
      pointer-events:none;
      background:linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-top:1px solid rgba(255,255,255,0.02);
      border-bottom:1px solid rgba(255,255,255,0.02);
    }

    /* Controls column */
    .controls{
      display:flex;
      flex-direction:column;
      gap:12px;
      min-width:300px;
    }

    .controls-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    .btn{
      padding:12px 16px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      font-weight:800;
      color:#071018;
      background:linear-gradient(90deg,var(--accent-2),var(--accent));
      box-shadow:0 10px 30px rgba(124,92,255,0.06);
    }
    .btn.secondary{
      background:transparent;
      color:var(--muted);
      border:1px solid rgba(255,255,255,0.04);
      font-weight:700;
    }

    .stat{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:120px;
    }
    .stat .label{font-size:12px;color:var(--muted)}
    .stat .value{font-weight:800;color:#fff}

    /* Bet controls */
    .bet-controls{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .bet-input{
      width:110px;
      padding:10px 12px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.04);
      background:transparent;
      color:#fff;
      font-weight:700;
      text-align:center;
    }
    .small-btn{
      padding:8px 10px;
      border-radius:8px;
      border:none;
      background:rgba(255,255,255,0.03);
      color:var(--muted);
      cursor:pointer;
      font-weight:700;
    }

    .message{
      min-height:28px;
      font-weight:800;
      color:var(--muted);
    }
    .message.win{color:var(--win-glow); text-shadow:0 6px 18px rgba(46,230,167,0.08)}
    .message.lose{color:#ff6b6b}

    /* Reel highlight on win */
    .reel-viewport.win{box-shadow:0 12px 36px rgba(46,230,167,0.12), 0 0 18px rgba(46,230,167,0.06) inset;}

    /* Responsive */
    @media (max-width:920px){
      main{padding:18px;margin-top:72px}
      .controls{min-width:220px}
      :root{--symbol-size:72px}
    }
    @media (max-width:520px){
      .panel{padding:14px}
      .machine-shell{flex-direction:column;align-items:center}
      .controls{width:100%}
      :root{--symbol-size:64px}
    }
  </style>
</head>
<body>
  <a class="back-btn" href="hub.html" aria-label="Back to Hub">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back to Hub
  </a>

  <main>
    <header>
      <div>
        <h1>Slots</h1>
      </div>

      <div class="stat" aria-hidden="true">
        <div class="label">House Edge</div>
        <div class="value">~5%</div>
      </div>
    </header>

    <section class="panel" aria-labelledby="slots-heading">
      <div class="machine-shell" role="application" aria-label="Slot machine">
        <div class="reels" id="reels">
          <!-- Reels will be injected here -->
        </div>
      </div>

      <div class="controls" aria-hidden="false">
        <div class="controls-row">
          <button class="btn" id="spinBtn" aria-label="Spin">SPIN</button>
          <button class="btn secondary" id="autoBtn" aria-label="Auto play">AUTO</button>
          <button class="btn secondary" id="maxBtn" aria-label="Max bet">MAX</button>
        </div>

        <div class="controls-row">
          <div class="stat">
            <div class="label">Credits</div>
            <div class="value" id="credits">1000</div>
          </div>

          <div class="stat">
            <div class="label">Bet</div>
            <div class="value" id="betDisplay">10</div>
          </div>

          <div class="stat">
            <div class="label">Last Win</div>
            <div class="value" id="lastWin">0</div>
          </div>
        </div>

        <div class="controls-row">
          <div class="bet-controls" role="group" aria-label="Bet controls">
            <button class="small-btn" id="decBet" aria-label="Decrease bet">−</button>
            <input id="betInput" class="bet-input" type="number" min="1" step="1" value="10" aria-label="Bet amount" />
            <button class="small-btn" id="incBet" aria-label="Increase bet">+</button>
            <button class="small-btn" id="setCustom" aria-label="Set custom bet">Set</button>
          </div>
        </div>

        <div class="message" id="message" aria-live="polite"></div>
      </div>
    </section>

    <div style="text-align:center;color:var(--muted);font-size:12px">Realistic reel physics, adjustable bet, and accessible controls. Demo only.</div>
  </main>

  <script>
    /***********************
     * Slot machine engine
     ***********************/

    // Symbols and weights (more realistic distribution)
    const symbolPool = [
      {s:"🍒", weight:18, payout:3},
      {s:"🍋", weight:16, payout:4},
      {s:"🔔", weight:12, payout:8},
      {s:"⭐", weight:9, payout:12},
      {s:"💎", weight:4, payout:25},
      {s:"7️⃣", weight:1, payout:100}
    ];

    // Build a weighted array for each reel (can vary per reel for realism)
    function buildReelStrip(multiplier = 3){
      const base = [];
      symbolPool.forEach(sym => {
        for (let i=0;i<sym.weight;i++) base.push(sym.s);
      });
      // Shuffle base for variety
      for (let i = base.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [base[i], base[j]] = [base[j], base[i]];
      }
      // Repeat the strip to allow long spins and smooth stops
      const strip = [];
      for (let m=0;m<multiplier;m++) strip.push(...base);
      return strip;
    }

    // State
    let credits = 1000;
    let bet = 10;
    let lastWin = 0;
    let auto = false;
    let spinning = false;

    // Reels config
    const REEL_COUNT = 3;
    const strips = [];
    const reelElements = [];

    const reelsContainer = document.getElementById('reels');
    const spinBtn = document.getElementById('spinBtn');
    const autoBtn = document.getElementById('autoBtn');
    const maxBtn = document.getElementById('maxBtn');
    const creditsEl = document.getElementById('credits');
    const betDisplay = document.getElementById('betDisplay');
    const lastWinEl = document.getElementById('lastWin');
    const messageEl = document.getElementById('message');
    const betInput = document.getElementById('betInput');
    const incBet = document.getElementById('incBet');
    const decBet = document.getElementById('decBet');
    const setCustom = document.getElementById('setCustom');

    // Create reels DOM with realistic strip
    function createReels(){
      reelsContainer.innerHTML = '';
      for (let r=0;r<REEL_COUNT;r++){
        const strip = buildReelStrip(4); // longer strip for smoother spin
        strips.push(strip);

        const viewport = document.createElement('div');
        viewport.className = 'reel-viewport';
        viewport.setAttribute('data-reel', r);

        const payline = document.createElement('div');
        payline.className = 'payline';
        viewport.appendChild(payline);

        const stripEl = document.createElement('div');
        stripEl.className = 'reel-strip';
        // populate symbols (add extra copies at top and bottom for seamless wrap)
        for (let i=0;i<strip.length;i++){
          const sym = document.createElement('div');
          sym.className = 'symbol';
          sym.textContent = strip[i];
          stripEl.appendChild(sym);
        }
        // duplicate once more to allow large translate values without gaps
        for (let i=0;i<strip.length;i++){
          const sym = document.createElement('div');
          sym.className = 'symbol';
          sym.textContent = strip[i];
          stripEl.appendChild(sym);
        }

        viewport.appendChild(stripEl);
        reelsContainer.appendChild(viewport);
        reelElements.push({viewport, stripEl, length: strip.length});
      }
    }

    // Utility: get symbol at logical index (center line)
    function getCenterSymbol(reelIndex, finalOffsetIndex){
      const strip = strips[reelIndex];
      const idx = finalOffsetIndex % strip.length;
      return strip[idx];
    }

    // Update displays
    function updateDisplays(){
      creditsEl.textContent = credits;
      betDisplay.textContent = bet;
      lastWinEl.textContent = lastWin;
      betInput.value = bet;
    }

    // Spin physics: choose a random stop index for each reel, compute translateY
    function spin(){
      if (spinning) return;
      if (credits < bet){
        showMessage('Not enough credits', 'lose');
        return;
      }
      spinning = true;
      messageEl.className = 'message';
      messageEl.textContent = '';
      credits -= bet;
      updateDisplays();

      // Visual: add small press animation
      spinBtn.disabled = true;
      spinBtn.style.opacity = 0.9;

      // Choose final indices (simulate RNG)
      const finalIndices = [];
      for (let r=0;r<REEL_COUNT;r++){
        const len = reelElements[r].length;
        // pick a random index within the base strip
        const chosen = Math.floor(Math.random() * len);
        finalIndices.push(chosen);
      }

      // Staggered durations and easing to mimic real slot inertia
      const baseDuration = 1400; // ms
      const durations = [baseDuration, baseDuration + 220, baseDuration + 480];
      const delays = [0, 120, 260];

      // For each reel, compute translateY so that the chosen symbol lands centered
      reelElements.forEach((reel, r) => {
        const symbolHeight = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--symbol-size')) || 96;
        const stripLen = reel.length;
        // We duplicated the strip once, so we can offset by stripLen to ensure long travel
        const cycles = 3 + Math.floor(Math.random() * 3); // full cycles before stopping
        const targetIndex = finalIndices[r] + stripLen * cycles;
        const translateY = -targetIndex * symbolHeight + ( (reel.viewport.clientHeight - symbolHeight) / 2 );

        // Apply transition
        reel.stripEl.style.transition = `transform ${durations[r]}ms cubic-bezier(.12,.72,.24,1) ${delays[r]}ms`;
        // Force reflow then set transform
        requestAnimationFrame(() => {
          reel.stripEl.style.transform = `translateY(${translateY}px)`;
        });

        // Listen for transition end to normalize position
        const onEnd = () => {
          reel.stripEl.style.transition = 'none';
          // Normalize to the equivalent index within the first strip copy
          const normalizedIndex = finalIndices[r] % stripLen;
          const normalizedTranslate = -normalizedIndex * symbolHeight + ( (reel.viewport.clientHeight - symbolHeight) / 2 );
          reel.stripEl.style.transform = `translateY(${normalizedTranslate}px)`;
          reel.viewport.classList.remove('win');
          reel.stripEl.removeEventListener('transitionend', onEnd);
          // When last reel finishes, evaluate
          if (r === REEL_COUNT - 1) {
            setTimeout(() => finalizeSpin(finalIndices), 40);
          }
        };
        reel.stripEl.addEventListener('transitionend', onEnd);
      });
    }

    // Evaluate result after spin completes
    function finalizeSpin(finalIndices){
      // Get center symbols
      const centerSymbols = finalIndices.map((idx, r) => getCenterSymbol(r, idx));
      // Simple evaluation: three of a kind pays according to symbol payout; two cherries small payout
      let win = 0;
      if (centerSymbols.every(s => s === centerSymbols[0])){
        // find payout from symbolPool
        const sym = symbolPool.find(x => x.s === centerSymbols[0]);
        const multiplier = sym ? sym.payout : 2;
        win = bet * multiplier;
      } else {
        const cherries = centerSymbols.filter(s => s === '🍒').length;
        if (cherries === 2) win = Math.floor(bet * 1.5);
      }

      lastWin = win;
      credits += win;
      updateDisplays();

      // Visual highlight for winning reels
      if (win > 0){
        // highlight reels that match
        for (let r=0;r<REEL_COUNT;r++){
          if (centerSymbols[r] === centerSymbols[0] && centerSymbols.every(s => s === centerSymbols[0])) {
            reelElements[r].viewport.classList.add('win');
          }
        }
        showMessage(`You won ${win} credits!`, 'win');
      } else {
        showMessage('No win — try again.', 'lose');
      }

      spinning = false;
      spinBtn.disabled = false;
      spinBtn.style.opacity = 1;

      // Auto-play handling
      if (auto && credits >= bet){
        setTimeout(() => spin(), 600);
      } else if (auto){
        auto = false;
        autoBtn.textContent = 'AUTO';
      }
    }

    // UI helpers
    function showMessage(text, type){
      messageEl.textContent = text;
      messageEl.className = 'message ' + (type || '');
    }

    // Controls wiring
    spinBtn.addEventListener('click', spin);

    autoBtn.addEventListener('click', () => {
      auto = !auto;
      autoBtn.textContent = auto ? 'STOP' : 'AUTO';
      if (auto && !spinning){
        spin();
      }
    });

    maxBtn.addEventListener('click', () => {
      // set bet to 10% of credits (rounded), min 1
      bet = Math.max(1, Math.floor(credits * 0.1));
      betInput.value = bet;
      updateDisplays();
    });

    incBet.addEventListener('click', () => {
      bet = Math.min(credits, bet + 5);
      betInput.value = bet;
      updateDisplays();
    });
    decBet.addEventListener('click', () => {
      bet = Math.max(1, bet - 5);
      betInput.value = bet;
      updateDisplays();
    });
    setCustom.addEventListener('click', () => {
      const v = parseInt(betInput.value, 10);
      if (!isNaN(v) && v >= 1 && v <= credits){
        bet = v;
        updateDisplays();
      } else {
        showMessage('Invalid bet (must be 1 to your credits).', 'lose');
      }
    });

    betInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') setCustom.click();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); spin(); }
      if (e.code === 'ArrowUp') { incBet.click(); }
      if (e.code === 'ArrowDown') { decBet.click(); }
      if (e.key.toLowerCase() === 'm') { maxBtn.click(); }
    });

    // Initialize
    createReels();
    updateDisplays();

    // Center reels on load (pick a visible index)
    (function centerOnLoad(){
      reelElements.forEach((reel, r) => {
        const symbolHeight = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--symbol-size')) || 96;
        const initialIndex = Math.floor(reel.length / 2);
        const translate = -initialIndex * symbolHeight + ( (reel.viewport.clientHeight - symbolHeight) / 2 );
        reel.stripEl.style.transform = `translateY(${translate}px)`;
      });
    })();
  </script>
</body>
</html>
