<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>homewrk</title>

<style>
/* -------------------------------------------------- */
/* BASE THEME VARIABLES                               */
/* -------------------------------------------------- */
:root {
  --bg: #0d0f16;
  --card: #141622;
  --text: #ffffff;
  --muted: #bbbbbb;
  --accent: #6366f1;
  --border: #222;
  --transition: 0.25s ease;
}

body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  transition: background var(--transition), color var(--transition);
}

/* -------------------------------------------------- */
/* SIDEBAR                                            */
/* -------------------------------------------------- */
.sidebar {
  width: 240px;
  background: var(--card);
  border-right: 1px solid var(--border);
  height: 100vh;
  padding: 20px;
  position: fixed;
  left: 0;
  top: 0;
  transition: transform 0.3s ease;
  box-shadow: 4px 0 20px rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
}

.sidebar.closed {
  transform: translateX(-260px);
}

.sidebar h2 {
  margin: 0 0 20px 0;
  font-size: 22px;
}

.nav-btn {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  text-align: left;
  color: var(--text);
}

.nav-btn:hover {
  border-color: var(--accent);
  transform: translateX(4px);
}

/* SETTINGS ICON */
.settings-icon {
  margin-top: auto;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  text-align: center;
  transition: 0.2s;
  font-size: 20px;
}

.settings-icon:hover {
  border-color: var(--accent);
  transform: translateX(4px);
}

/* -------------------------------------------------- */
/* TOP BAR                                            */
/* -------------------------------------------------- */
.topbar {
  height: 70px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  margin-left: 240px;
  width: calc(100% - 240px);
  transition: margin-left 0.3s ease, width 0.3s ease;
}

.sidebar.closed + .topbar {
  margin-left: 0;
  width: 100%;
}

.menu-toggle {
  margin-right: 16px;
  cursor: pointer;
  font-size: 22px;
  color: var(--text);
}

.topbar-title {
  font-size: 20px;
  font-weight: 600;
}

/* -------------------------------------------------- */
/* MAIN CONTENT                                       */
/* -------------------------------------------------- */
.main {
  margin-left: 240px;
  padding: 30px;
  width: calc(100% - 240px);
  transition: margin-left 0.3s ease, width 0.3s ease;
}

.sidebar.closed ~ .main {
  margin-left: 0;
  width: 100%;
}

/* -------------------------------------------------- */
/* SETTINGS PANEL                                     */
/* -------------------------------------------------- */
.settings-panel {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 26px;
  border-radius: 20px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.25);
  max-width: 500px;
}

.settings-panel h2 {
  margin-top: 0;
}

.theme-option {
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
}

.theme-option:hover {
  border-color: var(--accent);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>homewrk</h2>

  <button class="nav-btn" onclick="openPage('games.html')">Games</button>
  <button class="nav-btn" onclick="openPage('tools.html')">Tools</button>
  <button class="nav-btn" onclick="openPage('other.html')">Other</button>

  <div class="settings-icon" onclick="openSettings()">⚙️</div>
</div>

<!-- TOP BAR -->
<div class="topbar" id="topbar">
  <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
  <div class="topbar-title">homewrk</div>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <div class="settings-panel" id="settingsPanel">
    <h2>Settings</h2>

    <h3>Theme Settings</h3>

    <div class="theme-option" onclick="setTheme('dark')">Dark</div>
    <div class="theme-option" onclick="setTheme('light')">Light</div>
    <div class="theme-option" onclick="setTheme('neon')">Neon</div>
    <div class="theme-option" onclick="setTheme('midnight')">Midnight</div>
    <div class="theme-option" onclick="setTheme('solarized')">Solarized</div>
    <div class="theme-option" onclick="setTheme('gradient1')">Blue‑Purple Gradient</div>
    <div class="theme-option" onclick="setTheme('gradient2')">Sunset Gradient</div>
    <div class="theme-option" onclick="setTheme('gradient3')">Cyber Green Gradient</div>
  </div>
</div>

<script>
/* SIDEBAR TOGGLE */
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("closed");
}

/* OPEN PAGE */
function openPage(url) {
  window.location.href = url;
}

/* OPEN SETTINGS */
function openSettings() {
  const panel = document.getElementById("settingsPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

/* THEME SWITCHING */
function setTheme(theme) {
  document.body.className = theme;
  localStorage.setItem("homewrk_theme", theme);
}

/* LOAD SAVED THEME */
(function(){
  const saved = localStorage.getItem("homewrk_theme") || "dark";
  document.body.className = saved;
})();
</script>

</body>
</html>
