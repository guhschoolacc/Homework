<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Website</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
        width: 250px;
        background: #222;
        color: white;
        transition: 0.3s;
        padding-top: 20px;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
    }

    #sidebar.closed {
        left: -250px;
    }

    #sidebar h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    #sidebar button {
        width: 100%;
        padding: 15px;
        background: #333;
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
        text-align: left;
    }

    #sidebar button:hover {
        background: #444;
    }

    /* Main content */
    #content {
        margin-left: 250px;
        padding: 20px;
        width: 100%;
        transition: 0.3s;
    }

    #content.full {
        margin-left: 0;
    }

    /* Toggle button */
    #toggleBtn {
        position: absolute;
        top: 15px;
        left: 15px;
        padding: 10px 15px;
        background: #222;
        color: white;
        border: none;
        cursor: pointer;
        z-index: 1000;
    }

    /* Category sections */
    .section {
        display: none;
    }

    .active {
        display: block;
    }
</style>
</head>
<body>

<button id="toggleBtn">☰</button>

<div id="sidebar">
    <h2>Dashboard</h2>
    <button onclick="showSection('games')">Games</button>
    <button onclick="showSection('tools')">Tools</button>
    <button onclick="showSection('other')">Other</button>
</div>

<div id="content">
    <h1>Welcome</h1>
    <p>Select a category from the dashboard.</p>

    <div id="games" class="section">
        <h2>Games</h2>
        <p>Game content goes here.</p>
    </div>

    <div id="tools" class="section">
        <h2>Tools</h2>
        <p>Tools content goes here.</p>
    </div>

    <div id="other" class="section">
        <h2>Other</h2>
        <p>Other content goes here.</p>
    </div>
</div>

<script>
    const sidebar = document.getElementById("sidebar");
    const content = document.getElementById("content");
    const toggleBtn = document.getElementById("toggleBtn");

    toggleBtn.onclick = () => {
        sidebar.classList.toggle("closed");
        content.classList.toggle("full");
    };

    function showSection(id) {
        document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }
</script>

</body>
</html>
