<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>homewrk</title>

<style>
/* -------------------------------------------------- */
/* BASE THEME VARIABLES                               */
/* -------------------------------------------------- */
:root {
  --bg: #0d0f16;
  --card: #141622;
  --text: #ffffff;
  --muted: #bbbbbb;
  --accent: #6366f1;
  --border: #222;
  --transition: 0.25s ease;
}

/* THEMES */
body.light {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #111;
  --muted: #555;
  --accent: #4f46e5;
  --border: #ddd;
}

body.neon {
  --bg: #000;
  --card: #0a0a0a;
  --text: #00ffee;
  --muted: #00b3a4;
  --accent: #ff00ff;
}

body.midnight {
  --bg: #0b0014;
  --card: #1a0b2e;
  --text: #e3d7ff;
  --muted: #a88cd9;
  --accent: #b26bff;
}

body.solarized {
  --bg: #002b36;
  --card: #073642;
  --text: #eee8d5;
  --muted: #93a1a1;
  --accent: #b58900;
}

body.gradient1 {
  --bg: linear-gradient(135deg, #1e3a8a, #6d28d9);
  --card: rgba(0,0,0,0.35);
}

body.gradient2 {
  --bg: linear-gradient(135deg, #f97316, #db2777);
  --card: rgba(0,0,0,0.35);
}

body.gradient3 {
  --bg: linear-gradient(135deg, #0f172a, #00ff95);
  --card: rgba(0,0,0,0.35);
}

/* -------------------------------------------------- */
/* GLOBAL LAYOUT                                      */
/* -------------------------------------------------- */
body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background var(--transition), color var(--transition);
  overflow: hidden;
}

/* -------------------------------------------------- */
/* SIDEBAR                                            */
/* -------------------------------------------------- */
.sidebar {
  width: 240px;
  background: var(--card);
  border-right: 1px solid var(--border);
  height: 100vh;
  padding: 20px;
  position: fixed;
  left: 0;
  top: 0;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease;
  z-index: 10; /* stays above topbar but below pages */
}

.sidebar.closed {
  transform: translateX(-240px);
}

.sidebar h2 {
  margin: 0 0 20px 0;
  font-size: 22px;
}

/* NAV BUTTONS */
.nav-btn {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  text-align: left;
  color: var(--text);
}

.nav-btn:hover {
  border-color: var(--accent);
  transform: translateX(4px);
}

/* SETTINGS ICON */
.settings-icon {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  transition: 0.2s;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: auto;
  margin-bottom: 20px;
}

.settings-icon:hover {
  border-color: var(--accent);
  transform: translateX(4px);
}

/* -------------------------------------------------- */
/* TOP BAR                                            */
/* -------------------------------------------------- */
.topbar {
  height: 70px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  position: fixed;
  left: 240px;
  top: 0;
  width: calc(100% - 240px);
  transition: left 0.3s ease, width 0.3s ease;
  z-index: 9; /* below sidebar, below pages */
}

.sidebar.closed + .topbar {
  left: 0;
  width: 100%;
}

.menu-toggle {
  margin-right: 16px;
  cursor: pointer;
  font-size: 22px;
}

/* -------------------------------------------------- */
/* MAIN CONTENT AREA                                  */
/* -------------------------------------------------- */
.main {
  position: fixed;
  top: 70px;
  left: 240px;
  right: 0;
  bottom: 0;
  overflow-y: auto;
  background: var(--bg);
  transition: left 0.3s ease;
  z-index: 5; /* below pages */
}

.sidebar.closed ~ .main {
  left: 0;
}

/* -------------------------------------------------- */
/* FULLSCREEN PAGES                                   */
/* -------------------------------------------------- */
.page {
  display: none;
  position: fixed;
  top: 70px;
  left: 240px;
  right: 0;
  bottom: 0;
  background: var(--card);
  padding: 30px;
  box-sizing: border-box;
  overflow-y: auto;
  z-index: 20; /* ABOVE sidebar + topbar */
}

.sidebar.closed ~ .page {
  left: 0;
}

.page h2 {
  margin-top: 0;
}

.theme-option {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  cursor: pointer;
}

.theme-option:hover {
  border-color: var(--accent);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>homewrk</h2>

  <button class="nav-btn" onclick="openPage('games')">Games</button>
  <button class="nav-btn" onclick="openPage('tools')">Tools</button>
  <button class="nav-btn" onclick="openPage('other')">Other</button>

  <div class="settings-icon" onclick="openPage('settings')">⚙️</div>
</div>

<!-- TOP BAR -->
<div class="topbar" id="topbar">
  <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
</div>

<!-- MAIN CONTENT (empty background layer) -->
<div class="main"></div>

<!-- FULLSCREEN PAGES -->
<div class="page" id="gamesPage">
  <h2>Games</h2>
  <p style="color:var(--muted)">Games content goes here.</p>
</div>

<div class="page" id="toolsPage">
  <h2>Tools</h2>
  <p style="color:var(--muted)">Tools content goes here.</p>
</div>

<div class="page" id="otherPage">
  <h2>Other</h2>
  <p style="color:var(--muted)">Other content goes here.</p>
</div>

<div class="page" id="settingsPage">
  <h2>Settings</h2>

  <h3>Theme Settings</h3>

  <div class="theme-option" onclick="setTheme('dark')">Dark</div>
  <div class="theme-option" onclick="setTheme('light')">Light</div>
  <div class="theme-option" onclick="setTheme('neon')">Neon</div>
  <div class="theme-option" onclick="setTheme('midnight')">Midnight</div>
  <div class="theme-option" onclick="setTheme('solarized')">Solarized</div>
  <div class="theme-option" onclick="setTheme('gradient1')">Blue‑Purple Gradient</div>
  <div class="theme-option" onclick="setTheme('gradient2')">Sunset Gradient</div>
  <div class="theme-option" onclick="setTheme('gradient3')">Cyber Green Gradient</div>
</div>

<script>
/* SIDEBAR TOGGLE */
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("closed");

  // Move pages when sidebar collapses
  document.querySelectorAll(".page").forEach(p => {
    if (document.getElementById("sidebar").classList.contains("closed")) {
      p.style.left = "0";
    } else {
      p.style.left = "240px";
    }
  });
}

/* OPEN PAGE */
function openPage(name) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById(name + "Page").style.display = "block";
}

/* THEME SWITCHING */
function setTheme(theme) {
  document.body.className = theme;
  localStorage.setItem("homewrk_theme", theme);
}

/* LOAD SAVED THEME */
(function(){
  const saved = localStorage.getItem("homewrk_theme") || "dark";
  document.body.className = saved;
})();
</script>

</body>
</html>
