<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>homewrk</title>

<style>
/* THEME VARIABLES */
:root {
  --bg: #0d0f16;
  --card: #141622;
  --text: #ffffff;
  --muted: #bbbbbb;
  --accent: #6366f1;
  --border: #222;
}

/* GLOBAL */
body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: grid;
  grid-template-columns: 240px 1fr;
  grid-template-rows: 70px 1fr;
  grid-template-areas:
    "sidebar topbar"
    "sidebar main";
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  grid-area: sidebar;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.sidebar h2 {
  margin: 0 0 20px 0;
}

.nav-btn {
  padding: 12px;
  margin-bottom: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  text-align: left;
  color: var(--text);
}

.nav-btn:hover {
  border-color: var(--accent);
}

.settings-icon {
  margin-top: auto;
  width: 48px;
  height: 48px;
  border-radius: 10px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* TOPBAR */
.topbar {
  grid-area: topbar;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
}

/* MAIN CONTENT */
.main {
  grid-area: main;
  overflow-y: auto;
  padding: 30px;
  background: var(--bg);
}

/* PAGES */
.page {
  display: none;
}

.page h2 {
  margin-top: 0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>homewrk</h2>
  <button class="nav-btn" onclick="openPage('games')">Games</button>
  <button class="nav-btn" onclick="openPage('tools')">Tools</button>
  <button class="nav-btn" onclick="openPage('other')">Other</button>
  <div class="settings-icon" onclick="openPage('settings')">⚙️</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <span>☰</span>
</div>

<!-- MAIN -->
<div class="main">

  <div class="page" id="gamesPage">
    <h2>Games</h2>
    <p>Games content goes here.</p>
  </div>

  <div class="page" id="toolsPage">
    <h2>Tools</h2>
    <p>Tools content goes here.</p>
  </div>

  <div class="page" id="otherPage">
    <h2>Other</h2>
    <p>Other content goes here.</p>
  </div>

  <div class="page" id="settingsPage">
    <h2>Settings</h2>
    <p>Theme settings go here.</p>
  </div>

</div>

<script>
function openPage(name) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById(name + "Page").style.display = "block";
}
</script>

</body>
</html>
