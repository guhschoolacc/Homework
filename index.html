<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>homewrk</title>

<style>
/* -------------------------------------------------- */
/* BASE THEME VARIABLES */
/* -------------------------------------------------- */
:root {
  --bg: #0d0f16;
  --card: #141622;
  --text: #ffffff;
  --muted: #bbbbbb;
  --accent: #6366f1;
  --border: #222;
}

/* -------------------------------------------------- */
/* THEMES */
/* -------------------------------------------------- */
body.dark {}

body.light {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #111;
  --muted: #555;
  --accent: #4f46e5;
  --border: #ddd;
}

body.neon {
  --bg: #000;
  --card: #0a0a0a;
  --text: #00ffee;
  --muted: #00b3a4;
  --accent: #ff00ff;
}

body.midnight {
  --bg: #0b0014;
  --card: #1a0b2e;
  --text: #e3d7ff;
  --muted: #a88cd9;
  --accent: #b26bff;
}

body.solarized {
  --bg: #002b36;
  --card: #073642;
  --text: #eee8d5;
  --muted: #93a1a1;
  --accent: #b58900;
}

body.gradient1 {
  --bg: linear-gradient(135deg, #1e3a8a, #6d28d9);
  --card: rgba(0,0,0,0.35);
}

body.gradient2 {
  --bg: linear-gradient(135deg, #f97316, #db2777);
  --card: rgba(0,0,0,0.35);
}

body.gradient3 {
  --bg: linear-gradient(135deg, #0f172a, #00ff95);
  --card: rgba(0,0,0,0.35);
}

/* -------------------------------------------------- */
/* GLOBAL GRID LAYOUT */
/* -------------------------------------------------- */
body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: grid;
  grid-template-columns: 240px 1fr;
  grid-template-rows: 70px 1fr;
  grid-template-areas:
    "sidebar topbar"
    "sidebar main";
  overflow: hidden;
}

/* -------------------------------------------------- */
/* SIDEBAR */
/* -------------------------------------------------- */
.sidebar {
  grid-area: sidebar;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.sidebar h2 {
  margin: 0 0 20px 0;
}

.nav-btn {
  padding: 12px;
  margin-bottom: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  text-align: left;
  color: var(--text);
}

.nav-btn:hover {
  border-color: var(--accent);
}

.settings-icon {
  margin-top: auto;
  width: 48px;
  height: 48px;
  border-radius: 10px;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* -------------------------------------------------- */
/* TOPBAR */
/* -------------------------------------------------- */
.topbar {
  grid-area: topbar;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
}

/* -------------------------------------------------- */
/* MAIN CONTENT */
/* -------------------------------------------------- */
.main {
  grid-area: main;
  overflow-y: auto;
  padding: 30px;
  background: var(--bg);
}

/* -------------------------------------------------- */
/* PAGES */
/* -------------------------------------------------- */
.page {
  display: none;
}

.page h2 {
  margin-top: 0;
}

/* THEME-MATCHING BUTTONS */
.action-btn {
  padding: 14px;
  background: var(--accent);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  margin-top: 15px;
  font-size: 16px;
}

.action-btn:hover {
  opacity: 0.8;
}

/* Theme option styling */
.theme-option {
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  cursor: pointer;
}

.theme-option:hover {
  border-color: var(--accent);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>homewrk</h2>
  <button class="nav-btn" onclick="openPage('games')">Games</button>
  <button class="nav-btn" onclick="openPage('tools')">Tools</button>
  <button class="nav-btn" onclick="openPage('other')">Other</button>
  <div class="settings-icon" onclick="openPage('settings')">⚙️</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <span>☰</span>
</div>

<!-- MAIN -->
<div class="main">

  <!-- GAMES PAGE -->
  <div class="page" id="gamesPage">
    <h2>Games</h2>
    <p>Games content goes here.</p>

    <!-- ⭐ SANDBOX BUTTON (THEME MATCHING) -->
    <button class="action-btn" onclick="location.href='sandbox.html'">
      Open Sandbox
    </button>
  </div>

  <!-- TOOLS PAGE -->
  <div class="page" id="toolsPage">
    <h2>Tools</h2>

    <button class="action-btn" onclick="location.href='calculator.html'">
      Calculator
    </button>

    <button class="action-btn" onclick="location.href='clock.html'">
      Clock
    </button>

    <button class="action-btn" onclick="location.href='converter.html'">
      File Converter
    </button>
  </div>

  <!-- OTHER PAGE -->
  <div class="page" id="otherPage">
    <h2>Other</h2>
    <p>Other content goes here.</p>
  </div>

  <!-- SETTINGS PAGE -->
  <div class="page" id="settingsPage">
    <h2>Settings</h2>

    <h3>Theme Settings</h3>

    <div class="theme-option" onclick="setTheme('dark')">Dark</div>
    <div class="theme-option" onclick="setTheme('light')">Light</div>
    <div class="theme-option" onclick="setTheme('neon')">Neon</div>
    <div class="theme-option" onclick="setTheme('midnight')">Midnight</div>
    <div class="theme-option" onclick="setTheme('solarized')">Solarized</div>
    <div class="theme-option" onclick="setTheme('gradient1')">Blue‑Purple Gradient</div>
    <div class="theme-option" onclick="setTheme('gradient2')">Sunset Gradient</div>
    <div class="theme-option" onclick="setTheme('gradient3')">Cyber Green Gradient</div>
  </div>

</div>

<script>
function openPage(name) {
  document.querySelectorAll(".page").forEach(p => p.style.display = "none");
  document.getElementById(name + "Page").style.display = "block";
}

function setTheme(theme) {
  document.body.className = theme;
  localStorage.setItem("homewrk_theme", theme);
}

(function(){
  const saved = localStorage.getItem("homewrk_theme") || "dark";
  document.body.className = saved;
})();
</script>

</body>
</html>
