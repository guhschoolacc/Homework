<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Dashboard</title>

<style>
    :root {
        --bg1: #e9ecf5;
        --bg2: #f7f9ff;
        --sidebar-bg: rgba(25, 25, 25, 0.85);
        --sidebar-blur: blur(14px);
        --card-bg: rgba(255, 255, 255, 0.65);
        --card-border: rgba(255, 255, 255, 0.35);
        --highlight: #5a8dee;
        --radius: 18px;
        --shadow: 0 8px 30px rgba(0,0,0,0.12);
    }

    body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, var(--bg1), var(--bg2));
        height: 100vh;
        overflow: hidden;
        display: flex;
    }

    /* Sidebar */
    #sidebar {
        width: 260px;
        background: var(--sidebar-bg);
        backdrop-filter: var(--sidebar-blur);
        color: white;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        padding: 30px 0;
        transition: 0.35s ease;
        border-right: 1px solid rgba(255,255,255,0.1);
    }

    #sidebar.closed {
        left: -260px;
    }

    #sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
        font-weight: 600;
        letter-spacing: 1px;
    }

    #sidebar button {
        width: 85%;
        margin: 10px auto;
        padding: 14px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: var(--radius);
        color: white;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: 0.25s;
    }

    #sidebar button:hover {
        background: var(--highlight);
        transform: translateX(6px);
    }

    /* Toggle button */
    #toggleBtn {
        position: absolute;
        top: 15px;
        left: 15px;
        padding: 10px 14px;
        background: var(--sidebar-bg);
        color: white;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        z-index: 1000;
        backdrop-filter: var(--sidebar-blur);
        border: 1px solid rgba(255,255,255,0.2);
        transition: 0.3s;
    }

    #toggleBtn:hover {
        background: var(--highlight);
    }

    /* Main content */
    #content {
        margin-left: 260px;
        padding: 40px;
        width: 100%;
        transition: 0.35s ease;
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }

    #content.full {
        margin-left: 0;
    }

    /* Floating content card */
    .section {
        display: none;
        width: 70%;
        max-width: 900px;
        background: var(--card-bg);
        backdrop-filter: blur(18px);
        border-radius: var(--radius);
        padding: 30px;
        border: 1px solid var(--card-border);
        box-shadow: var(--shadow);
        animation: fadeIn 0.4s ease;
    }

    .active {
        display: block;
    }

    h1, h2 {
        color: #333;
        font-weight: 600;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<button id="toggleBtn">☰</button>

<div id="sidebar">
    <h2>Studio Panel</h2>

    <button onclick="showSection('games')">🎮 Games</button>
    <button onclick="showSection('tools')">🛠️ Tools</button>
    <button onclick="showSection('other')">📁 Other</button>
</div>

<div id="content">
    <div id="welcome" class="section active">
        <h1>Welcome to Your Studio</h1>
        <p>Select a category from the left panel to begin.</p>
    </div>

    <div id="games" class="section">
        <h2>Games</h2>
        <p>Your game collection will appear here.</p>
    </div>

    <div id="tools" class="section">
        <h2>Tools</h2>
        <p>Your tools and utilities will appear here.</p>
    </div>

    <div id="other" class="section">
        <h2>Other</h2>
        <p>Miscellaneous content goes here.</p>
    </div>
</div>

<script>
    const sidebar = document.getElementById("sidebar");
    const content = document.getElementById("content");
    const toggleBtn = document.getElementById("toggleBtn");

    toggleBtn.onclick = () => {
        sidebar.classList.toggle("closed");
        content.classList.toggle("full");
    };

    function showSection(id) {
        document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }
</script>

</body>
</html>
