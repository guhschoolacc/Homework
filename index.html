<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>homewrk — full</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
:root{ --bg:#071021; --panel:#0e1620; --muted:#9aa4b2; --accent:#1db954; --accent-2:#17a44a; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.04); --radius:12px; --text:#e6eef6; }
[data-theme="light"]{ --bg:#f6f8fb; --panel:#ffffff; --muted:#6b7280; --accent:#0ea5e9; --accent-2:#3b82f6; --text:#0b1220; --glass: rgba(2,6,23,0.02); --border: rgba(2,6,23,0.06); }
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;color:var(--text);background:var(--bg)}
.app{height:100vh;display:grid;grid-template-columns:300px 1fr;gap:18px;padding:18px}
.sidebar{background:var(--panel);border-radius:12px;padding:16px;border:1px solid var(--border);display:flex;flex-direction:column;gap:12px}
.logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,#06202a,#0b2a3a);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);overflow:hidden}
.logo img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.brand{display:flex;gap:12px;align-items:center}
.tabs{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.tab{padding:10px;border-radius:10px;cursor:pointer;color:var(--muted);background:transparent;border:1px solid transparent;font-weight:700;display:flex;align-items:center;gap:8px}
.tab.active{background:var(--glass);color:var(--text)}
.tab .tab-icon{width:20px;height:20px;border-radius:6px;background:transparent;display:inline-flex;align-items:center;justify-content:center;overflow:hidden}
.tab .tab-icon img{width:100%;height:100%;object-fit:cover;border-radius:4px}
.profile-card{display:flex;align-items:center;gap:12px;margin-top:auto;position:relative}
.profile-avatar{width:56px;height:56px;border-radius:12px;background:#0b2a3a;display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:800;border:none;cursor:pointer;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.profile-info{flex:1;min-width:0;overflow:hidden}
.profile-info .name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-info .email{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-menu{position:absolute;right:16px;bottom:76px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:6px;min-width:180px;box-shadow:0 8px 30px rgba(0,0,0,0.6);z-index:1300}
.profile-menu[aria-hidden="true"]{display:none}
.menu-item{background:transparent;border:none;color:var(--text);text-align:left;padding:8px 10px;border-radius:8px;cursor:pointer}
.menu-item:hover{background:rgba(255,255,255,0.02)}
.btn{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#04263b;border:none;padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:700}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.03)}
.btn.ghost.fav-active{ background: var(--accent); color: #04263b; border-color: rgba(0,0,0,0.08); }
.main{display:flex;flex-direction:column;gap:12px}
.content{flex:1;background:var(--panel);border-radius:12px;padding:16px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;min-height:0}
.section-head{display:flex;justify-content:space-between;align-items:center}
.chat-window{display:flex;flex-direction:column;gap:12px;height:100%;min-height:0}
.chat-messages{flex:1;min-height:0;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
.chat-row{display:flex;gap:12px;align-items:flex-start}
.chat-row.me{flex-direction:row-reverse}
.chat-avatar{width:48px;height:48px;border-radius:10px;background:#0b1220;display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;overflow:hidden}
.chat-avatar img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.chat-bubble{max-width:72%;padding:12px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);border:1px solid rgba(255,255,255,0.02)}
.chat-bubble.me{background:linear-gradient(90deg,var(--accent),#6ee7b7);color:#04263b}
.meta{font-size:12px;color:var(--muted);margin-bottom:6px;display:flex;gap:8px;align-items:center}
.timestamp{font-size:11px;color:var(--muted)}
.upload-status{font-size:13px;color:var(--muted);margin-top:8px}
/* grid tiles */
#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin-top:12px; }
.tile{background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent);padding:12px;border-radius:10px}
.tile .meta-file{ color:var(--muted); font-size:13px; margin-top:6px; word-break:break-all; }
/* chat images constrained so they don't blow out layout */
.chat-image{max-width:100%;max-height:40vh;height:auto;border-radius:8px;display:block}
/* scrollbar styling (modern browsers) */
.chat-messages::-webkit-scrollbar{width:10px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:8px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
/* theme-select active */
.theme-select.active{ background:var(--glass); color:var(--text); border-color:transparent; }
/* toast */
.toast-container{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:8px;z-index:1400}
.toast{background:var(--panel);border:1px solid var(--border);padding:10px 14px;border-radius:10px;color:var(--text);box-shadow:0 8px 30px rgba(0,0,0,0.6);min-width:200px}
.toast.success{border-left:4px solid #22c55e}
.toast.warn{border-left:4px solid #f59e0b}
@media (max-width:900px){
  .app{grid-template-columns:1fr;grid-auto-rows:auto;padding:12px}
}

/* chat controls */
.chat-controls { display:flex; gap:8px; align-items:center; margin-top:12px; flex-shrink:0; flex-wrap:wrap; }
.chat-controls input[type="text"] { padding:10px; border-radius:10px; border:1px solid var(--border); background:transparent; color:inherit; outline:none; min-width:0; }
.chat-controls .wide { width:220px; max-width:40vw; }

/* auth modal */
.modal-backdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:1200;background:rgba(0,0,0,0.45)}
.modal{width:520px;max-width:96%;background:var(--panel);border-radius:12px;padding:18px;border:1px solid var(--border);box-shadow:0 30px 80px rgba(0,0,0,0.6)}
.modal h3{margin:0 0 12px 0}
.form-row{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.small-note{font-size:13px;color:var(--muted)}
/* settings & account backdrops */
#settingsBackdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:1400;background:rgba(0,0,0,0.45)}
#settingsBackdrop[aria-hidden="false"]{display:flex}
#accountBackdrop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:1400;background:rgba(0,0,0,0.45)}
#accountBackdrop[aria-hidden="false"]{display:flex}

/* tab masking UI */
.mask-preview{display:flex;gap:8px;align-items:center}
.mask-preview .preview-icon{width:36px;height:36px;border-radius:8px;background:#0b1220;overflow:hidden}
.mask-preview .preview-icon img{width:100%;height:100%;object-fit:cover}
.mask-presets{display:flex;gap:8px;flex-wrap:wrap}
.mask-presets button{padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer}
  </style>
</head>
<body>

    <aside class="sidebar" aria-label="Navigation">

        <div id="brandLogo" class="logo" aria-hidden="true">HW</div>

        <div class="tab" role="tab" data-target="favorites" data-default-label="Favorites" data-default-icon="">
          <span class="tab-icon" aria-hidden="true"></span>
          <span class="tab-label">Favorites</span>
        </div>
        <div class="tab" role="tab" data-target="chat" data-default-label="Chat" data-default-icon="">
          <span class="tab-icon" aria-hidden="true"></span>
          <span class="tab-label">Chat</span>

      <!-- Profile card with menu -->
      <div class="profile-card" style="margin-top:auto">

    <main class="main">
      <div style="display:flex;gap:12px;align-items:center">
        <input id="global-search" placeholder="Search..." style="flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:inherit;outline:none" />

      </div>

      <section id="content" class="content" aria-live="polite"></section>
    </main>
  </div>

  <!-- Auth modal -->
  <div id="authBackdrop" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="authTitle">
      <h3 id="authTitle">Sign in or Create account</h3>

      <div id="authForms">
        <div class="form-row">
          <label class="small-note">Email</label>

        </div>

        <div class="form-row">
          <label class="small-note">Password</label>
          <input id="authPass" type="password" placeholder="Password" style="padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:inherit;outline:none" />

        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">

      <div class="form-row">
        <label class="small-note">Theme</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn ghost theme-select" data-theme="dark">Dark</button>
          <button class="btn ghost theme-select" data-theme="light">Light</button>

      </div>

      <div class="form-row">
        <label class="small-note">Accent color</label>
        <div style="display:flex;gap:8px;align-items:center">

          <button class="preset-btn" data-name="Gmail" data-icon="https://www.gstatic.com/images/branding/product/1x/gmail_48dp.png">Gmail</button>
          <button class="preset-btn" data-name="Google" data-icon="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png">Google</button>
          <button class="preset-btn" data-name="YouTube" data-icon="https://www.gstatic.com/youtube/img/branding/youtubelogo/svg/youtubelogo.svg">YouTube</button>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
        <button id="settingsCancel" class="btn ghost">Cancel</button>
        <button id="settingsSave" class="btn">Save</button>
      </div>
    </div>
  </div>

  <!-- Account modal -->
  <div id="accountBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="accountTitle">
      <h3 id="accountTitle">Account Settings</h3>

      <div class="form-row">
        <label class="small-note">Display name (shown in chat)</label>
        <input id="accountDisplayName" type="text" placeholder="Your display name" style="padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:inherit;outline:none" />
      </div>

      <div class="form-row">
        <label class="small-note">Profile picture URL (public image)</label>
        <input id="accountPhotoUrl" type="url" placeholder="https://example.com/avatar.png" style="padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:inherit;outline:none" />

  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script>
/* --------------------------- CONFIG --------------------------- */
const firebaseConfig = { apiKey: "AIzaSyCR8I5eOiZbHzVZJDEQHYpyxXbcClk_rxA", authDomain: "goon-7ddc3.firebaseapp.com", projectId: "goon-7ddc3", storageBucket: "goon-7ddc3.firebasestorage.app", messagingSenderId: "117099331820", appId: "1:117099331820:web:3af984b15a843d3d7b65c" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* --------------------------- Data (games + tools) --------------------------- */
const games = [
  {label:'Sandbox',file:'sandbox.html'},
  {label:'Snake Game Ripoff',file:'snake.html'},
  {label:'Tic Tac Toe',file:'tic-tactoe.html'},
  {label:'Minesweeper',file:'mines.html'},
  {label:'2048',file:'2048.html'},
  {label:'Bubble Shooter',file:'bubble-shooter.html'},
  {label:'GUH Clicker',file:'guh-clicker.html'},
  {label:'Flappy Bird',file:'flappy-bird.html'},
  {label:'Chess',file:'chess.html'},
  {label:'Hangman',file:'hangman.html'},
  {label:'Block Breaker',file:'block-breaker.html'},
  {label:'Casino',file:'casino.html'},
  {label:'Wormscape',file:'wormscape.html'},
  {label:'Arcade Racer',file:'arcade-racer.html'},
  {label:'Tower Defense',file:'tower-defense.html'},
  {label:'Space Shooter',file:'space-shooter.html'}
];

const tools = [
  {label:'Calculator',file:'calculator.html'},
  {label:'Clock',file:'clock.html'},
  {label:'File Converter',file:'converter.html'},
  {label:'Notepad',file:'notepad.html'},
  {label:'JSON Formatter',file:'json-formatter.html'},
  {label:'Regex Tester',file:'regex-tester.html'},
  {label:'Base64',file:'base64-tool.html'},
  {label:'LocalStorage Viewer',file:'localstorage-viewer.html'},
  {label:'IP Lookup',file:'ip-lookup.html'},
  {label:'Image Resizer',file:'image-resizer.html'},
  {label:'Image Cropper',file:'image-cropper.html'},
  {label:'QR Code Generator',file:'qr-generator.html'},
  {label:'Text To Speech',file:'text-to-speech.html'},
  {label:'FL Studio Recreation',file:'fl-studio.html'},
  {label:'QR Scanner',file:'qr-scanner.html'},
  {label:'Soundboard',file:'soundboard.html'}
];

let favorites = JSON.parse(localStorage.getItem('homewrk.favs')||'[]');
function saveFavs(){ localStorage.setItem('homewrk.favs', JSON.stringify(favorites)); }

/* --------------------------- DOM helpers --------------------------- */
const content = document.getElementById('content');
const toastContainer = document.getElementById('toastContainer');

function showToast(msg, type='info', ttl=3500){
  const el = document.createElement('div');
  el.className = 'toast ' + (type==='success'?'success': type==='warn'?'warn':'');
  el.textContent = msg;
  toastContainer.appendChild(el);
  setTimeout(()=> { el.style.opacity = '0'; el.style.transform = 'translateY(8px)'; setTimeout(()=> el.remove(), 300); }, ttl);
}

/* --------------------------- Theme handling (dark default) --------------------------- */
const SETTINGS_KEY = 'homewrk.settings.v3';
const TAB_MASK_KEY = 'homewrk.tabmasks.v1';
const defaultSettings = { theme:'dark', accent:'#1db954', notificationsEnabled:true, showEmailInProfile:true };

function loadSettings(){ try{ const raw = localStorage.getItem(SETTINGS_KEY); return raw? {...defaultSettings, ...JSON.parse(raw)} : {...defaultSettings}; }catch(e){ return {...defaultSettings}; } }
function saveSettings(s){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

function shadeColor(hex, percent){ try{ const h = hex.replace('#',''); const num = parseInt(h,16); let r = (num>>16) + Math.round(255*percent/100); let g = ((num>>8)&0xff) + Math.round(255*percent/100); let b = (num&0xff) + Math.round(255*percent/100); r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b)); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }catch(e){ return hex; } }

function applyThemeFromSettings(){
  const s = loadSettings();
  const theme = (s.theme === 'light') ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  document.documentElement.style.setProperty('--accent', s.accent || defaultSettings.accent);
  document.documentElement.style.setProperty('--accent-2', shadeColor(s.accent||defaultSettings.accent, -12));
}

/* --------------------------- Tab masking (localStorage) --------------------------- */
function loadTabMasks(){
  try{
    const raw = localStorage.getItem(TAB_MASK_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){
    return {};
  }
}
function saveTabMasks(masks){
  localStorage.setItem(TAB_MASK_KEY, JSON.stringify(masks));
}
function applyTabMasks(){
  const masks = loadTabMasks();
  const tabs = document.querySelectorAll('#tabsContainer .tab');
  tabs.forEach(tab => {
    const key = tab.dataset.target;
    const labelEl = tab.querySelector('.tab-label');
    const iconEl = tab.querySelector('.tab-icon');
    const defaultLabel = tab.dataset.defaultLabel || labelEl.textContent;
    if(masks[key] && masks[key].name){
      labelEl.textContent = masks[key].name;
    } else {
      labelEl.textContent = defaultLabel;
    }
    // icon
    if(masks[key] && masks[key].icon){
      iconEl.innerHTML = `<img src="${masks[key].icon}" alt="${labelEl.textContent}">`;
    } else {
      iconEl.innerHTML = '';
    }
  });

  // brand logo/title masks (optional)
  const brand = document.getElementById('brandLogo');
  const brandTitle = document.getElementById('brandTitle');
  if(masks._brand){

/* helper to set a mask for a tab */
function setTabMask(tabKey, name, iconUrl){
  const masks = loadTabMasks();
  masks[tabKey] = masks[tabKey] || {};
  if(name === null) delete masks[tabKey].name; else if(name !== undefined) masks[tabKey].name = name;
  if(iconUrl === null) delete masks[tabKey].icon; else if(iconUrl !== undefined) masks[tabKey].icon = iconUrl;
  // if object empty, remove
  if(masks[tabKey] && Object.keys(masks[tabKey]).length === 0) delete masks[tabKey];
  saveTabMasks(masks);
  applyTabMasks();
}

/* --------------------------- Chat (fixed to fit) --------------------------- */
function messagesCollectionRef(){ return db.collection('chat').doc('main').collection('messages'); }
async function sendMessageFirestore(text, imageURL=null){
  if(!auth.currentUser){
    openAuthModal('Please sign in to send messages.');
    return;
  }
  const trimmed = (text||'').trim(); if(!trimmed && !imageURL) return;
  const user = auth.currentUser;
  const payload = { text: trimmed||'', ts: firebase.firestore.FieldValue.serverTimestamp(), uid: user?user.uid:null, name: user?(user.displayName||user.email||'User'):'Guest', photoURL: user?user.photoURL||null:null, imageURL: imageURL||null };
  try{ await messagesCollectionRef().add(payload); showToast('Message sent','success'); }catch(e){ console.error(e); showToast('Failed to send message','warn'); }
}

let unsubscribeMessages = null;
const messageElements = new Map();

function startFirestoreListener(){
  if(unsubscribeMessages) return;
  unsubscribeMessages = messagesCollectionRef().orderBy('ts','asc').limitToLast(500).onSnapshot(snap=>{ snap.docChanges().forEach(change=>{ const data = change.doc.data(); const ts = data.ts && data.ts.toDate ? data.ts.toDate() : null; const msg = { id: change.doc.id, text: data.text, name: data.name, uid: data.uid, ts, photoURL: data.photoURL||null, imageURL: data.imageURL||null }; if(change.type === 'added') appendMessageToUI(msg); if(change.type === 'modified') modifyMessageInUI(msg); if(change.type === 'removed') removeMessageFromUI(msg); }); }, err => console.error('listener', err));
}

function stopFirestoreListener(){ if(unsubscribeMessages){ unsubscribeMessages(); unsubscribeMessages = null; } }

function renderChat(){
  content.innerHTML = `
  <div class="section-head"><h2 style="margin:0">Global Chat</h2></div>
  <div class="chat-window" style="margin-top:12px">
    <div class="chat-messages" id="chatMessages" aria-live="polite"></div>

    <div class="chat-controls" style="margin-top:8px">
      <input id="chatInput" placeholder="Say something..." style="flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:inherit;outline:none" />
      <input id="chatImageUrl" placeholder="Paste image URL" class="wide" style="padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:inherit;outline:none" />
      <button class="btn ghost" id="sendImageUrlBtn">Send Image</button>
      <button class="btn" id="sendChat">Send</button>
    </div>

    <div style="margin-top:6px;color:var(--muted);font-size:13px">ill make image uploading a thing when i have money to pay for storage</div>
    <div id="chatUploadHint" class="upload-status"></div>
  </div>
  `;

  const chatMessagesEl = document.getElementById('chatMessages');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendChat');
  const sendImageBtn = document.getElementById('sendImageUrlBtn');
  const chatImageInput = document.getElementById('chatImageUrl');

  if(unsubscribeMessages) stopFirestoreListener();
  startFirestoreListener();

  sendBtn.addEventListener('click', () => { sendMessageFirestore(chatInput.value); chatInput.value=''; });
  chatInput.addEventListener('keydown', e => { if(e.key==='Enter') { sendMessageFirestore(chatInput.value); chatInput.value=''; } });
  sendImageBtn.addEventListener('click', async () => {
    const url = (chatImageInput.value||'').trim(); if(!url) return;
    try{ await preloadImage(url); await sendMessageFirestore('', url); chatImageInput.value = ''; showToast('Image sent','success'); }catch(e){ showToast('Image failed to load','warn'); }
  });
}

function makeAvatarElement(name, photoURL, size=48){
  const wrapper = document.createElement('div');
  wrapper.className = 'chat-avatar';
  wrapper.style.width = size+'px';
  wrapper.style.height = size+'px';
  if(photoURL){
    const img = document.createElement('img');
    img.src = photoURL;
    img.alt = name||'avatar';
    img.style.width='100%';
    img.style.height='100%';
    img.style.objectFit='cover';
    img.style.borderRadius='10px';
    wrapper.appendChild(img);
  } else {
    wrapper.textContent = (name && name.charAt(0)) ? name.charAt(0).toUpperCase() : 'G';
  }
  return wrapper;
}

function appendMessageToUI(msg){
  const chatMessagesEl = document.getElementById('chatMessages');
  if(!chatMessagesEl) return;
  const row = document.createElement('div');
  row.className = 'chat-row ' + ((auth.currentUser && msg.uid === auth.currentUser.uid) ? 'me' : '');
  row.dataset.msgId = msg.id;
  const avatar = makeAvatarElement(msg.name, msg.photoURL, 48);
  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble ' + ((auth.currentUser && msg.uid === auth.currentUser.uid) ? 'me' : '');
  bubble.dataset.msgId = msg.id;
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.innerHTML = `<strong class="msg-name">${escapeHtml(msg.name||'Guest')}</strong><span class="timestamp">${msg.ts? (new Date(msg.ts)).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : ''}</span>`;
  bubble.appendChild(meta);
  if(msg.text){
    const body = document.createElement('div');
    body.className='msg-text';
    body.textContent = msg.text;
    bubble.appendChild(body);
  }
  if(msg.imageURL){
    const img = document.createElement('img');
    img.src = msg.imageURL;
    img.className='chat-image';
    bubble.appendChild(img);
  }
  if(auth.currentUser && msg.uid === auth.currentUser.uid){
    row.appendChild(bubble);
    row.appendChild(avatar);
  } else {
    row.appendChild(avatar);
    row.appendChild(bubble);
  }
  chatMessagesEl.appendChild(row);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
  messageElements.set(msg.id, {row,bubble,avatar});
}

function modifyMessageInUI(msg){
  const entry = messageElements.get(msg.id);
  if(!entry) return appendMessageToUI(msg);
  const {bubble,avatar} = entry;
  const nameEl = bubble.querySelector('.msg-name');
  if(nameEl) nameEl.textContent = msg.name || 'Guest';
  const tsEl = bubble.querySelector('.timestamp');
  if(tsEl) tsEl.textContent = msg.ts? (new Date(msg.ts)).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
  const textEl = bubble.querySelector('.msg-text');
  if(msg.text){
    if(textEl) textEl.textContent = msg.text;
    else { const d = document.createElement('div'); d.className='msg-text'; d.textContent = msg.text; bubble.appendChild(d); }
  } else if(textEl) textEl.remove();
  if(msg.photoURL){
    avatar.innerHTML = '';
    const img = document.createElement('img');
    img.src = msg.photoURL;
    img.style.width='100%';
    img.style.height='100%';
    img.style.objectFit='cover';
    img.style.borderRadius='10px';
    avatar.appendChild(img);
  } else {
    avatar.textContent = (msg.name && msg.name.charAt(0)) ? msg.name.charAt(0).toUpperCase() : 'G';
  }
}

function removeMessageFromUI(msg){
  const entry = messageElements.get(msg.id);
  if(entry && entry.row){ entry.row.remove(); messageElements.delete(msg.id); }
}

/* --------------------------- Utilities --------------------------- */
function preloadImage(url, timeoutMs=6000){ return new Promise((resolve,reject)=>{ const img = new Image(); let done=false; const t = setTimeout(()=>{ if(done) return; done=true; img.src=''; reject(new Error('timeout')); }, timeoutMs); img.onload = ()=>{ if(done) return; done=true; clearTimeout(t); resolve(); }; img.onerror = ()=>{ if(done) return; done=true; clearTimeout(t); reject(new Error('error')); }; img.src = url; }); }

document.addEventListener('DOMContentLoaded', () => {
  applyThemeFromSettings();
  applyTabMasks();

  Array.from(document.querySelectorAll('.tab')).forEach(t => t.addEventListener('click', () => {
    Array.from(document.querySelectorAll('.tab')).forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    renderActive(t.dataset.target);
  }));

  // content click handlers (open/fav)
  content.addEventListener('click', e=> {
    const openBtn = e.target.closest('.open-btn');
    const favBtn = e.target.closest('.fav-btn');

    if(favBtn){
      const file = favBtn.getAttribute('data-file');
      const wasFav = favorites.includes(file);

      if(wasFav) favorites = favorites.filter(f=>f!==file);
      else favorites.push(file);
      saveFavs();

      updateFavButtons(file);

      const active = document.querySelector('.tab.active')?.dataset.target;
      if(active === 'favorites'){
        if(wasFav){
          const tiles = Array.from(document.querySelectorAll('.tile'));
          tiles.forEach(t => {
            const btn = t.querySelector('.fav-btn');
            if(btn && btn.dataset.file === file) t.remove();
          });
          const grid = document.getElementById('grid');
          if(grid && grid.children.length === 0) grid.innerHTML = '<div style="padding:12px">No favorites yet.</div>';
        } else {
          const item = findItemByFile(file);
          if(item){
            const grid = document.getElementById('grid');
            if(grid){
              grid.prepend(createTile(item));
            }
          }
        }
      }

      return;
    }

    if(openBtn){
      const file = openBtn.getAttribute('data-file');
      window.location.href = file;
    }
  });

  // initial render
  renderActive('games');

  // auth state
  auth.onAuthStateChanged(user => { updateMiniProfile(); });

  // close auth modal on backdrop click
  authBackdrop.addEventListener('click', (e) => { if(e.target === authBackdrop) closeAuthModal(); });
});
  </script>
</body>
</html>
