<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Guh Website Slop</title>

<style>
/* -------------------------------------------------- */
/* BASE THEME VARIABLES                               */
/* -------------------------------------------------- */
:root {
  --bg: #0d0f16;
  --card: #141622;
  --text: #ffffff;
  --muted: #bbbbbb;
  --accent: #6366f1;
  --border: #222;
  --transition: 0.25s ease;
}

/* LIGHT THEME */
body.light {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #111;
  --muted: #555;
  --accent: #4f46e5;
  --border: #ddd;
}

/* NEON THEME */
body.neon {
  --bg: #000000;
  --card: #0a0a0a;
  --text: #00ffea;
  --muted: #00b3a4;
  --accent: #ff00ff;
  --border: #222;
}

/* SOLARIZED */
body.solarized {
  --bg: #002b36;
  --card: #073642;
  --text: #eee8d5;
  --muted: #93a1a1;
  --accent: #b58900;
  --border: #0f3a44;
}

/* MIDNIGHT PURPLE */
body.midnight {
  --bg: #0b0014;
  --card: #1a0b2e;
  --text: #e3d7ff;
  --muted: #a88cd9;
  --accent: #b26bff;
  --border: #2d1a47;
}

/* GRADIENT THEMES */
body.gradient1 {
  --bg: linear-gradient(135deg, #1e3a8a, #6d28d9);
  --card: rgba(0,0,0,0.35);
  --text: #ffffff;
  --muted: #d1d5db;
  --accent: #a78bfa;
  --border: rgba(255,255,255,0.12);
}

body.gradient2 {
  --bg: linear-gradient(135deg, #f97316, #db2777);
  --card: rgba(0,0,0,0.35);
  --text: #ffffff;
  --muted: #ffe4e6;
  --accent: #fb7185;
  --border: rgba(255,255,255,0.12);
}

body.gradient3 {
  --bg: linear-gradient(135deg, #0f172a, #00ff95);
  --card: rgba(0,0,0,0.35);
  --text: #eafff5;
  --muted: #94fbd1;
  --accent: #00ff95;
  --border: rgba(255,255,255,0.12);
}

/* CUSTOM THEME */
body.custom {
  --bg: var(--custom-bg);
  --card: var(--custom-card);
  --text: var(--custom-text);
  --muted: var(--custom-muted);
  --accent: var(--custom-accent);
  --border: var(--custom-border);
}

/* -------------------------------------------------- */
/* GLOBAL STYLES                                      */
/* -------------------------------------------------- */
body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background var(--transition), color var(--transition);
}

.page {
  max-width: 1350px;
  margin: auto;
  padding: 30px;
}

/* -------------------------------------------------- */
/* GLASS HEADER                                       */
/* -------------------------------------------------- */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 32px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-logo {
  width: 48px;
  height: 48px;
  background: var(--accent);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: #fff;
  font-size: 20px;
}

.theme-dropdown {
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
}

/* -------------------------------------------------- */
/* DASHBOARD GRID                                     */
/* -------------------------------------------------- */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}

@media (max-width: 900px) {
  .dashboard {
    grid-template-columns: 1fr;
  }
}

/* -------------------------------------------------- */
/* SECTION CARDS                                      */
/* -------------------------------------------------- */
.section-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 26px;
  border-radius: 20px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.25);
}

.section-card h2 {
  margin: 0 0 18px 0;
  font-size: 22px;
}

/* -------------------------------------------------- */
/* TOOL GRID + CARDS                                  */
/* -------------------------------------------------- */
.tools-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}

.tool-card {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 18px;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 15px;
}

.tool-card:hover {
  border-color: var(--accent);
  transform: translateY(-4px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}

.tool-icon {
  width: 22px;
  height: 22px;
  opacity: 0.8;
}

/* -------------------------------------------------- */
/* CUSTOM THEME PANEL                                 */
/* -------------------------------------------------- */
.custom-panel {
  display: none;
  margin-top: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 16px;
  border-radius: 12px;
}

.custom-panel input {
  width: 100%;
  margin: 6px 0;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
}
</style>
</head>

<body>
<div class="page">

<header>
  <div class="brand">
    <div class="brand-logo">GW</div>
    <div>
      <h2 style="margin:0;">Guh Website Slop</h2>
      <p style="margin:0;color:var(--muted);font-size:13px;">All‑in‑one Slop Studio</p>
    </div>
  </div>

  <select id="themeSelect" class="theme-dropdown" onchange="onThemeChange(this.value)">
    <option value="dark">Dark</option>
    <option value="light">Light</option>
    <option value="neon">Neon</option>
    <option value="solarized">Solarized</option>
    <option value="midnight">Midnight</option>
    <option value="gradient1">Blue‑Purple Gradient</option>
    <option value="gradient2">Sunset Gradient</option>
    <option value="gradient3">Cyber Green Gradient</option>
    <option value="custom">Custom</option>
  </select>
</header>

<!-- CUSTOM THEME PANEL -->
<div class="custom-panel" id="customPanel">
  <label>Background</label><input type="color" id="c-bg">
  <label>Card</label><input type="color" id="c-card">
  <label>Text</label><input type="color" id="c-text">
  <label>Muted Text</label><input type="color" id="c-muted">
  <label>Accent</label><input type="color" id="c-accent">
  <label>Border</label><input type="color" id="c-border">
  <button onclick="applyCustomTheme()" class="theme-dropdown" style="margin-top:10px;">Apply</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard">

  <!-- LEFT -->
  <div>
    <div class="section-card">
      <h2>AI Tools</h2>
      <div class="tools-grid">
        <div class="tool-card" onclick="openPage('image-generator.html')">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/image.png" class="tool-icon">
          Image Generator
        </div>
        <div class="tool-card">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/edit.png" class="tool-icon">
          Image Editor
        </div>
        <div class="tool-card">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/video.png" class="tool-icon">
          Video Generator
        </div>
        <div class="tool-card">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/code.png" class="tool-icon">
          AI Coder
        </div>
      </div>
    </div>

    <div class="section-card">
      <h2>Music & Audio</h2>
      <div class="tools-grid">
        <div class="tool-card">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/musical-notes.png" class="tool-icon">
          Music Generator
        </div>
        <div class="tool-card">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/mixer.png" class="tool-icon">
          FL Studio Clone
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div>
    <div class="section-card">
      <h2>Games & Coding</h2>
      <div class="tools-grid">
        <div class="tool-card">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/controller.png" class="tool-icon">
          Game Builder
        </div>
        <div class="tool-card">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/arcade-cabinet.png" class="tool-icon">
          Arcade
        </div>
      </div>
    </div>

    <div class="section-card">
      <h2>System Tools</h2>
      <div class="tools-grid">
        <div class="tool-card">
          <img src="https://img.icons8.com/ios-filled/50/ffffff/export.png" class="tool-icon">
          Project Export
        </div>
      </div>
    </div>
  </div>

</div>

</div>

<script>
/* THEME SWITCHING */
function applyThemeClass(theme) {
  document.body.className = '';
  if (!theme || theme === 'dark') {
    document.body.className = 'dark';
    return;
  }
  document.body.className = theme;
}

function onThemeChange(value) {
  if (value === 'custom') {
    document.getElementById('customPanel').style.display = 'block';
  } else {
    document.getElementById('customPanel').style.display = 'none';
  }
  localStorage.setItem('guh_theme', value);
  applyThemeClass(value);
}

/* APPLY CUSTOM THEME */
function applyCustomTheme() {
  const bg = document.getElementById('c-bg').value;
  const card = document.getElementById('c-card').value;
  const text = document.getElementById('c-text').value;
  const muted = document.getElementById('c-muted').value;
  const accent = document.getElementById('c-accent').value;
  const border = document.getElementById('c-border').value;

  document.documentElement.style.setProperty('--custom-bg', bg);
  document.documentElement.style.setProperty('--custom-card', card);
  document.documentElement.style.setProperty('--custom-text', text);
  document.documentElement.style.setProperty('--custom-muted', muted);
  document.documentElement.style.setProperty('--custom-accent', accent);
  document.documentElement.style.setProperty('--custom-border', border);

  localStorage.setItem('guh_theme', 'custom');
  document.getElementById('themeSelect').value = 'custom';
  applyThemeClass('custom');
}

/* OPEN PAGE */
function openPage(url) {
  window.location.href = url;
}

/* LOAD SAVED THEME */
(function(){
  const saved = localStorage.getItem('guh_theme') || 'dark';
  document.getElementById('themeSelect').value = saved;
  if (saved === 'custom') document.getElementById('customPanel').style.display = 'block';
  applyThemeClass(saved);
})();
</script>

</body>
</html>
