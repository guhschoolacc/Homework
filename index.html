<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>homewrk</title>
  <link id="siteFavicon" rel="icon" href="">
  <style>
    :root{
      --bg:#050509;
      --sidebar:#0b0b12;
      --muted:#cfd3dc;
      --card:#0d0d12;
      --accent-1:#3b82f6;
      --accent-2:#6366f1;
      --radius:12px;
      --shadow:0 6px 18px rgba(0,0,0,0.5);
      --font-scale:1;
    }

    /* Themes */
    .theme-light{ --bg:#f6f7fb; --card:#ffffff; --muted:#6b7280; --accent-1:#2563eb; --accent-2:#7c3aed; color-scheme:light; }
    .theme-dark{ /* default */ }
    .theme-neon{ --bg:#0b0b10; --card:#0f0f14; --muted:#9ca3ff; --accent-1:#ff6ec7; --accent-2:#00ffd5; }
    .theme-sunset{ --bg:#2b0b0b; --card:#3a0f0f; --muted:#f0c6b9; --accent-1:#ff7a59; --accent-2:#ffd36b; }

    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;}
    html,body{height:100%}
    body{
      min-height:100vh;
      background:var(--bg);
      color:#fff;
      display:flex;
      font-size:calc(14px * var(--font-scale));
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .app{display:flex;flex:1;height:100%}
    .sidebar{
      width:220px;
      background:var(--sidebar);
      border-right:1px solid rgba(255,255,255,0.03);
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .logo{font-size:20px;font-weight:700;color:#f3f4f6}
    .nav{display:flex;flex-direction:column;gap:8px}
    .nav-item{padding:10px;border-radius:8px;font-size:15px;color:var(--muted);cursor:pointer;user-select:none}
    .nav-item.active{background:linear-gradient(135deg,var(--accent-1),var(--accent-2));color:#fff}

    .main{flex:1;display:flex;flex-direction:column;padding:18px;gap:14px}
    .header{display:flex;align-items:center;justify-content:space-between}
    .page-title{font-size:20px;font-weight:600;color:#e6e9ef}

    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);padding:14px;border-radius:var(--radius);box-shadow:var(--shadow)}
    .row{display:flex;align-items:center;gap:12px}

    /* Search */
    .search{margin-left:auto;display:flex;gap:8px;align-items:center}
    .search input{padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:#0b0b10;color:#fff;min-width:180px}

    /* Grid / Buttons */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:12px}
    .item{position:relative;padding:12px;border-radius:10px;background:var(--card);border:1px solid rgba(255,255,255,0.03);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--muted)}
    .item:hover{transform:translateY(-4px);transition:transform .12s}
    .fav{position:absolute;right:8px;top:8px;background:transparent;border:0;color:rgba(255,255,255,0.6);font-size:16px;cursor:pointer}
    .fav.active{color:gold}

    /* Games row (horizontal) */
    .games-row{display:flex;gap:12px;overflow-x:auto;padding-top:8px}
    .game-card{min-width:160px;padding:12px;border-radius:10px;background:var(--card);border:1px solid rgba(255,255,255,0.03);position:relative;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--muted)}
    .game-card .fav{right:8px;top:8px}

    /* Favorites area */
    .favorites-empty{color:var(--muted);padding:12px;text-align:center}

    /* Profile */
    .profile-wrap{position:fixed;left:18px;bottom:18px;display:flex;align-items:center;gap:10px;z-index:60}
    .profile-btn{width:48px;height:48px;border-radius:50%;background:#111217;border:1px solid rgba(255,255,255,0.06);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
    .profile-label{padding:8px 12px;border-radius:10px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));color:var(--muted);font-weight:600}

    /* Popovers & modals */
    .popover{position:fixed;left:18px;bottom:78px;width:320px;background:var(--card);border-radius:10px;padding:12px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 12px 40px rgba(0,0,0,0.6);display:none;z-index:70}
    .popover.show{display:block}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:90}
    .modal-backdrop.show{display:flex}
    .modal{width:820px;max-width:96%;background:var(--card);border-radius:12px;padding:18px;border:1px solid rgba(255,255,255,0.04);max-height:86vh;overflow:auto}

    /* Notifications panel */
    .notif-panel{position:absolute;right:0;top:48px;width:360px;max-height:420px;overflow:auto;background:var(--card);border-radius:10px;padding:12px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 12px 40px rgba(0,0,0,0.6);display:none;z-index:80}
    .notif-panel.show{display:block}
    .notif-item{padding:10px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--muted)}

    @media (max-width:720px){
      .sidebar{width:64px;padding:12px}
      .logo{display:none}
      .search input{min-width:120px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" role="navigation" aria-label="Main navigation">
      <div class="logo">homewrk</div>
      <nav class="nav" aria-label="Categories">
        <div class="nav-item active" data-category="games" tabindex="0">Games</div>
        <div class="nav-item" data-category="tools" tabindex="0">Tools</div>
        <div class="nav-item" data-category="favorites" tabindex="0">Favorites</div>
        <div class="nav-item" data-category="other" tabindex="0">Other</div>
      </nav>
      <div style="margin-top:auto">
        <button id="openSettings" class="item" style="width:100%;justify-content:flex-start">⚙ Settings</button>
      </div>
    </aside>

    <main class="main" role="main">
      <div class="header">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="page-title" id="pageTitle">Games</div>
        </div>

        <div style="display:flex;align-items:center;gap:12px">
          <div id="siteStatusLabel" style="opacity:0.7;font-size:13px">homewrk</div>

          <div style="position:relative">
            <button id="notifBell" title="Notifications" aria-haspopup="true" aria-expanded="false" style="width:36px;height:36px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;cursor:pointer">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#cfd3dc" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0 1 18 14.158V11a6 6 0 0 0-5-5.917V4a1 1 0 0 0-2 0v1.083A6 6 0 0 0 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
            </button>
            <div id="notifPanel" class="notif-panel" aria-hidden="true"></div>
          </div>
        </div>
      </div>

      <!-- Games -->
      <section class="card" id="gamesCard">
        <div class="row" style="align-items:center">
          <div style="font-size:16px;font-weight:600">Games</div>
          <div class="search">
            <input id="gamesSearch" placeholder="Search games" aria-label="Search games">
          </div>
        </div>

        <div class="games-row" id="gamesRow" role="list" aria-label="Games list">
          <div class="game-card" data-id="sandbox" data-href="sandbox.html">Sandbox
            <button class="fav" data-id="sandbox" aria-label="favorite">☆</button>
          </div>
          <div class="game-card" data-id="snake" data-href="snake.html">Snake Game Ripoff
            <button class="fav" data-id="snake" aria-label="favorite">☆</button>
          </div>
          <div class="game-card" data-id="tictactoe" data-href="tictactoe.html">Tic Tac Toe
            <button class="fav" data-id="tictactoe" aria-label="favorite">☆</button>
          </div>
        </div>
      </section>

      <!-- Tools -->
      <section class="card hidden" id="toolsCard">
        <div class="row" style="align-items:center">
          <div style="font-size:16px;font-weight:600">Tools</div>
          <div class="search">
            <input id="toolsSearch" placeholder="Search tools" aria-label="Search tools">
          </div>
        </div>

        <div class="grid" id="toolsGrid" role="list" aria-label="Tools list">
          <a class="item" data-id="calculator" href="calculator.html">Calculator <button class="fav" data-id="calculator">☆</button></a>
          <a class="item" data-id="clock" href="clock.html">Clock <button class="fav" data-id="clock">☆</button></a>
          <a class="item" data-id="notepad" href="notepad.html">Notepad <button class="fav" data-id="notepad">☆</button></a>
          <a class="item" data-id="jsonformatter" href="json-formatter.html">JSON Formatter <button class="fav" data-id="jsonformatter">☆</button></a>
          <a class="item" data-id="flstudio" href="fl-studio.html">FL Studio Recreation <button class="fav" data-id="flstudio">☆</button></a>
        </div>
      </section>

      <!-- Favorites -->
      <section class="card hidden" id="favoritesCard">
        <div style="font-size:16px;font-weight:600">Favorites</div>
        <div id="favoritesGrid" class="grid" role="list" aria-label="Favorites list"></div>
        <div id="favoritesEmpty" class="favorites-empty hidden">No favorites yet. Click the star on any item to add it here.</div>
      </section>

      <!-- Other -->
      <section class="card hidden" id="otherCard">
        <div style="font-size:16px;font-weight:600">Other</div>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
          <a class="item" data-id="soundboard" href="soundboard.html">Soundboard <button class="fav" data-id="soundboard">☆</button></a>
        </div>
      </section>
    </main>
  </div>

  <!-- Profile & popover -->
  <div class="profile-wrap" aria-hidden="false">
    <div class="profile-btn" id="profileBtn" title="Profile" aria-label="Profile">
      <img id="profileAvatar" src="" alt="avatar" style="width:100%;height:100%;object-fit:cover">
    </div>
    <div class="profile-label" id="profileLabel">Not signed in</div>
  </div>

  <div class="popover" id="profilePopover" role="menu" aria-hidden="true"></div>

  <!-- Settings / Modals -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <script>
    /* -------------------------
       Lightweight, corrected script
       Fixes applied:
       - Restored signup/login flows and settings modal
       - Notifications panel renders without breaking layout
       - Favorites implemented consistently (games/tools/other)
       - Removed "file://..." path label and stray favorite button
       - Removed "add" quick-add UI (no manual add)
       - Search bars filter items in each category
       - Settings accessible and persists panic key, theme, tab mask
       ------------------------- */

    /* Utilities & storage */
    const DEFAULT_AVATAR = 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23cfcfd6" stroke-width="1.2"><circle cx="12" cy="8" r="3.2"/><path d="M4.5 20.5c1.8-3.6 5.4-5.5 7.5-5.5s5.7 1.9 7.5 5.5"/></svg>');
    const DEFAULT_FAVICON = 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23cfcfd6" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M8 12h8"/></svg>');

    function getJSON(key, fallback){ try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); } catch(e){ return fallback; } }
    function setJSON(key, value){ try { localStorage.setItem(key, JSON.stringify(value)); } catch(e){} }
    function get(key, fallback){ try { const v = localStorage.getItem(key); return v === null ? fallback : v; } catch(e){ return fallback; } }
    function set(key, value){ try { if(value === null) localStorage.removeItem(key); else localStorage.setItem(key, value); } catch(e){} }

    /* Favorites */
    function getFavorites(){ return getJSON('hw_favs', []); }
    function saveFavorites(list){ setJSON('hw_favs', list); }

    function isFavorited(id){ return getFavorites().some(f => f.id === id); }
    function toggleFavorite(id, label, href){
      const favs = getFavorites();
      const idx = favs.findIndex(f => f.id === id);
      if(idx === -1){
        favs.push({ id, label: label || id, href: href || '#' });
      } else {
        favs.splice(idx,1);
      }
      saveFavorites(favs);
      renderFavoritesUI();
      updateFavButtons();
    }

    /* Tab masking & theme */
    function getTabTitle(){ return get('hw_tab_title',''); }
    function getTabIcon(){ return get('hw_tab_icon',''); }
    function saveTabTitle(t){ set('hw_tab_title', t || ''); }
    function saveTabIcon(u){ set('hw_tab_icon', u || ''); }
    function applyTabMasking(){
      const t = getTabTitle(); const i = getTabIcon();
      document.title = t || 'homewrk';
      let link = document.getElementById('siteFavicon');
      if(!link){ link = document.createElement('link'); link.id='siteFavicon'; link.rel='icon'; document.head.appendChild(link); }
      link.href = i || DEFAULT_FAVICON;
      const theme = get('hw_theme_name','');
      document.documentElement.classList.remove('theme-light','theme-neon','theme-sunset');
      if(theme) document.documentElement.classList.add(theme);
      const fs = get('hw_font_scale', null);
      if(fs) document.documentElement.style.setProperty('--font-scale', fs);
    }

    /* Panic key */
    function getPanicKey(){ return get('hw_panic_key', "'"); }
    function getPanicCtrl(){ return get('hw_panic_ctrl','false') === 'true'; }
    function getPanicAction(){ return get('hw_panic_action','close_tab'); }
    function performPanicAction(action){
      // safe, best-effort actions
      if(action === 'close_tab'){ try{ window.close(); }catch(e){} setTimeout(()=>{ window.location.href='about:blank'; },200); return; }
      if(action === 'goto_drive'){ window.location.href = 'https://drive.google.com'; return; }
      if(action === 'goto_gmail'){ window.location.href = 'https://mail.google.com'; return; }
      if(action === 'goto_google'){ window.location.href = 'https://www.google.com'; return; }
      if(action === 'mask_drive'){ saveTabTitle('My Drive - Google Drive'); saveTabIcon('https://drive.google.com/favicon.ico'); applyTabMasking(); return; }
      if(action === 'mute_audio'){ document.querySelectorAll('audio,video').forEach(v=>v.muted=true); showTemporaryOverlay('Audio muted'); return; }
      if(action === 'hide_content'){ document.querySelectorAll('body > *').forEach(el=>{ if(el.id==='modalBackdrop') return; el.style.visibility='hidden'; }); saveTabTitle('Documents - University'); saveTabIcon('https://www.google.com/favicon.ico'); applyTabMasking(); return; }
      if(action === 'lock_overlay'){ showLockOverlay(); return; }
    }

    function showTemporaryOverlay(text){
      const o = document.createElement('div');
      o.style.position='fixed'; o.style.inset='0'; o.style.background='#000'; o.style.opacity='0.9'; o.style.zIndex='99999'; o.style.display='flex'; o.style.alignItems='center'; o.style.justifyContent='center'; o.style.color='#fff'; o.style.fontSize='20px'; o.textContent=text;
      document.body.appendChild(o);
      setTimeout(()=>{ try{ document.body.removeChild(o); }catch(e){} },1500);
    }
    function showLockOverlay(){
      if(document.getElementById('hw_lock_overlay')) return;
      const o = document.createElement('div'); o.id='hw_lock_overlay';
      o.style.position='fixed'; o.style.inset='0'; o.style.background='#fff'; o.style.zIndex='999999'; o.style.display='flex'; o.style.alignItems='center'; o.style.justifyContent='center'; o.style.color='#000'; o.style.flexDirection='column';
      const t = document.createElement('div'); t.style.fontSize='18px'; t.style.marginBottom='12px'; t.textContent='Locked';
      const btn = document.createElement('button'); btn.textContent='Unlock'; btn.style.padding='10px 14px'; btn.style.borderRadius='8px'; btn.onclick = ()=>{ try{ document.body.removeChild(o); }catch(e){} };
      o.appendChild(t); o.appendChild(btn); document.body.appendChild(o);
    }

    /* Notifications (simple, non-destructive) */
    function getNotifications(){ return getJSON('hw_notifications', []); }
    function saveNotifications(n){ setJSON('hw_notifications', n); }
    function createNotification(title, message){ const list = getNotifications(); list.unshift({ id:'n_'+Date.now(), title, message, ts:Date.now() }); if(list.length>200) list.length=200; saveNotifications(list); renderNotifPanel(); }
    function renderNotifPanel(){
      const panel = document.getElementById('notifPanel'); panel.innerHTML = '';
      const list = getNotifications();
      if(list.length === 0){ panel.innerHTML = '<div style="padding:12px;color:var(--muted)">No notifications</div>'; return; }
      list.forEach(n => {
        const el = document.createElement('div'); el.className='notif-item';
        el.innerHTML = `<div style="font-weight:700">${escapeHtml(n.title)}</div><div style="color:var(--muted);margin-top:6px">${escapeHtml(n.message)}</div>`;
        panel.appendChild(el);
      });
    }

    /* Simple auth (local demo) */
    function getUsers(){ return getJSON('hw_users', {}); }
    function saveUsers(u){ setJSON('hw_users', u); }
    function getCurrentUser(){ return get('hw_currentUser', null); }
    function setCurrentUser(u){ set('hw_currentUser', u); renderProfile(); }

    function encodePassword(p){ try { return btoa(p); } catch(e){ return p; } }
    function verifyPassword(stored, candidate){ return stored === encodePassword(candidate); }

    /* Render profile/popover */
    function renderProfile(){
      const u = getCurrentUser();
      const avatar = (getUsers()[u] && getUsers()[u].avatar) || DEFAULT_AVATAR;
      document.getElementById('profileAvatar').src = avatar;
      document.getElementById('profileLabel').textContent = u || 'Not signed in';
      renderPopover();
    }

    function renderPopover(){
      const pop = document.getElementById('profilePopover'); pop.innerHTML = '';
      const u = getCurrentUser();
      if(!u){
        const sign = document.createElement('button'); sign.className='item'; sign.textContent='Sign up / Log in'; sign.onclick = ()=>{ openModal('auth'); };
        pop.appendChild(sign);
      } else {
        const settings = document.createElement('button'); settings.className='item'; settings.textContent='Settings'; settings.onclick = ()=>{ openModal('settings'); };
        const logout = document.createElement('button'); logout.className='item'; logout.textContent='Log out'; logout.onclick = ()=>{ setCurrentUser(null); };
        pop.appendChild(settings); pop.appendChild(logout);
      }
    }

    /* Favorites UI */
    function renderFavoritesUI(){
      const grid = document.getElementById('favoritesGrid'); grid.innerHTML = '';
      const favs = getFavorites();
      if(favs.length === 0){ document.getElementById('favoritesEmpty').classList.remove('hidden'); return; }
      document.getElementById('favoritesEmpty').classList.add('hidden');
      favs.forEach(f => {
        const a = document.createElement('a'); a.className='item'; a.href = f.href || '#'; a.textContent = f.label || f.id;
        const btn = document.createElement('button'); btn.className='fav active'; btn.innerHTML='★'; btn.onclick = (e)=>{ e.preventDefault(); toggleFavorite(f.id); };
        a.appendChild(btn);
        grid.appendChild(a);
      });
    }

    function updateFavButtons(){
      document.querySelectorAll('.fav').forEach(btn=>{
        const id = btn.dataset.id;
        if(!id) return;
        if(isFavorited(id)){ btn.classList.add('active'); btn.innerHTML='★'; } else { btn.classList.remove('active'); btn.innerHTML='☆'; }
      });
    }

    /* Search filter */
    function filterContainer(containerSelector, query){
      const q = (query||'').toLowerCase();
      document.querySelectorAll(containerSelector + ' .item, ' + containerSelector + ' .game-card').forEach(el=>{
        const text = (el.textContent || '').toLowerCase();
        el.style.display = text.includes(q) ? '' : 'none';
      });
    }

    /* Modal system (auth + settings) */
    function openModal(mode){
      const backdrop = document.getElementById('modalBackdrop'); const modal = document.getElementById('modal');
      backdrop.classList.add('show'); backdrop.setAttribute('aria-hidden','false');
      modal.innerHTML = '';
      if(mode === 'auth') renderAuthModal();
      if(mode === 'settings') renderSettingsModal();
    }
    function closeModal(){ const backdrop = document.getElementById('modalBackdrop'); backdrop.classList.remove('show'); backdrop.setAttribute('aria-hidden','true'); document.getElementById('modal').innerHTML=''; }

    function renderAuthModal(){
      const modal = document.getElementById('modal');
      modal.innerHTML = `
        <h3>Sign up / Log in</h3>
        <div style="display:flex;gap:12px;flex-direction:column;margin-top:12px">
          <input id="authUser" placeholder="Username" style="padding:10px;border-radius:8px;background:#0b0b10;color:#fff;border:1px solid rgba(255,255,255,0.04)">
          <input id="authEmail" placeholder="Email (optional)" style="padding:10px;border-radius:8px;background:#0b0b10;color:#fff;border:1px solid rgba(255,255,255,0.04)">
          <input id="authPass" placeholder="Password" type="password" style="padding:10px;border-radius:8px;background:#0b0b10;color:#fff;border:1px solid rgba(255,255,255,0.04)">
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button id="authCancel" class="item">Cancel</button>
            <button id="authSignup" class="item">Sign up</button>
            <button id="authLogin" class="item">Log in</button>
          </div>
        </div>
      `;
      document.getElementById('authCancel').onclick = closeModal;
      document.getElementById('authSignup').onclick = () => {
        const u = document.getElementById('authUser').value.trim();
        const e = document.getElementById('authEmail').value.trim();
        const p = document.getElementById('authPass').value;
        if(!u || !p){ alert('Provide username and password'); return; }
        const users = getUsers();
        if(users[u]){ alert('Username exists'); return; }
        users[u] = { password: encodePassword(p), email: e || '', avatar: DEFAULT_AVATAR, createdAt: Date.now() };
        saveUsers(users);
        setCurrentUser(u);
        closeModal();
      };
      document.getElementById('authLogin').onclick = () => {
        const id = document.getElementById('authUser').value.trim();
        const p = document.getElementById('authPass').value;
        if(!id || !p){ alert('Provide username and password'); return; }
        const users = getUsers();
        let matched = null;
        if(users[id]) matched = id;
        else {
          const lower = id.toLowerCase();
          matched = Object.keys(users).find(k => users[k].email && users[k].email.toLowerCase() === lower) || null;
        }
        if(!matched || !verifyPassword(users[matched].password, p)){ alert('Invalid credentials'); return; }
        setCurrentUser(matched);
        closeModal();
      };
    }

    function renderSettingsModal(){
      const modal = document.getElementById('modal');
      const currentPanicKey = getPanicKey();
      const currentPanicCtrl = getPanicCtrl();
      const currentPanicAction = getPanicAction();
      const currentTabTitle = getTabTitle();
      const currentTabIcon = getTabIcon();
      const currentTheme = get('hw_theme_name','');

      modal.innerHTML = `
        <h3>Settings</h3>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">
          <div>
            <strong>Panic key</strong>
            <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
              <input id="panicKeyInput" value="${escapeHtml(currentPanicKey)}" style="width:80px;padding:8px;border-radius:8px;background:#0b0b10;color:#fff;border:1px solid rgba(255,255,255,0.04)">
              <label style="color:var(--muted)"><input id="panicCtrl" type="checkbox" ${currentPanicCtrl ? 'checked' : ''}> Require Ctrl</label>
              <select id="panicAction" style="padding:8px;border-radius:8px;background:#0b0b10;color:#fff;border:1px solid rgba(255,255,255,0.04);margin-left:auto">
                <option value="close_tab">Close tab</option>
                <option value="goto_drive">Go to Google Drive</option>
                <option value="goto_gmail">Go to Gmail</option>
                <option value="goto_google">Go to Google</option>
                <option value="mask_drive">Mask as Drive</option>
                <option value="mute_audio">Mute audio</option>
                <option value="hide_content">Hide content</option>
                <option value="lock_overlay">Lock overlay</option>
              </select>
            </div>
          </div>

          <div>
            <strong>Tab masking</strong>
            <div style="display:flex;gap:8px;align-items:center;margin-top:6px">
              <input id="tabTitleInput" placeholder="Tab title" value="${escapeHtml(currentTabTitle)}" style="flex:1;padding:8px;border-radius:8px;background:#0b0b10;color:#fff;border:1px solid rgba(255,255,255,0.04)">
              <input id="tabIconInput" placeholder="Icon URL" value="${escapeHtml(currentTabIcon)}" style="flex:1;padding:8px;border-radius:8px;background:#0b0b10;color:#fff;border:1px solid rgba(255,255,255,0.04)">
            </div>
            <div style="display:flex;gap:8px;margin-top:8px">
              <button id="maskDrive" class="item">Mask as Drive</button>
              <button id="maskGmail" class="item">Mask as Gmail</button>
              <button id="clearMask" class="item">Clear mask</button>
            </div>
          </div>

          <div>
            <strong>Themes</strong>
            <div style="display:flex;gap:8px;margin-top:8px">
              <button class="item theme-btn" data-theme="">Default</button>
              <button class="item theme-btn" data-theme="theme-light">Light</button>
              <button class="item theme-btn" data-theme="theme-neon">Neon</button>
              <button class="item theme-btn" data-theme="theme-sunset">Sunset</button>
            </div>
          </div>

          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button id="settingsCancel" class="item">Cancel</button>
            <button id="settingsSave" class="item">Save</button>
          </div>
        </div>
      `;

      // initialize select
      document.getElementById('panicAction').value = currentPanicAction;

      document.getElementById('settingsCancel').onclick = closeModal;
      document.getElementById('maskDrive').onclick = ()=>{ document.getElementById('tabTitleInput').value='My Drive - Google Drive'; document.getElementById('tabIconInput').value='https://drive.google.com/favicon.ico'; };
      document.getElementById('maskGmail').onclick = ()=>{ document.getElementById('tabTitleInput').value='Inbox - Gmail'; document.getElementById('tabIconInput').value='https://mail.google.com/favicon.ico'; };
      document.getElementById('clearMask').onclick = ()=>{ document.getElementById('tabTitleInput').value=''; document.getElementById('tabIconInput').value=''; };

      document.querySelectorAll('.theme-btn').forEach(b=>{
        b.addEventListener('click', ()=> {
          const t = b.dataset.theme || '';
          set('hw_theme_name', t);
          applyTabMasking();
        });
      });

      document.getElementById('settingsSave').onclick = ()=>{
        const pk = document.getElementById('panicKeyInput').value.trim() || "'";
        const ctrl = document.getElementById('panicCtrl').checked;
        const action = document.getElementById('panicAction').value;
        set('hw_panic_key', pk);
        set('hw_panic_ctrl', ctrl ? 'true' : 'false');
        set('hw_panic_action', action);

        const tt = document.getElementById('tabTitleInput').value.trim();
        const ti = document.getElementById('tabIconInput').value.trim();
        saveTabTitle(tt);
        saveTabIcon(ti);
        applyTabMasking();
        closeModal();
        alert('Settings saved.');
      };
    }

    /* Event wiring & initialization */
    document.addEventListener('DOMContentLoaded', ()=>{
      applyTabMasking();
      renderProfile();
      renderNotifPanel();
      renderFavoritesUI();
      updateFavButtons();

      // Navigation
      document.querySelectorAll('.nav-item').forEach(n=>{
        n.addEventListener('click', ()=> {
          document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
          n.classList.add('active');
          const cat = n.dataset.category;
          document.getElementById('gamesCard').classList.toggle('hidden', cat !== 'games');
          document.getElementById('toolsCard').classList.toggle('hidden', cat !== 'tools');
          document.getElementById('favoritesCard').classList.toggle('hidden', cat !== 'favorites');
          document.getElementById('otherCard').classList.toggle('hidden', cat !== 'other');
          document.getElementById('pageTitle').textContent = n.textContent;
        });
      });

      // Search
      document.getElementById('gamesSearch').addEventListener('input', (e)=> filterContainer('#gamesRow', e.target.value));
      document.getElementById('toolsSearch').addEventListener('input', (e)=> filterContainer('#toolsGrid', e.target.value));

      // Favorites click handling (delegated)
      document.body.addEventListener('click', (e)=>{
        const fav = e.target.closest('.fav');
        if(fav){
          e.preventDefault();
          const id = fav.dataset.id;
          // find label/href
          const parent = fav.closest('.game-card') || fav.closest('.item') || fav.closest('a');
          const label = parent ? (parent.textContent || parent.innerText).replace('☆','').replace('★','').trim() : id;
          const href = parent && parent.getAttribute('data-href') ? parent.getAttribute('data-href') : (parent && parent.href ? parent.href : '#');
          toggleFavorite(id, label, href);
          return;
        }
      });

      // Item navigation (games/tools)
      document.querySelectorAll('.game-card').forEach(g=>{
        g.addEventListener('click', (e)=>{
          if(e.target.closest('.fav')) return;
          const href = g.dataset.href || '#';
          if(href && href !== '#') window.location.href = href;
        });
      });
      document.querySelectorAll('.item').forEach(a=>{
        a.addEventListener('click', (e)=>{
          if(e.target.closest('.fav')) return;
          const href = a.getAttribute('href') || '#';
          if(href && href !== '#') window.location.href = href;
        });
      });

      // Settings open
      document.getElementById('openSettings').addEventListener('click', ()=> openModal('settings'));

      // Profile popover
      const profileBtn = document.getElementById('profileBtn');
      const pop = document.getElementById('profilePopover');
      profileBtn.addEventListener('click', (e)=>{ e.stopPropagation(); pop.classList.toggle('show'); pop.style.display = pop.classList.contains('show') ? 'block' : 'none'; });
      document.addEventListener('click', ()=>{ pop.classList.remove('show'); pop.style.display='none'; });

      // Notifications
      document.getElementById('notifBell').addEventListener('click', (e)=>{ e.stopPropagation(); const p = document.getElementById('notifPanel'); p.classList.toggle('show'); p.style.display = p.classList.contains('show') ? 'block' : 'none'; });
      document.addEventListener('click', ()=>{ const p = document.getElementById('notifPanel'); p.classList.remove('show'); p.style.display='none'; });

      // Modal backdrop close
      document.getElementById('modalBackdrop').addEventListener('click', (e)=>{ if(e.target === document.getElementById('modalBackdrop')) closeModal(); });

      // Panic key listener
      window.addEventListener('keydown', (e)=>{
        try{
          const active = document.activeElement;
          if(active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) return;
          const stored = getPanicKey();
          const requiresCtrl = getPanicCtrl();
          const action = getPanicAction();
          if(!stored) return;
          const keyMatch = (stored.length === 1) ? (e.key === stored) : (e.key.toLowerCase() === stored.toLowerCase());
          if(!keyMatch) return;
          if(requiresCtrl && !e.ctrlKey) return;
          e.preventDefault();
          performPanicAction(action);
        }catch(err){}
      });

      // Ensure a default admin user exists (local demo)
      const users = getUsers();
      if(!users['anotheryear']){ users['anotheryear'] = { password: encodePassword('adminpass'), avatar: DEFAULT_AVATAR, email: '' }; saveUsers(users); }

      // Initial UI sync
      applyTabMasking();
      renderNotifPanel();
      renderFavoritesUI();
      updateFavButtons();
    });

    /* Small helpers */
    function escapeHtml(s){ if(s === undefined || s === null) return ''; return String(s).replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; }); }
  </script>
</body>
</html>
