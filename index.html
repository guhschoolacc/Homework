<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tiny Firebase Chat</title>
  <style>
    body{font-family:Arial;max-width:700px;margin:20px}
    #messages{border:1px solid #ddd;height:300px;overflow:auto;padding:8px}
    .msg{margin-bottom:8px}
    .me{font-weight:600}
  </style>
</head>
<body>
  <h3>Tiny Firebase Chat</h3>
  <div id="auth">
    <input id="email" placeholder="email" />
    <input id="pass" placeholder="password" type="password" />
    <button id="signin">Sign In</button>
    <button id="signup">Sign Up</button>
    <div id="user"></div>
  </div>

  <div id="chat" style="display:none">
    <div id="messages"></div>
    <input id="text" placeholder="Type a message" style="width:80%" />
    <button id="send">Send</button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js';
    import { getFirestore, collection, query, orderBy, limit, onSnapshot, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "REPLACE_ME",
      authDomain: "REPLACE_ME",
      projectId: "REPLACE_ME",
      // other fields from your Firebase web config
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const emailEl = document.getElementById('email');
    const passEl = document.getElementById('pass');
    const signinBtn = document.getElementById('signin');
    const signupBtn = document.getElementById('signup');
    const userDiv = document.getElementById('user');
    const chatDiv = document.getElementById('chat');
    const messagesDiv = document.getElementById('messages');
    const textEl = document.getElementById('text');
    const sendBtn = document.getElementById('send');

    signupBtn.onclick = async () => {
      try { await createUserWithEmailAndPassword(auth, emailEl.value, passEl.value); }
      catch(e){ alert(e.message); }
    };
    signinBtn.onclick = async () => {
      try { await signInWithEmailAndPassword(auth, emailEl.value, passEl.value); }
      catch(e){ alert(e.message); }
    };

    let unsubscribe = null;
    onAuthStateChanged(auth, user => {
      if (user) {
        userDiv.textContent = 'Signed in as ' + user.email;
        chatDiv.style.display = 'block';
        startListening();
      } else {
        userDiv.textContent = 'Not signed in';
        chatDiv.style.display = 'none';
        if (unsubscribe) unsubscribe();
      }
    });

    function startListening() {
      const q = query(collection(db, 'chats', 'main', 'messages'), orderBy('createdAt'), limit(100));
      unsubscribe = onSnapshot(q, snap => {
        messagesDiv.innerHTML = '';
        snap.docs.forEach(d => {
          const data = d.data();
          const who = data.senderId === (auth.currentUser && auth.currentUser.uid) ? 'me' : 'them';
          const el = document.createElement('div');
          el.className = 'msg ' + (who === 'me' ? 'me' : '');
          const time = data.createdAt && data.createdAt.toDate ? data.createdAt.toDate().toLocaleTimeString() : '';
          el.textContent = (who === 'me' ? 'You: ' : '') + (data.text || '') + ' ' + time;
          messagesDiv.appendChild(el);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
    }

    sendBtn.onclick = async () => {
      const text = textEl.value.trim();
      if (!text || !auth.currentUser) return;
      await addDoc(collection(db, 'chats', 'main', 'messages'), {
        senderId: auth.currentUser.uid,
        text: text,
        createdAt: serverTimestamp()
      });
      textEl.value = '';
    };
  </script>
</body>
</html>
