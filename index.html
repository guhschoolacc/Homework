<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Core</title>

    <style>
        body {
            margin: 0;
            font-family: "Inter", sans-serif;
            background: radial-gradient(circle at top, #1a1a1d, #0b0b0d 70%);
            color: white;
            overflow-x: hidden;
        }

        /* Floating Glow Background */
        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(120,0,255,0.35), transparent 70%);
            top: -150px;
            left: -150px;
            filter: blur(80px);
            animation: drift 12s infinite alternate ease-in-out;
            z-index: -2;
        }

        @keyframes drift {
            from { transform: translate(0,0); }
            to { transform: translate(80px, 60px); }
        }

        /* Navigation */
        .navbar {
            width: 100%;
            height: 75px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(20,20,25,0.35);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-links a {
            margin-left: 25px;
            text-decoration: none;
            color: #dcdcdc;
            font-size: 17px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: white;
        }

        /* Hero Section */
        .hero {
            margin-top: 180px;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 60px;
            font-weight: 800;
            background: linear-gradient(90deg, #b57cff, #7f5bff, #caa8ff);
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero p {
            margin-top: -10px;
            font-size: 20px;
            color: #cfcfcf;
            opacity: 0.85;
        }

        /* Category Grid */
        .grid {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            padding: 0 20px;
        }

        .card {
            width: 260px;
            height: 150px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(255,255,255,0.25);
            box-shadow: 0 0 25px rgba(150,80,255,0.25);
        }

        footer {
            margin-top: 140px;
            text-align: center;
            color: #777;
            font-size: 14px;
            padding-bottom: 40px;
        }
    </style>
</head>

<body>

    <div class="glow"></div>

    <!-- Navigation -->
    <div class="navbar">
        <div class="logo">Nebula Core</div>
        <div class="nav-links">
            <a href="#">Dashboard</a>
            <a href="#">Games</a>
            <a href="#">AI Tools</a>
            <a href="#">Settings</a>
        </div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <h1>Welcome to Nebula Core</h1>
        <p>Your gateway to tools, games, and creativity.</p>
    </div>

    <!-- Category Grid -->
    <div class="grid">
        <div class="card">Games</div>
        <div class="card">AI Tools</div>
        <div class="card">Utilities</div>
        <div class="card">Creative</div>
    </div>

    <footer>
        © 2026 Nebula Core — Designed for Exploration
    </footer>

</body>
</html>
