<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Casino</title>
  <style>
    :root{
      --bg-1: #07120b;
      --bg-2: #0b2a18;
      --felt: #0f5b2f;
      --card:#0b1b12;
      --gold:#ffd166;
      --neon:#00ffd5;
      --muted:#bcd8c2;
      --glass: rgba(255,255,255,0.03);
      --glass-2: rgba(255,255,255,0.02);
    }

    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;color:#eafaf1;background:
      radial-gradient(1200px 600px at 10% 10%, rgba(0,255,213,0.03), transparent 10%),
      linear-gradient(180deg,var(--bg-1) 0%, var(--bg-2) 100%); -webkit-font-smoothing:antialiased;}

    /* Top-left back button */
    .back-btn{
      position:fixed;
      top:14px;
      left:14px;
      z-index:1000;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      color:var(--gold);
      text-decoration:none;
      border-radius:10px;
      box-shadow:0 8px 30px rgba(3,8,6,0.6), 0 0 10px rgba(0,255,213,0.03) inset;
      border:1px solid rgba(255,255,255,0.04);
      font-weight:700;
      letter-spacing:0.2px;
      transition:transform .12s ease, box-shadow .12s ease;
      backdrop-filter: blur(6px);
    }
    .back-btn svg{filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6));}
    .back-btn:hover{transform:translateY(-3px); box-shadow:0 18px 40px rgba(3,8,6,0.7), 0 0 18px rgba(0,255,213,0.06) inset;}

    .container{
      max-width:1200px;
      margin:84px auto 48px;
      padding:28px;
    }

    header{
      display:flex;
      align-items:center;
      gap:18px;
      margin-bottom:18px;
    }
    .logo {
      width:64px;
      height:64px;
      border-radius:12px;
      background:linear-gradient(135deg, rgba(255,209,102,0.12), rgba(0,255,213,0.04));
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 30px rgba(0,0,0,0.6), 0 0 18px rgba(0,255,213,0.03) inset;
      border:1px solid rgba(255,255,255,0.03);
    }
    .logo svg{width:40px;height:40px}

    h1{
      margin:0;
      font-size:32px;
      color:var(--gold);
      text-shadow:0 6px 18px rgba(0,0,0,0.6), 0 0 10px rgba(255,209,102,0.06);
      letter-spacing:-0.4px;
    }
    p.lead{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    /* Grid of game buttons */
    .games-grid{
      margin-top:22px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:18px;
    }

    .game-card{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02));
      border-radius:14px;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:flex-start;
      box-shadow:0 10px 30px rgba(2,6,8,0.6);
      border:1px solid rgba(255,255,255,0.03);
      transition:transform .14s cubic-bezier(.2,.9,.3,1), box-shadow .14s ease;
      position:relative;
      overflow:hidden;
    }
    .game-card::after{
      content:"";
      position:absolute;
      right:-40%;
      top:-30%;
      width:220%;
      height:120%;
      background:radial-gradient(closest-side, rgba(0,255,213,0.06), transparent 30%);
      transform:rotate(18deg);
      pointer-events:none;
    }
    .game-card:hover{transform:translateY(-8px); box-shadow:0 26px 60px rgba(2,6,8,0.7);}

    .game-title{
      font-weight:800;
      color:#fff;
      font-size:16px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .chip {
      width:34px;
      height:34px;
      border-radius:50%;
      background:linear-gradient(180deg,#ffefc2,#ffd166);
      display:inline-grid;
      place-items:center;
      color:#0b1b12;
      font-weight:800;
      box-shadow:0 6px 18px rgba(0,0,0,0.5);
      border:2px solid rgba(255,255,255,0.06);
    }

    .game-desc{font-size:13px;color:var(--muted);margin-top:0}

    .play-btn{
      margin-top:auto;
      align-self:stretch;
      display:inline-flex;
      justify-content:center;
      padding:12px 14px;
      background:linear-gradient(90deg,var(--neon), #00bfa5);
      color:#02120b;
      font-weight:800;
      border-radius:10px;
      text-decoration:none;
      border:none;
      cursor:pointer;
      box-shadow:0 8px 30px rgba(0,255,213,0.06), 0 6px 18px rgba(0,0,0,0.5);
      transition:transform .12s ease, box-shadow .12s ease;
    }
    .play-btn:active{transform:translateY(1px)}
    .play-btn:hover{box-shadow:0 18px 48px rgba(0,255,213,0.09), 0 10px 30px rgba(0,0,0,0.6)}

    /* Accent ribbon for featured games */
    .ribbon{
      position:absolute;
      top:12px;
      left:-36px;
      transform:rotate(-18deg);
      background:linear-gradient(90deg,#ff9f1a,#ffd166);
      color:#07120b;
      padding:6px 56px;
      font-weight:800;
      font-size:12px;
      box-shadow:0 6px 18px rgba(0,0,0,0.45);
      border-radius:6px;
      letter-spacing:0.6px;
    }

    /* small screens */
    @media (max-width:520px){
      .container{margin-top:72px;padding:16px}
      .back-btn{padding:8px 10px;font-size:14px}
      h1{font-size:24px}
      .games-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
    }
  </style>
</head>
<body>
  <!-- Fixed top-left back button -->
  <a class="back-btn" href="index.html" aria-label="Back to Dashboard">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back to Dashboard
  </a>

  <main class="container" id="hub">
    <header>
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="6" y="6" width="52" height="52" rx="10" fill="url(#g)"/>
          <g transform="translate(12,12)" fill="#07120b" font-weight="800">
            <circle cx="20" cy="12" r="8" fill="#ffd166"/>
            <rect x="6" y="28" width="28" height="6" rx="3" fill="#00ffd5"/>
          </g>
          <defs>
            <linearGradient id="g" x1="0" x2="1">
              <stop offset="0" stop-color="#0f5b2f"/>
              <stop offset="1" stop-color="#072b18"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <div>
        <h1>The Casino</h1>
        <p class="lead">Premium tables, bright lights, and big wins. Pick a game and good luck.</p>
      </div>
    </header>

    <section class="games-grid" id="gamesGrid" aria-live="polite">
      <!-- Game buttons will be injected here by JavaScript -->
    </section>
  </main>

  <script>
    const games = [
      { title: "Slots", slug: "slots.html", desc: "Classic 3-reel and 5-reel slot machines.", featured: true },
      { title: "Blackjack", slug: "blackjack.html", desc: "Beat the dealer in this card classic." },
      { title: "Roulette", slug: "roulette.html", desc: "Place your bets on red, black, or a number." },
      { title: "Poker", slug: "poker.html", desc: "Texas Hold'em and other poker variants.", featured: true },
      { title: "Baccarat", slug: "baccarat.html", desc: "High-roller card game with simple rules." },
      { title: "Craps", slug: "craps.html", desc: "Fast-paced dice action." },
      { title: "Video Poker", slug: "video-poker.html", desc: "Poker hands on a slot-style machine." },
      { title: "Keno", slug: "keno.html", desc: "Pick numbers and hope for a big hit." },
      { title: "Bingo", slug: "bingo.html", desc: "Classic bingo halls and online rooms." },
      { title: "Scratch Cards", slug: "scratch.html", desc: "Instant-win scratch-off tickets." }
    ];

    const grid = document.getElementById('gamesGrid');

    games.forEach(game => {
      const card = document.createElement('article');
      card.className = 'game-card';
      card.setAttribute('role','group');
      card.setAttribute('aria-label', game.title);

      if (game.featured) {
        const ribbon = document.createElement('div');
        ribbon.className = 'ribbon';
        ribbon.textContent = 'HOT';
        card.appendChild(ribbon);
      }

      const titleRow = document.createElement('div');
      titleRow.style.display = 'flex';
      titleRow.style.alignItems = 'center';
      titleRow.style.gap = '10px';
      titleRow.style.width = '100%';

      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = game.title.charAt(0);

      const title = document.createElement('div');
      title.className = 'game-title';
      title.textContent = game.title;

      titleRow.appendChild(chip);
      titleRow.appendChild(title);

      const desc = document.createElement('div');
      desc.className = 'game-desc';
      desc.textContent = game.desc;

      const play = document.createElement('a');
      play.className = 'play-btn';
      play.href = game.slug;
      play.textContent = 'Play';
      play.setAttribute('aria-label', `Play ${game.title}`);
      play.dataset.game = game.title.toLowerCase().replace(/\s+/g,'-');

      card.appendChild(titleRow);
      card.appendChild(desc);
      card.appendChild(play);

      grid.appendChild(card);
    });

    // Keyboard accessibility
    grid.addEventListener('keydown', (e) => {
      const card = e.target.closest('.game-card');
      if (!card) return;
      if (e.key === 'Enter' || e.key === ' ') {
        const link = card.querySelector('.play-btn');
        if (link) link.click();
      }
    });

    // Make cards focusable
    document.querySelectorAll('.game-card').forEach(c => c.tabIndex = 0);
  </script>
</body>
</html>
