<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Casino — Hub</title>
  <style>
    :root{
      --bg:#06060a;
      --panel:#0f1115;
      --card:#121318;
      --accent:#ffb86b;
      --accent-2:#7c5cff;
      --muted:#9aa0a6;
      --glass: rgba(255,255,255,0.03);
      --glow: rgba(124,92,255,0.14);
      --success:#2ee6a7;
    }

    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#e6eef6;background:
      radial-gradient(800px 400px at 10% 10%, rgba(124,92,255,0.04), transparent 8%),
      linear-gradient(180deg,var(--bg) 0%, #0b0b0d 100%);-webkit-font-smoothing:antialiased;}

    /* Top-left back button */
    .back-btn{
      position:fixed;
      top:14px;
      left:14px;
      z-index:1000;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.02));
      color:var(--accent);
      text-decoration:none;
      border-radius:10px;
      box-shadow:0 8px 30px rgba(0,0,0,0.6);
      border:1px solid rgba(255,255,255,0.03);
      font-weight:700;
    }
    .back-btn:hover{transform:translateY(-3px);}

    /* Top-right gambling button */
    .gamble-btn{
      position:fixed;
      top:14px;
      right:14px;
      z-index:1000;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      background:linear-gradient(90deg,var(--accent-2),var(--accent));
      color:#071018;
      text-decoration:none;
      border-radius:10px;
      box-shadow:0 12px 36px var(--glow);
      border:1px solid rgba(255,255,255,0.04);
      font-weight:800;
      letter-spacing:0.2px;
    }
    .gamble-btn svg{filter:drop-shadow(0 6px 18px rgba(124,92,255,0.12));}
    .gamble-btn:active{transform:translateY(1px);}

    .container{
      max-width:1200px;
      margin:92px auto 48px;
      padding:28px;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-bottom:18px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
    }
    .logo {
      width:64px;
      height:64px;
      border-radius:12px;
      background:linear-gradient(135deg,#0f1720,#071018);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.6), 0 0 18px rgba(124,92,255,0.03) inset;
      border:1px solid rgba(255,255,255,0.03);
    }
    .logo svg{width:40px;height:40px}

    .title-wrap{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    h1{
      margin:0;
      font-size:28px;
      color:var(--accent);
      letter-spacing:-0.3px;
    }
    p.lead{
      margin:0;
      color:var(--muted);
      font-size:13px;
    }

    /* Grid of game buttons */
    .games-grid{
      margin-top:22px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
      gap:18px;
    }

    .game-card{
      background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(0,0,0,0.02));
      border-radius:14px;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:flex-start;
      box-shadow:0 10px 30px rgba(2,6,8,0.6);
      border:1px solid rgba(255,255,255,0.03);
      transition:transform .14s cubic-bezier(.2,.9,.3,1), box-shadow .14s ease;
      position:relative;
      overflow:hidden;
    }
    .game-card:hover{transform:translateY(-8px); box-shadow:0 26px 60px rgba(2,6,8,0.75);}

    .game-title{
      font-weight:800;
      color:#fff;
      font-size:16px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .chip {
      width:36px;
      height:36px;
      border-radius:50%;
      background:linear-gradient(180deg,#ffd9b3,#ffb86b);
      display:inline-grid;
      place-items:center;
      color:#071018;
      font-weight:800;
      box-shadow:0 6px 18px rgba(0,0,0,0.5);
      border:2px solid rgba(255,255,255,0.04);
      flex-shrink:0;
    }

    .game-desc{font-size:13px;color:var(--muted);margin-top:0}

    .play-btn{
      margin-top:auto;
      align-self:stretch;
      display:inline-flex;
      justify-content:center;
      padding:12px 14px;
      background:linear-gradient(90deg,var(--accent-2), var(--accent));
      color:#071018;
      font-weight:800;
      border-radius:10px;
      text-decoration:none;
      border:none;
      cursor:pointer;
      box-shadow:0 8px 30px rgba(124,92,255,0.06);
      transition:transform .12s ease, box-shadow .12s ease;
    }
    .play-btn:hover{box-shadow:0 18px 48px rgba(124,92,255,0.09);}
    .play-btn:active{transform:translateY(1px);}

    /* small screens */
    @media (max-width:520px){
      .container{margin-top:80px;padding:16px}
      .back-btn,.gamble-btn{padding:8px 10px;font-size:13px}
      h1{font-size:22px}
      .games-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
    }
  </style>
</head>
<body>
  <!-- Fixed top-left back button -->
  <a class="back-btn" href="index.html" aria-label="Back to Dashboard">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back to Dashboard
  </a>

  <!-- Fixed top-right gambling button -->
  <a class="gamble-btn" href="gambling.html" aria-label="Gambling">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 2v20" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 8h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 16h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Gamble
  </a>

  <main class="container" id="hub">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="6" y="6" width="52" height="52" rx="10" fill="#0b0f12"/>
            <g transform="translate(12,12)" fill="none" stroke="none">
              <circle cx="20" cy="14" r="8" fill="#ffb86b"/>
              <rect x="6" y="30" width="28" height="6" rx="3" fill="#7c5cff"/>
            </g>
          </svg>
        </div>
        <div class="title-wrap">
          <h1>The Casino</h1>
          <p class="lead">Sleek tables, sharper lights. Pick a game and play responsibly.</p>
        </div>
      </div>
    </header>

    <section class="games-grid" id="gamesGrid" aria-live="polite">
      <!-- Game buttons injected by JavaScript -->
    </section>
  </main>

  <script>
    // Games list (edit to add/remove games)
    const games = [
      { title: "Slots", slug: "slots.html", desc: "Fast spins, big jackpots." },
      { title: "Blackjack", slug: "blackjack.html", desc: "Beat the dealer with strategy." },
      { title: "Roulette", slug: "roulette.html", desc: "Bet on colors, numbers, or ranges." },
      { title: "Poker", slug: "poker.html", desc: "Tables for all stakes and variants." },
      { title: "Baccarat", slug: "baccarat.html", desc: "Simple rules, high-roller appeal." },
      { title: "Craps", slug: "craps.html", desc: "Dice action with fast payouts." },
      { title: "Video Poker", slug: "video-poker.html", desc: "Skill meets slots." },
      { title: "Keno", slug: "keno.html", desc: "Pick numbers, wait for the draw." },
      { title: "Bingo", slug: "bingo.html", desc: "Community rooms and quick games." },
      { title: "Scratch Cards", slug: "scratch.html", desc: "Instant wins, instant fun." }
    ];

    const grid = document.getElementById('gamesGrid');

    function createCard(game){
      const card = document.createElement('article');
      card.className = 'game-card';
      card.setAttribute('role','group');
      card.setAttribute('aria-label', game.title);

      const row = document.createElement('div');
      row.style.display = 'flex';
      row.style.alignItems = 'center';
      row.style.gap = '12px';
      row.style.width = '100%';

      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = game.title.charAt(0);

      const title = document.createElement('div');
      title.className = 'game-title';
      title.textContent = game.title;

      row.appendChild(chip);
      row.appendChild(title);

      const desc = document.createElement('div');
      desc.className = 'game-desc';
      desc.textContent = game.desc;

      const play = document.createElement('a');
      play.className = 'play-btn';
      play.href = game.slug;
      play.textContent = 'Play';
      play.setAttribute('aria-label', `Play ${game.title}`);
      play.dataset.game = game.title.toLowerCase().replace(/\s+/g,'-');

      card.appendChild(row);
      card.appendChild(desc);
      card.appendChild(play);

      // make card focusable for keyboard users
      card.tabIndex = 0;
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          play.click();
        }
      });

      return card;
    }

    games.forEach(g => grid.appendChild(createCard(g)));

    // Optional: quick keyboard shortcut to open gambling page (G)
    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'g' && !e.metaKey && !e.ctrlKey && !e.altKey) {
        const link = document.querySelector('.gamble-btn');
        if (link) link.click();
      }
    });
  </script>
</body>
</html>
