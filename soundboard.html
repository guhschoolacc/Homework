<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Soundboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px; }
    header { position:fixed; top:10px; left:10px; }
    .grid { display:grid; grid-template-columns:repeat(3,140px); gap:12px; margin-top:80px; }
    button.sound { padding:12px; font-size:16px; cursor:pointer; }
    .controls { margin-top:20px; display:flex; gap:12px; align-items:center; }
    label { font-weight:600; }
  </style>
</head>
<body>
  <header><a href="index.html"><button>Return to dashboard</button></a></header>

  <h1>Web Soundboard + Mic Mixer</h1>

  <div class="controls">
    <label>Mic: <input id="micToggle" type="checkbox" checked></label>
    <label>Sound Volume: <input id="sVol" type="range" min="0" max="1" step="0.01" value="0.8"></label>
    <label>Mic Volume: <input id="mVol" type="range" min="0" max="1" step="0.01" value="1"></label>
    <button id="shareBtn">Use mixed stream (for WebRTC)</button>
  </div>

  <div class="grid" id="buttons">
    <button class="sound" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Sound 1</button>
    <button class="sound" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">Sound 2</button>
    <button class="sound" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3">Sound 3</button>
  </div>

  <p id="status"></p>

<script>
(async function(){
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const dest = audioCtx.createMediaStreamDestination(); // mixed output stream
  const sVol = document.getElementById('sVol');
  const mVol = document.getElementById('mVol');
  const micToggle = document.getElementById('micToggle');
  const status = document.getElementById('status');

  // Gain nodes
  const soundGain = audioCtx.createGain(); soundGain.gain.value = sVol.value;
  const micGain = audioCtx.createGain(); micGain.gain.value = mVol.value;

  // Hook up sliders
  sVol.addEventListener('input', ()=> soundGain.gain.value = sVol.value);
  mVol.addEventListener('input', ()=> micGain.gain.value = mVol.value);

  // Load and play sound via <audio> elements routed into WebAudio
  document.querySelectorAll('.sound').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const url = btn.dataset.src;
      const audio = new Audio(url);
      audio.crossOrigin = "anonymous";
      await audio.play().catch(()=>{}); // start playback
      const src = audioCtx.createMediaElementSource(audio);
      src.connect(soundGain).connect(dest);
      src.connect(audioCtx.destination); // also play to speakers
      // auto-stop after ended
      audio.addEventListener('ended', ()=> {
        try { src.disconnect(); } catch(e){}
      });
    });
  });

  // Get microphone and route into destination
  let micStream = null;
  async function enableMic(){
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const micSource = audioCtx.createMediaStreamSource(micStream);
      micSource.connect(micGain).connect(dest);
      // Also optionally monitor to speakers
      micSource.connect(audioCtx.destination);
      status.textContent = 'Microphone connected.';
    } catch (e) {
      status.textContent = 'Microphone access denied or unavailable.';
      console.error(e);
    }
  }
  if (micToggle.checked) await enableMic();
  micToggle.addEventListener('change', async ()=>{
    if (micToggle.checked) await enableMic();
    else {
      if (micStream) micStream.getTracks().forEach(t=>t.stop());
      status.textContent = 'Microphone disconnected.';
    }
  });

  // Expose mixed stream for WebRTC or recording
  document.getElementById('shareBtn').addEventListener('click', ()=>{
    const mixed = dest.stream; // MediaStream with mixed audio tracks
    // Example: open a new window that plays the mixed stream (for testing)
    const w = window.open('', '_blank');
    w.document.body.innerHTML = '<h3>Mixed stream preview</h3>';
    const audioEl = w.document.createElement('audio');
    audioEl.autoplay = true;
    audioEl.controls = true;
    audioEl.srcObject = mixed;
    w.document.body.appendChild(audioEl);
    status.textContent = 'Mixed MediaStream created; preview opened in new tab.';
  });

})();
</script>
</body>
</html>
