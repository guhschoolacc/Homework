<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tic Tac Toe — Play vs AI</title>
<style>
  :root{
    --bg:#0f1724;
    --card:#0b1220;
    --accent:#06b6d4;
    --muted:#94a3b8;
    --win:#16a34a;
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:linear-gradient(180deg,#071029 0%, #071a2a 100%);color:#e6eef6}
  /* Back button top-left */
  .back-wrap{position:fixed;top:16px;left:16px;z-index:60}
  .back-btn{
    display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;
    background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);color:var(--muted);
    text-decoration:none;font-weight:600;font-size:13px;backdrop-filter:blur(6px)
  }
  .back-btn:hover{background:rgba(255,255,255,0.04);color:var(--accent)}
  .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:32px}
  .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.04);padding:20px;border-radius:12px;max-width:420px;width:100%;box-shadow:0 8px 30px rgba(2,6,23,0.6)}
  h1{font-size:20px;margin:0 0 8px;color:var(--accent)}
  p.lead{margin:0 0 16px;color:var(--muted);font-size:13px}
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
  .cell{background:transparent;border:2px solid rgba(255,255,255,0.06);height:96px;display:flex;align-items:center;justify-content:center;font-size:44px;color:#e6eef6;border-radius:8px;cursor:pointer;user-select:none;transition:transform .08s ease,background .12s}
  .cell:hover{transform:translateY(-4px);background:rgba(255,255,255,0.02)}
  .controls{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:12px}
  button{background:var(--accent);border:none;color:#042027;padding:8px 12px;border-radius:8px;font-weight:600;cursor:pointer}
  button.secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);font-weight:600}
  .status{font-size:14px;color:var(--muted)}
  .highlight{background:linear-gradient(90deg, rgba(6,182,212,0.12), rgba(6,182,212,0.06));border-color:rgba(6,182,212,0.18)}
  .win{background:linear-gradient(90deg, rgba(22,163,74,0.12), rgba(22,163,74,0.06));border-color:rgba(22,163,74,0.18)}
  .disabled{pointer-events:none;opacity:0.9}
  footer{margin-top:12px;font-size:12px;color:var(--muted);text-align:center}
  @media (max-width:420px){.cell{height:72px;font-size:34px}}
</style>
</head>
<body>
  <!-- Back to dashboard button top-left -->
  <div class="back-wrap">
    <a class="back-btn" href="index.html" aria-label="Back to dashboard">← Back to dashboard</a>
  </div>

<div class="wrap">
  <div class="card" role="application" aria-label="Tic Tac Toe game">
    <h1>Tic Tac Toe — Play vs AI</h1>
    <p class="lead">You are <strong>X</strong>. Click a square to play. The AI is <strong>O</strong> and plays optimally.</p>

    <div id="board" class="board" aria-live="polite"></div>

    <div class="controls">
      <div class="status" id="status">Your turn</div>
      <div style="display:flex;gap:8px">
        <button id="restart">Restart</button>
        <button id="swap" class="secondary">Swap sides</button>
      </div>
    </div>

    <footer>Minimax AI; unbeatable when playing perfectly</footer>
  </div>
</div>

<script>
/* Tic Tac Toe with Minimax AI
   - Board indices: 0..8
   - Player: 'X' (human) or 'O' (AI) depending on side
*/

const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const restartBtn = document.getElementById('restart');
const swapBtn = document.getElementById('swap');

let board = Array(9).fill(null);
let human = 'X';
let ai = 'O';
let currentPlayer = 'X';
let gameOver = false;

// Winning lines
const lines = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function createBoard(){
  boardEl.innerHTML = '';
  for(let i=0;i<9;i++){
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;
    cell.setAttribute('role','button');
    cell.setAttribute('aria-label','Square ' + (i+1));
    cell.addEventListener('click', onCellClick);
    boardEl.appendChild(cell);
  }
  render();
}

function onCellClick(e){
  const idx = Number(e.currentTarget.dataset.index);
  if(gameOver || board[idx]) return;
  if(currentPlayer !== human) return;
  makeMove(idx, human);
  if(!gameOver) {
    // AI move after a short delay for UX
    setTimeout(() => {
      const aiMove = bestMove(board, ai);
      if(aiMove !== null) makeMove(aiMove, ai);
    }, 220);
  }
}

function makeMove(idx, player){
  if(board[idx] || gameOver) return;
  board[idx] = player;
  render();
  const winner = checkWinner(board);
  if(winner){
    endGame(winner);
    return;
  }
  if(isBoardFull(board)){
    endGame('draw');
    return;
  }
  currentPlayer = (player === 'X') ? 'O' : 'X';
  updateStatus();
}

function updateStatus(){
  if(gameOver) return;
  if(currentPlayer === human) statusEl.textContent = 'Your turn';
  else statusEl.textContent = 'AI thinking...';
}

function endGame(result){
  gameOver = true;
  if(result === 'draw'){
    statusEl.textContent = "It's a draw";
    highlightLine(null);
  } else {
    statusEl.textContent = (result === human) ? 'You win!' : 'AI wins';
    const winLine = winningLine(board, result);
    highlightLine(winLine);
  }
  // disable further clicks visually
  boardEl.classList.add('disabled');
}

function highlightLine(line){
  // clear first
  document.querySelectorAll('.cell').forEach(c => {
    c.classList.remove('highlight','win');
  });
  if(!line) return;
  const cls = (board[line[0]] === ai) ? 'win' : 'highlight';
  line.forEach(i => {
    const el = boardEl.querySelector(`.cell[data-index="${i}"]`);
    if(el) el.classList.add(cls);
  });
}

function render(){
  for(let i=0;i<9;i++){
    const el = boardEl.querySelector(`.cell[data-index="${i}"]`);
    el.textContent = board[i] || '';
  }
}

// Helpers
function isBoardFull(b){ return b.every(Boolean); }

function checkWinner(b){
  for(const [a,c,d] of lines){
    if(b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
  }
  return null;
}

function winningLine(b, player){
  for(const line of lines){
    const [a,c,d] = line;
    if(b[a] === player && b[c] === player && b[d] === player) return line;
  }
  return null;
}

// Minimax algorithm
function bestMove(b, player){
  // If board empty and AI is 'O' and human 'X', choose center for variety
  if(b.every(x => x === null) && player === ai){
    return 4;
  }
  let bestScore = -Infinity;
  let move = null;
  for(let i=0;i<9;i++){
    if(!b[i]){
      b[i] = player;
      const score = minimax(b, 0, false, player === ai ? ai : human);
      b[i] = null;
      if(score > bestScore){
        bestScore = score;
        move = i;
      }
    }
  }
  return move;
}

function minimax(b, depth, isMaximizing, maximizingPlayer){
  const winner = checkWinner(b);
  if(winner === ai) return 10 - depth;
  if(winner === human) return depth - 10;
  if(isBoardFull(b)) return 0;

  if(isMaximizing){
    let best = -Infinity;
    for(let i=0;i<9;i++){
      if(!b[i]){
        b[i] = maximizingPlayer;
        best = Math.max(best, minimax(b, depth+1, false, maximizingPlayer));
        b[i] = null;
      }
    }
    return best;
  } else {
    let best = Infinity;
    const opponent = (maximizingPlayer === 'X') ? 'O' : 'X';
    for(let i=0;i<9;i++){
      if(!b[i]){
        b[i] = opponent;
        best = Math.min(best, minimax(b, depth+1, true, maximizingPlayer));
        b[i] = null;
      }
    }
    return best;
  }
}

// UI controls
restartBtn.addEventListener('click', () => {
  board = Array(9).fill(null);
  currentPlayer = 'X';
  gameOver = false;
  boardEl.classList.remove('disabled');
  statusEl.textContent = 'Your turn';
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight','win'));
  render();
  // If AI is X (after swap), let AI start
  if(currentPlayer !== human){
    setTimeout(() => {
      const aiMove = bestMove(board, ai);
      if(aiMove !== null) makeMove(aiMove, ai);
    }, 220);
  }
});

swapBtn.addEventListener('click', () => {
  // Swap sides: human becomes O and AI X, and restart
  [human, ai] = [ai, human];
  board = Array(9).fill(null);
  currentPlayer = 'X';
  gameOver = false;
  boardEl.classList.remove('disabled');
  document.querySelectorAll('.cell').forEach(c => c.classList.remove('highlight','win'));
  statusEl.textContent = (currentPlayer === human) ? 'Your turn' : 'AI thinking...';
  render();
  // If AI now starts (AI is X), make AI move
  if(currentPlayer === ai){
    setTimeout(() => {
      const aiMove = bestMove(board, ai);
      if(aiMove !== null) makeMove(aiMove, ai);
    }, 220);
  }
});

// Initialize
createBoard();
updateStatus();
</script>
</body>
</html>
