<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Global Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1724; --panel:#0b1220; --muted:#9aa4b2; --accent:#5865f2; --border:rgba(255,255,255,0.04); --text:#e6eef6;
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text);overflow:hidden}
  .app{height:100vh;display:grid;grid-template-columns:240px 1fr;gap:0}
  .channels{background:var(--panel);padding:16px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:12px}
  .channels .title{font-weight:700}
  .channel{padding:10px;border-radius:8px;background:rgba(255,255,255,0.02);display:flex;align-items:center;gap:8px}
  .chat{display:flex;flex-direction:column;min-width:0;height:100vh}
  .chat-header{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--border);flex:0 0 64px}
  .messages{height:calc(100vh - 64px - 84px); overflow:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
  .message-row{display:flex;gap:12px;align-items:flex-start}
  .message-row.me{flex-direction:row-reverse}
  .avatar{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,#6b7cff,#00d4ff);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;flex-shrink:0;overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover;border-radius:8px}
  .message{max-width:70%;background:var(--panel);padding:10px 12px;border-radius:10px;color:var(--text);word-break:break-word;position:relative}
  .message.me{background:linear-gradient(180deg,#2b3446,#1f2937)}
  .meta{display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .meta .name{font-weight:700}
  .meta .time{color:var(--muted);font-size:12px}
  .message img.media{max-width:420px;border-radius:8px;display:block;margin-top:8px}
  .message .embedded-video{max-width:420px;border-radius:8px;display:block;margin-top:8px}
  .reply-quote{border-left:3px solid rgba(255,255,255,0.06);padding-left:8px;margin-bottom:8px;color:var(--muted);font-size:13px;border-radius:6px;background:rgba(255,255,255,0.01)}
  .msg-actions{display:flex;gap:8px;margin-top:6px}
  .msg-actions button{background:transparent;border:0;color:var(--muted);cursor:pointer;padding:6px;border-radius:6px}
  .composer-wrap{position:fixed;left:260px;right:20px;bottom:18px;padding:12px;display:flex;justify-content:center;pointer-events:none;z-index:30}
  .composer{width:100%;background:linear-gradient(180deg,#071226,#071226);border-radius:14px;padding:6px 8px;display:flex;gap:8px;align-items:center;box-shadow:0 10px 30px rgba(2,6,23,0.6);pointer-events:auto}
  .text{flex:1;background:transparent;border-radius:8px;padding:8px 10px;color:var(--text);min-height:36px;max-height:84px;outline:none;border:1px solid rgba(255,255,255,0.03);overflow:auto;font-size:14px}
  .controls{display:flex;gap:6px;align-items:center}
  .icon-btn{background:transparent;border:0;padding:8px;border-radius:8px;color:var(--muted);cursor:pointer;font-size:18px}
  .btn{background:var(--accent);color:white;padding:8px 12px;border-radius:10px;border:none;cursor:pointer}
  .panel{position:fixed;right:20px;bottom:88px;z-index:9999;background:#071226;padding:12px;border-radius:10px;box-shadow:0 8px 30px rgba(2,6,23,0.6);max-width:520px;max-height:420px;overflow:auto;display:none}
  .attach-url-box{position:fixed;background:#071226;padding:10px;border-radius:10px;box-shadow:0 8px 30px rgba(2,6,23,0.6);z-index:60;display:none;min-width:320px}
  .attach-url-box input{width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);margin-bottom:8px}
  .profile-bottom{position:fixed;left:18px;bottom:18px;display:flex;align-items:center;gap:8px;z-index:40;cursor:pointer}
  .profile-bottom img{width:44px;height:44px;border-radius:8px;object-fit:cover}
  .profile-bottom .name{font-size:13px;color:var(--text);max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .status-toast{position:fixed;right:18px;bottom:18px;background:rgba(0,0,0,0.6);color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;z-index:45;display:none}
  @media (max-width:900px){ .app{grid-template-columns:1fr} .composer-wrap{left:20px;right:20px} .panel{right:20px} .messages{height:calc(100vh - 64px - 120px)} .attach-url-box{left:50%;transform:translateX(-50%);right:20px;left:20px} }
</style>
</head>
<body>
  <div class="app" id="app">
    <div class="channels">
      <div class="title">Community</div>
      <div class="channel"><span style="color:var(--muted);font-weight:700">#</span>&nbsp;global</div>
    </div>

    <div class="chat">
      <div class="chat-header">
        <div style="display:flex;gap:12px;align-items:center">
          <div style="font-weight:700"># global</div>
          <div style="color:var(--muted);font-size:13px">Public channel • Realtime</div>
        </div>
        <div id="headerStatus" style="color:var(--muted);font-size:12px">Connecting...</div>
      </div>

      <div class="messages" id="messages" aria-live="polite" tabindex="0"></div>
    </div>
  </div>

  <div class="profile-bottom" id="profileBottom" title="Open profile" style="display:none">
    <img id="profileBottomImg" src="" alt="avatar" />
    <div class="name" id="profileBottomName"></div>
  </div>

  <div class="composer-wrap">
    <div class="composer" role="region" aria-label="Message composer">
      <div style="display:flex;flex-direction:column;flex:1;gap:6px">
        <div id="replyBox" style="display:none">
          <div class="reply-indicator">
            <div style="font-size:13px;color:var(--muted)">Replying to <strong id="replyToName"></strong></div>
            <div style="color:var(--muted);font-size:13px" id="replyToSnippet"></div>
            <button id="cancelReply" title="Cancel reply">✖</button>
          </div>
        </div>
        <div contenteditable="true" id="textInput" class="text" placeholder="Message #global" aria-label="Message input"></div>
      </div>

      <div class="controls" aria-hidden="false">
        <button class="icon-btn" id="favBtn" title="Favorites">★</button>
        <button class="icon-btn" id="gifBtn" title="GIF">GIF</button>
        <button class="icon-btn" id="emojiToggle" title="Emoji">😊</button>
        <button class="icon-btn" id="attachBtn" title="Attach image (URL or file)">📎</button>
        <input id="fileInput" type="file" accept="image/*,video/*" style="display:none" />
        <button class="btn" id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <div class="attach-url-box" id="attachUrlBox" role="dialog" aria-hidden="true">
    <input id="attachUrlInput" placeholder="Paste image/GIF/MP4 URL here (http(s)://)"/>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button id="attachCancel" class="icon-btn">Cancel</button>
      <button id="attachSend" class="btn">Send</button>
    </div>
  </div>

  <div id="statusToast" class="status-toast" role="status" aria-live="polite"></div>

  <div id="tenorPanel" class="panel" aria-hidden="true"></div>
  <div id="favPanel" class="panel fav-panel" aria-hidden="true"></div>

  <script type="module" src="https://unpkg.com/emoji-picker-element@^1/index.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const firebaseConfig = {
      apiKey: "AIzaSyCR8I5eOiZbHzVZJDEQHYpyxXbcClk_rxA",
      authDomain: "goon-7ddc3.firebaseapp.com",
      projectId: "goon-7ddc3",
      storageBucket: "goon-7ddc3.firebasestorage.app",
      messagingSenderId: "117099331820",
      appId: "1:117099331820:web:3af984b15a843d3d7b65c"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    const TENOR_API_KEY = "LIVDSRZULELA";

    // UI refs
    const messagesEl = document.getElementById('messages');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const gifBtn = document.getElementById('gifBtn');
    const tenorPanel = document.getElementById('tenorPanel');
    const favPanel = document.getElementById('favPanel');
    const favBtn = document.getElementById('favBtn');
    const emojiToggle = document.getElementById('emojiToggle');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const headerStatus = document.getElementById('headerStatus');
    const profileBottom = document.getElementById('profileBottom');
    const profileBottomImg = document.getElementById('profileBottomImg');
    const profileBottomName = document.getElementById('profileBottomName');
    const attachUrlBox = document.getElementById('attachUrlBox');
    const attachUrlInput = document.getElementById('attachUrlInput');
    const attachCancel = document.getElementById('attachCancel');
    const attachSend = document.getElementById('attachSend');
    const statusToast = document.getElementById('statusToast');

    // state
    let currentUser = null;
    let unsubscribeMessages = null;
    let unsubscribeUsers = null;
    const renderedIds = new Set();
    const usersCache = new Map(); // uid -> { displayName, photoURL }
    let replyTo = null;

    // emoji picker
    const picker = document.createElement('emoji-picker');
    picker.style.display = 'none';
    picker.style.position = 'fixed';
    picker.style.zIndex = 9999;
    document.body.appendChild(picker);

    emojiToggle.addEventListener('click', () => {
      const open = picker.style.display === 'block';
      picker.style.display = open ? 'none' : 'block';
      tenorPanel.style.display = 'none';
      favPanel.style.display = 'none';
      attachUrlBox.style.display = 'none';
      positionPicker();
    });

    picker.addEventListener('emoji-click', (ev) => {
      insertAtCursor(textInput, ev.detail.unicode);
      picker.style.display = 'none';
      textInput.focus();
    });

    function positionPicker(){
      const rect = document.querySelector('.composer').getBoundingClientRect();
      picker.style.left = Math.max(8, rect.left + rect.width - 420) + 'px';
      picker.style.top = Math.max(8, rect.top - 420) + 'px';
    }

    function insertAtCursor(el, text) {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) { el.textContent += text; return; }
      const range = sel.getRangeAt(0);
      let node = range.startContainer;
      let inside = false;
      while(node){ if(node === el){ inside = true; break; } node = node.parentNode; }
      if(!inside){ el.focus(); range.selectNodeContents(el); range.collapse(false); }
      range.deleteContents();
      const nodeText = document.createTextNode(text);
      range.insertNode(nodeText);
      range.setStartAfter(nodeText);
      range.setEndAfter(nodeText);
      sel.removeAllRanges();
      sel.addRange(range);
    }

    // favorites & tenor (kept minimal)
    const FAV_KEY = 'favGifs_v1';
    function getFavorites(){ try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch { return []; } }
    function saveFavorites(arr){ localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }
    function isFavorited(url){ return getFavorites().includes(url); }
    function toggleFavorite(url){ const favs = getFavorites(); const idx = favs.indexOf(url); if (idx === -1) favs.unshift(url); else favs.splice(idx,1); saveFavorites(favs); }

    favBtn.addEventListener('click', () => {
      picker.style.display = 'none';
      tenorPanel.style.display = 'none';
      attachUrlBox.style.display = 'none';
      favPanel.style.display = favPanel.style.display === 'block' ? 'none' : 'block';
      renderFavoritesPanel();
    });

    function renderFavoritesPanel() {
      favPanel.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:700">Favorites</div><button id="clearFavs" class="icon-btn" title="Clear">Clear</button></div><div id="favGrid"></div>';
      const grid = favPanel.querySelector('#favGrid');
      grid.style.display = 'flex';
      grid.style.flexWrap = 'wrap';
      grid.style.gap = '8px';
      const favs = getFavorites();
      if (favs.length === 0) grid.innerHTML = '<div style="color:var(--muted)">No favorites yet</div>';
      favs.forEach(url => {
        const item = document.createElement('div');
        item.className = 'fav-item';
        item.style.width = '120px';
        item.style.height = '80px';
        item.style.borderRadius = '8px';
        item.style.overflow = 'hidden';
        item.style.cursor = 'pointer';
        const img = document.createElement('img');
        img.src = url;
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';
        item.appendChild(img);
        item.addEventListener('click', () => {
          sendMessage(url);
          favPanel.style.display = 'none';
        });
        grid.appendChild(item);
      });
      const clearBtn = favPanel.querySelector('#clearFavs');
      clearBtn.addEventListener('click', () => { saveFavorites([]); renderFavoritesPanel(); });
    }

    // GIF button
    gifBtn.addEventListener('click', () => {
      picker.style.display = 'none';
      favPanel.style.display = 'none';
      attachUrlBox.style.display = 'none';
      if (tenorPanel.style.display === 'block') {
        tenorPanel.style.display = 'none';
        tenorPanel.setAttribute('aria-hidden','true');
      } else {
        showTenorSearch();
      }
    });

    function showTenorSearch() {
      tenorPanel.style.display = 'block';
      tenorPanel.setAttribute('aria-hidden','false');
      tenorPanel.innerHTML = `
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input id="tenorQuery" placeholder="Search GIFs" style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#e6eef8" />
          <button id="tenorSearchBtn" class="btn">Search</button>
        </div>
        <div id="tenorResults" class="tenor-grid"></div>
      `;
      document.getElementById('tenorSearchBtn').addEventListener('click', () => tenorSearch(document.getElementById('tenorQuery').value || 'funny'));
      tenorSearch('funny');
    }

    async function tenorSearch(query) {
      const resultsEl = document.getElementById('tenorResults');
      resultsEl.innerHTML = 'Searching...';
      try {
        const url = `https://g.tenor.com/v1/search?q=${encodeURIComponent(query)}&key=${TENOR_API_KEY}&limit=24`;
        const res = await fetch(url);
        const data = await res.json();
        resultsEl.innerHTML = '';
        (data.results || []).forEach(item => {
          const media = item.media && item.media[0];
          const gifUrl = media?.gif?.url || media?.mediumgif?.url || media?.mp4?.url;
          if (!gifUrl) return;
          const card = document.createElement('div');
          card.className = 'gif-card';
          const img = document.createElement('img');
          img.src = gifUrl;
          img.alt = item.title || 'gif';
          img.addEventListener('click', () => {
            sendMessage(gifUrl);
            tenorPanel.style.display = 'none';
          });
          const star = document.createElement('button');
          star.className = 'fav-btn';
          star.title = 'Favorite';
          star.innerHTML = isFavorited(gifUrl) ? '★' : '☆';
          star.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFavorite(gifUrl);
            star.innerHTML = isFavorited(gifUrl) ? '★' : '☆';
            renderFavoritesPanel();
          });
          card.appendChild(img);
          card.appendChild(star);
          resultsEl.appendChild(card);
        });
        if (!data.results || data.results.length === 0) resultsEl.innerHTML = '<div style="color:var(--muted)">No results</div>';
      } catch (err) {
        console.error(err);
        resultsEl.innerHTML = '<div style="color:var(--muted)">Error searching Tenor</div>';
      }
    }

    // Attach URL box
    attachBtn.addEventListener('click', (e) => {
      picker.style.display = 'none';
      tenorPanel.style.display = 'none';
      favPanel.style.display = 'none';

      const rect = attachBtn.getBoundingClientRect();
      const box = attachUrlBox;
      const boxWidth = Math.min(420, Math.max(320, window.innerWidth - 40));
      let computedLeft = rect.left + rect.width/2 - 24 - (boxWidth/2);
      if (computedLeft < 20) computedLeft = 20;
      if (computedLeft + boxWidth > window.innerWidth - 20) computedLeft = window.innerWidth - 20 - boxWidth;
      box.style.minWidth = boxWidth + 'px';
      box.style.left = computedLeft + 'px';
      const bottom = window.innerHeight - rect.top + 12;
      box.style.bottom = bottom + 'px';
      box.style.transform = 'none';
      attachUrlInput.value = '';
      box.style.display = 'block';
      box.setAttribute('aria-hidden','false');
      attachUrlInput.focus();
    });

    attachCancel.addEventListener('click', () => {
      attachUrlBox.style.display = 'none';
      attachUrlBox.setAttribute('aria-hidden','true');
    });

    attachSend.addEventListener('click', async () => {
      const url = attachUrlInput.value.trim();
      if (!url) { showToast('Paste a valid http(s) URL.'); return; }
      if (!/^https?:\/\//i.test(url) && !/^data:/i.test(url)) { showToast('Please paste a valid http(s) or data URL.'); return; }
      attachUrlBox.style.display = 'none';
      attachUrlBox.setAttribute('aria-hidden','true');
      try {
        if (url.startsWith('data:')) {
          const blob = await dataUrlToBlob(url);
          const uploadedUrl = await uploadMediaBlob(blob, 'inline_' + Date.now());
          await sendMessage(uploadedUrl);
        } else {
          await sendMessage(url);
        }
      } catch (err) {
        console.error('attach send failed', err);
        showToast('Send failed');
      }
    });

    // file/paste/drag handlers
    fileInput.addEventListener('change', (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      handleFileAndSend(f);
      fileInput.value = '';
    });

    textInput.addEventListener('paste', (ev) => {
      const items = (ev.clipboardData && ev.clipboardData.items) || [];
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        if (item.type.indexOf('image') !== -1) {
          ev.preventDefault();
          const file = item.getAsFile();
          handleFileAndSend(file);
          return;
        }
      }
    });

    ['dragenter','dragover'].forEach(evt => {
      document.addEventListener(evt, (e) => { if (e.dataTransfer) e.preventDefault(); }, { passive: false });
    });
    document.addEventListener('drop', (e) => {
      if (!e.dataTransfer) return;
      e.preventDefault();
      const files = Array.from(e.dataTransfer.files || []);
      if (files.length === 0) return;
      const file = files.find(f => /^image|video/.test(f.type));
      if (file) handleFileAndSend(file);
    });

    async function handleFileAndSend(file) {
      try {
        const uploadedUrl = await uploadMediaFile(file);
        await sendMessage(uploadedUrl);
      } catch (err) {
        console.error('file send failed', err);
        showToast('Send failed');
      }
    }

    // upload helpers
    async function uploadMediaFile(file) {
      const uid = (currentUser && currentUser.uid) ? currentUser.uid : ('anon_' + Date.now());
      const ext = (file.name && file.name.split('.').pop()) || (file.type.split('/').pop()) || 'bin';
      const path = `chat_media/${uid}_${Date.now()}.${ext}`;
      const ref = storage.ref().child(path);
      const snap = await ref.put(file);
      return await snap.ref.getDownloadURL();
    }
    async function uploadMediaBlob(blob, nameHint = '') {
      const uid = (currentUser && currentUser.uid) ? currentUser.uid : ('anon_' + Date.now());
      const path = `chat_media/${uid}_${Date.now()}_${nameHint}`;
      const ref = storage.ref().child(path);
      const snap = await ref.put(blob);
      return await snap.ref.getDownloadURL();
    }
    async function dataUrlToBlob(dataUrl) {
      const res = await fetch(dataUrl);
      return await res.blob();
    }

    // ---------- USERS real-time sync ----------
    // Keep a live cache of users so avatars update for everyone immediately.
    function startUsersListener() {
      if (unsubscribeUsers) unsubscribeUsers();
      unsubscribeUsers = db.collection('users').onSnapshot(snapshot => {
        snapshot.docChanges().forEach(change => {
          const uid = change.doc.id;
          const data = change.doc.data() || {};
          usersCache.set(uid, { displayName: data.displayName || null, photoURL: data.photoURL || null });
          // update any avatar elements in the DOM that reference this uid
          const avatarEls = document.querySelectorAll(`.avatar[data-uid="${uid}"]`);
          avatarEls.forEach(av => {
            if (data.photoURL) {
              av.innerHTML = `<img src="${escapeAttr(data.photoURL)}" alt="avatar">`;
            } else {
              const name = data.displayName || av.dataset-name || 'G';
              av.textContent = (name || 'G')[0].toUpperCase();
            }
          });
          // also update any profile-bottom if it's the current user
          if (currentUser && currentUser.uid === uid) {
            profileBottomImg.src = data.photoURL || '';
            profileBottomName.textContent = data.displayName || currentUser.displayName || 'Guest';
          }
        });
      }, err => {
        console.warn('users listener error', err);
      });
    }

    // ---------- sendMessage, appendMessage and helpers (embed + avatar using cache) ----------
    async function sendMessage(imageUrl = null) {
      if (!currentUser) { showToast('Sign in to send messages'); return; }
      const raw = textInput.innerText || '';
      const text = raw.trim();

      let finalImageUrl = imageUrl || null;
      if (!finalImageUrl && text) {
        const singleUrlMatch = text.match(/^(https?:\/\/\S+)$/i);
        if (singleUrlMatch) {
          const url = singleUrlMatch[1];
          const imageExt = /\.(jpe?g|png|gif|webp|bmp|svg)(\?.*)?$/i;
          const videoExt = /\.(mp4|webm|ogg)(\?.*)?$/i;
          if (imageExt.test(url) || videoExt.test(url)) finalImageUrl = url;
        }
      }

      try {
        if (finalImageUrl && finalImageUrl.startsWith('data:')) {
          const blob = await dataUrlToBlob(finalImageUrl);
          finalImageUrl = await uploadMediaBlob(blob, 'inline_' + Date.now());
        }

        const payload = {
          text: (finalImageUrl && text.match(/^(https?:\/\/\S+)$/i)) ? '' : (text || ''),
          uid: currentUser.uid,
          name: currentUser.displayName || 'Guest',
          imageURL: finalImageUrl || null,
          ts: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (replyTo) {
          payload.replyTo = replyTo.id;
          payload.replyName = replyTo.name;
          payload.replySnippet = replyTo.snippet;
        }

        await db.collection('chat').doc('main').collection('messages').add(payload);

        textInput.innerText = '';
        replyTo = null;
        document.getElementById('replyBox').style.display = 'none';
        picker.style.display = 'none';
      } catch (err) {
        console.error('send error', err);
        showToast('Send failed');
      }
    }

    function appendMessage(m) {
      const row = document.createElement('div');
      row.className = 'message-row' + (m.uid === (currentUser && currentUser.uid) ? ' me' : '');
      row.dataset.id = m.id;

      // avatar container with data attributes so we can update it when users change
      const av = document.createElement('div');
      av.className = 'avatar';
      av.dataset.uid = m.uid || '';
      av.dataset.name = m.name || 'G';

      // use cached user info if available
      const cached = m.uid ? usersCache.get(m.uid) : null;
      if (cached && cached.photoURL) {
        av.innerHTML = `<img src="${escapeAttr(cached.photoURL)}" alt="avatar">`;
      } else {
        av.textContent = (m.name || 'G')[0].toUpperCase();
      }

      const msg = document.createElement('div'); msg.className = 'message' + (m.uid === (currentUser && currentUser.uid) ? ' me' : '');

      if (m.replyTo && m.replySnippet) {
        const quote = document.createElement('div'); quote.className = 'reply-quote';
        quote.innerHTML = `<div style="font-weight:700;color:var(--muted);font-size:13px">${escapeHtml(m.replyName || 'Someone')}</div><div style="margin-top:4px">${escapeHtml(m.replySnippet)}</div>`;
        msg.appendChild(quote);
      }

      const meta = document.createElement('div'); meta.className = 'meta';
      const name = document.createElement('div'); name.className = 'name'; name.textContent = m.name || 'Guest';
      const time = document.createElement('div'); time.className = 'time'; time.textContent = (m.ts instanceof Date) ? m.ts.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
      meta.appendChild(name); meta.appendChild(time); msg.appendChild(meta);

      // embed logic
      const textTrim = (m.text || '').trim();
      const singleUrl = textTrim.match(/^(https?:\/\/\S+)$/i);
      const imageExt = /\.(jpe?g|png|gif|webp|bmp|svg)(\?.*)?$/i;
      const videoExt = /\.(mp4|webm|ogg)(\?.*)?$/i;

      if (m.imageURL) {
        appendMediaElement(msg, m.imageURL);
      } else if (singleUrl) {
        const url = singleUrl[1];
        if (imageExt.test(url)) appendMediaElement(msg, url);
        else if (videoExt.test(url)) appendVideoElement(msg, url);
        else {
          const p = document.createElement('div');
          p.innerHTML = linkifyText(escapeHtml(m.text));
          msg.appendChild(p);
        }
      } else {
        if (m.text) {
          const p = document.createElement('div');
          p.innerHTML = linkifyText(escapeHtml(m.text));
          msg.appendChild(p);
        }
      }

      const actions = document.createElement('div'); actions.className = 'msg-actions';
      const replyBtn = document.createElement('button'); replyBtn.textContent = 'Reply';
      replyBtn.addEventListener('click', () => {
        setReply(m.id, m.name || 'Someone', (m.text || (m.imageURL ? '[image]' : '')).slice(0,200));
        textInput.focus();
      });
      actions.appendChild(replyBtn);
      msg.appendChild(actions);

      row.appendChild(av); row.appendChild(msg);
      messagesEl.appendChild(row);
    }

    function appendMediaElement(container, url) {
      const img = document.createElement('img');
      img.className = 'media';
      img.src = url;
      img.alt = 'media';
      img.style.cursor = 'pointer';
      img.addEventListener('click', () => window.open(url, '_blank'));
      img.addEventListener('error', () => {
        const link = document.createElement('a');
        link.href = url;
        link.textContent = 'Open media';
        link.target = '_blank';
        if (img.parentNode) img.parentNode.removeChild(img);
        container.appendChild(link);
      });
      container.appendChild(img);
    }

    function appendVideoElement(container, url) {
      const video = document.createElement('video');
      video.className = 'embedded-video';
      video.src = url;
      video.controls = true;
      video.style.maxWidth = '420px';
      video.style.borderRadius = '8px';
      video.addEventListener('error', () => {
        const link = document.createElement('a');
        link.href = url;
        link.textContent = 'Open video';
        link.target = '_blank';
        if (video.parentNode) video.parentNode.removeChild(video);
        container.appendChild(link);
      });
      container.appendChild(video);
    }

    function linkifyText(text) {
      return text.replace(/(https?:\/\/[^\s<]+)/g, (m) => {
        const safe = escapeAttr(m);
        return `<a href="${safe}" target="_blank" rel="noopener noreferrer">${safe}</a>`;
      });
    }

    // update message helpers (keeps avatars as data-uid so users listener can update)
    function updateMessage(m) {
      const row = messagesEl.querySelector(`[data-id="${m.id}"]`);
      if (!row) return;
      row.remove();
      renderedIds.delete(m.id);
      appendMessage(m);
      renderedIds.add(m.id);
    }
    function removeMessage(id) {
      const row = messagesEl.querySelector(`[data-id="${id}"]`);
      if (row) row.remove();
    }

    // reply handling
    function setReply(id, name, snippet) {
      replyTo = { id, name, snippet };
      document.getElementById('replyBox').style.display = 'block';
      document.getElementById('replyToName').textContent = name;
      document.getElementById('replyToSnippet').textContent = snippet.length > 120 ? snippet.slice(0,120) + '…' : snippet;
    }
    document.getElementById('cancelReply').addEventListener('click', () => {
      replyTo = null;
      document.getElementById('replyBox').style.display = 'none';
    });

    // messages listener
    function startMessagesListener() {
      if (unsubscribeMessages) unsubscribeMessages();
      const ref = db.collection('chat').doc('main').collection('messages').orderBy('ts','asc').limit(2000);
      unsubscribeMessages = ref.onSnapshot(snapshot => {
        const atBottom = isScrolledToBottom(messagesEl);
        if (renderedIds.size === 0) {
          messagesEl.innerHTML = '';
          snapshot.forEach(doc => {
            const d = doc.data();
            const msg = {
              id: doc.id,
              text: d.text || '',
              uid: d.uid || null,
              name: d.name || 'Guest',
              imageURL: d.imageURL || d.gifUrl || null,
              ts: d.ts && d.ts.toDate ? d.ts.toDate() : (d.ts ? new Date(d.ts) : new Date()),
              replyTo: d.replyTo || null,
              replyName: d.replyName || null,
              replySnippet: d.replySnippet || null
            };
            appendMessage(msg);
            renderedIds.add(msg.id);
          });
          messagesEl.scrollTop = messagesEl.scrollHeight;
          return;
        }

        snapshot.docChanges().forEach(change => {
          const doc = change.doc;
          const d = doc.data();
          const msg = {
            id: doc.id,
            text: d.text || '',
            uid: d.uid || null,
            name: d.name || 'Guest',
            imageURL: d.imageURL || d.gifUrl || null,
            ts: d.ts && d.ts.toDate ? d.ts.toDate() : (d.ts ? new Date(d.ts) : new Date()),
            replyTo: d.replyTo || null,
            replyName: d.replyName || null,
            replySnippet: d.replySnippet || null
          };
          if (change.type === 'added') {
            if (!renderedIds.has(msg.id)) {
              appendMessage(msg);
              renderedIds.add(msg.id);
            }
          } else if (change.type === 'modified') {
            updateMessage(msg);
          } else if (change.type === 'removed') {
            removeMessage(msg.id);
            renderedIds.delete(msg.id);
          }
        });

        if (atBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
      }, err => {
        console.error('messages listen error', err);
        headerStatus.textContent = 'Messages error';
      });
    }

    // users listener start
    startUsersListener();

    // scrolling helpers & composer wheel forwarding
    function isScrolledToBottom(el) { return (el.scrollHeight - el.scrollTop - el.clientHeight) < 80; }
    document.querySelector('.composer').addEventListener('wheel', (e) => {
      const delta = e.deltaY;
      if (Math.abs(delta) > 0) {
        messagesEl.scrollTop += delta;
        e.preventDefault();
      }
    }, { passive: false });

    // auth state & profile pictures server-side
    auth.onAuthStateChanged(async user => {
      currentUser = user;
      if (user) {
        headerStatus.textContent = 'Signed in';
        profileBottom.style.display = 'flex';
        profileBottomImg.src = user.photoURL || '';
        profileBottomName.textContent = user.displayName || 'Guest';
        try {
          await db.collection('users').doc(user.uid).set({
            uid: user.uid,
            displayName: user.displayName || 'Guest',
            photoURL: user.photoURL || null,
            online: true,
            lastSeen: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
        } catch (err) { console.warn('users doc write failed', err); }
      } else {
        headerStatus.textContent = 'Signed out';
        profileBottom.style.display = 'none';
      }
      startMessagesListener();
    });

    // profile bottom quick edit (upload avatar -> storage -> users doc)
    profileBottom.addEventListener('click', async () => {
      if (!currentUser) { showToast('Sign in first'); return; }
      const newName = prompt('Edit display name:', currentUser.displayName || '');
      if (newName === null) return;
      const choice = confirm('OK to pick a local image file for your avatar, Cancel to paste an image URL.');
      if (choice) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
          const f = e.target.files && e.target.files[0];
          if (!f) return;
          try {
            const uploaded = await uploadAvatarFile(f, currentUser.uid);
            await applyProfileUpdate(newName, uploaded);
          } catch (err) {
            console.error('avatar upload failed', err);
            showToast('Avatar upload failed');
          }
        };
        input.click();
      } else {
        const url = prompt('Paste profile image URL (http(s)://) or data URL:', currentUser.photoURL || '');
        if (url === null) return;
        try {
          if (url.startsWith('data:')) {
            const blob = await dataUrlToBlob(url);
            const uploaded = await uploadAvatarBlob(blob, currentUser.uid);
            await applyProfileUpdate(newName, uploaded);
          } else {
            await applyProfileUpdate(newName, url);
          }
        } catch (err) {
          console.error('avatar update failed', err);
          showToast('Avatar update failed');
        }
      }
    });

    async function applyProfileUpdate(name, photoURL) {
      try {
        await currentUser.updateProfile({ displayName: name || null, photoURL: photoURL || null });
        await db.collection('users').doc(currentUser.uid).set({
          displayName: name || null,
          photoURL: photoURL || null,
          lastSeen: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        profileBottomImg.src = photoURL || '';
        profileBottomName.textContent = name || 'Guest';
      } catch (err) {
        console.error('applyProfileUpdate failed', err);
        showToast('Failed to save profile');
      }
    }

    async function uploadAvatarFile(file, uid) {
      const ext = (file.name && file.name.split('.').pop()) || 'jpg';
      const path = `avatars/${uid}.${ext}`;
      const ref = storage.ref().child(path);
      const snap = await ref.put(file);
      return await snap.ref.getDownloadURL();
    }
    async function uploadAvatarBlob(blob, uid) {
      const path = `avatars/${uid}_${Date.now()}`;
      const ref = storage.ref().child(path);
      const snap = await ref.put(blob);
      return await snap.ref.getDownloadURL();
    }

    // toast
    let toastTimer = null;
    function showToast(text, ms = 3500) {
      statusToast.textContent = text;
      statusToast.style.display = 'block';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { statusToast.style.display = 'none'; }, ms);
    }

    // helpers
    function escapeHtml(s) { return String(s || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('\n','<br>'); }
    function escapeAttr(s) { return String(s||'').replaceAll('"','&quot;'); }

    // bind send and enter
    sendBtn.addEventListener('click', () => sendMessage());
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // initial focus and start listeners
    textInput.focus();
    startMessagesListener();
    startUsersListener();
  });
  </script>
</body>
</html>
