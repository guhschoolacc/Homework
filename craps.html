<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Craps — Casino</title>
<style>
  :root{
    --bg:#0b0f13;
    --panel:#0f1720;
    --accent:#f6c84c;
    --muted:#9aa6b2;
    --green:#2ecc71;
    --red:#e74c3c;
    --glass: rgba(255,255,255,0.03);
    --chip:#c0392b;
  }
  html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;}
  body{
    background: radial-gradient(1200px 600px at 10% 10%, rgba(246,200,76,0.06), transparent),
                radial-gradient(900px 400px at 90% 90%, rgba(46,204,113,0.03), transparent),
                var(--bg);
    color:#e6eef6;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    box-sizing:border-box;
  }

  /* Top-left back button */
  .back-btn{
    position:fixed;
    top:12px;
    left:12px;
    z-index:50;
    background:linear-gradient(180deg,#ffffff08,#ffffff03);
    border:1px solid rgba(255,255,255,0.06);
    color:var(--accent);
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
    box-shadow:0 6px 18px rgba(0,0,0,0.6);
    display:inline-flex;
    gap:8px;
    align-items:center;
  }
  .back-btn:hover{transform:translateY(-2px);transition:transform .15s ease;}

  /* Main panel */
  .container{
    width:100%;
    max-width:1100px;
    display:grid;
    grid-template-columns: 420px 1fr;
    gap:20px;
    align-items:start;
  }
  .panel{
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:14px;
    padding:18px;
    box-shadow: 0 10px 30px rgba(2,6,23,0.6);
    border:1px solid rgba(255,255,255,0.03);
  }

  /* Left column: controls */
  .controls h2{margin:0 0 8px 0;color:var(--accent);}
  .balance{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
  }
  .balance .amount{
    font-size:20px;
    font-weight:700;
    color:#fff;
  }
  .balance .small{color:var(--muted);font-size:13px;}

  .bet-row{
    display:flex;
    gap:8px;
    margin-bottom:12px;
    align-items:center;
  }
  input[type=number]{
    width:120px;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);
    background:var(--glass);color:inherit;font-weight:600;
  }
  button{
    cursor:pointer;
    padding:10px 14px;border-radius:10px;border:0;font-weight:700;
    background:linear-gradient(180deg,var(--accent),#e6b33a);
    color:#08121a;
    box-shadow:0 6px 18px rgba(230,179,58,0.12);
  }
  button.secondary{
    background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted);
  }

  .chips{
    display:flex;gap:8px;margin:12px 0 18px 0;flex-wrap:wrap;
  }
  .chip{
    width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#fff2,#fff0);border:3px solid #fff2;color:#fff;font-weight:800;
    box-shadow:0 6px 18px rgba(0,0,0,0.6), inset 0 -6px 12px rgba(0,0,0,0.12);
    font-size:14px;
  }
  .chip.small{width:44px;height:44px;font-size:13px}

  .log{
    background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.01));
    border-radius:10px;padding:12px;height:220px;overflow:auto;border:1px solid rgba(255,255,255,0.02);
    color:var(--muted);font-size:14px;
  }

  /* Right column: table and dice */
  .table-area{
    display:flex;flex-direction:column;gap:12px;
  }
  .table{
    height:360px;border-radius:12px;background:
      linear-gradient(180deg,#0b3b1f,#08311a);
    padding:18px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.03);
    box-shadow: inset 0 6px 40px rgba(0,0,0,0.6);
  }
  .table .status{
    position:absolute;top:18px;left:18px;color:#fff;font-weight:700;background:rgba(0,0,0,0.25);
    padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);
  }
  .table .point{
    position:absolute;top:18px;right:18px;color:var(--muted);font-weight:700;background:rgba(255,255,255,0.02);
    padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);
  }

  /* Dice area */
  .dice-area{
    display:flex;gap:18px;align-items:center;justify-content:center;height:100%;
  }
  .dice{
    width:120px;height:120px;border-radius:12px;background:#fff;border:6px solid rgba(0,0,0,0.12);
    display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
    padding:12px;box-sizing:border-box;position:relative;transform-style:preserve-3d;
    transition:transform 700ms cubic-bezier(.2,.9,.2,1);
    box-shadow:0 18px 40px rgba(0,0,0,0.6);
  }
  .dot{
    width:18px;height:18px;border-radius:50%;background:#111;box-shadow:inset 0 -3px 6px rgba(255,255,255,0.06);
    margin:auto;
  }
  .dice-wrapper{
    perspective:1200px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .dice-label{font-weight:700;color:var(--muted);font-size:13px}

  /* roll animation helper */
  .rolling{
    animation:shake 700ms ease-in-out;
  }
  @keyframes shake{
    0%{transform:translateY(0) rotate(0deg) scale(1);}
    20%{transform:translateY(-8px) rotate(-12deg) scale(1.02);}
    40%{transform:translateY(6px) rotate(8deg) scale(0.98);}
    60%{transform:translateY(-4px) rotate(-6deg) scale(1.01);}
    80%{transform:translateY(2px) rotate(4deg) scale(0.99);}
    100%{transform:translateY(0) rotate(0deg) scale(1);}
  }

  /* footer controls */
  .actions{display:flex;gap:12px;align-items:center;justify-content:flex-end;margin-top:12px;}
  .message{
    padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.02);color:var(--muted);
    border:1px solid rgba(255,255,255,0.02);font-weight:600;
  }

  /* responsive */
  @media (max-width:980px){
    .container{grid-template-columns:1fr;max-width:900px}
    .dice{width:96px;height:96px}
  }
</style>
</head>
<body>
  <a class="back-btn" href="casino.html" title="Back to hub">⬅ Back to Hub</a>

  <div class="container">
    <!-- Left: controls -->
    <div class="panel controls">
      <h2>Pass Line — Craps</h2>
      <div class="balance">
        <div>
          <div class="small">Balance</div>
          <div class="amount" id="balance">$1000</div>
        </div>
        <div style="text-align:right">
          <div class="small">Current Bet</div>
          <div class="amount" id="currentBet">$0</div>
        </div>
      </div>

      <div class="bet-row">
        <input id="betInput" type="number" min="1" step="1" value="10" />
        <button id="placeBetBtn">Place Pass Line Bet</button>
        <button id="clearBetBtn" class="secondary">Clear Bet</button>
      </div>

      <div class="chips" id="presetChips">
        <div class="chip" data-value="5">$5</div>
        <div class="chip" data-value="10">$10</div>
        <div class="chip" data-value="25">$25</div>
        <div class="chip" data-value="50">$50</div>
        <div class="chip" data-value="100">$100</div>
        <div class="chip small" data-value="500">$500</div>
      </div>

      <div style="margin-bottom:12px">
        <div class="small" style="margin-bottom:6px">Game Log</div>
        <div class="log" id="log"></div>
      </div>

      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button id="rollBtn">Roll Dice</button>
        <button id="autoBtn" class="secondary">Auto Roll Off</button>
        <div class="message" id="message">Place a Pass Line bet to start.</div>
      </div>
    </div>

    <!-- Right: table and dice -->
    <div class="panel table-area">
      <div class="table" id="table">
        <div class="status" id="status">Come-out</div>
        <div class="point" id="pointDisplay">Point: —</div>

        <div class="dice-area" id="diceArea">
          <div class="dice-wrapper">
            <div class="dice" id="dice1" aria-hidden="true"></div>
            <div class="dice-label">Die 1</div>
          </div>
          <div class="dice-wrapper">
            <div class="dice" id="dice2" aria-hidden="true"></div>
            <div class="dice-label">Die 2</div>
          </div>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <div style="color:var(--muted);font-weight:700">Rules: Come-out 7/11 wins, 2/3/12 lose. Otherwise point is set. Then roll point to win, 7 to lose.</div>
        <div style="color:var(--muted);font-weight:700">Payout: 1:1 on Pass Line</div>
      </div>
    </div>
  </div>

<script>
/*
  Simple Craps implementation (Pass Line only)
  - Balance and bet management
  - Come-out roll and point phase
  - Animated dice faces (CSS grid dots)
  - Game log and messages
  - Auto-roll toggle (roll repeatedly until win/lose)
*/

(() => {
  // DOM
  const balanceEl = document.getElementById('balance');
  const currentBetEl = document.getElementById('currentBet');
  const betInput = document.getElementById('betInput');
  const placeBetBtn = document.getElementById('placeBetBtn');
  const clearBetBtn = document.getElementById('clearBetBtn');
  const logEl = document.getElementById('log');
  const rollBtn = document.getElementById('rollBtn');
  const messageEl = document.getElementById('message');
  const statusEl = document.getElementById('status');
  const pointDisplay = document.getElementById('pointDisplay');
  const dice1 = document.getElementById('dice1');
  const dice2 = document.getElementById('dice2');
  const autoBtn = document.getElementById('autoBtn');
  const presetChips = document.getElementById('presetChips');

  // Game state
  let balance = 1000;
  let currentBet = 0;
  let point = null; // null = come-out
  let autoRolling = false;
  let rolling = false;

  // Initialize UI
  updateUI();
  renderDiceFace(dice1,1);
  renderDiceFace(dice2,1);

  // Helpers
  function log(text){
    const time = new Date().toLocaleTimeString();
    const el = document.createElement('div');
    el.textContent = `[${time}] ${text}`;
    logEl.prepend(el);
  }
  function updateUI(){
    balanceEl.textContent = `$${balance}`;
    currentBetEl.textContent = `$${currentBet}`;
    statusEl.textContent = point === null ? 'Come-out' : 'Point phase';
    pointDisplay.textContent = `Point: ${point === null ? '—' : point}`;
    messageEl.textContent = currentBet > 0 ? (point === null ? 'Ready for come-out roll.' : 'Roll to hit the point or avoid 7.') : 'Place a Pass Line bet to start.';
    rollBtn.disabled = currentBet <= 0 || rolling;
  }

  function setMessage(msg, color){
    messageEl.textContent = msg;
    if(color === 'win') messageEl.style.color = 'var(--green)';
    else if(color === 'lose') messageEl.style.color = 'var(--red)';
    else messageEl.style.color = 'var(--muted)';
  }

  // Preset chips click
  presetChips.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if(!chip) return;
    const val = Number(chip.dataset.value || 0);
    betInput.value = Math.max(1, (Number(betInput.value) || 0) + val);
  });

  // Place bet
  placeBetBtn.addEventListener('click', () => {
    const val = Math.floor(Number(betInput.value) || 0);
    if(val <= 0){ setMessage('Enter a positive bet amount.'); return; }
    if(val > balance){ setMessage('Insufficient balance.'); return; }
    currentBet += val;
    balance -= val;
    log(`Placed Pass Line bet of $${val}.`);
    updateUI();
    setMessage('Bet placed. Ready to roll.');
  });

  clearBetBtn.addEventListener('click', () => {
    if(currentBet > 0){
      balance += currentBet;
      log(`Cleared bet of $${currentBet}.`);
      currentBet = 0;
      updateUI();
    } else {
      setMessage('No bet to clear.');
    }
  });

  // Auto roll toggle
  autoBtn.addEventListener('click', () => {
    autoRolling = !autoRolling;
    autoBtn.textContent = autoRolling ? 'Auto Roll On' : 'Auto Roll Off';
    autoBtn.classList.toggle('secondary', !autoRolling);
    if(autoRolling && !rolling) attemptAutoRoll();
  });

  // Roll button
  rollBtn.addEventListener('click', () => {
    if(rolling) return;
    if(currentBet <= 0){ setMessage('Place a bet first.'); return; }
    doRoll();
  });

  // Core roll logic
  async function doRoll(){
    rolling = true;
    rollBtn.disabled = true;
    setMessage('Rolling...', 'neutral');
    // animate dice
    animateDice();
    // simulate roll delay
    await wait(800);
    const d1 = randInt(1,6);
    const d2 = randInt(1,6);
    const total = d1 + d2;
    // show faces
    renderDiceFace(dice1,d1);
    renderDiceFace(dice2,d2);
    log(`Rolled ${d1} + ${d2} = ${total}.`);
    // Evaluate
    if(point === null){
      // come-out roll
      if(total === 7 || total === 11){
        // win
        const payout = currentBet * 2;
        balance += payout;
        log(`Come-out ${total} — Pass Line wins $${currentBet}.`);
        setMessage(`You win $${currentBet}!`, 'win');
        currentBet = 0;
        point = null;
      } else if(total === 2 || total === 3 || total === 12){
        // lose
        log(`Come-out ${total} — Craps! You lose $${currentBet}.`);
        setMessage(`Craps — you lose $${currentBet}.`, 'lose');
        currentBet = 0;
        point = null;
      } else {
        // point established
        point = total;
        log(`Point is established at ${point}.`);
        setMessage(`Point is ${point}. Roll again to hit it before a 7.`);
      }
    } else {
      // point phase
      if(total === point){
        // win
        const payout = currentBet * 2;
        balance += payout;
        log(`Rolled the point ${point} — Pass Line wins $${currentBet}.`);
        setMessage(`You hit the point! You win $${currentBet}.`, 'win');
        currentBet = 0;
        point = null;
      } else if(total === 7){
        // lose
        log(`Seven out — you lose $${currentBet}.`);
        setMessage(`Seven out — you lose $${currentBet}.`, 'lose');
        currentBet = 0;
        point = null;
      } else {
        setMessage(`No decision. Roll again.`, 'neutral');
      }
    }
    updateUI();
    rolling = false;
    rollBtn.disabled = currentBet <= 0;
    // If auto-rolling and still in a state to roll, continue
    if(autoRolling && currentBet > 0){
      await wait(600);
      attemptAutoRoll();
    }
  }

  function attemptAutoRoll(){
    if(autoRolling && !rolling && currentBet > 0){
      doRoll();
    }
  }

  // Utility functions
  function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
  function wait(ms){ return new Promise(res => setTimeout(res, ms)); }

  // Dice rendering: create 3x3 grid of dots; show/hide dots based on face
  function renderDiceFace(diceEl, face){
    // Clear
    diceEl.innerHTML = '';
    // Create 9 cells
    const positions = [
      [0,0],[1,0],[2,0],
      [0,1],[1,1],[2,1],
      [0,2],[1,2],[2,2]
    ];
    // Map face to dot indices (0..8)
    const faceMap = {
      1: [4],
      2: [0,8],
      3: [0,4,8],
      4: [0,2,6,8],
      5: [0,2,4,6,8],
      6: [0,2,3,5,6,8]
    };
    const dots = faceMap[face] || [];
    for(let i=0;i<9;i++){
      const cell = document.createElement('div');
      cell.style.display = 'flex';
      cell.style.alignItems = 'center';
      cell.style.justifyContent = 'center';
      if(dots.includes(i)){
        const dot = document.createElement('div');
        dot.className = 'dot';
        cell.appendChild(dot);
      }
      diceEl.appendChild(cell);
    }
    // small tilt transform for variety
    const tilt = (Math.random()*20 - 10).toFixed(2);
    diceEl.style.transform = `rotate(${tilt}deg)`;
  }

  // Animate dice: add rolling class and random transforms
  function animateDice(){
    [dice1,dice2].forEach(d => {
      d.classList.add('rolling');
      // quick random 3D spin
      d.style.transform = `rotate3d(${Math.random().toFixed(2)},${Math.random().toFixed(2)},${Math.random().toFixed(2)},${(360*Math.random()).toFixed(0)}deg)`;
      setTimeout(()=> {
        d.classList.remove('rolling');
      }, 700);
    });
  }

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    if(e.key === 'r' || e.key === 'R') {
      if(!rolling && currentBet > 0) doRoll();
    }
    if(e.key === 'a' || e.key === 'A'){
      autoBtn.click();
    }
  });

  // Small UX: prevent accidental negative bets
  betInput.addEventListener('input', () => {
    if(Number(betInput.value) < 0) betInput.value = 0;
  });

  // Initial log
  log('Welcome to Craps. You have $1000. Place a Pass Line bet to begin.');
})();
</script>
</body>
</html>
