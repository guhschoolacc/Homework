<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bubble Shooter</title>
<style>
  :root{
    --bg:#0b1220;
    --panel:#0f1724;
    --accent:#ffd166;
    --btn:#1f2937;
    --text:#e6eef8;
  }
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;}
  body{background:linear-gradient(180deg,#071022 0%, #0b1220 100%);color:var(--text);display:flex;align-items:center;justify-content:center;}
  .container{width:960px;max-width:96vw;padding:18px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.6);position:relative;}
  /* Back button top-left */
  .back-btn{
    position:absolute;left:12px;top:12px;background:var(--btn);color:var(--text);border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:8px;
  }
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .title{font-size:18px;font-weight:700;color:var(--accent);}
  .hud{display:flex;gap:12px;align-items:center;}
  .hud .box{background:rgba(255,255,255,0.02);padding:8px 12px;border-radius:8px;font-weight:600;}
  canvas{display:block;background:linear-gradient(180deg,#071022,#081226);border-radius:8px;width:100%;height:640px;max-height:80vh;}
  .controls{display:flex;gap:8px;margin-top:12px;align-items:center;}
  .btn{background:var(--btn);color:var(--text);border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:600;}
  .small{font-size:13px;color:#9fb0d6}
  footer{margin-top:10px;color:#8fa6d0;font-size:13px}
  /* Aim line */
  .aim-line{position:absolute;pointer-events:none;left:0;top:0;}
</style>
</head>
<body>
  <div class="container" id="app">
    <a class="back-btn" href="index.html">← Back to Dashboard</a>
    <div class="header">
      <div class="title">Bubble Shooter</div>
      <div class="hud">
        <div class="box">Score: <span id="score">0</span></div>
        <div class="box">Bubbles: <span id="remaining">0</span></div>
      </div>
    </div>

    <canvas id="game" width="900" height="640"></canvas>

    <div class="controls">
      <button id="restart" class="btn">Restart</button>
      <div class="small">Aim with mouse, click or press Space to shoot</div>
    </div>
    <footer>Simple remake — grid snapping, cluster pop, and basic physics</footer>
  </div>

<script>
/* Bubble Shooter core logic
   - Grid: rows with alternating offsets (staggered hex-like)
   - Colors: fixed palette
   - Shooting: ball travels until collision with top or other bubble, then snaps to nearest grid cell
   - Pop: flood fill to remove clusters of 3+ same color
   - Gravity: remove floating bubbles (not connected to top)
*/

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const remainingEl = document.getElementById('remaining');
const restartBtn = document.getElementById('restart');

const W = canvas.width;
const H = canvas.height;

const ROWS = 10;
const COLS = 12;
const R = 18; // bubble radius
const GAP = 2;
const CELL_W = R*2 + GAP;
const CELL_H = Math.sqrt(3)*R + GAP*0.2; // vertical spacing for staggered rows
const OFFSET_X = 40;
const OFFSET_Y = 40;

const COLORS = ['#ff6b6b','#ffd166','#6bcB77','#4d96ff','#b388eb','#ff9f1c'];
let grid = []; // 2D array of null or color index
let score = 0;

let shooter = {
  x: W/2,
  y: H - 40,
  angle: -Math.PI/2,
  speed: 700,
  ball: null // {x,y,vx,vy,color}
};

let mouse = {x:0,y:0,down:false};

function initGrid(){
  grid = [];
  for(let r=0;r<ROWS;r++){
    grid[r] = [];
    for(let c=0;c<COLS;c++){
      // Fill top rows with bubbles, leave bottom rows empty
      if(r < 5){
        // random color
        grid[r][c] = Math.floor(Math.random()*COLS) % COLORS.length;
      } else {
        grid[r][c] = null;
      }
    }
  }
  updateRemaining();
}

function updateRemaining(){
  let count = 0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c] !== null) count++;
  remainingEl.textContent = count;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // draw grid bubbles
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const col = grid[r][c];
      if(col === null) continue;
      const pos = cellToPixel(r,c);
      drawBubble(pos.x,pos.y,R, COLORS[col]);
    }
  }
  // draw shooter base
  ctx.save();
  ctx.translate(shooter.x, shooter.y);
  // aim line
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0,0);
  const aimX = Math.cos(shooter.angle)*1000;
  const aimY = Math.sin(shooter.angle)*1000;
  ctx.lineTo(aimX, aimY);
  ctx.stroke();
  ctx.restore();

  // draw shooter ball
  if(shooter.ball){
    drawBubble(shooter.ball.x, shooter.ball.y, R, COLORS[shooter.ball.color]);
  } else {
    // preview next ball
    const previewColor = Math.floor(Math.random()*COLORS.length);
    // store preview color in shooter.nextColor
    if(shooter.nextColor === undefined) shooter.nextColor = previewColor;
    drawBubble(shooter.x, shooter.y, R, COLORS[shooter.nextColor]);
  }
  // HUD aim pointer
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath();
  ctx.arc(shooter.x, shooter.y, R+6, 0, Math.PI*2);
  ctx.fill();
}

function drawBubble(x,y,r,color){
  ctx.beginPath();
  const g = ctx.createRadialGradient(x - r*0.4, y - r*0.4, r*0.1, x, y, r);
  g.addColorStop(0, lighten(color,0.18));
  g.addColorStop(1, color);
  ctx.fillStyle = g;
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.stroke();
}

function lighten(hex, amt){
  const c = hex.replace('#','');
  const num = parseInt(c,16);
  let r = (num>>16) + Math.round(255*amt);
  let g = ((num>>8)&0x00FF) + Math.round(255*amt);
  let b = (num&0x0000FF) + Math.round(255*amt);
  r = Math.min(255, r); g = Math.min(255,g); b = Math.min(255,b);
  return '#' + ((1<<24) + (r<<16) + (g<<8) + b).toString(16).slice(1);
}

function cellToPixel(r,c){
  const offset = (r % 2 === 1) ? (CELL_W/2) : 0;
  const x = OFFSET_X + c*CELL_W + offset + R;
  const y = OFFSET_Y + r*CELL_H + R;
  return {x,y};
}

function pixelToCell(x,y){
  // approximate by scanning nearby cells
  let best = null;
  let bestDist = Infinity;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const p = cellToPixel(r,c);
      const d = Math.hypot(p.x - x, p.y - y);
      if(d < bestDist){
        bestDist = d;
        best = {r,c,d};
      }
    }
  }
  return best;
}

function spawnBall(){
  if(shooter.ball) return;
  const color = shooter.nextColor !== undefined ? shooter.nextColor : Math.floor(Math.random()*COLORS.length);
  shooter.nextColor = Math.floor(Math.random()*COLORS.length);
  shooter.ball = {
    x: shooter.x,
    y: shooter.y,
    vx: Math.cos(shooter.angle)*shooter.speed,
    vy: Math.sin(shooter.angle)*shooter.speed,
    color
  };
}

function update(dt){
  // update ball
  if(shooter.ball){
    shooter.ball.x += shooter.ball.vx * dt;
    shooter.ball.y += shooter.ball.vy * dt;
    // bounce off walls
    if(shooter.ball.x - R <= 0){
      shooter.ball.x = R;
      shooter.ball.vx *= -1;
    } else if(shooter.ball.x + R >= W){
      shooter.ball.x = W - R;
      shooter.ball.vx *= -1;
    }
    // collision with top
    if(shooter.ball.y - R <= OFFSET_Y){
      // snap to nearest cell in top row
      placeBallAt(shooter.ball.x, shooter.ball.y, shooter.ball.color);
      shooter.ball = null;
      return;
    }
    // collision with other bubbles
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const col = grid[r][c];
        if(col === null) continue;
        const p = cellToPixel(r,c);
        const d = Math.hypot(p.x - shooter.ball.x, p.y - shooter.ball.y);
        if(d <= R*2 - 1){
          // place ball near this cell: compute target position halfway between centers along collision normal
          // snap to nearest empty neighbor cell
          placeBallAt(shooter.ball.x, shooter.ball.y, shooter.ball.color);
          shooter.ball = null;
          return;
        }
      }
    }
    // if ball goes below bottom, reset (shouldn't happen)
    if(shooter.ball.y - R > H){
      shooter.ball = null;
    }
  }
}

function placeBallAt(px,py,color){
  const cell = pixelToCell(px,py);
  if(!cell) return;
  // if target occupied, find nearest empty neighbor
  let {r,c} = cell;
  if(grid[r][c] !== null){
    const neighbors = getNeighbors(r,c);
    let placed = false;
    for(const n of neighbors){
      if(n.r>=0 && n.r<ROWS && n.c>=0 && n.c<COLS && grid[n.r][n.c] === null){
        r = n.r; c = n.c; placed = true; break;
      }
    }
    if(!placed){
      // fallback: find any empty cell nearest to px,py
      let best = null; let bd = Infinity;
      for(let rr=0;rr<ROWS;rr++) for(let cc=0;cc<COLS;cc++){
        if(grid[rr][cc] === null){
          const p = cellToPixel(rr,cc);
          const d = Math.hypot(p.x - px, p.y - py);
          if(d < bd){ bd = d; best = {rr,cc}; }
        }
      }
      if(best){ r = best.rr; c = best.cc; }
    }
  }
  grid[r][c] = color;
  updateRemaining();
  // check pops
  const cluster = floodFill(r,c,grid[r][c]);
  if(cluster.length >= 3){
    // remove cluster
    for(const cell of cluster) grid[cell.r][cell.c] = null;
    score += cluster.length * 10;
    scoreEl.textContent = score;
    // remove floating bubbles
    removeFloating();
  } else {
    // no pop
  }
  updateRemaining();
}

function getNeighbors(r,c){
  // neighbors for staggered grid
  const even = (r % 2 === 0);
  const neighbors = [
    {r:r, c:c-1},
    {r:r, c:c+1},
    {r:r-1, c:c},
    {r:r+1, c:c},
  ];
  if(even){
    neighbors.push({r:r-1,c:c-1},{r:r+1,c:c-1});
  } else {
    neighbors.push({r:r-1,c:c+1},{r:r+1,c:c+1});
  }
  return neighbors;
}

function floodFill(sr,sc,color){
  const visited = {};
  const stack = [{r:sr,c:sc}];
  const out = [];
  while(stack.length){
    const cur = stack.pop();
    const key = cur.r + ',' + cur.c;
    if(visited[key]) continue;
    visited[key] = true;
    if(cur.r<0||cur.r>=ROWS||cur.c<0||cur.c>=COLS) continue;
    if(grid[cur.r][cur.c] !== color) continue;
    out.push(cur);
    const neigh = getNeighbors(cur.r,cur.c);
    for(const n of neigh) stack.push(n);
  }
  return out;
}

function removeFloating(){
  // mark all bubbles connected to top
  const connected = {};
  const stack = [];
  for(let c=0;c<COLS;c++){
    if(grid[0][c] !== null) stack.push({r:0,c});
  }
  while(stack.length){
    const cur = stack.pop();
    const key = cur.r + ',' + cur.c;
    if(connected[key]) continue;
    connected[key] = true;
    const neigh = getNeighbors(cur.r,cur.c);
    for(const n of neigh){
      if(n.r<0||n.r>=ROWS||n.c<0||n.c>=COLS) continue;
      if(grid[n.r][n.c] !== null){
        const k2 = n.r + ',' + n.c;
        if(!connected[k2]) stack.push(n);
      }
    }
  }
  // remove bubbles not in connected
  let removed = 0;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c] !== null){
        const key = r+','+c;
        if(!connected[key]){
          grid[r][c] = null;
          removed++;
        }
      }
    }
  }
  if(removed>0){
    score += removed * 5;
    scoreEl.textContent = score;
  }
}

let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last)/1000);
  last = now;
  // update shooter angle toward mouse
  const dx = mouse.x - shooter.x;
  const dy = mouse.y - shooter.y;
  shooter.angle = Math.atan2(dy,dx);
  // clamp angle so you can't shoot backwards
  const minAngle = -Math.PI + 0.2;
  const maxAngle = -0.2;
  if(shooter.angle < minAngle) shooter.angle = minAngle;
  if(shooter.angle > maxAngle) shooter.angle = maxAngle;

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove', (e)=>{
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

canvas.addEventListener('click', (e)=>{
  spawnBall();
});

window.addEventListener('keydown', (e)=>{
  if(e.code === 'Space'){
    e.preventDefault();
    spawnBall();
  } else if(e.key === 'r' || e.key === 'R'){
    resetGame();
  }
});

restartBtn.addEventListener('click', resetGame);

function resetGame(){
  score = 0;
  scoreEl.textContent = score;
  shooter.ball = null;
  shooter.nextColor = Math.floor(Math.random()*COLORS.length);
  initGrid();
}

function start(){
  shooter.x = W/2;
  shooter.y = H - 40;
  shooter.nextColor = Math.floor(Math.random()*COLORS.length);
  initGrid();
  last = performance.now();
  requestAnimationFrame(loop);
}

start();
</script>
</body>
</html>
