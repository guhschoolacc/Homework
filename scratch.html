<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Scratch Cards</title>
<style>
  :root{
    --bg:#071022;
    --panel-w:300px;
    --gap:10px;
    --card-w:180px;
    --card-h:110px;
    --radius:10px;
    --accent:#ffb86b;
    --muted:#9fb3d6;
    --shadow: 0 6px 20px rgba(2,6,23,0.6);
    --grid-scale: 1;
  }

  html,body{
    height:100%;
    margin:0;
    overflow:hidden;
    font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
    background:
      radial-gradient(600px 300px at 10% 10%, rgba(255,184,107,0.04), transparent 8%),
      linear-gradient(180deg,#041226 0%, #071022 100%);
    color:#e6eef8;
    -webkit-font-smoothing:antialiased;
    box-sizing:border-box;
  }
  *,*::before,*::after{box-sizing:inherit}

  .top-left{position:fixed;top:10px;left:10px;z-index:9999}
  .hub-btn{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted);padding:6px 10px;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;backdrop-filter:blur(4px)}
  .hub-btn:hover{color:#fff;transform:translateY(-2px)}

  .viewport{
    height:100vh;
    width:100vw;
    padding:14px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .container{
    width:100%;
    max-width:1200px;
    height:calc(100vh - 28px);
    display:grid;
    grid-template-columns: 1fr var(--panel-w);
    gap:var(--gap);
    align-items:start;
    position:relative;
  }

  @media (max-width:980px){
    .container{ grid-template-columns: 1fr; grid-auto-rows: min-content; padding-bottom:8px; }
    .panel{ order:2; width:100%; height:auto; }
  }

  .header{
    grid-column:1 / span 2;
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:6px;
    padding-left:4px;
  }
  .title{font-size:16px;margin:0}
  .sub{color:var(--muted);font-size:13px}

  .cards-wrap{
    height:100%;
    overflow:hidden;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:6px;
  }

  .cards-area{
    display:grid;
    gap:var(--gap)px;
    transform-origin: top center;
    transform: scale(var(--grid-scale));
    will-change: transform;
  }

  .card{
    width:var(--card-w);
    height:var(--card-h);
    border-radius:var(--radius);
    position:relative;
    box-shadow:var(--shadow);
    overflow:hidden;
    background:transparent;
    transition:transform .18s ease;
  }
  .card:focus{outline:3px solid rgba(124,58,237,0.18);outline-offset:4px;border-radius:var(--radius)}
  .card-inner{
    width:100%;
    height:100%;
    border-radius:var(--radius);
    position:relative;
    overflow:hidden;
  }

  /* IMPORTANT: use opacity-based reveal instead of 3D flip to avoid mirrored/backwards text */
  .card-face{ position:absolute; inset:0; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; overflow:hidden; transition:opacity .36s ease, transform .36s ease; }
  .face-front{ background:linear-gradient(135deg,#0ea5a4,#7c3aed); color:#fff; padding:8px; display:flex; flex-direction:column; gap:4px; justify-content:center; font-size:13px; opacity:0; transform:translateY(6px); z-index:2; pointer-events:none; }
  .face-back{ background:linear-gradient(180deg,#0b1220,#071022); border:1px solid rgba(255,255,255,0.03); position:relative; opacity:1; transform:translateY(0); z-index:3; }

  /* When revealed: front fades in, back fades out */
  .card.revealed .face-front{ opacity:1; transform:translateY(0); pointer-events:auto; z-index:4; }
  .card.revealed .face-back{ opacity:0; transform:translateY(-6px); pointer-events:none; z-index:1; }

  .prize-emoji{ font-size:28px; filter:drop-shadow(0 6px 14px rgba(0,0,0,0.45)); }
  .prize-text{ font-weight:800; font-size:14px; }
  .prize-sub{ font-size:11px; color:rgba(255,255,255,0.95); opacity:0.95; }

  .scratch-canvas{ width:100%; height:100%; display:block; border-radius:var(--radius); touch-action:none; cursor:crosshair; box-sizing:border-box; }

  .scratch-label{ position:absolute; top:8px; left:8px; font-size:11px; background:rgba(255,255,255,0.02); padding:6px 8px; border-radius:8px; color:var(--muted); z-index:6; pointer-events:none; }
  .badge{ position:absolute; bottom:8px; right:8px; background:linear-gradient(90deg,var(--accent),#ff7ab6); color:#07101a; padding:6px 8px; border-radius:999px; font-weight:800; font-size:11px; z-index:6; opacity:0; transform:translateY(6px); transition:opacity .22s ease,transform .22s ease; pointer-events:none; }
  .card.revealed .badge{ opacity:1; transform:translateY(0); }

  .panel{
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:12px;
    padding:12px;
    box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,0.03);
    box-sizing:border-box;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    min-width:var(--panel-w);
  }
  .panel h2{ margin:0 0 6px 0; font-size:14px; }
  .panel p{ margin:0 0 10px 0; color:var(--muted); font-size:13px; }

  .controls{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .btn{ background:linear-gradient(180deg,#0f1724,#0b1220); color:#fff; padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.03); font-weight:700; font-size:13px; cursor:pointer; }
  .btn.ghost{ background:transparent; border:1px dashed rgba(255,255,255,0.04); color:var(--muted); font-weight:600; }
  .stats{ display:flex; gap:12px; margin-top:6px; }
  .stat{ display:flex; flex-direction:column; align-items:flex-start; }
  .stat strong{ font-size:15px; }
  .muted{ color:var(--muted); font-size:13px; }

  #confetti{ position:fixed; inset:0; pointer-events:none; z-index:9998; }

  .card:hover{ transform:translateY(-6px); }
  .card.revealed:hover{ transform:translateY(-6px); }
</style>
</head>
<body>
  <a class="top-left" href="casino.html" aria-label="Back to hub">
    <span class="hub-btn">← Back to Hub</span>
  </a>

  <canvas id="confetti"></canvas>

  <div class="viewport">
    <div class="container" id="container">
      <div class="header" id="header">
        <div style="display:flex;flex-direction:column;">
          <h1 class="title">Scratch Cards</h1>
          <div class="sub">fixed broken shit</div>
        </div>
      </div>

      <div class="cards-wrap" id="cardsWrap" aria-live="polite">
        <div class="cards-area" id="cardsArea" role="list" aria-label="Scratch cards grid"></div>
      </div>

      <aside class="panel" id="panel" aria-label="Controls">
        <h2>Controls</h2>
        <p>Cards don't reveal the prize when you fully scratch them, double click them to reveal your prize.</p>

        <div class="controls">
          <button class="btn" id="newSetBtn">New Set</button>
          <button class="btn ghost" id="resetBtn">Reset</button>
          <button class="btn ghost" id="autoRevealBtn">Reveal All</button>
        </div>

        <div class="stats">
          <div class="stat"><strong id="playedCount">0</strong><span class="muted">Played</span></div>
          <div class="stat"><strong id="winsCount">0</strong><span class="muted">Wins</span></div>
          <div class="stat"><strong id="lastPrize">—</strong><span class="muted">Last</span></div>
        </div>

        
        </div>
      </aside>
    </div>
  </div>

<script>
/* Reveal fix:
   - Use opacity-based reveal (fade overlay out and fade prize in) instead of 3D flip.
   - When scratched enough, we animate the overlay away and show the front face (no mirrored text).
   - Double-click triggers the same reveal path.
*/

const PRIZES = [
  {emoji:'💎', label:'Big Win', sub:'Jackpot x50', weight:1},
  {emoji:'🎉', label:'Party', sub:'Free Spins x10', weight:3},
  {emoji:'🍀', label:'Lucky', sub:'Bonus x20', weight:6},
  {emoji:'💰', label:'Cash', sub:'Coins x5', weight:10},
  {emoji:'❌', label:'No Prize', sub:'Try again', weight:20}
];

function pickPrize(){
  const total = PRIZES.reduce((s,p)=>s+p.weight,0);
  let r = Math.random()*total;
  for(const p of PRIZES){
    if(r < p.weight) return p;
    r -= p.weight;
  }
  return PRIZES[PRIZES.length-1];
}

const container = document.getElementById('container');
const header = document.getElementById('header');
const panel = document.getElementById('panel');
const cardsArea = document.getElementById('cardsArea');

const confettiCanvas = document.getElementById('confetti');
const ctxConf = confettiCanvas.getContext('2d');
let confettiParticles = [];
let confettiRunning = false;

function resizeConfetti(){ confettiCanvas.width = innerWidth; confettiCanvas.height = innerHeight; }
addEventListener('resize', resizeConfetti);
resizeConfetti();

let stats = {played:0,wins:0,lastPrize:'—'};
const playedCountEl = document.getElementById('playedCount');
const winsCountEl = document.getElementById('winsCount');
const lastPrizeEl = document.getElementById('lastPrize');
function updateStats(){ playedCountEl.textContent = stats.played; winsCountEl.textContent = stats.wins; lastPrizeEl.textContent = stats.lastPrize; }

function cssVar(name, fallback=0){
  const v = getComputedStyle(document.documentElement).getPropertyValue(name);
  return v ? parseFloat(v) : fallback;
}

/* Layout & scaling (same safe approach) */
function layoutAndCreate(){
  const gap = cssVar('--gap', 10);
  const cardW = cssVar('--card-w', 180);
  const cardH = cssVar('--card-h', 110);
  const panelW = (window.innerWidth <= 980) ? 0 : cssVar('--panel-w', 300);

  const rect = container.getBoundingClientRect();
  const headerRect = header.getBoundingClientRect();

  const availableWidth = rect.width - panelW - gap;
  const availableHeight = rect.height - headerRect.height - gap;

  const cols = Math.max(1, Math.floor((availableWidth + gap) / (cardW + gap)));
  const rows = Math.max(1, Math.floor((availableHeight + gap) / (cardH + gap)));
  const total = Math.min(20, Math.max(4, cols * rows));

  cardsArea.style.gridTemplateColumns = `repeat(${cols}, ${cardW}px)`;
  cardsArea.style.gap = gap + 'px';

  createCards(total, cardW, cardH);

  const usedCols = Math.min(cols, total);
  const usedRows = Math.ceil(total / usedCols);
  const requiredWidth = usedCols * cardW + (usedCols - 1) * gap;
  const requiredHeight = usedRows * cardH + (usedRows - 1) * gap;

  const scaleX = Math.min(1, (availableWidth) / requiredWidth);
  const scaleY = Math.min(1, (availableHeight) / requiredHeight);
  const scale = Math.min(scaleX, scaleY, 1);

  document.documentElement.style.setProperty('--grid-scale', scale.toString());
  cardsArea.style.width = requiredWidth + 'px';
  cardsArea.style.height = requiredHeight + 'px';
}

/* Create cards */
function createCards(count=8, cardW=180, cardH=110){
  cardsArea.innerHTML = '';
  for(let i=0;i<count;i++){
    const prize = pickPrize();
    const card = document.createElement('div');
    card.className = 'card';
    card.setAttribute('role','button');
    card.setAttribute('tabindex','0');
    card.dataset.prize = JSON.stringify(prize);
    card.style.width = cardW + 'px';
    card.style.height = cardH + 'px';
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face face-back">
          <div class="scratch-label">Scratch</div>
          <canvas class="scratch-canvas" width="${cardW}" height="${cardH}"></canvas>
          <div class="badge">Reveal</div>
        </div>
        <div class="card-face face-front" aria-hidden="true">
          <div style="text-align:center">
            <div class="prize-emoji">${prize.emoji}</div>
            <div class="prize-text">${prize.label}</div>
            <div class="prize-sub">${prize.sub}</div>
          </div>
        </div>
      </div>
    `;
    cardsArea.appendChild(card);
    setupScratch(card);
  }
}

/* Scratch logic with overlay fade reveal */
function setupScratch(card){
  const canvas = card.querySelector('.scratch-canvas');
  const badge = card.querySelector('.badge');
  const ctx = canvas.getContext('2d');
  const prize = JSON.parse(card.dataset.prize);

  function setCanvasSize(){
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    drawOverlay();
  }

  function drawOverlay(){
    const w = canvas.width / (window.devicePixelRatio||1);
    const h = canvas.height / (window.devicePixelRatio||1);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#9aa4ad';
    ctx.fillRect(0,0,w,h);
    const g = ctx.createLinearGradient(0,0,w,h);
    g.addColorStop(0,'rgba(255,255,255,0.06)');
    g.addColorStop(1,'rgba(0,0,0,0.06)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,w,h);
    ctx.globalAlpha = 0.12;
    for(let i=0;i<12;i++){
      ctx.fillStyle = i%2? 'rgba(0,0,0,0.06)':'rgba(255,255,255,0.06)';
      ctx.fillRect((i*23)%w,0,6,h);
    }
    ctx.globalAlpha = 1;
  }

  setCanvasSize();
  const ro = new ResizeObserver(setCanvasSize);
  ro.observe(canvas);

  let isDown = false;
  let last = null;
  const radius = Math.max(10, Math.min(20, (parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--card-w'))||180) * 0.08));

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
    const clientY = (e.touches ? e.touches[0].clientY : e.clientY);
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function scratchAt(x,y){
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x,y,radius,0,Math.PI*2);
    ctx.fill();
    ctx.closePath();
    ctx.globalCompositeOperation = 'source-over';
  }

  function scratchLine(x1,y1,x2,y2){
    const dx = x2-x1, dy = y2-y1;
    const dist = Math.hypot(dx,dy);
    const steps = Math.max(1, Math.ceil(dist / (radius/2)));
    for(let i=0;i<=steps;i++){
      const t = i/steps;
      const x = x1 + dx*t;
      const y = y1 + dy*t;
      scratchAt(x,y);
    }
  }

  function pointerDown(e){
    if(card.classList.contains('revealed')) return;
    isDown = true;
    last = getPos(e);
    scratchAt(last.x,last.y);
    e.preventDefault();
  }
  function pointerMove(e){
    if(!isDown) return;
    const p = getPos(e);
    scratchLine(last.x,last.y,p.x,p.y);
    last = p;
    e.preventDefault();
  }
  function pointerUp(e){
    if(!isDown) return;
    isDown = false;
    checkReveal();
    e.preventDefault();
  }

  function getTransparentRatio(){
    const w = canvas.width;
    const h = canvas.height;
    const img = ctx.getImageData(0,0,w,h).data;
    let transparent = 0;
    for(let i=3;i<img.length;i+=32){
      if(img[i] === 0) transparent++;
    }
    const total = img.length/4/8;
    return transparent/total;
  }

  function checkReveal(){
    const ratio = getTransparentRatio();
    if(ratio > 0.42) revealCard();
  }

  /* Reveal path: fade overlay out (canvas) and add revealed class so front fades in.
     We also clear the canvas to avoid any residual overlay showing through.
  */
  function revealCard(){
    if(card.classList.contains('revealed')) return;
    // animate canvas fade then mark revealed
    canvas.style.transition = 'opacity .36s ease';
    canvas.style.opacity = '0';
    // small delay to let fade start, then finalize reveal
    setTimeout(()=>{
      // fully clear canvas pixels to avoid any leftover
      ctx.clearRect(0,0,canvas.width,canvas.height);
      card.classList.add('revealed');
      stats.played++;
      stats.lastPrize = prize.label;
      if(prize.label !== 'No Prize') stats.wins++;
      updateStats();
      badge.textContent = prize.label;
      card.setAttribute('aria-label', `Revealed: ${prize.label} - ${prize.sub}`);
      if(prize.label !== 'No Prize') startConfetti();
      // remove inline opacity after reveal so reset works cleanly
      canvas.style.opacity = '';
      canvas.style.transition = '';
    }, 260);
  }

  canvas.addEventListener('pointerdown', pointerDown);
  window.addEventListener('pointermove', pointerMove);
  window.addEventListener('pointerup', pointerUp);
  canvas.addEventListener('touchstart', pointerDown, {passive:false});
  canvas.addEventListener('touchmove', pointerMove, {passive:false});
  canvas.addEventListener('touchend', pointerUp);

  // double-click uses same reveal path (no mirrored text because we don't flip)
  canvas.addEventListener('dblclick', (e)=> {
    e.preventDefault();
    revealCard();
  });

  card.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      revealCard();
    }
  });

  card.reset = () => {
    card.classList.remove('revealed');
    setCanvasSize();
    badge.textContent = 'Reveal';
    card.setAttribute('aria-label','Scratch card');
    // ensure canvas visible again
    canvas.style.opacity = '';
  };
}

/* Confetti */
function startConfetti(){
  if(confettiRunning) return;
  confettiRunning = true;
  const count = 60;
  for(let i=0;i<count;i++){
    confettiParticles.push({
      x: Math.random()*confettiCanvas.width,
      y: -10 - Math.random()*200,
      vx: (Math.random()-0.5)*4,
      vy: 2 + Math.random()*4,
      size: 6 + Math.random()*8,
      rot: Math.random()*360,
      color: randomColor(),
      life: 0,
      ttl: 100 + Math.random()*80
    });
  }
  requestAnimationFrame(confettiLoop);
}
function randomColor(){ const palette = ['#ff7ab6','#ffb86b','#7ee787','#7c3aed','#60a5fa','#f472b6']; return palette[Math.floor(Math.random()*palette.length)]; }
function confettiLoop(){
  ctxConf.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  for(let i=confettiParticles.length-1;i>=0;i--){
    const p = confettiParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.rot += p.vx*2;
    p.life++;
    ctxConf.save();
    ctxConf.translate(p.x,p.y);
    ctxConf.rotate(p.rot * Math.PI/180);
    ctxConf.fillStyle = p.color;
    ctxConf.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
    ctxConf.restore();
    if(p.life > p.ttl || p.y > confettiCanvas.height + 50) confettiParticles.splice(i,1);
  }
  if(confettiParticles.length>0) requestAnimationFrame(confettiLoop);
  else confettiRunning = false;
}

/* Controls */
document.getElementById('newSetBtn').addEventListener('click', ()=> { layoutAndCreate(); });
document.getElementById('resetBtn').addEventListener('click', ()=>{
  const cards = cardsArea.querySelectorAll('.card');
  cards.forEach(c => c.reset && c.reset());
});
document.getElementById('autoRevealBtn').addEventListener('click', ()=>{
  const cards = Array.from(cardsArea.querySelectorAll('.card'));
  cards.forEach((c,idx) => {
    setTimeout(()=> {
      if(!c.classList.contains('revealed')){
        // call the same reveal path by simulating a direct reveal
        const canvas = c.querySelector('.scratch-canvas');
        const badge = c.querySelector('.badge');
        const prize = JSON.parse(c.dataset.prize);
        // fade canvas then finalize
        canvas.style.transition = 'opacity .36s ease';
        canvas.style.opacity = '0';
        setTimeout(()=>{
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0,0,canvas.width,canvas.height);
          c.classList.add('revealed');
          stats.played++;
          if(prize.label !== 'No Prize') stats.wins++;
          stats.lastPrize = prize.label;
          badge.textContent = prize.label;
          if(prize.label !== 'No Prize') startConfetti();
          canvas.style.opacity = '';
          canvas.style.transition = '';
          updateStats();
        }, 260);
      }
    }, idx*80);
  });
});

/* Init & responsive */
let resizeTimer = null;
function init(){
  resizeConfetti();
  layoutAndCreate();
  updateStats();
}
addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(init, 120);
});
addEventListener('orientationchange', ()=> setTimeout(init, 160));
init();

/* Ensure new cards are focusable */
const observer = new MutationObserver(()=>{
  const cards = cardsArea.querySelectorAll('.card');
  cards.forEach(c => c.setAttribute('tabindex','0'));
});
observer.observe(cardsArea, {childList:true});
</script>
</body>
</html>
