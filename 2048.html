<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>2048</title>
<style>
  :root{
    --bg:#faf8ef;
    --panel:#f7f2ef;
    --board:#bbada0;
    --cell:#cdc1b4;
    --tile-2:#eee4da;
    --tile-4:#ede0c8;
    --tile-text-dark:#776e65;
    --tile-text-light:#f9f6f2;
    --accent:#8f7a66;
    --text:#776e65;
  }
  body.dark{
    --bg:#121212;
    --panel:#1b1b1b;
    --board:#2b2b2b;
    --cell:#3a3a3a;
    --tile-2:#eee4da;
    --tile-4:#e6d6b8;
    --tile-text-dark:#eae6e0;
    --tile-text-light:#f9f6f2;
    --accent:#c9b79a;
    --text:#e6e1db;
  }

  html,body{height:100%;margin:0;font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;background:var(--bg);color:var(--text)}
  .topbar{display:flex;align-items:center;gap:12px;padding:18px}
  .back-btn{background:var(--panel);border:1px solid rgba(0,0,0,.06);padding:8px 12px;border-radius:6px;text-decoration:none;color:var(--text);font-weight:600;box-shadow:0 1px 0 rgba(0,0,0,.04)}
  .toggle-btn{background:transparent;border:1px solid rgba(0,0,0,.06);padding:8px 12px;border-radius:6px;color:var(--text);cursor:pointer;font-weight:700}
  .header{margin-left:auto;text-align:right}
  .score{display:inline-block;background:var(--panel);padding:8px 12px;border-radius:6px;font-weight:700;margin-left:8px}
  .container{max-width:520px;margin:18px auto;padding:20px}
  .game{background:var(--board);padding:16px;border-radius:8px;position:relative}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:12px;border-radius:6px;position:relative;overflow:hidden;transition:transform .08s ease, box-shadow .08s ease}
  .grid.key-press{transform:scale(.995);box-shadow:0 6px 18px rgba(0,0,0,.08) inset}
  .cell{width:100%;padding-top:100%;position:relative;background:var(--cell);border-radius:6px}
  /* tiles layer sits on top of cells */
  #tilesLayer{position:absolute;left:12px;top:12px;right:12px;bottom:12px;pointer-events:none;z-index:10}
  .tile{
    position:absolute;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:transform .18s cubic-bezier(.2,.8,.2,1), left .18s cubic-bezier(.2,.8,.2,1), top .18s cubic-bezier(.2,.8,.2,1), background .12s ease, opacity .12s ease;
    will-change:transform,left,top;
    box-shadow:0 2px 0 rgba(0,0,0,.08);
    transform-origin:center center;
    overflow:hidden;
  }
  .tile .value{transform:translateY(-2px);pointer-events:none}
  .controls{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
  .btn{background:var(--accent);color:var(--tile-text-light);padding:8px 12px;border-radius:6px;border:none;cursor:pointer;font-weight:700}
  .message{position:absolute;inset:0;background:rgba(238,228,218,.95);display:flex;align-items:center;justify-content:center;flex-direction:column;border-radius:8px;font-size:20px;z-index:20}
  .message h2{margin:0 0 8px 0}
  .small{font-size:14px;color:var(--text)}
  /* tile colors */
  .tile[data-value="2"]{background:var(--tile-2);color:var(--tile-text-dark)}
  .tile[data-value="4"]{background:var(--tile-4);color:var(--tile-text-dark)}
  .tile[data-value="8"]{background:#f2b179;color:var(--tile-text-light)}
  .tile[data-value="16"]{background:#f59563;color:var(--tile-text-light)}
  .tile[data-value="32"]{background:#f67c5f;color:var(--tile-text-light)}
  .tile[data-value="64"]{background:#f65e3b;color:var(--tile-text-light)}
  .tile[data-value="128"]{background:#edcf72;color:var(--tile-text-light);font-size:24px}
  .tile[data-value="256"]{background:#edcc61;color:var(--tile-text-light);font-size:24px}
  .tile[data-value="512"]{background:#edc850;color:var(--tile-text-light);font-size:24px}
  .tile[data-value="1024"]{background:#edc53f;color:var(--tile-text-light);font-size:20px}
  .tile[data-value="2048"]{background:#edc22e;color:var(--tile-text-light);font-size:20px}
  /* new/merged animations */
  .tile.new{transform:scale(.1);animation:pop .18s ease forwards}
  .tile.merged{animation:flash .18s ease}
  @keyframes pop{to{transform:scale(1)}}
  @keyframes flash{0%{transform:scale(1.15)}50%{transform:scale(.95)}100%{transform:scale(1)}}
  /* responsive */
  @media (max-width:420px){
    .container{padding:12px}
    .tile{font-size:20px}
  }
</style>
</head>
<body>
  <div class="topbar">
    <a class="back-btn" href="index.html">Back to dashboard</a>
    <button id="darkToggle" class="toggle-btn" aria-pressed="false">Dark mode</button>
    <div class="header">
      <div><strong>2048</strong></div>
      <div class="small">Use arrow keys or swipe</div>
    </div>
    <div style="margin-left:12px">
      <span class="score" id="score">Score: 0</span>
    </div>
  </div>

  <div class="container">
    <div class="game" id="game">
      <div class="grid" id="grid" aria-label="2048 game board">
        <!-- 16 static cells for background -->
        <div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div>
        <div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div>
        <div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div>
        <div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div><div class="cell" aria-hidden="true"></div>
      </div>

      <div id="tilesLayer"></div>

      <div class="controls">
        <button class="btn" id="newGame">New Game</button>
        <div class="small">Made with plain HTML/CSS/JS</div>
      </div>

      <div id="overlay" style="display:none" class="message" role="dialog" aria-modal="true">
        <h2 id="overlayTitle">Game Over</h2>
        <div id="overlayScore" class="small">Score: 0</div>
        <div style="margin-top:12px">
          <button class="btn" id="tryAgain">Try Again</button>
        </div>
      </div>
    </div>
  </div>

<script>
/* 2048 with correct movement, animations, key-press feedback, and dark mode */
(() => {
  const SIZE = 4;
  const gridEl = document.getElementById('grid');
  const tilesLayer = document.getElementById('tilesLayer');
  const scoreEl = document.getElementById('score');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayScore = document.getElementById('overlayScore');
  const newGameBtn = document.getElementById('newGame');
  const tryAgainBtn = document.getElementById('tryAgain');
  const darkToggle = document.getElementById('darkToggle');

  let board = [];
  let score = 0;
  let tileIdCounter = 1;

  function createEmptyBoard(){ return Array.from({length: SIZE}, ()=>Array(SIZE).fill(null)); }

  function init(){
    board = createEmptyBoard();
    score = 0;
    tileIdCounter = 1;
    updateScore();
    tilesLayer.innerHTML = '';
    spawnRandomAnimated(); spawnRandomAnimated();
    hideOverlay();
  }

  function updateScore(){ scoreEl.textContent = 'Score: ' + score; }

  function getCellSize(){
    const rect = gridEl.getBoundingClientRect();
    const gap = 12;
    const totalGap = gap * (SIZE - 1);
    const size = (rect.width - totalGap) / SIZE;
    return {size, gap};
  }

  function spawnRandomAnimated(){
    const empties = [];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!board[r][c]) empties.push([r,c]);
    if(!empties.length) return false;
    const [r,c] = empties[Math.floor(Math.random()*empties.length)];
    const val = Math.random() < 0.9 ? 2 : 4;
    const tile = {id: tileIdCounter++, value: val, r, c, merged: false};
    board[r][c] = tile;
    renderTiles(true, [tile]);
    return true;
  }

  function renderTiles(animateNew=false, newTiles=[]){
    const {size, gap} = getCellSize();
    // map existing by id
    const existing = {};
    tilesLayer.querySelectorAll('.tile').forEach(el=>{
      existing[el.dataset.id] = el;
      el.dataset.moved = 'false';
    });

    const currentTiles = [];
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const t = board[r][c];
        if(t) currentTiles.push(t);
      }
    }

    // remove stale elements
    for(const id in existing){
      if(!currentTiles.find(t=>String(t.id)===id)){
        const el = existing[id];
        el.style.transition = 'opacity .12s ease';
        el.style.opacity = '0';
        setTimeout(()=>el.remove(), 140);
      }
    }

    // create/update elements
    currentTiles.forEach(t=>{
      let el = existing[t.id];
      const left = (t.c * (size + gap));
      const top = (t.r * (size + gap));
      if(!el){
        el = document.createElement('div');
        el.className = 'tile';
        el.dataset.id = t.id;
        el.dataset.value = t.value;
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.left = left + 'px';
        el.style.top = top + 'px';
        el.style.fontSize = Math.max(18, Math.floor(size/3.5)) + 'px';
        el.innerHTML = '<div class="value">' + t.value + '</div>';
        tilesLayer.appendChild(el);
        if(animateNew && newTiles && newTiles.find(nt=>nt.id===t.id)){
          el.classList.add('new');
          setTimeout(()=>el.classList.remove('new'), 220);
        }
      } else {
        // update value and animate move/merge
        el.dataset.value = t.value;
        const valEl = el.querySelector('.value');
        if(valEl) valEl.textContent = t.value;
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.fontSize = Math.max(18, Math.floor(size/3.5)) + 'px';
        requestAnimationFrame(()=>{
          el.style.left = left + 'px';
          el.style.top = top + 'px';
        });
        if(t.merged){
          el.classList.add('merged');
          setTimeout(()=>el.classList.remove('merged'), 220);
          t.merged = false;
        }
      }
    });
  }

  // movement logic: update tile.r and tile.c whenever a tile moves
  function move(direction){
    if(overlay.style.display === 'flex') return false;
    let moved = false;
    const vector = {up:[-1,0], down:[1,0], left:[0,-1], right:[0,1]}[direction];
    const traversals = buildTraversals(direction);

    // reset merged flags
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(board[r][c]) board[r][c].merged = false;

    for(const r of traversals.rows){
      for(const c of traversals.cols){
        const tile = board[r][c];
        if(!tile) continue;
        let rr = r, cc = c;
        while(true){
          const nr = rr + vector[0];
          const nc = cc + vector[1];
          if(nr<0||nr>=SIZE||nc<0||nc>=SIZE) break;
          const next = board[nr][nc];
          if(!next){
            // move tile object and update its coordinates
            board[nr][nc] = board[rr][cc];
            board[rr][cc] = null;
            board[nr][nc].r = nr;
            board[nr][nc].c = nc;
            rr = nr; cc = nc;
            moved = true;
            continue;
          } else if(next.value === tile.value && !next.merged && !tile.merged){
            // merge into next
            next.value *= 2;
            next.merged = true;
            // remove current tile
            board[rr][cc] = null;
            // ensure next has correct coords (it already does)
            score += next.value;
            moved = true;
            break;
          } else break;
        }
      }
    }

    if(moved){
      updateScore();
      // show sliding animation
      renderTiles(false);
      // spawn new tile after a short delay so the slide is visible
      setTimeout(()=>{
        spawnRandomAnimated();
        renderTiles(true);
        if(checkWin()){
          showOverlay('You Win!', score);
        } else if(!movesAvailable()){
          showOverlay('Game Over', score);
        }
      }, 120);
    }
    return moved;
  }

  function buildTraversals(direction){
    const range = (start,end,step)=>{
      const a=[];
      if(step>0) for(let i=start;i<=end;i+=step) a.push(i);
      else for(let i=start;i>=end;i+=step) a.push(i);
      return a;
    };
    if(direction==='left') return {rows: range(0,SIZE-1,1), cols: range(0,SIZE-1,1)};
    if(direction==='right') return {rows: range(0,SIZE-1,1), cols: range(SIZE-1,0,-1)};
    if(direction==='up') return {rows: range(0,SIZE-1,1), cols: range(0,SIZE-1,1)};
    if(direction==='down') return {rows: range(SIZE-1,0,-1), cols: range(0,SIZE-1,1)};
  }

  function checkWin(){
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(board[r][c] && board[r][c].value===2048) return true;
    return false;
  }

  function movesAvailable(){
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
      if(!board[r][c]) return true;
      const v = board[r][c].value;
      if(r+1<SIZE && board[r+1][c] && board[r+1][c].value===v) return true;
      if(c+1<SIZE && board[r][c+1] && board[r][c+1].value===v) return true;
    }
    return false;
  }

  function showOverlay(title, sc){
    overlayTitle.textContent = title;
    overlayScore.textContent = 'Score: ' + sc;
    overlay.style.display = 'flex';
  }
  function hideOverlay(){ overlay.style.display = 'none'; }

  // keyboard with key-press visual feedback
  let keyPressTimeout = null;
  window.addEventListener('keydown', (e)=>{
    if(overlay.style.display === 'flex') return;
    let handled = true;
    switch(e.key){
      case 'ArrowUp': triggerKeyPress(); move('up'); break;
      case 'ArrowDown': triggerKeyPress(); move('down'); break;
      case 'ArrowLeft': triggerKeyPress(); move('left'); break;
      case 'ArrowRight': triggerKeyPress(); move('right'); break;
      default: handled = false;
    }
    if(handled) e.preventDefault();
  });

  function triggerKeyPress(){
    gridEl.classList.add('key-press');
    if(keyPressTimeout) clearTimeout(keyPressTimeout);
    keyPressTimeout = setTimeout(()=> gridEl.classList.remove('key-press'), 120);
  }

  // touch swipe support
  let touchStartX=0, touchStartY=0;
  window.addEventListener('touchstart', (e)=>{
    if(e.touches.length===1){
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }
  }, {passive:true});
  window.addEventListener('touchend', (e)=>{
    if(overlay.style.display === 'flex') return;
    const touch = e.changedTouches[0];
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;
    const absX = Math.abs(dx), absY = Math.abs(dy);
    if(Math.max(absX,absY) < 30) return;
    if(absX > absY){
      triggerKeyPress();
      if(dx>0) move('right'); else move('left');
    } else {
      triggerKeyPress();
      if(dy>0) move('down'); else move('up');
    }
  }, {passive:true});

  // window resize -> re-render tile sizes/positions
  window.addEventListener('resize', ()=>renderTiles(false));

  // buttons
  newGameBtn.addEventListener('click', init);
  tryAgainBtn.addEventListener('click', init);

  // dark mode toggle
  function applyDarkMode(pref){
    if(pref) document.body.classList.add('dark');
    else document.body.classList.remove('dark');
    darkToggle.setAttribute('aria-pressed', String(!!pref));
    darkToggle.textContent = pref ? 'Light mode' : 'Dark mode';
    try { localStorage.setItem('2048-dark', pref ? '1' : '0'); } catch(e){}
  }
  darkToggle.addEventListener('click', ()=>{
    const isDark = document.body.classList.toggle('dark');
    applyDarkMode(isDark);
  });
  // load preference
  try {
    const saved = localStorage.getItem('2048-dark');
    applyDarkMode(saved === '1');
  } catch(e){ applyDarkMode(false); }

  // initialize
  init();
})();
</script>
</body>
</html>
